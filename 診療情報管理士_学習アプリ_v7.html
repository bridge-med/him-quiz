      {"id":"ch10-001","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"10章で扱われる実務分野の組み合わせとして正しいのはどれか。","choices":{"A":"DPC、医師事務作業補助者、がん登録","B":"介護保険、訪問看護、感染対策","C":"電子カルテ、看護管理、救急搬送","D":"医療安全、栄養管理、薬剤管理","E":"診療報酬、医療法、災害医療"},"correctAnswer":"A","explanation":"【正答の根拠】第10章は『診療情報管理III』として、診療情報管理士の応用的実務である『DPC・医師事務作業補助者・がん登録』の3分野を扱う。いずれも診療記録から情報を抽出・コード化し、制度運用やデータ活用につなげる業務で、診療情報管理士の専門性が最も活かされる領域。\n【誤答の整理】他の選択肢は医療実務に関わるが、診療情報管理士の中核業務とは直接的に結びつかない。\n【補足】この3分野の共通項は『ICDなどの分類体系を使って、診療記録から統計・請求・登録用のデータを生成する』こと。章全体の問題はこの視点で整理できる。","tags":["10章","章構成","DPC","医師事務作業補助者","がん登録"]},
      {"id":"ch10-002","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"DPCと診療情報管理士(診療情報管理部門)の関わりとして最も適切なのはどれか。","choices":{"A":"DPCは診療情報管理士とは無関係である","B":"診療情報管理士はDPC関連データの整備や精度確保に関わる重要な職種である","C":"診療情報管理士はDPCでは請求業務だけを行う","D":"DPCは医師のみで運用できるため診療情報管理士は不要である","E":"DPCでは診療録の質は問われない"},"correctAnswer":"B","explanation":"【正答の根拠】DPC制度はICD-10に基づく傷病名コーディングが出発点となるため、ICDを扱える診療情報管理士の専門性が不可欠。DPC対象病院の施設基準には『診療録管理体制加算』の届出と『適切なコーディングに関する委員会』の設置が含まれ、いずれも診療情報管理士が中核的に関わる。\n【誤答の整理】A：DPCとICDコーディングは表裏一体。C：請求業務だけでなく、データの抽出・精度管理・委員会運営まで関与。D：医師だけでは適切なコーディングとデータ精度確保は困難。E：DPCの根幹は診療録の質（医療資源病名の根拠）にあり『診療録の質が診療報酬に直結する』のがDPCの特徴。\n【補足】『DPC対象病院＝診療録管理体制加算＋コーディング委員会＋診療情報管理士』は施設基準の三点セット。","tags":["DPC","診療情報管理士","役割"]},
      {"id":"ch10-003","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"1998年11月から開始されたものとして本文で示されていたのはどれか。","choices":{"A":"全国がん登録","B":"医師事務作業補助体制加算","C":"国立病院等10病院に対する入院医療の定額支払制度、いわゆる日本版DRGの試行的導入","D":"病院情報の公表制度","E":"電子カルテ保存の全面義務化"},"correctAnswer":"C","explanation":"【正答の根拠】1998年(平成10年)11月、国立病院等10病院(当時の8国立病院＋2社会保険病院)で『急性期入院医療の定額支払い方式の試行』が開始された。これが『日本版DRG/PPS』と呼ばれ、現在のDPC制度の直接の前身。米国DRG/PPS(1983年メディケア導入)の日本版として検討された。\n【誤答の整理】A：全国がん登録は2016年1月施行。B：医師事務作業補助体制加算は2008年度改定で創設。D：病院情報の公表は2017年度改定以降の仕組み。E：電子カルテの全面義務化はされていない(医療DX推進は進行中)。\n【年号整理】1998年11月(日本版DRG試行開始)→ 2003年4月(DPC制度開始、82特定機能病院)→ 2006年4月(DPC対象病院の名称確定、本格運用)。","tags":["DPC","日本版DRG","1998年"]},
      {"id":"ch10-004","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"DPCの分類開発や妥当性検証・評価等に必要なデータとして本文で示されていたのはどれか。","choices":{"A":"患者アンケートのみ","B":"影響調査データ(当初は基礎調査)","C":"医師の経験則のみ","D":"看護必要度だけ","E":"会計伝票だけ"},"correctAnswer":"B","explanation":"【正答の根拠】DPC制度の維持・改善には『DPC導入の影響評価に係る調査』、いわゆる『影響調査(退院患者調査)』のデータが不可欠。当初は『基礎調査』と呼ばれたが現在は『影響調査』に改称。対象病院から提出される様式1(診療録情報)・様式3(施設情報)・EFファイル(医療行為情報)等から構成され、分類の妥当性検証や係数計算、改定判断に使われる。\n【誤答の整理】A：患者アンケートは参考情報にすぎない。C：経験則だけでは科学的な分類開発は不可能。D：看護必要度は入院基本料の指標で、DPC分類の中心データではない。E：会計伝票だけでは臨床的分類はできない。\n【補足】DPC対象病院・準備病院は毎月データ提出が義務。2024年度改定では『月90症例未満』の病院は制度から退出することになった。","tags":["影響調査","基礎調査","DPC"]},
      {"id":"ch10-005","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"影響調査データに求められる性質として最も適切なのはどれか。","choices":{"A":"速報性だけが重要で精度は問われない","B":"高い精度を持っていることが必要である","C":"病院ごとに定義が異なる方が望ましい","D":"紙媒体であることが条件である","E":"診療録とは無関係に作成できる"},"correctAnswer":"B","explanation":"【正答の根拠】影響調査データはDPC分類の開発・改定・診療報酬算定の根拠になるため、高い精度が必須。精度が低いとアップコーディング(不正に高い報酬を得る操作)や制度の歪みを招き、厚労省も『適切なコーディングに関する委員会』の開催(年4回以上、望ましくは毎月)を義務付けている。\n【誤答の整理】A：速報性より精度が優先。C：病院ごとに定義が違えば全国データとして比較不能。D：現在はすべて電子提出。E：診療録を基にコーディングするので無関係ではありえない。\n【補足】データ精度の担保は『記載(医師)→抽出(診療情報管理士)→コーディング→監査(委員会)』の全工程で行う。診療録の記載品質が根本。","tags":["影響調査","データ精度","DPC"]},
      {"id":"ch10-006","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"DPCにおける傷病名選択の考え方として本文に合致するのはどれか。","choices":{"A":"ICDとは無関係に各病院が独自に選択する","B":"ICDを基本として行う","C":"診断書の病名だけをそのまま用いる","D":"傷病名は不要で手術名だけで決まる","E":"すべてダブルコーディングを適用する"},"correctAnswer":"B","explanation":"【正答の根拠】DPCは『疾病及び関連保健問題の国際統計分類(ICD-10 2003年版準拠)』を基本に傷病名を選択する。DPC14桁コードの上6桁(MDCコード2桁＋傷病名4桁)はICD-10と対応しており、ICDの理解がDPC精度の前提となる。\n【誤答の整理】A：病院独自ではICDが基盤。C：診断書の病名をそのまま使うのではなく、入院中に『最も医療資源を投入した傷病名』を選択(医療資源病名)。D：DPCは傷病名＋手術・処置の組み合わせ。E：ダブルコーディングは特定の病態のみ(剣印・星印システム)で、すべてではない。\n【補足】DPCでは『医療資源病名＝ICD上の主要病態』と読み替える。MBルール(Q38-40)の適用もここで効いてくる。","tags":["DPC","ICD","傷病名選択"]},
      {"id":"ch10-007","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"質の高い影響調査データ作成の前提として、本文で重視されていたものはどれか。","choices":{"A":"診療記録や退院時要約の質","B":"病院の建物規模","C":"患者満足度調査のみ","D":"レセプト提出の速さだけ","E":"医師の経験年数だけ"},"correctAnswer":"A","explanation":"【正答の根拠】DPCコーディングの根拠は診療録と退院時要約。医師の記載が曖昧だと、診療情報管理士がいかに優秀でも適切なコーディングはできない。『不適切な病名(部位不明の悪性新生物C80、性状不詳D48等の乱用)』は精度低下の典型で、厚労省の傷病名コーディングテキストでも明示的に注意喚起されている。\n【誤答の整理】B：建物規模は無関係。C：患者満足度は別指標。D：速さは副次的、まず精度。E：経験年数だけでは記載品質の保証にならない。\n【補足】『診療録の質 → 抽出の質 → コーディングの質 → データの質 → 制度の質』という連鎖。退院時要約は特に重要で、DPC対象病院は『退院後14日以内の作成率9割以上』が診療録管理体制加算1の要件。","tags":["影響調査","退院時要約","診療記録"]},
      {"id":"ch10-008","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"病院情報の公表に関する説明として最も適切なのはどれか。","choices":{"A":"DPC対象病院では病院情報は公表されない","B":"病院指標や医療の質指標などが公表対象となる","C":"公表されるのは病院の建築年だけである","D":"患者個人名を公表する制度である","E":"病院情報の公表と診療情報管理士は無関係である"},"correctAnswer":"B","explanation":"【正答の根拠】DPC制度の一環として、DPC対象病院は自院ホームページで『病院指標(診療実績等)』と『医療の質指標(質評価項目)』を公表する。機能評価係数II(地域医療指数・体制評価指数)の評価項目にもなっており、公表は評価加点対象。\n【誤答の整理】A：DPC対象病院は公表が評価対象。C：建築年は対象外。D：患者個人名は個人情報保護上あり得ない。E：公表データは診療情報管理士が抽出・集計する中核業務。\n【補足】病院指標の7項目：(1)年齢階級別退院患者数、(2)診断群分類別患者数、(3)初発・再発別5大がん患者数、(4)成人市中肺炎の重症度別患者数、(5)脳梗塞の病型別患者数、(6)診療科別主要手術件数、(7)DPC別在院日数等。","tags":["病院情報の公表","病院指標","医療の質指標"]},
      {"id":"ch10-009","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"病院情報の公表における病院指標の例として適切なのはどれか。","choices":{"A":"年齢階級別退院患者数","B":"病院長の在任年数","C":"職員食堂の利用率","D":"病院建築費","E":"医局会開催回数"},"correctAnswer":"A","explanation":"【正答の根拠】病院指標の代表項目：(1)年齢階級別退院患者数(10歳刻みの退院患者集計)、(2)診断群分類別患者数等、(3)初発・再発別5大がん患者数、(4)成人市中肺炎の重症度別、(5)脳梗塞の病型別、(6)診療科別主要手術件数、(7)DPC別在院日数(自院と全国比較)。これらはいずれも診療録・DPCデータから診療情報管理士が抽出・集計する。\n【誤答の整理】B・C・D・Eはいずれも診療実績ではなく経営・運営情報で、病院情報の公表の対象ではない。\n【補足】年齢階級別退院患者数は病院の患者層(高齢者中心か、小児中心か等)を示す基礎指標。この7項目を押さえれば『病院指標の中身』は全体把握できる。","tags":["病院情報の公表","病院指標","退院患者数"]},
      {"id":"ch10-010","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"病院情報の公表における医療の質指標の例として適切なのはどれか。","choices":{"A":"病床数","B":"血液培養2セット実施率","C":"病院敷地面積","D":"救急車の台数","E":"診療科数"},"correctAnswer":"B","explanation":"【正答の根拠】医療の質指標は『実際の診療プロセスの質』を測る指標。代表例は『血液培養2セット実施率(敗血症疑い時に2セット以上採取する適正な検査プロセスの評価)』、『広域スペクトル抗菌薬使用時の適切な培養実施率』、『手術開始前1時間以内の予防的抗菌薬投与率』、『転倒・転落による損傷発生率』、『入院患者の褥瘡発生率』など。\n【誤答の整理】A・C・D・Eは『構造(structure)』や『規模』の指標で、医療の質(プロセス・アウトカム)とは別。医療の質評価は『ドナベディアンモデル(構造・過程・結果)』でいう過程と結果の指標。\n【補足】血液培養2セットは、1セットだと汚染菌なのか真の菌血症か判別困難なため、2セット採取が感染症診療の国際標準。これを実施できているかは病院の質の象徴的指標。","tags":["医療の質指標","血液培養","病院情報の公表"]},
      {"id":"ch10-011","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"2024(令和6)年度の病院情報の公表について本文で示されていたものはどれか。","choices":{"A":"病院指標がすべて廃止された","B":"医療の質指標3項目が追加された","C":"DPCが廃止された","D":"がん登録項目が削除された","E":"診療情報管理士の関与が不要になった"},"correctAnswer":"B","explanation":"【正答の根拠】2024年度(令和6年度)診療報酬改定で、医療の質指標が拡充・追加された。また機能評価係数IIの体制評価指数に『医療の質向上に向けた取り組み』評価項目が新設され、医療の質指標のデータ提出・公表が評価対象に。『医療の質指標の自院ホームページ公表』に加点(令和7年度以降の評価)も導入。\n【誤答の整理】A：病院指標は継続。C：DPCは拡充(改定継続)。D：がん登録は別制度で削除されていない。E：診療情報管理士の関与はむしろ重要度が増している。\n【補足】2024年度改定は『医療の質可視化プロジェクト』の方向性も反映。診療情報管理士にとって『質指標の計測・公表支援』が新たな業務領域として明確化された。","tags":["2024年度","病院情報の公表","医療の質指標"]},
      {"id":"ch10-012","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"DPC制度におけるデータ精度の重要性として最も適切なのはどれか。","choices":{"A":"精度が低くても診療や制度には影響しない","B":"精度が低いと医療過誤や制度の歪みにつながる可能性がある","C":"精度は会計部門だけの問題である","D":"病院外では影響しない","E":"データ精度は影響調査には不要である"},"correctAnswer":"B","explanation":"【正答の根拠】DPCデータの精度が低いと：(1)院内では診療プロセスの問題(アレルギー情報漏れ等)が見逃されて医療過誤につながる、(2)院外では不正確な分類集計が全国集計に混入し、診断群分類の設定・係数計算を歪め、制度全体の公平性を損なう。厚労省は『アップコーディング』を名指しで問題視し、コーディング委員会設置を義務化している。\n【誤答の整理】A：精度は診療・制度の根幹。C：診療情報管理部門・医師・コーディング委員会全体の問題。D：全国集計に影響する。E：影響調査こそ精度が命。\n【補足】『精度低下 → 個別病院の医療安全リスク ＋ 制度全体の歪み』の二重の害がある。『自院だけの問題』ではない。","tags":["データ精度","DPC","医療安全"]},
      {"id":"ch10-013","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"本文で「はがしなデータ」の問題として示唆されていた背景として最も適切なのはどれか。","choices":{"A":"詳細な病名が分かっていても、入力やチェックの不備で精度が落ちることがある","B":"電子カルテでは常に精度が保証される","C":"診療録の内容はDPCに反映されない","D":"病名の詳細性はDPCでは不要である","E":"部位不明コードは必ず正しい"},"correctAnswer":"A","explanation":"【正答の根拠】臨床現場では詳細な病名(例：噴門部癌＝C16.0)が分かっているにもかかわらず、入力やチェック体制の不備で『C16.9(胃部位不明)』『C80(部位不明の悪性新生物)』等の曖昧なコードが多用される問題がある。詳細情報が粗いコードに『剥がされて』しまう現象で、厚労省も留意コードとして警告している。\n【誤答の整理】B：電子カルテでも入力品質と運用品質で精度は変動する。C：診療録こそDPCの根拠。D：詳細性は診断群分類の精度に直結。E：部位不明コードは極力避けるべきコード。\n【補足】留意すべきICDコード：C80(部位不明の悪性新生物)、D37-D44・D48(性状不詳の新生物)、各種.9(詳細不明)。これらを避け、可能な限り具体的コードを選ぶのが精度の鍵。","tags":["データ精度","ICDコーディング","チェック体制"]},
      {"id":"ch10-014","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"DPC対象病院における精度向上策として本文で示されていたものはどれか。","choices":{"A":"コーディングに関する委員会の設置","B":"診療録の廃止","C":"ICDの使用禁止","D":"外来患者のデータ削除","E":"病院情報の非公表"},"correctAnswer":"A","explanation":"【正答の根拠】DPC対象病院は『適切なコーディングに関する委員会(コーディング委員会)』の設置が義務。年4回以上(望ましくは毎月)開催し、『DPC/PDPS傷病名コーディングテキスト(厚労省保険局医療課)』を活用した検討を行う。メンバーには医師、診療情報管理士、医事課職員等が含まれる。\n【誤答の整理】B・C：診療録とICDはDPCの基盤で廃止や禁止はありえない。D：外来データ削除は精度向上と逆行。E：公表はむしろ評価対象で、非公表は減点。\n【補足】コーディング委員会はDPC制度の品質保証(QA)の中核。医師・管理士・医事が連携して『病名記載→コーディング→点検』のPDCAを回す場。診療情報管理士が実務的な中心になる。","tags":["DPC","精度向上","委員会","コーディング"]},
      {"id":"ch10-015","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"DPCデータの活用として最も適切なのはどれか。","choices":{"A":"他院比較や在院日数分析などのベンチマークに用いる","B":"患者個人名を公表するために用いる","C":"データは請求後すぐ廃棄する","D":"診療科の統廃合だけに限定して使う","E":"研究には利用できない"},"correctAnswer":"A","explanation":"【正答の根拠】DPCデータは請求目的を超えて多面的に活用される：(1)ベンチマーク(他院との在院日数・治療パターン比較)、(2)診療プロセス改善(クリニカルパスの見直し)、(3)経営分析(収益構造、診療科別採算)、(4)臨床研究・疫学研究(DPCデータベース研究として論文化多数)、(5)医療政策立案(診療報酬改定の根拠データ)。\n【誤答の整理】B：個人情報保護上あり得ない。C：統計・研究目的で保管される。D：統廃合だけでなく医療の質改善・研究など多岐に活用。E：MDV社・厚労省公開データ等による研究は盛ん。\n【補足】DPCデータは日本の医療ビッグデータの中核で、国際誌掲載の日本発臨床研究にも多用される。診療情報管理士が『請求係』から『データ活用推進者』へ役割拡大する基盤。","tags":["DPCデータ活用","在院日数","ベンチマーク"]},
      {"id":"ch10-016","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"厚生労働省が公表するDPC病院データの活用例として適切なのはどれか。","choices":{"A":"在院日数や再入院の状況などを比較する","B":"職員の私的メールを閲覧する","C":"患者個人の資産を調べる","D":"病院の土地価格を算定する","E":"救急車の走行距離だけを集計する"},"correctAnswer":"A","explanation":"【正答の根拠】厚労省が公表するDPC病院データの活用項目は広範：(1)在院日数(診断群分類別、病院別、全国平均)、(2)再入院の状況、(3)退院先(自宅・他院・介護施設等)、(4)MDC(主要診断群)構成、(5)手術実施率、(6)救急対応状況など。病院間ベンチマークの基礎になる。\n【誤答の整理】B〜E：いずれも診療データとは無関係、または個人情報保護違反や目的外利用にあたる。\n【補足】再入院率は『退院後の診療継続性』を示す質指標の1つ。短すぎる在院日数で早期退院→再入院が増えると、真の効率化とは言えない。DPCデータはこうした『見せかけの効率化』も可視化できる。","tags":["DPCデータ活用","厚生労働省","比較"]},
      {"id":"ch10-017","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者の導入が進んだ背景として最も適切なのはどれか。","choices":{"A":"医師不足や地域偏在、さらに医師の勤務環境改善への対応","B":"診療録を不要にするため","C":"看護師を廃止するため","D":"診療報酬請求をなくすため","E":"病院情報公表をやめるため"},"correctAnswer":"A","explanation":"【正答の根拠】2000年代以降、勤務医の過重労働、医師不足、地方の医師偏在が社会問題化。特に書類作成(診断書・紹介状・主治医意見書等)が医師の時間を圧迫していた。その対策として『医療関係職と事務職員の役割分担推進』が打ち出され、医師事務作業補助者が制度化された。2024年4月の医師の時間外労働規制(働き方改革)でさらに重要性が高まっている。\n【誤答の整理】B〜E：いずれも医師事務作業補助者の導入目的ではない。診療録・看護師・請求事務・病院情報公表は医療制度の根幹で、廃止・縮減の対象ではない。\n【補足】背景キーワード：(1)医師不足 (2)地域偏在 (3)勤務環境改善 (4)医師の働き方改革(2024年4月〜)。これら4つはすべて根底でつながっている。","tags":["医師事務作業補助者","背景","医師不足","地域偏在"]},
      {"id":"ch10-018","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"本文で示されていた通知として正しいのはどれか。","choices":{"A":"2007年12月28日医政局長通知『医師及び医療関係職と事務職員等との間等での役割分担の推進について』","B":"2016年1月1日医療法全面改正通知","C":"1998年11月病院情報公表通知","D":"2003年全国がん登録通知","E":"2024年電子カルテ義務化通知"},"correctAnswer":"A","explanation":"【正答の根拠】2007年12月28日付の医政局長通知『医師及び医療関係職と事務職員等との間等での役割分担の推進について』(医政発第1228001号)が、医師事務作業補助者の業務範囲を公式に示した最初の根幹通知。診断書・診療録・処方せん作成などで『医師が最終確認・署名することを条件に、事務職員が代行可能』と明記。\n【誤答の整理】B：医療法全面改正ではない日付。C：病院情報公表は2017年度以降。D：全国がん登録は2016年1月施行。E：電子カルテ全面義務化は2024年時点で未実施(医療DX推進中)。\n【補足】この通知は翌2008年度診療報酬改定の『医師事務作業補助体制加算』創設の根拠になった。『通知→加算創設→現場普及』の流れを押さえる。","tags":["医師事務作業補助者","通知","2007年"]},
      {"id":"ch10-019","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助体制加算について正しいのはどれか。","choices":{"A":"2008年度診療報酬改定で生まれ、医師事務作業補助者の業務が評価対象になった","B":"1998年に全国がん登録と同時に創設された","C":"2024年に初めて創設された","D":"診療報酬とは無関係である","E":"看護補助加算の別名である"},"correctAnswer":"A","explanation":"【正答の根拠】医師事務作業補助体制加算(A207-2)は2008年度(平成20年度)診療報酬改定で創設。勤務医の負担軽減・処遇改善を目的とし、医師事務作業補助者を配置した医療機関の入院初日に加算される。配置人数に応じて複数区分があり、診療報酬改定のたびに点数が引き上げられ、評価は年々拡充されている。\n【誤答の整理】B：1998年は日本版DRG試行。全国がん登録とは別で同時ではない。C：2024年は創設ではなく拡充改定年。D：診療報酬そのもの。E：看護補助加算(看護補助者配置の加算)とは別物。\n【補足】『2008年創設』は医療制度史の重要年号。同年は後期高齢者医療制度も始まっており、医療制度の大転換期だった。","tags":["医師事務作業補助体制加算","2008年","診療報酬改定"]},
      {"id":"ch10-020","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者が関わる書類作成に関する説明として最も適切なのはどれか。","choices":{"A":"医師の関与なく自由に診断書を作成できる","B":"医師が最終的に確認し署名することを前提に、補助者が記載を代行できる場合がある","C":"処方せんは補助者が単独で発行できる","D":"主治医意見書は看護師しか扱えない","E":"診療録作成補助は一切認められない"},"correctAnswer":"B","explanation":"【正答の根拠】2007年通知の要点：診断書・診療録・処方せんは『診察した医師が作成する書類で作成責任は医師が負う』が、『医師が最終的に確認し署名することを条件に、事務職員が記載を代行できる』。つまり『代行入力＋医師の確認・署名』が原則のスキーム。\n【誤答の整理】A：医師の関与なしは不可。作成責任は医師。C：処方せんは医師法により医師の発行が必須、単独発行は不可。D：主治医意見書も医師が最終確認のもと、医師事務作業補助者が代行可能。E：診療録代行入力は主要業務の1つ(認められる)。\n【補足】『医師の指示 → 代行入力 → 医師の確認・署名』の3段階が必須。この流れが崩れると無資格診療や文書偽造につながる。","tags":["医師事務作業補助者","書類作成","診断書","処方せん"]},
      {"id":"ch10-021","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"主治医意見書の作成補助について本文に合致するのはどれか。","choices":{"A":"医師の確認は不要である","B":"医師が最終確認し署名することを条件に、補助者が記載代行できる場合がある","C":"介護保険とは無関係である","D":"補助者が単独で法的責任を負う","E":"病院外では扱えない"},"correctAnswer":"B","explanation":"【正答の根拠】主治医意見書は介護保険法に基づき、要介護認定申請時に市町村が主治医に作成を求める書類。これも診断書・処方せんと同様、『医師の最終確認・署名』を条件に、医師事務作業補助者による記載代行が可能。\n【誤答の整理】A：医師の確認は必須。C：介護保険制度の中核書類。D：補助者は法的責任を負わない(作成責任は医師)。E：病院・診療所・介護施設など主治医が属する機関で扱う。\n【補足】主治医意見書は介護認定の根幹書類で、記載内容が要介護度の決定に直結する。医師事務作業補助者の活躍する典型業務。","tags":["主治医意見書","介護保険","医師事務作業補助者"]},
      {"id":"ch10-022","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者の業務として本文で示されていたものはどれか。","choices":{"A":"医療上の判断が必要な診断そのものの決定","B":"診察や検査の予約に関する事務、オーダリングシステム入力補助","C":"手術適応の最終判断","D":"薬剤の単独処方","E":"病理解剖の実施"},"correctAnswer":"B","explanation":"【正答の根拠】医師事務作業補助者の業務範囲(2007年通知・診療報酬通知)：(1)文書作成補助(診断書・診療情報提供書等)、(2)診療記録への代行入力、(3)医療の質向上に資する事務作業(データ整理、がん登録統計等)、(4)オーダリングシステム入力補助、(5)診察・検査予約事務、(6)行政業務(感染症サーベイランス入力等)。医療判断を伴わない事務が中心。\n【誤答の整理】A・C：医療上の判断は医師の専権。D：処方権は医師のみ。E：病理解剖は病理医の業務。\n【補足】『医師の判断を代行する業務は不可、医師の判断を記録・伝達する業務は可』が分岐点。","tags":["医師事務作業補助者","予約","オーダリングシステム"]},
      {"id":"ch10-023","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者が担当しうる「その他」の業務として本文に示されていたものはどれか。","choices":{"A":"医療上の判断を伴う治療方針の決定","B":"診療報酬請求書の作成、伝票整理、医療判断を要しない電話対応など","C":"手術の執刀","D":"病理診断の確定","E":"がん登録の届出免除判定"},"correctAnswer":"B","explanation":"【正答の根拠】教科書本文では、医師事務作業補助者の『その他の業務』として、診療報酬請求書作成の補助、伝票整理、医療判断を要しない電話対応等が例示されている。\n【注意】ただし、診療報酬通知(A207-2)の最新解釈では、『診療報酬の請求事務(DPCのコーディングに係る業務を含む)、窓口・受付業務、医療機関の経営・運営のためのデータ収集業務、看護業務の補助及び物品運搬業務等は医師事務作業補助者の業務としない』と明示されており、加算の対象業務としては除外される方向で整理されている。教科書の記載は広めの定義に基づくため、試験では教科書記載に従うが、実務では最新通知を確認することが重要。\n【誤答の整理】A・C：医療判断・医療行為は医師・専門職の業務。D：病理診断は病理医。E：がん登録の届出判定は医師の判断。\n【補足】医師事務作業補助体制加算の対象業務は、(1)文書作成補助、(2)代行入力、(3)医療の質向上業務、(4)患者対応業務、(5)行政業務に限定されるため、試験では教科書記載、実務では加算要件を優先という二重基準を理解しておく。","tags":["医師事務作業補助者","その他業務","電話対応","請求書"]},
      {"id":"ch10-024","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者の配置や体制について本文で示されていたものとして適切なのはどれか。","choices":{"A":"配置後の研修は不要である","B":"配置には32時間の研修が求められている","C":"全国統一の国家資格が必須である","D":"すべての病院で名称と業務範囲が法律で完全に同一化されている","E":"責任者の配置は不要である"},"correctAnswer":"B","explanation":"【正答の根拠】医師事務作業補助体制加算の施設基準：配置後6か月以内に、基礎知識習得のため32時間以上の研修を実施することが義務づけられている。研修内容には医療関連法規の概要、個人情報保護、一般的な医療内容、診療録の記載、電子カルテ、医療安全等が含まれる。\n【誤答の整理】A：研修は義務。C：国家資格は存在しない(民間資格としてドクターズクラーク®等はあるが必須ではない)。D：名称は医療機関ごとに異なる(医療クラーク、MA、DA、臨床支援士等)。業務範囲も細部は施設ごとに運用。E：業務管理・改善のための責任者配置は必要。\n【覚え方】『32時間・6か月以内・基礎知識』がキーセット。","tags":["医師事務作業補助者","研修","32時間"]},
      {"id":"ch10-025","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者の研修について正しいのはどれか。","choices":{"A":"新規配置後6か月以内に32時間以上の研修を行うことが求められる","B":"研修は10年ごとに1回だけでよい","C":"個人情報保護は研修項目に含まれない","D":"電子カルテは研修対象外である","E":"院内研修は認められない"},"correctAnswer":"A","explanation":"【正答の根拠】医師事務作業補助体制加算の施設基準では、新規配置後6か月間を研修期間とし、その間に32時間以上の研修を行うことが義務化されている。これに加えて、実務に必要な内容については6か月間の業務研修(OJT)も別途実施。\n【誤答の整理】B：10年ごと1回は不十分。C：個人情報保護は研修必須項目。D：電子カルテの研修は必須。E：院内研修も認められる(むしろ通常は院内研修)。\n【補足】『6か月以内 × 32時間以上』の研修は、医師事務作業補助者の品質保証(QA)の根幹。診療情報管理士が講師として関わることも多い。","tags":["医師事務作業補助者","研修","6か月","32時間"]},
      {"id":"ch10-026","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者の研修内容として本文に示されていたものはどれか。","choices":{"A":"個人情報保護に関する事項","B":"航空管制の基礎","C":"病院建築設計","D":"薬剤の単独処方権","E":"救急車運転技能"},"correctAnswer":"A","explanation":"【正答の根拠】32時間研修の必須項目：(1)関連法規の概要(医療法・医師法・個人情報保護法等)、(2)個人情報保護、(3)一般的な医療内容、(4)診療録の記載、(5)電子カルテ操作、(6)医療安全、(7)医師事務作業補助業務の概要等。『医療現場で安全に事務を遂行する』ための基礎教養。\n【誤答の整理】B・C・D・E：いずれも医師事務作業補助業務と無関係。\n【補足】個人情報保護は診療記録を扱う全職種の必須教養。医師事務作業補助者は診療録に日常的にアクセスするため、守秘義務(雇用契約書・就業規則に明記)と保護法教育は特に重要。","tags":["医師事務作業補助者","研修内容","個人情報保護"]},
      {"id":"ch10-027","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者の体制整備で求められるものとして本文に示されていたのはどれか。","choices":{"A":"責任者を置かず現場任せにすること","B":"補助者の業務を管理・改善する責任者を置くこと","C":"医師だけで研修内容を秘密にすること","D":"配置状況の見直しを行わないこと","E":"関連医師の意見を聞かないこと"},"correctAnswer":"B","explanation":"【正答の根拠】医師事務作業補助体制加算の施設基準では、業務管理・改善の責任者配置が明記されている。責任者は研修計画、業務範囲の明確化、トラブル対応、医師との調整、業務品質の監督など幅広い役割を担う。\n【誤答の整理】A：現場任せでは体制とは言えない。C：研修内容の秘匿は意味がない(むしろ文書化・共有推奨)。D：配置状況の定期的見直しは運用改善の基本。E：現場の医師の意見を聞かない体制は機能しない。\n【補足】責任者には診療情報管理士や事務長、医事課長等が就くことが多い。『誰が責任を持つか』を明確にするのが組織運用の鉄則。","tags":["医師事務作業補助者","体制整備","責任者"]},
      {"id":"ch10-028","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"医師事務作業補助者と診療情報管理士の関係として最も適切なのはどれか。","choices":{"A":"両者の業務は全く無関係である","B":"研修内容や業務範囲に重なる部分が多く、今後さらに結びつくと考えられる","C":"診療情報管理士は医師事務作業補助者業務を理解する必要はない","D":"診療情報管理士は必ず医師事務作業補助者より下位である","E":"医師事務作業補助者はがん登録に全く関与しない"},"correctAnswer":"B","explanation":"【正答の根拠】両者の重なり：(1)研修内容(医療法規・個人情報保護・診療録・電子カルテ)、(2)業務(診療記録の取扱い、データ整理、がん登録実務)、(3)診療情報の精度管理。日本診療情報管理士会には『医師事務作業補助者コース小委員会』もあり、両者は人材育成面でも連携している。実務では、診療情報管理士が医師事務作業補助者の研修・指導・管理を担うケースが多い。\n【誤答の整理】A：強く関連する業務領域。C：管理士は補助者業務の理解が不可欠(研修講師等を担う)。D：上下関係ではなく役割分担。E：医師事務作業補助者の業務には『院内がん登録等の統計・調査』が明記されている(診療報酬通知)。\n【補足】両職種は『医師の業務負担軽減』と『診療情報の質向上』という2つの目的で連携する。","tags":["医師事務作業補助者","診療情報管理士","関係"]},
      {"id":"ch10-029","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"がん登録の説明として最も適切なのはどれか。","choices":{"A":"がん患者の診療費だけを集計する仕組みである","B":"がんの罹患、傷病名、診断根拠や病期等を登録し、分析する仕組みである","C":"病理診断だけを記録するものである","D":"外来患者だけを対象とする","E":"医療機関ではなく患者本人のみが行う"},"correctAnswer":"B","explanation":"【正答の根拠】がん登録は、がんの診断・治療・経過に関する情報を収集・保管・整理・解析する仕組み。登録項目には罹患(いつ・どこの・どんながんが発生したか)、傷病名、診断根拠、病期(ステージ)、治療内容、予後などが含まれる。これを分析することで、罹患率・生存率・治療実態などが明らかになり、がん対策の基礎データとなる。\n【誤答の整理】A：診療費は対象外(医療費統計は別)。C：病理診断は根拠の1つだが全体ではない。D：入院・外来を問わず対象。E：医療機関(医師・がん登録実務者)が届出する。\n【補足】がん登録の3本柱：(1)罹患情報(いつ・誰が・どんながん)、(2)診療情報(どう治療したか)、(3)転帰情報(その後の経過)。この3つで『がんの全体像』が見える。","tags":["がん登録","定義","罹患","病期"]},
      {"id":"ch10-030","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"現在のわが国のがん対策の基本法として本文で示されていたものはどれか。","choices":{"A":"健康増進法","B":"がん対策基本法","C":"医療法","D":"感染症法","E":"個人情報保護法"},"correctAnswer":"B","explanation":"【正答の根拠】『がん対策基本法』(平成18年=2006年法律第98号、2007年4月施行)が、わが国のがん対策の基本法。基本理念、国・地方公共団体・医療保険者・国民・医師等・事業主の責務を定め、『がん対策推進基本計画』の策定を政府に義務付けている。\n【誤答の整理】A：健康増進法(2003年施行)はがん検診や地域がん登録の根拠として関与するが、がん対策全般の基本法ではない。C：医療法は医療提供体制の基本法で、がん特化ではない。D：感染症法は感染症対策。E：個人情報保護法は情報保護の基本法。\n【補足】『基本法』は分野の憲法的役割を持つ法律。がん対策基本法(2006)→がん対策推進基本計画(第1期2007〜)→がん登録推進法(2013成立・2016施行)という制度発展の流れ。","tags":["がん対策基本法","がん対策","2006年"]},
      {"id":"ch10-031","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"がん対策基本法に関する説明として適切なのはどれか。","choices":{"A":"がん対策の基本理念や各主体の責務を定めている","B":"がん登録を廃止する法律である","C":"医師だけの責務を定めた法律である","D":"保険請求の方法のみを定める法律である","E":"病院建築の基準を定める法律である"},"correctAnswer":"A","explanation":"【正答の根拠】がん対策基本法の構造：第1章(総則)で基本理念、第2章で責務(国・地方公共団体・医療保険者・国民・医師等・事業主)、第3章で基本計画策定義務、第4章で具体的施策(がん予防・検診、医療提供体制、研究推進、がん登録)。2016年改正で事業主の責務(治療と仕事の両立支援)が追加された。\n【誤答の整理】B：逆で、がん登録の推進をうたっている。C：6つの主体の責務を規定。D：保険請求とは別法の範疇。E：病院建築は医療法の範疇。\n【補足】『6主体の責務』=(1)国、(2)地方公共団体、(3)医療保険者、(4)国民、(5)医師等、(6)事業主。特に(6)事業主は2016年追加で、働く世代のがんサバイバー支援を意識した改正。","tags":["がん対策基本法","責務","基本理念"]},
      {"id":"ch10-032","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"がん対策基本法に基づき政府が策定しなければならないものとして本文で示されていたのはどれか。","choices":{"A":"病院建築基本計画","B":"がん対策推進基本計画","C":"診療録保存基本計画","D":"病床再編基本計画","E":"災害派遣基本計画"},"correctAnswer":"B","explanation":"【正答の根拠】がん対策基本法第10条により、政府は『がん対策推進基本計画』を策定する義務を負う。6年ごとに見直し、現在は第4期(2023年3月閣議決定、2023〜2028年度)。3本柱は『(1)がん予防、(2)がん医療、(3)がんとの共生』。\n【誤答の整理】A・C・D・Eは存在しない、または別法の基本計画。\n【補足】都道府県は基本計画を踏まえて『都道府県がん対策推進計画』を策定。国→都道府県→医療圏→医療機関と計画が連鎖する構造。診療情報管理士の業務(がん登録・DPC)もこの計画に組み込まれている。","tags":["がん対策推進基本計画","がん対策基本法"]},
      {"id":"ch10-033","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"2016年1月に施行された法律として本文に示されていたものはどれか。","choices":{"A":"医療法","B":"がん登録等の推進に関する法律","C":"介護保険法","D":"医師法","E":"統計法"},"correctAnswer":"B","explanation":"【正答の根拠】『がん登録等の推進に関する法律(通称：がん登録推進法)』は2013年12月13日公布、2016年1月1日施行。全国がん登録の実施・情報利用・保護、院内がん登録の推進等を定めた法律。議員立法として成立した点も特徴。\n【誤答の整理】A：医療法は1948年制定で度重なる改正あり、2016年施行の新法ではない。C：介護保険法は2000年施行。D：医師法は1948年制定。E：統計法は2007年全面改正。\n【年号整理】2006年：がん対策基本法成立 → 2007年：同施行、基本計画第1期 → 2013年：がん登録推進法成立 → 2016年1月：同施行・全国がん登録開始。","tags":["がん登録等の推進に関する法律","2016年","施行"]},
      {"id":"ch10-034","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"2016年施行前にわが国のがん登録が大別されていた3種類として正しいのはどれか。","choices":{"A":"全国がん登録、院内がん登録、臓器(別)がん登録","B":"外来がん登録、入院がん登録、死亡がん登録","C":"地域がん登録、院内がん登録、臓器(別)がん登録","D":"住民がん登録、保険がん登録、研究がん登録","E":"学校がん登録、企業がん登録、保険がん登録"},"correctAnswer":"C","explanation":"【正答の根拠】2016年1月の法施行前のがん登録は3種類：(1)地域がん登録(都道府県単位、健康増進法に基づく努力義務)、(2)院内がん登録(病院内、がん診療連携拠点病院が中心)、(3)臓器(別)がん登録(学会・研究会が臓器別に実施)。2016年以降は(1)が法制化されて『全国がん登録』に発展し、統一的な国家事業となった。\n【誤答の整理】A：『全国がん登録』は法施行後の呼称で、施行前の3種類には含まれない(ここが引っかけ)。B・D・E：そもそも存在しない分類。\n【注意】問題の選択肢Aと正答Cは非常に紛らわしい。『地域』(旧)と『全国』(新)の違いを押さえる。","tags":["がん登録","地域がん登録","院内がん登録","臓器別がん登録"]},
      {"id":"ch10-035","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"院内がん登録で用いられ、病期分類の国際比較が可能と本文で示されていたものはどれか。","choices":{"A":"病床機能報告","B":"TNM悪性腫瘍の分類","C":"診療報酬点数表","D":"介護認定基準","E":"DPC係数表"},"correctAnswer":"B","explanation":"【正答の根拠】TNM分類はUICC(国際対がん連合)が策定する悪性腫瘍の国際標準病期分類。T(Tumor：原発腫瘍の広がり)、N(Node：リンパ節転移)、M(Metastasis：遠隔転移)の3軸で評価し、これらからステージ(I〜IV期)が決まる。国際標準のため、国をまたいだ予後比較や研究が可能。\n【誤答の整理】A：病床機能報告は医療計画制度。C：診療報酬点数表は請求用。D：介護認定基準は介護保険制度。E：DPC係数表は支払制度用で、国際比較不可。\n【補足】TNMの版が変わると病期分類も変わる(現在は第8版、2017年〜)。院内がん登録では採用している版を必ず記録する。診療情報管理士はTNM分類の理解が必須。","tags":["院内がん登録","TNM","病期分類"]},
      {"id":"ch10-036","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"本文で、学会・研究会で作成されるが国独自の決まりであり国際比較はできないとされていたものはどれか。","choices":{"A":"TNM悪性腫瘍の分類","B":"癌取扱い規約","C":"ICD-10","D":"DPC分類","E":"WHO-FIC"},"correctAnswer":"B","explanation":"【正答の根拠】『癌取扱い規約』は日本の各臓器別学会(日本胃癌学会、日本肺癌学会、日本乳癌学会等)が作成する日本独自の臨床ルール。病期分類・組織分類・治療指針等を含むが、日本の診療実態に合わせた独自規定が多いため、そのままでは国際比較できない。\n【誤答の整理】A：TNM分類は国際標準で比較可能(Q35)。C：ICD-10はWHOの国際分類。D：DPC分類は日本独自だがICDをベースにする。E：WHO-FICはWHOの国際分類ファミリー全体。\n【補足】日本では『TNM(国際標準)＋癌取扱い規約(日本独自)』の両方が併用される。前者は国際比較、後者は日本の診療実務に最適化。両者は一致しないこともあり、院内がん登録ではTNMを使う。","tags":["癌取扱い規約","TNM","国際比較"]},
      {"id":"ch10-037","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"全国がん登録について最も適切なのはどれか。","choices":{"A":"2016年1月以降、全国でがんと診断された患者データを国で1つにまとめて集計・分析・管理する仕組みである","B":"大学病院だけが参加する任意制度である","C":"患者の自己申告のみで成り立つ制度である","D":"院内がん登録の別名である","E":"外来患者は対象外である"},"correctAnswer":"A","explanation":"【正答の根拠】全国がん登録は2016年1月1日から開始された国家事業。仕組み：(1)すべての病院＋指定診療所が都道府県の登録室へ届出 → (2)都道府県が審査 → (3)国(国立がん研究センター)が全国データベースへ記録 → (4)死亡情報(人口動態統計)と突合 → (5)罹患率・生存率等を算出・公表。国が一元管理する点が旧『地域がん登録』との最大の違い。\n【誤答の整理】B：大学病院だけではなく全病院。C：医療機関からの届出で、自己申告ではない。D：院内がん登録は病院単位の登録で別物。E：外来・入院を問わず診断されたがんすべて対象。\n【補足】『全国がん登録(国家事業)』と『院内がん登録(病院内)』は併存。診療情報管理士は両方の実務に関わる。","tags":["全国がん登録","2016年","一元管理"]},
      {"id":"ch10-038","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"全国がん登録に関する説明として正しいのはどれか。","choices":{"A":"全国の医療機関は、がんと診断された人のデータを都道府県知事に届け出る義務を負う","B":"患者が希望すれば医療機関は届出を行わなくてよい","C":"診療所は対象外である","D":"原発性がんは対象外である","E":"届出先は病院長個人である"},"correctAnswer":"A","explanation":"【正答の根拠】がん登録推進法第6条により、全国のすべての病院と、都道府県知事が指定した診療所の管理者は、原発性のがんと診断された患者について都道府県知事へ届け出る義務を負う。これは『努力義務』ではなく『法的義務』で、違反時の罰則規定もある。\n【誤答の整理】B：患者同意は不要(法律で義務化)。C：知事が指定した診療所は対象。D：原発性がんこそ登録対象(転移性は原発性がんの経過として記録される)。E：届出先は『都道府県知事』(病院長個人ではない)。\n【補足】届出から登録までの流れ：(1)医療機関→(2)都道府県(審査)→(3)国立がん研究センター(全国DB)→(4)匿名化処理→(5)統計公表・研究利用。","tags":["全国がん登録","届出","都道府県知事"]},
      {"id":"ch10-039","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"全国がん登録における患者本人の同意について本文の趣旨として最も適切なのはどれか。","choices":{"A":"登録には必ず患者本人の書面同意が必要である","B":"患者本人の同意を得なくても登録できるとされている","C":"患者本人の口頭同意だけで足りる","D":"未成年者のみ同意不要である","E":"主治医が反対すれば登録しない"},"correctAnswer":"B","explanation":"【正答の根拠】全国がん登録は法律に基づく義務的な届出で、患者本人の同意は不要。これは個人情報保護法の例外にあたる。理由：(1)正確な罹患統計を得るには全数登録が必要、(2)同意を要件にすると漏れが生じ統計の信頼性が損なわれる、(3)公益性が高い。ただし、個人情報の管理・罰則規定は厳格に設けられている(がん登録推進法第28条・29条の秘密保持義務・罰則)。\n【誤答の整理】A：書面同意は不要。C：口頭同意も不要。D：年齢に関係なく同意不要。E：主治医の反対で登録しないことはできない(法的義務)。\n【補足】同意不要だからこそ、代わりに『秘密保持』『目的外利用禁止』『個人情報保護法の開示等対象外(第35条)』『違反時の罰則』が厳格。患者の知る権利とのバランスで設計されている。","tags":["全国がん登録","同意","個人情報"]},
      {"id":"ch10-040","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"全国がん登録の登録項目の概要に含まれるものとして適切なのはどれか。","choices":{"A":"患者の氏名、性別、生年月日、住所","B":"患者の銀行口座番号","C":"患者の勤務先給与額","D":"患者家族全員の健康状態","E":"病院職員の住所録"},"correctAnswer":"A","explanation":"【正答の根拠】全国がん登録の登録項目(施行規則)は大きく(1)患者基本情報、(2)がん情報、(3)診断・治療情報、(4)転帰情報の4区分。患者基本情報には氏名・性別・生年月日・住所・個人番号(連結管理用)が含まれる。これらは他データベース(人口動態統計の死亡情報等)との突合に必須。\n【誤答の整理】B・C・D・Eはいずれも個人のプライバシー情報で、がん登録の目的(罹患・生存統計)とは無関係。目的外利用は法律で明確に禁止。\n【補足】『氏名・住所が登録される』ことに違和感を持つ人もいるが、匿名統計を作るためには最初は実名で集めて突合し、統計集計後は匿名化(法第15条)する設計になっている。","tags":["全国がん登録","登録項目","基本情報"]},
      {"id":"ch10-041","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"全国がん登録の登録項目の概要として本文に含まれていたものはどれか。","choices":{"A":"がんの診断を行った医療機関名","B":"患者のSNSアカウント名","C":"病院の建築年","D":"患者の趣味","E":"病院の清掃計画"},"correctAnswer":"A","explanation":"【正答の根拠】登録項目には『診断・治療を行った医療機関名』が含まれる。これにより複数医療機関を受診した患者の情報を名寄せ・突合でき、同一症例の重複登録を避けることができる。また、施設別の診療実績分析にも使われる。\n【誤答の整理】B〜E：いずれもプライバシー情報または無関係な情報。がん登録の目的に合致しない。\n【補足】患者は複数病院にかかることが多いため(診断A病院→手術B病院→化学療法C病院など)、『どこで何をしたか』の情報がないと正しい統計が取れない。医療機関名は突合・名寄せのキー情報。","tags":["全国がん登録","登録項目","医療機関名"]},
      {"id":"ch10-042","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"全国がん登録の登録項目の概要として本文に含まれていたものはどれか。","choices":{"A":"がんの診断を受けた日","B":"医師の自宅住所","C":"患者の学歴のみ","D":"病院の宣伝費","E":"看護師の勤務年数"},"correctAnswer":"A","explanation":"【正答の根拠】『がんの診断を受けた日』は全国がん登録の必須項目。これは罹患年の基準となる重要データで、年次罹患率の計算や時系列分析の起点になる。正確性が求められ、複数医療機関で診断された場合は最初の診断日を採用するのがルール。\n【誤答の整理】B〜E：いずれもプライバシー情報または無関係情報で登録対象外。\n【補足】診断日と似た概念：(1)初診日(その病院に来た日)、(2)診断確定日(がんと確定した日)、(3)治療開始日。登録上は『診断日』をどう定義するかの統一ルールが重要で、診療情報管理士の正確な判断が求められる。","tags":["全国がん登録","登録項目","診断日"]},
      {"id":"ch10-043","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"全国がん登録の登録項目の概要として本文に含まれていたものはどれか。","choices":{"A":"がんの種類、進行度、発見の経緯、治療内容","B":"患者の旅行歴のみ","C":"病院の設備投資額のみ","D":"主治医の趣味のみ","E":"患者家族の勤務先一覧"},"correctAnswer":"A","explanation":"【正答の根拠】臨床情報の登録項目には、(1)がんの種類(原発部位・組織型、ICD-O準拠)、(2)進行度(ステージ：TNM分類)、(3)発見経緯(検診発見・症状発見・他疾患での偶発発見等)、(4)治療内容(手術・化学療法・放射線療法・内分泌療法・免疫療法など)が含まれる。これらがあってこそ『どのがんがどう見つかり、どう治療され、どうなったか』が分かる。\n【誤答の整理】B〜E：いずれもがん登録の目的に合致しない個人情報や運営情報。\n【補足】『発見経緯』はがん検診の有効性評価に重要で、検診で見つかったがんは早期発見で予後が良いかなどを検証できる。これがあってがん検診政策の改善につながる。","tags":["全国がん登録","登録項目","進行度","治療内容"]},
      {"id":"ch10-044","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"院内がん登録の目的として本文に合致するものはどれか。","choices":{"A":"施設のがん診療の向上や患者支援に役立てること","B":"病院ごとの秘密情報を公開すること","C":"がん患者の登録を減らすこと","D":"DPC請求だけに使うこと","E":"診療録を廃棄しやすくすること"},"correctAnswer":"A","explanation":"【正答の根拠】院内がん登録は『その病院で診断・治療した全がん症例』を詳細に登録する病院独自のデータベース。目的：(1)自院の診療実態の把握と改善、(2)他院との比較(ベンチマーク)、(3)患者支援(追跡・生存率計測)、(4)臨床研究の基盤、(5)がん診療連携拠点病院等の指定要件。がん登録推進法では病院の『努力義務』。\n【誤答の整理】B：秘密情報公開ではなく、集計データの活用。C：減らすのではなく漏れなく登録。D：DPC請求とは別目的(ただしICDコーディング等の知識は共通)。E：逆で詳細保存が必要。\n【補足】院内がん登録は全国がん登録より詳細な項目を記録する(病理組織型、治療詳細、予後追跡等)。全国がん登録が『広く浅く』なら院内がん登録は『狭く深く』。","tags":["院内がん登録","目的","患者支援","質向上"]},
      {"id":"ch10-045","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"院内がん登録の活用例として本文に示されていたものはどれか。","choices":{"A":"施設のがん患者の生存率の計測","B":"病院敷地の資産評価","C":"全職員の私用電話の管理","D":"患者の住宅ローン審査","E":"病院職員の家系図作成"},"correctAnswer":"A","explanation":"【正答の根拠】院内がん登録の代表的活用例：(1)施設の生存率計測(5年生存率・10年生存率等)、(2)部位別・ステージ別の診療実績分析、(3)他院とのベンチマーク(がん診療連携拠点病院院内がん登録全国集計)、(4)臨床研究の症例抽出、(5)患者さんへの説明資料(病院の治療実績の透明化)、(6)院内改善活動(プロセス指標の計測)。\n【誤答の整理】B〜E：すべて院内がん登録の目的と無関係。\n【補足】生存率計測には患者追跡が不可欠。住民票照会や人口動態情報との突合で行うが、これは法的根拠と個人情報保護の両立が重要。診療情報管理士はこの追跡実務の中心を担う。","tags":["院内がん登録","生存率","活用"]},
      {"id":"ch10-046","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"臓器(別)がん登録の説明として最も適切なのはどれか。","choices":{"A":"法律で全国一律に義務づけられている","B":"学会や研究会が独自に実施する登録の総称である","C":"院内がん登録の別名である","D":"全国がん登録に統合され廃止されたため存在しない","E":"外来だけを対象とする制度である"},"correctAnswer":"B","explanation":"【正答の根拠】臓器(別)がん登録は、各臓器の専門学会・研究会が独自に実施する登録の総称。例：日本胃癌学会・日本肺癌学会・日本乳癌学会・日本大腸癌学会・全国肝癌登録(日本肝癌研究会)・前立腺癌登録(日本泌尿器科学会)等。参加は任意で、臓器別の詳細な臨床情報(組織型、手術術式、薬剤レジメン等)を扱う。\n【誤答の整理】A：法律義務ではなく学会主導の任意登録。C：院内がん登録とは別。D：2016年以降も存続しており廃止されていない。E：入院・外来問わず対象。\n【補足】3種類のがん登録の整理：(1)全国がん登録(国家事業・義務・全がん)、(2)院内がん登録(病院単位・努力義務・全がん詳細)、(3)臓器別がん登録(学会単位・任意・臓器特化詳細)。目的・主体・対象範囲の違いを押さえる。","tags":["臓器別がん登録","学会","研究会"]},
      {"id":"ch10-047","chapterId":10,"chapterName":"第10章 診療情報管理III DPC・医師事務作業補助者・がん登録の実務","questionText":"診療情報管理士とがん登録の関わりとして最も適切なのはどれか。","choices":{"A":"がん登録では診療情報管理士の関与は不要である","B":"診療記録から情報を抽出し、コード化することは診療情報管理士が関わるべき専門的領域の一つである","C":"がん登録はすべて自動化され、記録確認は不要である","D":"診療情報管理士は全国がん登録だけに関与し院内がん登録には関与しない","E":"がん登録は医師だけが行える"},"correctAnswer":"B","explanation":"【正答の根拠】がん登録の実務は『診療記録から必要情報を抽出→ICD-O等で正確にコード化→届出票に記入→都道府県・国に提出』の流れで、診療情報管理士の専門性(医学用語・解剖・ICD/ICD-O・コーディング技能)が不可欠。国立がん研究センターが主催する『がん登録実務者研修』を受けた認定者が中心となり、診療情報管理士がその多くを占める。\n【誤答の整理】A：中核人材として関与。C：医師の記載不備や曖昧な表記の確認が必要で自動化は不完全。D：全国がん登録・院内がん登録ともに関与。E：医師だけでは実務的に不可能で、がん登録実務者(多くは診療情報管理士)が担う。\n【補足】診療情報管理士のキャリアパス：ICDコーディング → DPCコーディング → がん登録実務者 → がん登録指導者、という専門性の積み上げが可能。わたるさんの領域(リハビリ・整形外科)とは直接重ならないが、診療情報管理士の職能の広がりを知る参考になる。","tags":["診療情報管理士","がん登録","抽出","コード化"]}
    ]
  },

      {"id":"ch11-001","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"疾病分類の説明として最も適切なのはどれか。","choices":{"A":"病名を自由記述で残し、後から個別に解釈する方法である。","B":"似た事象を一定の法則に従って集団に分け、分析や処理をしやすくする考え方である。","C":"医師が使いやすい俗称を優先して集めた一覧である。","D":"病名の日本語表記だけを統一するための仕組みである。","E":"死因統計のためだけに作られた限定的な手法である。"},"correctAnswer":"B","explanation":"【正答の根拠】分類（classification）とは、類似する事象を一定のルール・基準に基づきグループ化し、統計的な集計・比較・分析を可能にする考え方である。ICDはこの原理に立脚している。\n【誤答の整理】A：自由記述は分類ではなく、そのままでは集計・国際比較ができない。C：俗称では施設間の差が大きく標準化できない。D：日本語表記の統一は「標準病名集」の役割であり、分類とは別物（Q3参照）。E：ICDは死因だけでなく疾病統計にも使われる（第6回改訂以降）。\n【補足】疾病分類は『記録』ではなく『整理・集計の仕組み』。この概念整理がICD理解の出発点になる。","tags":["分類の意義","疾病分類","標準化"]},
      {"id":"ch11-002","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICDの役割として最も適切なのはどれか。","choices":{"A":"医療機関ごとの独自病名を増やすこと","B":"医師の自由記述を制限しないこと","C":"国際比較や医療内容評価のための共通コードとして使うこと","D":"診療報酬請求だけに使うこと","E":"看護記録の表現を統一することだけを目的とすること"},"correctAnswer":"C","explanation":"【正答の根拠】ICD（International Statistical Classification of Diseases and Related Health Problems）は、WHOが定める国際共通の分類で、異なる国・地域・時点のデータを比較可能にするための標準コード。国際比較、疫学研究、医療の質評価、DPC、診療録管理など幅広く活用される。\n【誤答の整理】A：ICDは独自病名を増やすのではなく共通化する仕組み。B：自由記述では国際比較不可能。D：診療報酬請求は用途の一部にすぎず、本質は統計・分析。E：看護記録の表現統一はICNP（看護実践国際分類）の役割。\n【補足】ICDは単なる請求コードではなく『統計・国際比較の基盤』であることが要点。","tags":["ICD","使用目的","国際比較"]},
      {"id":"ch11-003","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICDと標準病名集の違いとして適切なのはどれか。","choices":{"A":"ICDは俗称を集めた病名集である。","B":"標準病名集は統計分類表である。","C":"ICDは分類体系であり、標準病名集とは性格が異なる。","D":"両者は完全に同一である。","E":"標準病名集の方が国際比較に向いている。"},"correctAnswer":"C","explanation":"【正答の根拠】ICDは『分類体系（classification）』——病態をグループ化して統計を取るための枠組み。一方、標準病名集（例：MEDIS-DC標準病名マスター）は『病名辞書（terminology）』——臨床で使う個々の病名を統一した表記で集めたもの。両者は連携するが役割が違う。\n【誤答の整理】A：ICDは俗称集ではなく、整理された分類。B：標準病名集は分類表ではなく病名リスト。D：両者は連携するが別物。E：国際比較に向くのはICD。標準病名集は国内の電子カルテでの入力統一が主目的。\n【補足】『分類＝グルーピングの枠』、『病名集＝個別病名の辞書』と覚える。日本ではMEDIS-DC標準病名マスターがICD-10コードとの対応を持ち、両者を橋渡ししている。","tags":["ICD","標準病名集","分類体系"]},
      {"id":"ch11-004","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"コード化が必要な理由として最も適切なのはどれか。","choices":{"A":"同じ病態でも患者ごとに別のコードを付けるため","B":"病名の長さを短くするためだけ","C":"同じ分類に当てはまるものに同じコードを付け、比較可能にするため","D":"医師の記載を不要にするため","E":"診断を自動化するため"},"correctAnswer":"C","explanation":"【正答の根拠】コード化（coding）の本質は『同じものに同じ識別子を与える』こと。これにより、施設・国・言語を超えて集計・比較が可能になる。例えば日本語「百日咳」、英語「Whooping cough」でも、ICDコードはA37で世界共通。\n【誤答の整理】A：患者ごとに別コードでは統計にならない。B：短縮は副次的効果にすぎない。D：医師の記載あってのコード化。E：コード化は診断の自動化ではなく、記録の集計基盤。\n【補足】コード化の3つの価値は『①検索性 ②集計性 ③国際比較』。この原則はDPCやがん登録でも同じ。","tags":["コード化","コーディング","比較可能性"]},
      {"id":"ch11-005","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"人口動態事象の例として本文に含まれていたものはどれか。","choices":{"A":"出生、死亡、死産、婚姻、離婚","B":"出生、入院、退院、婚姻、失業","C":"出生、転居、転職、婚姻、離婚","D":"死亡、手術、退院、養子縁組、就職","E":"出生、入院、死産、離職、離婚"},"correctAnswer":"A","explanation":"【正答の根拠】わが国の人口動態統計の対象は『出生・死亡・死産・婚姻・離婚』の5事象。これは統計法・人口動態調査令に基づき、それぞれの届書を基礎に調査票が作成される。\n【誤答の整理】入院・退院・手術は医療統計（患者調査等）の対象で、人口動態には含まれない。転居・転職・失業・就職・養子縁組は社会経済統計や住民基本台帳の範疇。\n【覚え方】『出・死・死・婚・離』の5つ——生まれる／死ぬ／生まれずに死ぬ／結婚する／別れる、という『人の一生の節目』のうち戸籍に関わる事象と覚える。","tags":["人口動態統計","人口動態事象"]},
      {"id":"ch11-006","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"わが国の人口動態統計が始まった年として正しいのはどれか。","choices":{"A":"1855年","B":"1872年","C":"1899年","D":"1946年","E":"1968年"},"correctAnswer":"B","explanation":"【正答の根拠】わが国の人口動態統計は1872年（明治5年）に開始。当初は出生・死亡・死産の3事象から。\n【誤答の整理】1855年は幕末で統計制度以前。1899年（明治32年）は戸籍法施行に伴う近代的調査方式への移行年（Q8参照）。1946年は戦後の人口動態調査令制定年（Q9）。1968年はOMR（光学式マーク読取）導入年（Q13）。\n【年号の流れ】①1872：開始 → ②1884：婚姻・離婚追加 → ③1886：死産追加 → ④1899：戸籍法で近代化 → ⑤1946：調査令制定 → ⑥1968：OMR → ⑦1992：OCR → ⑧2003-2004：オンライン化。この時系列はセットで押さえる。","tags":["人口動態統計","沿革"]},
      {"id":"ch11-007","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"わが国の人口動態統計で、婚姻・離婚が加わった年として正しいのはどれか。","choices":{"A":"1872年","B":"1884年","C":"1886年","D":"1898年","E":"1947年"},"correctAnswer":"B","explanation":"【正答の根拠】1872年の開始時点では『出生・死亡・死産』の3事象のみ。1884年に婚姻・離婚が追加され、1886年に死産（再）追加で現行の5事象構成に。\n【誤答の整理】1872：統計開始年（まだ婚姻・離婚は未追加）。1886：死産が追加された年。1898：戸籍法の制定年（施行は翌1899年）。1947：厚生省への移管年。\n【覚え方】『婚・離は1884年（いっぱっぱよ、で結ばれる／別れる）』など語呂で年号を紐付けると定着しやすい。","tags":["人口動態統計","沿革","婚姻","離婚"]},
      {"id":"ch11-008","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"1899年からの人口動態調査の近代的方法への移行の契機として最も適切なのはどれか。","choices":{"A":"WHOの発足","B":"戸籍法施行により登録制度が法体系的に完全となったこと","C":"ICD-10の公表","D":"OCRの導入","E":"オンライン報告システムの導入"},"correctAnswer":"B","explanation":"【正答の根拠】1898年に戸籍法が制定・施行され、登録制度が法的に整備された。これを機に、1899年から『1事件1枚の個別票』による中央集計方式に移行し、近代的な人口動態調査方式が確立された。\n【誤答の整理】A：WHO発足は1948年。C：ICD-10はWHOで1990年採択、日本適用は1995年。D：OCR導入は1992年。E：オンライン化は2003-2004年。いずれも1899年より後の出来事。\n【補足】戸籍法による届出義務の明確化が、統計の完全性・正確性を担保した。戸籍制度と人口動態統計はセットで機能する。","tags":["人口動態統計","戸籍法","沿革"]},
      {"id":"ch11-009","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"戦後の人口動態統計に関する記述として正しいのはどれか。","choices":{"A":"1946年に人口動態調査令が新設され、1947年に厚生省へ移管された。","B":"1946年にICD-10が導入された。","C":"1947年にOCRが導入された。","D":"1946年にオンライン報告が始まった。","E":"1947年に戸籍法が施行された。"},"correctAnswer":"A","explanation":"【正答の根拠】戦中の混乱で途絶えた人口動態統計は、1946年に『人口動態調査令』で再開され、1947年9月に所管が内務省から厚生省（現・厚生労働省）へ移管された。\n【誤答の整理】B：ICD-10は1990年採択、日本適用は1995年。C：OCRは1992年。D：オンラインは2003-2004年。E：戸籍法は1898年制定（現行戸籍法は1947年に新法として制定だが、本問は『人口動態統計整備のための施行年』ではない）。\n【覚え方】『1946年＝調査令』『1947年＝厚生省移管』の2段階。戦後復興の流れで、国民健康把握のため統計を早急に再開した文脈。","tags":["人口動態統計","人口動態調査令","厚生省"]},
      {"id":"ch11-010","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"人口動態統計の法的根拠として本文に示されていた組み合わせはどれか。","choices":{"A":"医療法・健康保険法・戸籍法","B":"統計法・人口動態調査令・人口動態調査令施行規則","C":"医師法・保健師助産師看護師法・統計法","D":"地方自治法・戸籍法・統計法","E":"健康増進法・統計法・介護保険法"},"correctAnswer":"B","explanation":"【正答の根拠】人口動態統計の法的根拠は3つ：①統計法（統計全般の基本法、2007年全面改正）、②人口動態調査令（1946年制定）、③人口動態調査令施行規則。この三層構造で運用される。\n【誤答の整理】医療法・健康保険法は医療提供・保険の法律で統計の根拠法ではない。戸籍法は届出の根拠で、統計作成の直接の根拠法ではない（届書を統計利用するのが人口動態調査令）。医師法・保助看法は職種法。健康増進法・介護保険法も別領域。\n【補足】『届書（戸籍法に基づく）→ 調査票（人口動態調査令に基づく）→ 統計（統計法に基づく）』という流れを押さえる。","tags":["人口動態統計","統計法","法令"]},
      {"id":"ch11-011","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"人口動態調査票について正しいのはどれか。","choices":{"A":"調査票は病院が独自に作成する。","B":"出生・死亡・死産・婚姻・離婚について、それぞれの届書に基づいて作成される。","C":"調査票は電子カルテから自動生成される。","D":"調査票は都道府県のみが作成する。","E":"死亡調査票は死体検案書とは無関係である。"},"correctAnswer":"B","explanation":"【正答の根拠】人口動態調査票は、市区町村が受理した5つの届書（出生届・死亡届・死産届・婚姻届・離婚届）を基礎に作成される。死亡調査票の場合は、死亡届に添付された『死亡診断書（死体検案書）』の記載が原データとなる。\n【誤答の整理】A：病院が独自に作るのではなく、届出を受けた市区町村が作成。C：電子カルテから自動生成ではない（届書ベース）。D：都道府県のみではなく市区町村が作成（その後都道府県経由で国へ）。E：死亡調査票は死体検案書の情報を直接反映するので『無関係』は誤り。\n【補足】市区町村→保健所→都道府県→厚生労働省という集計のルートも押さえる。","tags":["人口動態統計","調査票","届書"]},
      {"id":"ch11-012","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"人口動態調査を作成するうえで強く求められるものとして本文に示されていたのはどれか。","choices":{"A":"多様性・自由度・柔軟性","B":"完全性・正確性・迅速性","C":"網羅性・匿名性・秘匿性","D":"柔軟性・独自性・迅速性","E":"完全性・国際性・独自性"},"correctAnswer":"B","explanation":"【正答の根拠】人口動態調査の3大要件は『完全性・正確性・迅速性』。完全性＝漏れなく届出が集まる、正確性＝記載内容が正しい、迅速性＝タイムリーに集計される。この3つが揃って初めて政策判断・医療計画に使える統計になる。\n【誤答の整理】Aの多様性・自由度・柔軟性は調査票に求めない方向性（標準化を崩すため）。Cの匿名性・秘匿性は個人情報保護上の要件だが、調査の作成品質を示す言葉ではない。\n【補足】『完・正・迅』と覚える。特にコロナ禍以降、死因統計の迅速性の重要性が再認識された。","tags":["人口動態統計","完全性","正確性","迅速性"]},
      {"id":"ch11-013","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"人口動態統計の入力・集計方法の大きな改正として正しい組み合わせはどれか。","choices":{"A":"1968年にOMR、1992年にOCR","B":"1968年にOCR、1992年にOMR","C":"1967年にOCR、1995年にOMR","D":"1899年にOMR、1946年にOCR","E":"2003年にOMR、2004年にOCR"},"correctAnswer":"A","explanation":"【正答の根拠】1968年にOMR（Optical Mark Reader：光学式マーク読取装置、いわゆるマークシート）、1992年にOCR（Optical Character Reader：光学式文字読取装置、手書き・印字文字をテキスト化）を導入。機械化で処理が飛躍的に迅速化した。\n【誤答の整理】B：OMRとOCRが入れ替わっている。OMRの方が技術的に先。D：1899年は近代化移行年、1946年は調査令制定年でIT導入とは別。E：2003-2004年はオンライン報告開始。\n【覚え方】『M（マーク）が先、C（キャラクター/文字）が後』。OMR→OCR→オンラインの順で高度化した。","tags":["人口動態統計","OMR","OCR"]},
      {"id":"ch11-014","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"人口動態調査オンライン報告システムの導入について正しいのはどれか。","choices":{"A":"1992年に全国一斉に導入された。","B":"2003年1月から保健所・都道府県、2004年2月から市区町村で導入可能となった。","C":"1947年から運用されている。","D":"戸籍法施行と同時に始まった。","E":"死亡票だけに限定して導入された。"},"correctAnswer":"B","explanation":"【正答の根拠】オンライン報告システムは段階的導入。2003年1月に保健所・都道府県から、2004年2月に市区町村へ拡大された。一斉導入ではなく、上位機関から段階的に降ろす方式。\n【誤答の整理】A：1992年はOCR導入年でオンライン化ではない。C：1947年は厚生省移管年でIT導入ではない。D：戸籍法は1898年で当時オンラインは存在しない。E：死亡票だけではなく人口動態5事象が対象。\n【補足】上位（保健所・都道府県）から先に整備し、翌年に現場（市区町村）に下ろす段階導入は、日本の行政IT化によくある順序。","tags":["人口動態統計","オンライン報告"]},
      {"id":"ch11-015","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"1853年の第1回国際統計会議で死因分類作成を要請された2人の組み合わせとして正しいのはどれか。","choices":{"A":"Bertillon と Huber","B":"Farr と d'Espine","C":"Nightingale と Farr","D":"WHO と国際連盟","E":"Bertillon と Nightingale"},"correctAnswer":"B","explanation":"【正答の根拠】1853年、ベルギー・ブリュッセルで開催された第1回国際統計会議において、英国のWilliam Farrとスイス・ジュネーブのMarc d'Espineが死因の国際分類作成を依頼された。これがICDの最古の起源。\n【誤答の整理】Bertillon（ジャック・ベルティヨン）はFarrらの分類を引き継ぎ1893年に『ベルティヨン分類』を発表した後継者。Nightingaleは1860年の第4回会議でFarr分類の病院統計応用を提唱した人物（Q17）。WHOは1948年発足で時代が合わない。\n【人物整理】Farr（英）＝解剖学的部位 → Bertillon（仏）＝統合・体系化 → Nightingale（英）＝病院統計への応用提唱。ICD史の『三大人物』。","tags":["ICDの歴史","Farr","dEspine"]},
      {"id":"ch11-016","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"Farr分類とd'Espine分類の違いとして最も適切なのはどれか。","choices":{"A":"Farrは疾病の性質、d'Espineは解剖学的部位を重視した。","B":"Farrは解剖学的部位局所病を含む分類、d'Espineは疾病の性質に沿う分類であった。","C":"両者とも完全に同一であった。","D":"Farrは病院統計専用、d'Espineは死因統計専用であった。","E":"d'Espineのみが採用され、Farrは採用されなかった。"},"correctAnswer":"B","explanation":"【正答の根拠】Farrは疾病を5群（流行病・体質性疾患・解剖学的部位による局所病・発育性疾患・暴力の直接結果）に分類し、部位を重視。d'Espineは疾病の『性質（痛風性・疱疹性・血液性など）』に沿った分類を提案。最終的にFarrの方式が採用・発展しICDの原型となった。\n【誤答の整理】A：FarrとEspineの役割が逆。C：2人は異なる原理で提案したので同一ではない。D：両者とも死因分類が目的で、病院統計への応用提唱はNightingale。E：Farrの方式こそ主流として採用された。\n【覚え方】『Farr＝部位（Fがfieldのイメージ）』、『Espine＝性質（Eがessenceのイメージ）』。部位派が勝ち残ったのが現在のICD。","tags":["ICDの歴史","Farr分類","dEspine分類"]},
      {"id":"ch11-017","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"Florence Nightingaleが提唱した内容として正しいのはどれか。","choices":{"A":"ICD-10の名称変更","B":"ICHIの策定","C":"Farr分類を病院の疾病統計に用いること","D":"J・Kコードの導入","E":"MBルールの作成"},"correctAnswer":"C","explanation":"【正答の根拠】1860年、ロンドンで開かれた第4回国際統計会議において、Florence Nightingale（クリミア戦争の看護統計で知られる）はFarrの死因分類を病院の疾病統計に応用することを提唱した。これにより分類が死因のみならず『疾病』にも広がる契機となった。\n【誤答の整理】A：ICD-10の名称変更は1990年のWHO総会の話（1世紀以上後）。B：ICHIはWHOが近年開発中の医療行為分類。D：J・Kコードは日本の診療報酬請求コード。E：MBルールはICD本体の主要病態選択ルール。\n【補足】Nightingaleの功績は『統計を医療改善に使う』という発想の先駆け。のちの病院統計・DPC・医療の質評価に通じる。","tags":["ICDの歴史","Nightingale","病院統計"]},
      {"id":"ch11-018","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"Bertillon分類について正しいのはどれか。","choices":{"A":"1893年の国際統計協会会議で提出・承認され、その後10年ごとの改訂案が提起された。","B":"WHO発足後に初めて採用された。","C":"日本だけで使用された。","D":"疾病分類のみで死因分類は含まない。","E":"一度も改訂されなかった。"},"correctAnswer":"A","explanation":"【正答の根拠】Jacques Bertillon（仏・パリ市統計部長）が委員長となり、1893年シカゴで開かれた国際統計協会（ISI）で『ベルティヨン死因分類』を提出・承認。以後10年ごとの改訂が望ましいとされ、これが現ICDの改訂サイクルの起源。\n【誤答の整理】B：WHO発足は1948年で、ベルティヨン分類はそれ以前から使用。C：欧米諸国（1898年APHA採用）など国際的に広く使われた。D：本体は死因分類。E：1900年第1回改訂会議以降、継続的に改訂されている。\n【補足】『1893年承認＋10年改訂サイクル』は現在も続くICDの基本構造。Bertillon→第1回改訂（1900）→…→第10回（ICD-10, 1990）→ICD-11（2019承認）。","tags":["ICDの歴史","Bertillon分類"]},
      {"id":"ch11-019","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"第1回国際改訂会議について正しいのはどれか。","choices":{"A":"1900年にパリで26か国が参加して開催された。","B":"1909年にジュネーブで開催された。","C":"1948年にニューヨークで開催された。","D":"日本は参加していない。","E":"ICD-10がここで公表された。"},"correctAnswer":"A","explanation":"【正答の根拠】1900年、フランス政府の主催でパリにて第1回国際死因分類改訂会議が開催され、26か国が参加。ベルティヨン分類の正式な国際改訂版が採択された。日本は同年にこの分類を採用。\n【誤答の整理】B：1909年は第2回改訂会議（パリ）で、ジュネーブではない。C：1948年はジュネーブで第6回改訂会議（WHO主催）。D：日本はこの時からICDを国内適用している（明治33年）。E：ICD-10は1990年WHO総会採択。\n【補足】日本のICD適用は1900年（明治33年）からという長い歴史。これは世界的にも早い部類に入る。","tags":["ICDの歴史","国際改訂会議"]},
      {"id":"ch11-020","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"第4回国際死因分類改訂会議（1929年）の特徴として正しいのはどれか。","choices":{"A":"WHOが正式に発足した。","B":"「死因としてはさほど必要としない疾病・病態分類」が12項目の細分類として追加された。","C":"dagger・asteriskシステムが導入された。","D":"ICD-10が公表された。","E":"ICFが採択された。"},"correctAnswer":"B","explanation":"【正答の根拠】1929年の第4回改訂会議で、死因としては重要度が低いが疾病統計には必要な病態について12項目の細分類が追加された。これは死因だけでなく『疾病』への拡張の萌芽となった。\n【誤答の整理】A：WHO発足は1948年。C：dagger（†）・asterisk（*）の二重分類は第9回改訂会議（1975年）で承認（Q23）。D：ICD-10は1990年WHO総会。E：ICF（国際生活機能分類）は2001年WHO総会採択。\n【補足】第4回は『疾病分類への拡張の第一歩』として重要。本格的に疾病分類が統合されるのは第6回（1948年）。","tags":["ICDの歴史","第4回改訂会議"]},
      {"id":"ch11-021","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"第5回国際改訂会議（1938年）について正しいのはどれか。","choices":{"A":"複合死因の取り扱いが検討された。","B":"ICD-11が採択された。","C":"3桁10進法がここで初めて採用された。","D":"死亡診断書様式が廃止された。","E":"日本標準病名集が作られた。"},"correctAnswer":"A","explanation":"【正答の根拠】1938年の第5回改訂会議では、死因が単一ではなく複数関連する場合の『複合死因』の扱いが検討された。これはのちの原死因選択ルール（第6回以降で体系化）の前段階。\n【誤答の整理】B：ICD-11は2019年WHO総会採択。C：3桁10進法の現行型は第6回（1948年）で確立。D：死亡診断書様式が廃止された事実はない（現在も継続的に改訂）。E：日本標準病名集は別の話（MEDIS-DC等）。\n【補足】『第5回＝複合死因』『第6回＝疾病と死因の統一』『第9回＝二重分類（†*）』は改訂会議のキーワードとしてセットで覚える。","tags":["ICDの歴史","第5回改訂会議","複合死因"]},
      {"id":"ch11-022","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"第6回国際疾病及び死因分類改訂会議（1948年）の意義として最も適切なのはどれか。","choices":{"A":"疾病分類と死因分類が分離された。","B":"疾病と死因の統一分類が打ち出され、3桁数字による10進法や表形式・索引表の構成が現在の原型となった。","C":"ICD-10の小改正が始まった。","D":"ICHIが公表された。","E":"日本のオンライン報告が始まった。"},"correctAnswer":"B","explanation":"【正答の根拠】1948年、WHO発足と同時に開催された第6回改訂会議は、ICD史上最大の転換点。それまで別々だった『疾病分類』と『死因分類』を統一し、3桁10進法の基本コード体系、表形式（内容例示表）、索引表という現在のICDの原型が確立された。またWHOが正式に主管機関となった年でもある。\n【誤答の整理】A：逆で『統一』された。C：小改正は毎年行われるが第6回の意義ではない。D：ICHIはWHOが近年開発中の医療行為分類で公表時期が異なる。E：日本のオンライン化は2003-2004年。\n【補足】『第6回＝WHO主管開始＋疾病と死因統一＋3桁10進法』の3点セット。ICD史の最重要ポイント。","tags":["ICDの歴史","第6回改訂会議","ICDの原型"]},
      {"id":"ch11-023","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"第9回改訂会議で承認された二重分類システムとして正しいのはどれか。","choices":{"A":"＋ と −","B":"† と *","C":"○ と ×","D":"A と B","E":"J と K"},"correctAnswer":"B","explanation":"【正答の根拠】1975年の第9回改訂会議で、dagger（†：剣印）とasterisk（*：星印）による二重分類システム（ダブルコーディング）が承認された。剣印は『原因となる基礎疾患』、星印は『特定臓器の症状・所見』を表し、両方のコードを付ける仕組み。例：糖尿病性網膜症では、糖尿病（†）と網膜症（*）の両方をコード化。\n【誤答の整理】他の記号はICDの分類体系とは無関係。J・KはQ34で扱う日本の診療報酬コード（医科点数表のJ検査・K手術）で全く別物。\n【補足】ダブルコーディングは『全身疾患の臓器症状を両面から捉える』ための仕組み。ICD-11でも考え方は継承されている（ポストコーディネーション）。","tags":["ICDの歴史","第9回改訂会議","二重分類"]},
      {"id":"ch11-024","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICD-10の正式名称として追加された要素はどれか。","choices":{"A":"Nursing Problems","B":"Genetic Diseases","C":"Related Health Problems","D":"Surgical Claims","E":"Social Insurance Codes"},"correctAnswer":"C","explanation":"【正答の根拠】ICD-10の正式名称は『International Statistical Classification of Diseases and Related Health Problems（疾病及び関連保健問題の国際統計分類）』。ICD-9までは『Diseases, Injuries and Causes of Death』だったが、ICD-10で『Related Health Problems（関連保健問題）』が加わり、対象が『疾病・死因』から『保健問題全般』へ拡大した。\n【誤答の整理】Nursing Problemsは看護分類（ICNP等）の領域。Genetic Diseasesは単独分類ではない。Surgical ClaimsやSocial Insurance Codesは請求・保険の用語でWHO分類ではない。\n【補足】ICD-10（1990年採択）は、社会要因・生活習慣・保健サービスまで統計対象を広げた。この名称変更は思想の拡張を反映している。","tags":["ICD-10","正式名称"]},
      {"id":"ch11-025","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"大改正と小改正の説明として正しいのはどれか。","choices":{"A":"同一3桁分類内での索引追加や表現変更は大改正である。","B":"新規コード追加やコード削除は小改正である。","C":"同一3桁分類項目内での補足や索引強化は小改正に含まれる。","D":"大改正は毎年必ず行われる。","E":"小改正では誤植修正は行わない。"},"correctAnswer":"C","explanation":"【正答の根拠】ICDの改正には『大改正（Major revision）』と『小改正（Minor revision）』がある。大改正＝新規コード追加・削除など3桁分類自体の変更（3年ごと）。小改正＝同一3桁分類内での補足、表現修正、索引強化、誤植訂正など（毎年）。\n【誤答の整理】A：3桁分類内の変更は小改正。B：新規コード追加・削除は大改正。D：大改正は3年ごと、毎年行われるのは小改正と索引改正。E：小改正には誤植修正も含まれる。\n【補足】『大＝構造変更（3年）／小＝微調整（毎年）／索引＝毎年』と整理。日本ではICD-10の2003年版、2013年版などの版差もこの改正を反映。","tags":["ICD-10","大改正","小改正"]},
      {"id":"ch11-026","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICD-10の3桁分類項目の基本形として正しいのはどれか。","choices":{"A":"数字3桁のみ","B":"アルファベット2文字＋数字1桁","C":"アルファベット1文字＋数字2桁","D":"アルファベット1文字＋数字4桁","E":"数字2桁＋アルファベット1文字"},"correctAnswer":"C","explanation":"【正答の根拠】ICD-10の3桁分類はアルファベット1文字＋数字2桁の形式（例：I21＝急性心筋梗塞、C34＝気管支・肺の悪性新生物、A37＝百日咳）。アルファベットA〜U（Uは一部の緊急用途のみ）で21章を構成し、続く数字で詳細を表す。さらに4桁目以降の細分類（小数点以下）で精度を高める（例：I21.0 前壁心筋梗塞）。\n【誤答の整理】A：数字のみではICD-9以前の形式。B：アルファベット2文字はICD-11の形式に近い。D：アルファベット1文字＋数字4桁は日本独自の細分類などでは見られるが基本形ではない。E：その形式は存在しない。\n【補足】ICD-9（数字のみ）→ICD-10（英数字）→ICD-11（英数字＋ポストコーディネーション）と進化。","tags":["ICD-10","構造","3桁分類"]},
      {"id":"ch11-027","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICD-10の4桁分類までを含めた項目数として本文に示されていたものはどれか。","choices":{"A":"2,036項目","B":"1,775項目","C":"5,284項目","D":"12,159項目","E":"14,000項目ちょうど"},"correctAnswer":"D","explanation":"【正答の根拠】ICD-10では、3桁分類を4桁分類で細分化した結果、全体で約12,159項目に達する。3桁レベルで約2,000、4桁まで含めると約14,000項目（WHO基本版）とされるが、本文記載に合わせると12,159。日本独自の細分類を加えるとさらに項目数は増える。\n【誤答の整理】A・B：3桁レベルの概算。C：中間的な数字。E：『ちょうど』という表現が誤り。\n【補足】正確な数値暗記より『数千〜1万項目規模で疾病を網羅』というスケール感を押さえる。DPCやがん登録での実務では4桁・5桁レベルの精度が求められる。","tags":["ICD-10","構造","項目数"]},
      {"id":"ch11-028","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICD-10の分類軸について正しいのはどれか。","choices":{"A":"全章で完全に同一の軸だけで構成される。","B":"多軸性を持ち、全体として必ずしも一貫していない。","C":"すべて病因論のみで分類される。","D":"すべて解剖学的部位のみで分類される。","E":"腫瘍分類では形態分類は存在しない。"},"correctAnswer":"B","explanation":"【正答の根拠】ICD-10は複数の分類軸を併用する『多軸性（multiaxial）』な構造。章によって軸が異なる：第I章（感染症）＝病因論、第II章（新生物）＝部位＋形態、第V章（精神）＝症状群、第XIX章（損傷）＝外因＋部位、等々。全体として一貫した単一軸では構成されていない。\n【誤答の整理】A：完全同一軸ではない。C・D：病因論のみ／部位のみではなく複数軸が混在。E：腫瘍分類ではICD-Oで形態コードが存在し、部位と組み合わせる（Q29-31参照）。\n【補足】多軸性は『疾病の性質ごとに最適な切り口を選ぶ』実用性と、『一貫性の欠如』という批判が併存する。ICD-11ではポストコーディネーションでこれを改善。","tags":["ICD-10","分類軸","多軸性"]},
      {"id":"ch11-029","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICD-Oの形態コードにおいて、第5桁の「/3」が表すものはどれか。","choices":{"A":"良性新生物","B":"性状不詳","C":"上皮内癌","D":"原発性悪性新生物","E":"続発性悪性新生物"},"correctAnswer":"D","explanation":"【正答の根拠】ICD-O（国際疾病分類 腫瘍学）の形態コードは『M-XXXX/Y』の形式。Yが第5桁の性状コードで、/0＝良性、/1＝良悪性不明（境界悪性）、/2＝上皮内癌（in situ）、/3＝原発性悪性、/6＝続発性悪性（転移）、/9＝原発性か転移性か不明。\n【誤答の整理】A：/0が良性。B：/1が性状不詳/境界悪性、/9が原発か転移か不明。C：/2が上皮内癌。E：/6が続発性（転移）悪性。\n【覚え方】『0＝良性、1＝境界、2＝上皮内、3＝原発悪性、6＝転移、9＝不明』。臨床的重要度は0→1→2→3→6の順で悪性度が増すイメージ。がん登録業務で必須の知識。","tags":["ICD-O","形態コード","性状コード"]},
      {"id":"ch11-030","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICD-Oの第6桁コード「4」が表すものとして正しいのはどれか。","choices":{"A":"高分化型","B":"中等度分化型","C":"低分化型","D":"未分化型・退形成","E":"分化度不定"},"correctAnswer":"D","explanation":"【正答の根拠】ICD-Oの第6桁は分化度／異型度（Grade）を表す。1＝高分化（Grade I）、2＝中等度分化（II）、3＝低分化（III）、4＝未分化・退形成（IV）、9＝分化度不定。分化度が低いほど悪性度が高く、予後も悪い傾向がある。\n【誤答の整理】A：1（Grade I）が高分化。B：2が中等度分化。C：3が低分化。E：9が分化度不定。\n【覚え方】『数字が上がるほど未分化（悪性度高）』と覚える。腫瘍の病理診断書で『G1/G2/G3/G4』と記載されるのと対応している。","tags":["ICD-O","分化度","異型度"]},
      {"id":"ch11-031","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICD-Oの局在コード（T分類）について正しいのはどれか。","choices":{"A":"DPC請求専用コードである。","B":"C00〜C80で表され、ICD-10の悪性新生物コードと一致する部分が多い。","C":"良性腫瘍だけを表す。","D":"形態を中心に表す。","E":"看護分類の一部である。"},"correctAnswer":"B","explanation":"【正答の根拠】ICD-Oの局在コード（T分類：Topography）は、腫瘍の発生部位を示し、C00〜C80の範囲で表される。これはICD-10第II章（新生物）の悪性新生物コードと多くが一致する構造で、連携して使える。例：C34＝気管支・肺、C50＝乳房、C16＝胃。\n【誤答の整理】A：DPC請求専用ではなく、がん登録・統計全般で使う国際分類。C：悪性新生物の部位を表すため良性だけではない（良性はD00-D48）。D：形態はM分類で別。E：看護分類ではない。\n【補足】がんは『T（部位）＋M（形態・分化度）』の組合せで表現される。国際的に使える標準だから、がん登録で国際比較が可能になる。","tags":["ICD-O","局在コード","T分類"]},
      {"id":"ch11-032","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICHIについて正しいのはどれか。","choices":{"A":"外科手術のみに限定した分類である。","B":"診断的処置、プライマリケア、メンタルヘルス、看護介入、公衆衛生的応用も視野に入れる。","C":"ICD-Oの別名である。","D":"日本独自の診療報酬請求コードである。","E":"すでに1989年に完成している。"},"correctAnswer":"B","explanation":"【正答の根拠】ICHI（International Classification of Health Interventions：国際医療行為分類）は、WHOが開発中の医療行為全般の国際分類。外科手術だけでなく、診断的処置、プライマリケア、メンタルヘルス介入、看護介入、公衆衛生活動まで広くカバーする設計。WHO国際分類ファミリー（WHO-FIC）の『中心分類』候補の1つ。\n【誤答の整理】A：外科手術限定ではなく医療介入全般。C：ICD-O（腫瘍）とは別物。D：J・Kコード（Q34）が日本の請求コード。E：2021年時点でもベータ版の段階で『完成』ではない。\n【補足】WHO国際分類ファミリーの3中心分類：ICD（疾病）、ICF（生活機能）、ICHI（医療行為）。ICHIは『何を治すか』ではなく『何をするか』の分類。","tags":["ICHI","医療行為分類"]},
      {"id":"ch11-033","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"ICHIの基本構造として正しいのはどれか。","choices":{"A":"Target 2桁、Action 2桁、Means 3桁","B":"Target 3桁、Action 2桁、Means 2桁","C":"Target 1桁、Action 3桁、Means 3桁","D":"数字7桁のみ","E":"アルファベット3桁のみ"},"correctAnswer":"B","explanation":"【正答の根拠】ICHIは『Target（対象）3桁＋Action（行為）2桁＋Means（手段・方法）2桁』の計7桁で構成。例：どの臓器に（Target）、何をして（Action）、どのように（Means）、という3軸で医療行為を記述する。\n【誤答の整理】桁数の配分が異なる選択肢はすべて誤り。単純な数字やアルファベットだけではない。\n【覚え方】『TAM 3-2-2』または『誰に（3）・何を（2）・どう（2）』で7桁。DPCやレセプトの行為コードとは根本思想が異なり、より構造的・国際的。","tags":["ICHI","構造","Target","Action","Means"]},
      {"id":"ch11-034","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"わが国の医療行為コードについて正しいのはどれか。","choices":{"A":"J・Kコードは長期的な統計分析に最適な分類体系である。","B":"STEM7は診療報酬請求専用で統計には不向きである。","C":"J・Kコードは請求実務で用いられるが、分類体系としての体をなさず長期統計には不向きとされる。","D":"J・KコードとSTEM7は完全に同じものである。","E":"どちらもWHOが作成した。"},"correctAnswer":"C","explanation":"【正答の根拠】J・Kコード（診療報酬点数表のJ検査・K手術）は日本の診療報酬請求実務で使われるが、分類体系ではなく『請求項目のリスト』。診療報酬改定のたびに変わり時系列比較が困難で、国際比較もできないため長期統計には不向き。STEM7は日本外科学会等が中心に開発した外科手術の標準コードで、医療行為分類として統計用途を意識した設計。\n【誤答の整理】A：J・Kコードは統計には不向き。B：逆でSTEM7の方が統計向き。D：J・KコードとSTEM7は別物。E：どちらも日本国内で作成され、WHO作成ではない。\n【補足】『請求用（J・K）と統計用（STEM7、ICHI）は分けて考える』のが整理のコツ。","tags":["Jコード","Kコード","STEM7","医療行為分類"]},
      {"id":"ch11-035","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"死因の定義について正しいのはどれか。","choices":{"A":"死亡直前の心停止だけを死因とする。","B":"死因には終末期の心不全や呼吸不全のような死亡様式を必ず含める。","C":"死因とは、死亡に関与したすべての疾病・損傷、または損傷を引き起こした事故・暴力の状況をいう。","D":"原死因は死亡診断書には不要である。","E":"死因統計では複数病態があっても常に最初に記載されたものを採用する。"},"correctAnswer":"C","explanation":"【正答の根拠】ICDにおける死因の定義は『死亡をもたらしたすべての疾病・損傷、または損傷を引き起こした事故・暴力の状況』。単なる死亡様式（心停止・呼吸停止など）は死因とみなさない。心停止は『死の様態』であって、その背景にある疾患こそが死因。\n【誤答の整理】A：心停止は死因ではなく死亡様式。B：死亡様式は死因に含めない（むしろ除外）。D：原死因こそ死亡診断書記載の中心。E：死因統計では『原死因選択ルール』に基づき選ぶので、記載順ではない。\n【補足】死亡診断書記入マニュアル（厚労省）でも、『心不全』『呼吸不全』『老衰以外の原因不明』を死因としないよう明記されている。原死因の特定は死因統計の精度の根幹。","tags":["死因","死亡診断書","原死因"]},
      {"id":"ch11-036","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"死亡診断書の記載形式について正しいのはどれか。","choices":{"A":"I欄はその他の重要な病態、II欄は原死因である。","B":"I欄には直接死因から先行死因までの連鎖を書き、II欄にはその他の重要な病態を書く。","C":"I欄には生活歴、II欄には死因を書く。","D":"原死因はII欄にしか書けない。","E":"直接死因だけを書けば十分である。"},"correctAnswer":"B","explanation":"【正答の根拠】死亡診断書のI欄は『死因の因果連鎖』を記載する欄。（ア）直接死因→（イ）その原因→（ウ）さらに原因→（エ）原死因、と時間をさかのぼる形で書く。II欄は『I欄の傷病経過に関連しないが、死亡に影響した重要な病態』を記載する欄。原死因（統計用）はI欄の連鎖の最終行から決定される。\n【誤答の整理】A：I欄とII欄の役割が逆。C：生活歴は記載事項ではない。D：原死因はI欄から選ばれる。E：連鎖記載が必要で、直接死因だけでは不十分。\n【補足】例）直接死因（ア）肺炎 ← （イ）脳梗塞 ← （ウ）高血圧、II欄：糖尿病。この場合の原死因は高血圧。II欄の糖尿病は統計上の原死因とはならないが参考情報として残る。","tags":["死亡診断書","死因連鎖","原死因"]},
      {"id":"ch11-037","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"「主要病態」の定義として最も適切なのはどれか。","choices":{"A":"退院時に最も重症だった病態","B":"最も長く存在した病態","C":"エピソードの終わりに、主として治療または検査された病態","D":"既往歴の中で最も重要な病態","E":"主治医が最初に記載した病名"},"correctAnswer":"C","explanation":"【正答の根拠】ICD第2巻（総論）の定義：主要病態（main condition）とは『保健ケアのエピソードの終わりに、主として治療または検査された病態』。重症度や期間ではなく『そのエピソードで医療資源を最も投入した病態』。DPCの『医療資源病名』もこの定義に準拠する。\n【誤答の整理】A：重症度は判断要素ではない。B：期間の長さも基準ではない。D：既往歴は主要病態ではなく副傷病（入院時併存症）。E：記載順も関係ない。\n【補足】『エピソード終わり』『治療・検査の主対象』の2点がキー。DPCで主要病態が揺らぐと請求・統計の両方に影響するため、退院時の見直しが重要。","tags":["主要病態","定義","疾病統計"]},
      {"id":"ch11-038","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"MB1「重要でない主要病態」の考え方として正しいのはどれか。","choices":{"A":"主要病態欄に書かれていれば必ずそれを採用する。","B":"「その他の病態」に、より重要で治療された病態があればそちらを主要病態として再選択する。","C":"糖尿病は常に主要病態になる。","D":"慢性病は急性病より必ず優先する。","E":"手術された病態は選ばない。"},"correctAnswer":"B","explanation":"【正答の根拠】MB1（Modification Rule B1）は『主要病態として記載されたものが軽微で、その他の病態欄により重要な治療対象があった場合は、そちらを主要病態として再選択する』ルール。医師の記載をそのまま鵜呑みにせず、コーダーが記録全体を見て判断し直す仕組み。\n【誤答の整理】A：記載されていても再選択されうる（まさにMB1の意義）。C：糖尿病は合併症や他疾患で入院した場合は主要病態にならないことが多い。D：慢性優先のルールはない。E：手術対象は多くの場合むしろ主要病態となる。\n【補足】MBルールは『記載の書き方で統計が歪まないようにする』ためのコーダー側の調整ルール。MB1〜MB5まで存在し、それぞれ異なるケースを扱う。","tags":["主要病態","MBルール","MB1"]},
      {"id":"ch11-039","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"MB3「主要病態が症状・保健上の問題（R・Zコード）」の考え方として正しいのはどれか。","choices":{"A":"Rコードが書かれていれば必ずRコードを採用する。","B":"Zコードは主要病態にならない。","C":"主要病態が症状や問題で、それが他に記載された診断病態の徴候・症状であり、治療が後者に行われた場合は診断病態を選ぶ。","D":"症状と診断病態が両方あれば両方を主要病態とする。","E":"最初に書かれたRコードを必ず優先する。"},"correctAnswer":"C","explanation":"【正答の根拠】MB3は『主要病態が症状・異常所見（Rコード）や健康状態影響要因（Zコード）になっており、それが別に記載された診断病態の徴候・症状に過ぎず、治療は診断病態に対して行われた場合、診断病態を主要病態に再選択する』ルール。例：主要病態『発熱（R50）』＋その他の病態『肺炎』で抗菌薬治療なら、主要病態は肺炎に変更。\n【誤答の整理】A：Rコードがあっても原因疾患が分かれば再選択。B：Zコードも単独なら主要病態になりうる（健診等）。D：主要病態は1つのみ選ぶ。E：記載順では決まらない。\n【補足】Rコード＝症状・徴候、Zコード＝保健サービス利用理由（健診・経過観察等）。これらは『原因となる診断が別にあれば』再選択される。","tags":["主要病態","MBルール","MB3","Rコード","Zコード"]},
      {"id":"ch11-040","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"MB4「特異性」の考え方として正しいのはどれか。","choices":{"A":"一般名と具体名が併記されたら一般名を選ぶ。","B":"「その他の病態」に部位や性質をより具体的に示す病態があれば、そちらを選ぶ。","C":"具体的病名は主病名にならない。","D":"先天性疾患は常に除外する。","E":"症候群名は必ず優先する。"},"correctAnswer":"B","explanation":"【正答の根拠】MB4（特異性）は『主要病態が一般的・曖昧で、その他の病態欄に部位や性質をより具体的に示す病態があれば、そちらを主要病態として再選択する』ルール。例：主要病態『心疾患』＋その他『急性前壁心筋梗塞』なら、後者が具体的なので主要病態に再選択。\n【誤答の整理】A：逆で『具体的な方を選ぶ』のがMB4の趣旨。C：具体的病名こそ主病名にふさわしい。D：先天性疾患を除外する根拠はない。E：症候群名は総称的なので具体的病名より後回しになることが多い。\n【補足】『MB1＝重要度』『MB3＝症状 vs 診断』『MB4＝具体性』と整理。統計精度向上のための『コーダー判断の標準化』。","tags":["主要病態","MBルール","MB4","特異性"]},
      {"id":"ch11-041","chapterId":11,"chapterName":"第11章 国際統計分類I","questionText":"完全性の高いコーディングに関する説明として正しいのはどれか。","choices":{"A":"主傷病名だけをコード化すれば十分である。","B":"入院時併存症は入院後に新たに発症した病態をいう。","C":"入院後発症は、今回の入院や治療が開始された時点ですでに持っていた病態をいう。","D":"副傷病名、入院時併存症、入院後発症も漏れなく把握・コード化することが望ましい。","E":"追加病名をコード化すると主傷病名の見直しは不要になる。"},"correctAnswer":"D","explanation":"【正答の根拠】完全性の高いコーディングには、主傷病名に加え、副傷病名・入院時併存症・入院後発症も漏れなく把握する必要がある。これらの違い：【入院時併存症】＝入院時点ですでに持っていた病態、【入院後発症】＝入院中に新たに発症した病態。両者は明確に区別される。\n【誤答の整理】A：主傷病名のみではDPC・統計とも不十分。B：入院後発症の定義と混同。C：入院時併存症の定義と混同。E：追加病名が増えると主傷病名の見直しが必要になることもある（MBルール適用）。\n【補足】DPC制度では『入院時併存症』と『入院後発症』の区別が支払い分類に影響する場合がある。医師の記載時から区別を意識することが重要。","tags":["コーディング","完全性","入院時併存症","入院後発症"]},

// ═══ State (persistent across session) ═══
let selectedChapters = [8, 9, 10, 11];
let selectedCount = 10; // default
let currentQuestions = [];
let currentIndex = 0;
let answers = {};
let wrongIds = [];    // auto-tracked: answered wrong
let flaggedIds = [];  // manually flagged by user
let answeredIds = []; // all answered (for stats)
let correctCountTotal = 0;
let attempts = 0;

// ═══ localStorage auto-save/load ═══
const STORAGE_KEY = 'iryokanriso_quiz_v1';
let storageAvailable = false;
let autoSaveEnabled = true;

function checkStorage(){
  try{
    const t='__test__';
    localStorage.setItem(t,t);
    localStorage.removeItem(t);
    return true;
  }catch(e){return false;}
}

function saveToStorage(){
  if(!storageAvailable||!autoSaveEnabled)return;
  try{
    const data={
      version:1,
      savedAt:new Date().toISOString(),
      wrongIds,flaggedIds,answeredIds,correctCountTotal,attempts
    };
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  }catch(e){/* silently ignore quota errors */}
}

function loadFromStorage(){
  if(!storageAvailable)return false;
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const data=JSON.parse(raw);
    wrongIds=Array.isArray(data.wrongIds)?data.wrongIds.filter(id=>findQuestion(id)):[];
    flaggedIds=Array.isArray(data.flaggedIds)?data.flaggedIds.filter(id=>findQuestion(id)):[];
    answeredIds=Array.isArray(data.answeredIds)?data.answeredIds.filter(id=>findQuestion(id)):[];
    correctCountTotal=+data.correctCountTotal||0;
    attempts=+data.attempts||0;
    return true;
  }catch(e){return false;}
}

function clearStorage(){
  if(!storageAvailable)return;
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
}

function renderStorageStatus(){
  const el=document.getElementById('storageStatus');
  if(!el)return;
  if(storageAvailable){
    el.style.background='#e8f5ee';
    el.style.color='#1a7a3f';
    el.style.border='1px solid #b4e0c5';
    el.innerHTML='💾 <strong>自動保存：ON</strong><br><span style="color:#4a5f52">このブラウザに自動的に学習記録を保存しています。閉じて開き直しても記録は残ります。</span>';
  }else{
    el.style.background='#fff4e5';
    el.style.color='#8a4a10';
    el.style.border='1px solid #f0c99c';
    el.innerHTML='⚠️ <strong>自動保存：OFF</strong><br><span style="color:#6b5032">この環境では自動保存が使えません。記録を残すには「📤 データ書き出し」でバックアップしてください（次回「📥 データ読み込み」で復元）。</span>';
  }
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function getAllSelected(){
  let qs=[];
  selectedChapters.forEach(id=>{qs=qs.concat(CHAPTERS[id].questions);});
  return qs;
}

function getAllQuestions(){
  let qs=[];
  Object.values(CHAPTERS).forEach(ch=>{qs=qs.concat(ch.questions);});
  return qs;
}

function getChapterColor(chId){return CHAPTERS[chId]?.color||'var(--accent)';}
function getChapterBg(chId){return CHAPTERS[chId]?.bgColor||'var(--accent-glow)';}

function findQuestion(id){
  for(const ch of Object.values(CHAPTERS)){
    const q=ch.questions.find(qq=>qq.id===id);
    if(q)return q;
  }
  return null;
}

// ═══ Render Home ═══
function renderHome(){
  const wrap=document.getElementById('chapterCards');
  let html='';
  Object.keys(CHAPTERS).sort((a,b)=>+a-+b).forEach(id=>{
    const ch=CHAPTERS[id];
    const sel=selectedChapters.includes(+id);
    html+=`<div class="ch-card ${sel?'selected':''}" onclick="toggleChapter(${id})" data-ch="${id}">
      <div class="ch-head">
        <div class="ch-dot" style="background:${ch.color}"></div>
        <div class="ch-label">${ch.fullName}</div>
      </div>
      <div class="ch-meta"><span>問題数: <strong>${ch.questions.length}問</strong></span></div>
    </div>`;
  });
  wrap.innerHTML=html;
  updatePoolInfo();
  updateActionButtons();
  updateDataCounts();
  renderStorageStatus();
}

function toggleChapter(id){
  id=+id;
  const idx=selectedChapters.indexOf(id);
  if(idx>-1){
    if(selectedChapters.length<=1)return;
    selectedChapters.splice(idx,1);
  }else{
    selectedChapters.push(id);
  }
  selectedChapters.sort((a,b)=>a-b);
  document.querySelectorAll('.ch-card').forEach(c=>{
    const cid=+c.dataset.ch;
    c.classList.toggle('selected',selectedChapters.includes(cid));
  });
  updatePoolInfo();
  updateActionButtons();
}

function selectCount(n){
  selectedCount=n;
  document.querySelectorAll('.count-chip').forEach(c=>{
    c.classList.toggle('selected',c.dataset.count==String(n));
  });
  document.getElementById('customCount').value='';
  updatePoolInfo();
}

function handleCustomCount(v){
  const n=parseInt(v);
  if(isNaN(n)||n<1){selectedCount=10;return;}
  selectedCount=n;
  document.querySelectorAll('.count-chip').forEach(c=>c.classList.remove('selected'));
  updatePoolInfo();
}

function updatePoolInfo(){
  const pool=getAllSelected().length;
  let outCount=selectedCount==='all'?pool:Math.min(selectedCount,pool);
  document.getElementById('poolInfo').innerHTML=`対象 <strong>${pool}</strong>問 から <strong>${outCount}</strong>問を出題`;
}

function updateActionButtons(){
  // Wrong review
  const wrongInScope=wrongIds.filter(wid=>{
    const q=findQuestion(wid);
    return q&&selectedChapters.includes(q.chapterId);
  });
  const btnW=document.getElementById('btnWrong');
  if(wrongInScope.length>0){
    btnW.classList.remove('hidden');
    btnW.textContent=`📍 間違えた問題を復習（${wrongInScope.length}問）`;
  }else{btnW.classList.add('hidden');}

  // Flagged
  const flaggedInScope=flaggedIds.filter(fid=>{
    const q=findQuestion(fid);
    return q&&selectedChapters.includes(q.chapterId);
  });
  const btnF=document.getElementById('btnFlagged');
  if(flaggedInScope.length>0){
    btnF.classList.remove('hidden');
    btnF.textContent=`🔖 ブックマーク問題（${flaggedInScope.length}問）`;
  }else{btnF.classList.add('hidden');}
}

function updateDataCounts(){
  const total=wrongIds.length+flaggedIds.length;
  document.getElementById('exportCount').textContent=total>0?`${total}件保存中`:'0件';
  const answered=answeredIds.length;
  if(answered>0){
    const rate=Math.round((correctCountTotal/answered)*100);
    document.getElementById('statsCount').textContent=`${rate}% / ${answered}問`;
  }else{
    document.getElementById('statsCount').textContent='未学習';
  }
}

// ═══ Start Quiz ═══
function startQuiz(mode){
  answers={};currentIndex=0;
  let pool;

  if(mode==='wrong'){
    pool=getAllSelected().filter(q=>wrongIds.includes(q.id));
    if(!pool.length){showToast('復習対象の問題がありません','err');return;}
    currentQuestions=shuffle(pool);
  }else if(mode==='flagged'){
    pool=getAllSelected().filter(q=>flaggedIds.includes(q.id));
    if(!pool.length){showToast('ブックマーク問題がありません','err');return;}
    currentQuestions=shuffle(pool);
  }else{
    pool=getAllSelected();
    if(!pool.length){showToast('章を選択してください','err');return;}
    const n=selectedCount==='all'?pool.length:Math.min(selectedCount,pool.length);
    currentQuestions=shuffle(pool).slice(0,n);
  }

  let label;
  if(mode==='wrong')label='📍 復習モード';
  else if(mode==='flagged')label='🔖 ブックマーク';
  else label=selectedChapters.length>1?'ミックス（'+selectedChapters.map(id=>CHAPTERS[id].name).join('+')+'）':CHAPTERS[selectedChapters[0]].fullName;
  document.getElementById('quizHeaderTitle').textContent=label;

  showScreen('quizScreen');
  renderQuestion();
}

// ═══ Render Question ═══
function renderQuestion(){
  const q=currentQuestions[currentIndex];
  const total=currentQuestions.length;
  const pct=Math.round((currentIndex/total)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressCurrent').textContent=`${currentIndex+1} / ${total}`;
  document.getElementById('progressPct').textContent=pct+'%';

  const chColor=getChapterColor(q.chapterId);
  const chBg=getChapterBg(q.chapterId);
  const chName=CHAPTERS[q.chapterId]?.name||'';
  const isFlagged=flaggedIds.includes(q.id);

  let html=`<div class="q-head-row"><div style="flex:1"><div class="q-chapter-badge" style="background:${chBg};color:${chColor}">${chName}</div><div class="q-number">Q${currentIndex+1} / ${total}</div></div><button class="flag-btn ${isFlagged?'flagged':''}" id="flagBtn" onclick="toggleFlag()" title="ブックマーク">${isFlagged?'🔖':'🏷️'}</button></div>`;
  html+=`<div class="q-text">${q.questionText}</div><div class="choices" id="choicesWrap">`;
  ['A','B','C','D','E'].forEach(k=>{
    html+=`<button class="choice-btn" data-key="${k}" onclick="selectChoice('${k}')"><span class="key">${k}</span><span>${q.choices[k]}</span></button>`;
  });
  html+='</div><div id="explanationWrap"></div>';
  document.getElementById('quizBody').innerHTML=html;
  document.getElementById('btnNext').classList.add('hidden');
  document.getElementById('btnFinish').classList.add('hidden');
  window.scrollTo(0,0);
  if(answers[q.id])applyAnswer(q,answers[q.id]);
}

function toggleFlag(){
  const q=currentQuestions[currentIndex];
  const idx=flaggedIds.indexOf(q.id);
  if(idx>-1){
    flaggedIds.splice(idx,1);
    showToast('ブックマーク解除','ok');
  }else{
    flaggedIds.push(q.id);
    showToast('ブックマークに追加','ok');
  }
  const btn=document.getElementById('flagBtn');
  const isFlagged=flaggedIds.includes(q.id);
  btn.classList.toggle('flagged',isFlagged);
  btn.textContent=isFlagged?'🔖':'🏷️';
  saveToStorage();
}

function selectChoice(key){
  const q=currentQuestions[currentIndex];
  if(answers[q.id])return;
  answers[q.id]=key;

  // Track globally
  if(!answeredIds.includes(q.id))answeredIds.push(q.id);
  const ok=key===q.correctAnswer;
  if(ok){
    correctCountTotal++;
    // If previously wrong, remove from wrongIds (now correct)
    const wIdx=wrongIds.indexOf(q.id);
    if(wIdx>-1)wrongIds.splice(wIdx,1);
  }else{
    if(!wrongIds.includes(q.id))wrongIds.push(q.id);
  }

  applyAnswer(q,key);
  saveToStorage();
}

function applyAnswer(q,key){
  const ok=key===q.correctAnswer;
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    const k=btn.dataset.key;
    btn.classList.add('disabled');
    if(k===q.correctAnswer)btn.classList.add('correct');
    if(k===key&&!ok)btn.classList.add('wrong');
    if(k!==key&&k!==q.correctAnswer)btn.classList.add('dimmed');
  });

  const isLast=currentIndex>=currentQuestions.length-1;
  const nextLabel=isLast?'結果を見る →':'次の問題 →';

  // Format explanation: highlight 【...】 headings and preserve line breaks
  const formattedExp=q.explanation
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/【([^】]+)】/g,'<strong>【$1】</strong>');

  document.getElementById('explanationWrap').innerHTML=`
    <div class="explanation-box">
      <div class="result-badge ${ok?'correct':'wrong'}">${ok?'✓ 正解':'✗ 不正解（正答: '+q.correctAnswer+'）'}</div>
      <div style="font-size:13px;color:var(--text);font-weight:700;margin-bottom:6px">💡 解説</div>
      <div class="exp-text">${formattedExp}</div>
      <div class="tags">${q.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>`;

  if(isLast){
    document.getElementById('btnFinish').classList.remove('hidden');
    document.getElementById('btnNext').classList.add('hidden');
  }else{
    document.getElementById('btnNext').classList.remove('hidden');
    document.getElementById('btnFinish').classList.add('hidden');
  }
  // Scroll to show explanation
  setTimeout(()=>{
    document.getElementById('explanationWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
  },100);
}

function nextQuestion(){
  if(currentIndex<currentQuestions.length-1){currentIndex++;renderQuestion();}
}

// ═══ Result ═══
function showResult(){
  let correct=0;
  currentQuestions.forEach(q=>{
    if(answers[q.id]===q.correctAnswer)correct++;
  });

  const total=currentQuestions.length;
  const pct=Math.round((correct/total)*100);
  attempts++;
  saveToStorage();

  showScreen('resultScreen');
  document.getElementById('reviewList').classList.add('hidden');
  document.getElementById('reviewBack').classList.add('hidden');
  document.getElementById('resultPct').textContent=pct+'%';
  document.getElementById('resultOk').textContent=correct;
  document.getElementById('resultNg').textContent=total-correct;
  document.getElementById('resultCount').textContent=total;

  // Chapter breakdown
  const breakdown={};
  currentQuestions.forEach(q=>{
    if(!breakdown[q.chapterId])breakdown[q.chapterId]={ok:0,ng:0};
    if(answers[q.id]===q.correctAnswer)breakdown[q.chapterId].ok++;
    else breakdown[q.chapterId].ng++;
  });
  const bdWrap=document.getElementById('chBreakdown');
  if(Object.keys(breakdown).length>1){
    let bHtml='';
    Object.keys(breakdown).sort((a,b)=>+a-+b).forEach(chId=>{
      const b=breakdown[chId];const t=b.ok+b.ng;const p=Math.round((b.ok/t)*100);
      bHtml+=`<div class="ch-break-item"><div class="cb-label" style="color:${getChapterColor(chId)}">${CHAPTERS[chId].name}</div><div class="cb-val">${p}%</div><div class="cb-label">${b.ok}/${t}</div></div>`;
    });
    bdWrap.innerHTML=bHtml;bdWrap.style.display='flex';
  }else{bdWrap.style.display='none';}

  const circ=2*Math.PI*62;const off=circ*(1-pct/100);
  const arc=document.getElementById('resultArc');
  arc.style.transition='none';arc.setAttribute('stroke-dashoffset',circ);
  setTimeout(()=>{
    arc.style.transition='stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)';
    arc.setAttribute('stroke-dashoffset',off);
    arc.setAttribute('stroke',pct>=80?'var(--correct)':pct>=50?'var(--accent)':'var(--wrong)');
  },50);
}

function showReview(){
  const list=document.getElementById('reviewList');
  const back=document.getElementById('reviewBack');
  list.classList.remove('hidden');back.classList.remove('hidden');
  let html='';
  currentQuestions.forEach((q,i)=>{
    const ans=answers[q.id];const ok=ans===q.correctAnswer;
    const chColor=getChapterColor(q.chapterId);const chBg=getChapterBg(q.chapterId);
    const flagged=flaggedIds.includes(q.id);
    html+=`<div class="review-item"><div class="ri-head"><span class="ri-badge ${ok?'ok':'ng'}">${ok?'✓':'✗'}</span><span class="ri-num">Q${i+1}</span><span class="ri-ch" style="background:${chBg};color:${chColor}">${CHAPTERS[q.chapterId].name}</span>${flagged?'<span style="margin-left:auto">🔖</span>':''}</div><div class="ri-q">${q.questionText}</div><div class="ri-ans">${ok?'正解: '+q.correctAnswer:'あなた: '+ans+' → 正答: '+q.correctAnswer}</div></div>`;
  });
  list.innerHTML=html;list.scrollIntoView({behavior:'smooth'});
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome(){
  showScreen('homeScreen');
  renderHome();
}

// ═══ Modals ═══
function openModal(title,desc,bodyHtml,actionsHtml){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalDesc').innerHTML=desc;
  document.getElementById('modalBody').innerHTML=bodyHtml;
  document.getElementById('modalActions').innerHTML=actionsHtml;
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
function closeModalBg(e){if(e.target.id==='modalOverlay')closeModal();}

function openExport(){
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    wrongIds:wrongIds,
    flaggedIds:flaggedIds,
    answeredIds:answeredIds,
    correctCountTotal:correctCountTotal,
    attempts:attempts
  };
  const json=JSON.stringify(data,null,2);
  openModal(
    '📤 データ書き出し',
    '下のテキストを全選択してコピー（長押しで「すべてを選択」→「コピー」）し、メモアプリ等に保存してください。次回使うときは「データ読み込み」から貼り付けて復元できます。',

    `<button class="btn btn-primary" onclick="copyExport()">📋 コピー</button><button class="btn btn-secondary" onclick="closeModal()">閉じる</button>`
  );

function copyExport(){
  const ta=document.getElementById('exportText');
  ta.select();ta.setSelectionRange(0,99999);
  try{
    navigator.clipboard.writeText(ta.value).then(()=>{showToast('コピーしました','ok');closeModal();},()=>{
      document.execCommand('copy');showToast('コピーしました','ok');closeModal();
    });
  }catch(e){
    document.execCommand('copy');showToast('コピーしました','ok');closeModal();
  }
}

function openImport(){
  openModal(
    '📥 データ読み込み',
    '前回書き出したデータを下に貼り付けて「読み込む」を押してください。現在の記録は上書きされます。',
    `<textarea id="importText" placeholder="ここに貼り付け..."></textarea>`,
    `<button class="btn btn-primary" onclick="doImport()">✓ 読み込む</button><button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>`
  );
}

function doImport(){
  const txt=document.getElementById('importText').value.trim();
  if(!txt){showToast('データがありません','err');return;}
  try{
    const data=JSON.parse(txt);
    wrongIds=Array.isArray(data.wrongIds)?data.wrongIds.filter(id=>findQuestion(id)):[];
    flaggedIds=Array.isArray(data.flaggedIds)?data.flaggedIds.filter(id=>findQuestion(id)):[];
    answeredIds=Array.isArray(data.answeredIds)?data.answeredIds.filter(id=>findQuestion(id)):[];
    correctCountTotal=+data.correctCountTotal||0;
    attempts=+data.attempts||0;
    saveToStorage();
    closeModal();
    renderHome();
    showToast(`読み込み完了（不正解${wrongIds.length}件・🔖${flaggedIds.length}件）`,'ok');
  }catch(e){
    showToast('データ形式が不正です','err');
  }
}

function openReset(){
  openModal(
    '🗑️ 記録をリセット',
    '間違えた問題、ブックマーク、学習履歴をすべて初期化します。この操作は取り消せません。書き出しでバックアップしてからの実行を推奨します。',
    '',
    `<button class="btn btn-wrong" onclick="doReset()">すべて削除</button><button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>`
  );
}

function doReset(){
  wrongIds=[];flaggedIds=[];answeredIds=[];correctCountTotal=0;attempts=0;
  clearStorage();
  closeModal();renderHome();
  showToast('リセットしました','ok');
}

function openStats(){
  let statsHtml='';
  const totalQ=getAllQuestions().length;
  const answered=answeredIds.length;
  const rate=answered>0?Math.round((correctCountTotal/answered)*100):0;

  // Chapter-wise stats
  let chStatsHtml='';
  Object.keys(CHAPTERS).sort((a,b)=>+a-+b).forEach(chId=>{
    const ch=CHAPTERS[chId];
    const chQs=ch.questions;
    const chAnswered=chQs.filter(q=>answeredIds.includes(q.id)).length;
    const chWrong=chQs.filter(q=>wrongIds.includes(q.id)).length;
    const chFlagged=chQs.filter(q=>flaggedIds.includes(q.id)).length;
    const chPct=chQs.length>0?Math.round((chAnswered/chQs.length)*100):0;
    chStatsHtml+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div style="font-weight:700;font-size:13px;color:${ch.color}">${ch.name}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim)">${chAnswered}/${chQs.length} (${chPct}%)</div>
      </div>
      <div style="display:flex;gap:10px;font-size:11px;color:var(--text-dim)">
        <span>❌ 要復習: <strong style="color:var(--wrong)">${chWrong}</strong></span>
        <span>🔖 BM: <strong style="color:#fbbf24">${chFlagged}</strong></span>
      </div>
    </div>`;
  });

  statsHtml=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;text-align:center;">
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">全体の学習進捗</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--accent);">${answered} / ${totalQ}</div>
    <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">正答率 ${rate}% ・ 挑戦 ${attempts}回</div>
  </div>
  <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;font-weight:700;">📚 章別</div>
  ${chStatsHtml}`;

  openModal('📊 学習状況','',statsHtml,`<button class="btn btn-secondary" onclick="closeModal()">閉じる</button>`);
}

function showToast(msg,type){
  const t=document.createElement('div');
  t.className='toast '+(type||'');t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';},1500);
  setTimeout(()=>t.remove(),1900);
}

// ═══ Init ═══
storageAvailable = checkStorage();
if(storageAvailable){
  loadFromStorage();
}
selectCount(10);
renderHome();
// Show a subtle hint on first load if storage is available and data exists
if(storageAvailable && (wrongIds.length||flaggedIds.length||attempts)){
  setTimeout(()=>showToast(`前回の記録を復元しました（🔖${flaggedIds.length}・要復習${wrongIds.length}）`,'ok'),300);
}
</script>
</body>
</html>
