<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>診療情報管理士 問題演習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface-alt: #222636;
  --border: #2d3248;
  --text: #e8eaf0;
  --text-dim: #8b90a5;
  --accent: #6c8cff;
  --accent-glow: rgba(108,140,255,0.15);
  --correct: #34d399;
  --correct-bg: rgba(52,211,153,0.1);
  --wrong: #f87171;
  --wrong-bg: rgba(248,113,113,0.1);
  --tag-bg: rgba(108,140,255,0.12);
  --ch8: #f59e0b;
  --ch8-bg: rgba(245,158,11,0.12);
  --ch9: #10b981;
  --ch9-bg: rgba(16,185,129,0.12);
  --ch10: #ec4899;
  --ch10-bg: rgba(236,72,153,0.12);
  --ch11: #8b5cf6;
  --ch11-bg: rgba(139,92,246,0.12);
  --mix: #ec4899;
  --mix-bg: rgba(236,72,153,0.12);
  --radius: 14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent;}
.screen{display:none}.screen.active{display:block}

/* Header */
.app-header{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 20px;}
.app-header h1{font-size:13px;font-weight:700;letter-spacing:0.04em;color:var(--text-dim);}
.app-header .chapter-name{font-size:17px;font-weight:900;margin-top:2px;}

/* Progress */
.progress-bar-wrap{padding:0 20px;margin-top:12px;}
.progress-track{height:6px;border-radius:3px;background:var(--surface-alt);overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#a78bfa);transition:width 0.4s cubic-bezier(.4,0,.2,1);}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-top:6px;padding:0 2px;font-family:'JetBrains Mono',monospace;}

/* Home */
.home-screen{padding:32px 20px 60px;}
.home-logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#fff;box-shadow:0 8px 32px rgba(108,140,255,0.25);}
.home-title{text-align:center;font-size:21px;font-weight:900;margin-bottom:4px;}
.home-sub{text-align:center;font-size:13px;color:var(--text-dim);margin-bottom:28px;}

/* Chapter Cards */
.chapter-cards{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
.ch-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all 0.2s;-webkit-user-select:none;user-select:none;}
.ch-card:active{transform:scale(0.98);}
.ch-card.selected{border-color:var(--accent);background:var(--accent-glow);}
.ch-card .ch-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ch-card .ch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ch-card .ch-label{font-size:15px;font-weight:700;}
.ch-card .ch-desc{font-size:12px;color:var(--text-dim);line-height:1.5;}
.ch-card .ch-meta{display:flex;gap:12px;margin-top:10px;font-size:12px;font-family:'JetBrains Mono',monospace;}
.ch-card .ch-meta span{color:var(--text-dim);}
.ch-card .ch-meta strong{color:var(--text);}

.section-label{font-size:13px;font-weight:700;color:var(--text-dim);margin-bottom:10px;letter-spacing:0.03em;}

/* Mode buttons */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;box-shadow:0 4px 20px rgba(108,140,255,0.25);}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.btn-secondary:active{background:var(--surface-alt);}
.btn-wrong{background:var(--wrong-bg);color:var(--wrong);border:1px solid rgba(248,113,113,0.3);}
.btn-full{grid-column:1/-1;}
.btn-disabled{opacity:0.35;pointer-events:none;}

/* Quiz */
.quiz-screen{padding:16px 20px 100px;}
.q-chapter-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:6px;}
.q-number{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:8px;font-weight:500;}
.q-text{font-size:16.5px;font-weight:700;line-height:1.7;margin-bottom:22px;}
.choices{display:flex;flex-direction:column;gap:10px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;width:100%;padding:15px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Noto Sans JP',sans-serif;font-size:14.5px;color:var(--text);text-align:left;cursor:pointer;transition:all 0.15s;line-height:1.6;-webkit-user-select:none;user-select:none;}
.choice-btn:active{transform:scale(0.98);}
.choice-btn .key{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:var(--surface-alt);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--text-dim);}
.choice-btn.selected{border-color:var(--accent);background:var(--accent-glow);}
.choice-btn.selected .key{background:var(--accent);color:#fff;}
.choice-btn.correct{border-color:var(--correct);background:var(--correct-bg);}
.choice-btn.correct .key{background:var(--correct);color:#fff;}
.choice-btn.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
.choice-btn.wrong .key{background:var(--wrong);color:#fff;}
.choice-btn.disabled{pointer-events:none;}
.choice-btn.dimmed{opacity:0.4;}

/* Explanation */
.explanation-box{margin-top:20px;padding:16px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);animation:slideUp 0.3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;margin-bottom:10px;}
.result-badge.correct{background:var(--correct-bg);color:var(--correct);}
.result-badge.wrong{background:var(--wrong-bg);color:var(--wrong);}
.exp-text{font-size:14px;line-height:1.75;color:var(--text-dim);white-space:pre-line;word-wrap:break-word;}
.exp-text strong{color:var(--text);font-weight:700;}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.tag{font-size:11px;padding:4px 8px;border-radius:6px;background:var(--tag-bg);color:var(--accent);font-weight:500;}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding:12px 20px calc(12px + env(safe-area-inset-bottom));background:rgba(15,17,23,0.92);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;gap:10px;}
.bottom-nav .btn{flex:1;padding:14px;}

/* Result */
.result-screen{padding:36px 20px;}
.result-screen .r-center{text-align:center;}
.result-circle{width:140px;height:140px;border-radius:50%;margin:0 auto 24px;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.result-circle svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.result-circle .pct{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;}
.result-circle .pct-label{font-size:12px;color:var(--text-dim);}
.result-detail{display:flex;justify-content:center;gap:24px;margin:20px 0 28px;}
.result-detail .item{text-align:center;}
.result-detail .item .val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
.result-detail .item .lbl{font-size:12px;color:var(--text-dim);margin-top:2px;}
.result-detail .item.ok .val{color:var(--correct);}
.result-detail .item.ng .val{color:var(--wrong);}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:12px;}

/* Chapter breakdown */
.ch-breakdown{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
.ch-break-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center;min-width:100px;}
.ch-break-item .cb-label{font-size:11px;color:var(--text-dim);margin-bottom:4px;}
.ch-break-item .cb-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;}

/* Review */
.review-list{padding:0 20px 40px;}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.review-item .ri-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ri-badge{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
.ri-badge.ok{background:var(--correct);}.ri-badge.ng{background:var(--wrong);}
.ri-num{font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
.ri-ch{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;}
.review-item .ri-q{font-size:13px;line-height:1.55;}
.review-item .ri-ans{font-size:12px;color:var(--text-dim);margin-top:6px;}
/* Utility */
.hidden{display:none!important}

/* Count picker */
.count-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.count-chip{flex:1;min-width:60px;padding:12px 8px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;-webkit-user-select:none;user-select:none;}
.count-chip:active{transform:scale(0.95);}
.count-chip.selected{border-color:var(--accent);background:var(--accent-glow);color:var(--accent);}
.count-custom-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.count-custom-row input{flex:1;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;text-align:center;outline:none;}
.count-custom-row input:focus{border-color:var(--accent);}
.count-custom-row .unit{color:var(--text-dim);font-size:13px;}
.pool-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text-dim);text-align:center;}
.pool-info strong{color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:700;}

/* Flag button in quiz */
.flag-btn{position:absolute;top:12px;right:20px;width:44px;height:44px;border:none;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.flag-btn:active{transform:scale(0.92);}
.flag-btn.flagged{background:rgba(251,191,36,0.15);border-color:#fbbf24;}
.q-head-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px;}

/* Menu / additional buttons */
.utility-section{margin-top:24px;}
.util-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.util-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all 0.15s;font-size:13px;font-weight:700;color:var(--text);}
.util-btn:active{transform:scale(0.97);background:var(--surface-alt);}
.util-btn .util-icon{font-size:20px;display:block;margin-bottom:4px;}
.util-btn .util-count{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:11px;margin-top:2px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 12px 12px;padding:24px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:500px;max-height:85dvh;overflow-y:auto;animation:slideUpModal 0.3s ease;}
@keyframes slideUpModal{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal h3{font-size:18px;font-weight:900;margin-bottom:8px;}
.modal p{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:14px;}
.modal textarea{width:100%;min-height:120px;padding:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.5;outline:none;resize:vertical;}
.modal textarea:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-actions .btn{flex:1;padding:13px;}
.toast{position:fixed;bottom:calc(30px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:toastIn 0.3s ease;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px);}to{opacity:1;transform:translate(-50%,0);}}
.toast.ok{color:var(--correct);border-color:rgba(52,211,153,0.3);}
.toast.err{color:var(--wrong);border-color:rgba(248,113,113,0.3);}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div id="homeScreen" class="screen active">
<div class="home-screen">
  <div class="home-logo">📋</div>
  <div class="home-title">診療情報管理士</div>
  <div class="home-sub">学習用 問題演習アプリ</div>

  <div class="section-label">章を選択（複数選択可）</div>
  <div class="chapter-cards" id="chapterCards"></div>

  <div class="section-label" style="margin-top:24px">問題数を選ぶ</div>
  <div class="count-picker" id="countPicker">
    <div class="count-chip" data-count="10" onclick="selectCount(10)">10問</div>
    <div class="count-chip" data-count="20" onclick="selectCount(20)">20問</div>
    <div class="count-chip" data-count="30" onclick="selectCount(30)">30問</div>
    <div class="count-chip" data-count="50" onclick="selectCount(50)">50問</div>
    <div class="count-chip" data-count="all" onclick="selectCount('all')">全問</div>
  </div>
  <div class="count-custom-row">
    <input type="number" id="customCount" placeholder="自由入力" min="1" max="500" inputmode="numeric" oninput="handleCustomCount(this.value)">
    <span class="unit">問</span>
  </div>
  <div class="pool-info" id="poolInfo">対象: <strong>0</strong>問から <strong>0</strong>問を出題</div>

  <button class="btn btn-primary" style="margin-bottom:10px" onclick="startQuiz('normal')">🚀 学習を始める</button>
  <button class="btn btn-wrong hidden" id="btnWrong" onclick="startQuiz('wrong')" style="margin-bottom:10px">📍 間違えた問題を復習</button>
  <button class="btn btn-secondary hidden" id="btnFlagged" onclick="startQuiz('flagged')" style="margin-bottom:10px">🔖 ブックマークした問題</button>

  <div class="utility-section">
    <div class="section-label">データ管理</div>
    <div class="util-btn-grid">
      <div class="util-btn" onclick="openExport()">
        <span class="util-icon">📤</span>
        <div>データ書き出し</div>
        <div class="util-count" id="exportCount">0件</div>
      </div>
      <div class="util-btn" onclick="openImport()">
        <span class="util-icon">📥</span>
        <div>データ読み込み</div>
        <div class="util-count">復元</div>
      </div>
      <div class="util-btn" onclick="openReset()">
        <span class="util-icon">🗑️</span>
        <div>記録をリセット</div>
        <div class="util-count">初期化</div>
      </div>
      <div class="util-btn" onclick="openStats()">
        <span class="util-icon">📊</span>
        <div>学習状況</div>
        <div class="util-count" id="statsCount">--</div>
      </div>
    </div>
    <div id="storageStatus" style="margin-top:10px;padding:10px 12px;border-radius:10px;font-size:12px;line-height:1.5;"></div>
  </div>
</div>
</div>

<!-- ═══ QUIZ ═══ -->
<div id="quizScreen" class="screen">
  <div class="app-header">
    <h1>診療情報管理士 問題演習</h1>
    <div class="chapter-name" id="quizHeaderTitle"></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label"><span id="progressCurrent">1 / 42</span><span id="progressPct">0%</span></div>
  </div>
  <div class="quiz-screen" id="quizBody"></div>
  <div class="bottom-nav" id="bottomNav">
    <button class="btn btn-secondary hidden" id="btnNext" onclick="nextQuestion()">次の問題 →</button>
    <button class="btn btn-primary hidden" id="btnFinish" onclick="showResult()">結果を見る</button>
  </div>
</div>

<!-- ═══ RESULT ═══ -->
<div id="resultScreen" class="screen">
  <div class="result-screen">
    <div class="r-center">
      <div class="result-circle"><svg width="140" height="140"><circle cx="70" cy="70" r="62" stroke="var(--surface-alt)" stroke-width="8" fill="none"/><circle id="resultArc" cx="70" cy="70" r="62" stroke="var(--accent)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="389.56" stroke-dashoffset="389.56"/></svg><div class="pct" id="resultPct">0%</div><div class="pct-label">正答率</div></div>
      <div class="result-detail">
        <div class="item ok"><div class="val" id="resultOk">0</div><div class="lbl">正解</div></div>
        <div class="item ng"><div class="val" id="resultNg">0</div><div class="lbl">不正解</div></div>
        <div class="item"><div class="val" id="resultCount">0</div><div class="lbl">出題数</div></div>
      </div>
      <div class="ch-breakdown" id="chBreakdown"></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" onclick="showReview()">解答を振り返る</button>
      <button class="btn btn-secondary" onclick="goHome()">ホームに戻る</button>
    </div>
  </div>
  <div class="review-list hidden" id="reviewList"></div>
  <div style="padding:0 20px 40px" class="hidden" id="reviewBack">
    <button class="btn btn-secondary" onclick="goHome()">ホームに戻る</button>
  </div>
</div>

<!-- ═══ MODALS ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal" id="modalBox">
    <h3 id="modalTitle">タイトル</h3>
    <p id="modalDesc"></p>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// QUESTION DATA
// ═══════════════════════════════════════
const CHAPTERS = {
  8: {
    id: 8,
    name: "第8章",
    fullName: "第8章 診療情報管理I（法令・諸規則）",
    color: "var(--ch8)",
    bgColor: "var(--ch8-bg)",
    questions: [
      {"id":"ch08-001","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"「診療録」の説明として最も適切なのはどれか。","choices":{"A":"患者に関するあらゆる情報を総称した概念である。","B":"医師が作成する診療内容・経過などの記録である。","C":"看護記録のみを指す用語である。","D":"電子媒体に保存されたものだけを指す。","E":"病院が保有する統計資料を指す。"},"correctAnswer":"B","explanation":"【正答の根拠】診療録(いわゆるカルテ)は、医師法第24条が規定する『医師が診療を行った際に作成する記録』。医師自身の判断・処方・処置・経過観察等を記載する。\n【誤答の整理】A：『患者に関するあらゆる情報』は『診療情報』の定義で、診療録より広い概念(Q3参照)。C：看護記録は別途存在し2007年医療法改正で診療記録の一部として位置づけられたが、診療録とは別。D：紙・電子を問わず『記録の媒体』ではなく『内容』で定義される。E：統計資料は別物。\n【3つの用語整理】(1)診療情報(最広義：診療の過程で知り得たすべての情報)→(2)診療に関する諸記録(記録化されたもの全般：診療録・看護記録・検査・手術記録等)→(3)診療録(医師が作成する中核記録)。包含関係を押さえるのが章全体の鍵。","tags":["診療録","用語の定義","診療情報管理"]},
      {"id":"ch08-002","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"「診療に関する諸記録」に含まれるものとして最も適切なのはどれか。","choices":{"A":"医師の診療録のみ","B":"診療録、手術記録、看護記録、検査所見記録など","C":"会計帳簿と給与台帳","D":"患者の家計簿","E":"病院の建築図面"},"correctAnswer":"B","explanation":"【正答の根拠】『診療に関する諸記録』は医療法施行規則第21条の5で範囲が規定されており、診療録に加え、病院日誌、各科診療日誌、処方せん、手術記録、看護記録、検査所見記録、エックス線写真、紹介状、退院した患者に係る入院期間中の診療経過の要約(退院時要約)、入院診療計画書などが含まれる。\n【誤答の整理】A：診療録のみでは狭すぎる。C：会計帳簿・給与台帳は診療記録ではなく経理記録。D・E：患者の家計簿・病院建築図面は診療と無関係。\n【保存期間の注意】医療法施行規則では『過去2年間』の保存を求められるものがある一方、診療録自体は医師法第24条で『5年間』保存。記録の種類により保存年限が異なる点が試験頻出。","tags":["診療に関する諸記録","用語の定義","記録"]},
      {"id":"ch08-003","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"「診療情報」の説明として最も適切なのはどれか。","choices":{"A":"診療の過程で、患者の身体状況、病状、治療等について医療従事者が知り得た情報である。","B":"保険請求に必要なレセプト情報のみである。","C":"患者が自宅で記載したメモのみである。","D":"診療録と同義であり、区別はない。","E":"電子カルテに入力された情報だけをいう。"},"correctAnswer":"A","explanation":"【正答の根拠】『診療情報』は厚労省『診療情報の提供等に関する指針』で定義され、診療の過程で医療従事者が患者から知り得た、あるいは観察・検査等で得た身体状況・病状・治療に関するすべての情報を指す。記録化される前の『情報』段階も含む最広義の概念。\n【誤答の整理】B：レセプトは診療情報の一部にすぎない。C：患者メモは医療従事者が得た情報ではない。D：診療録は診療情報のうち『医師が文書化した中核部分』で、診療情報の方が広い。E：媒体で定義されない。\n【覚え方】『情報(intangible)→記録(tangible)→諸記録(制度上の一覧)→診療録(法定の中核)』という階層。患者の権利(知る権利・開示請求権)は『診療情報』レベルで保障される。","tags":["診療情報","用語の定義","診療情報管理"]},
      {"id":"ch08-004","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"診療記録の価値のうち、「患者にとっての価値」として最も適切なのはどれか。","choices":{"A":"医師個人の研究資料となることだけを意味する。","B":"患者が安全な医療を受け、医療の継続性が確保されるうえで重要である。","C":"病院の経営統計にしか使われない。","D":"保険者の事務処理のみを目的とする。","E":"診療記録の価値は患者にはない。"},"correctAnswer":"B","explanation":"【正答の根拠】診療記録は患者にとって、(1)安全な医療提供の基盤(アレルギー歴・既往歴・投薬歴から医療事故を防ぐ)、(2)医療の継続性(他院受診や担当医変更時の情報継承)、(3)情報開示請求の基礎資料(インフォームドコンセント・セカンドオピニオン)、(4)医療過誤の有無を検証する証拠、という多面的価値を持つ。\n【誤答の整理】A：研究資料は医師側の価値の一部。C：経営統計は病院側の価値。D：保険者事務は一部用途。E：患者に最も直接的な価値がある。\n【補足】『患者の価値＝安全＋継続性＋知る権利』が3本柱。Q5(医師)・Q6(病院)との対比で理解する。","tags":["診療記録の価値","患者","継続性"]},
      {"id":"ch08-005","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"診療記録の価値のうち、「医師にとっての価値」として最も適切なのはどれか。","choices":{"A":"医師にとっては不要であり、法的義務にすぎない。","B":"診療の経験と知見の集積であり、自らの医業管理や教育にも利用される。","C":"患者への説明には用いられない。","D":"他職種との連携を妨げる資料である。","E":"医師以外には価値がない。"},"correctAnswer":"B","explanation":"【正答の根拠】医師にとっての診療記録の価値：(1)臨床経験と知見の蓄積(過去症例の参照)、(2)自らの医業管理(診療の質の自己評価)、(3)教育資料(研修医指導、学生教育、症例検討会)、(4)研究資料(臨床研究の基礎)、(5)法的自己防衛(医療訴訟時の証拠)、(6)患者説明の根拠(インフォームドコンセント)。\n【誤答の整理】A：単なる法的義務を超えた専門職としての道具。C：むしろ患者説明の重要な基盤。D：チーム医療の連携ツール。E：医療職全般・患者・研究者に価値。\n【補足】『経験の蓄積＝実地の教科書』という視点が、SOAP形式の記録が普及した理由。医師が後から振り返って学べるよう構造化されている。","tags":["診療記録の価値","医師","教育"]},
      {"id":"ch08-006","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"診療記録の価値のうち、「病院にとっての価値」として最も適切なのはどれか。","choices":{"A":"病院経営とは無関係である。","B":"医療機関におけるさまざまな診療活動を検証・評価するための情報源となる。","C":"患者のためには使えない。","D":"法廷で使用できないため価値は低い。","E":"医師個人の私物である。"},"correctAnswer":"B","explanation":"【正答の根拠】病院にとっての価値：(1)診療活動の検証・評価(医療の質評価、クリニカルインディケーターの集計)、(2)診療報酬請求の根拠、(3)医療機能評価・病院機能評価受審の資料、(4)DPCデータ・がん登録等の統計作成、(5)医療安全管理(インシデント検証)、(6)病院間比較(ベンチマーク)、(7)訴訟・紛争対応の証拠。\n【誤答の整理】A：病院経営の中核資料。C：患者サービス向上にも使う。D：民事訴訟法第220条により裁判所への文書提出義務があり、法廷での重要証拠。E：医師の私物ではなく、医療法上、病院・診療所の管理者が保存責任を負う『病院の記録』。\n【重要判例視点】診療録の所有権は医療機関側にあるが、記載された情報に対する患者の権利(開示請求等)は別途保障されている。","tags":["診療記録の価値","病院","質評価"]},
      {"id":"ch08-007","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"わが国の古代の診療記録・医療記録に関する記述として適切なのはどれか。","choices":{"A":"養老律令には医療に関する記載はみられない。","B":"『医心方』は平安時代の医書として知られる。","C":"近代以前には診療記録は存在しなかった。","D":"古代の医療記録はすべて西洋医学に基づいていた。","E":"江戸時代に初めて医療記録が現れた。"},"correctAnswer":"B","explanation":"【正答の根拠】『医心方』は平安時代中期(984年)、丹波康頼が編纂した日本最古の医学書で、全30巻。中国の医学書から引用した疾病・治療・予防の記述を集大成している。国宝指定。\n【誤答の整理】A：養老律令(718年制定)には医疾令(医療制度の規定)があり、医師養成・医療行政の記載がある。C：古代日本でも医療の記録はあった。D：古代は中国医学(漢方)が主流で西洋医学ではない。E：江戸時代より遥か前から医療記録は存在。\n【医療史の流れ】医疾令(奈良時代)→医心方(平安)→本居宣長の診療記録(江戸)→医制(1874明治)→医師法(1906)→国民医療法(1942)→戦後の現行法体系(1948〜)。","tags":["診療記録の歴史","古代","医心方"]},
      {"id":"ch08-008","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"近世の診療記録に関する人物として本文で示されていたものはどれか。","choices":{"A":"本居宣長","B":"伊藤博文","C":"福沢諭吉","D":"新島襄","E":"二宮尊徳"},"correctAnswer":"A","explanation":"【正答の根拠】本居宣長(1730-1801)は江戸時代中期の国学者として知られるが、本業は医師(小児科を中心とした町医者)。約40年にわたる詳細な診療記録(『済世録』『諸用帳』等)を残し、近世日本の町医者の診療実態を知る貴重な史料となっている。\n【誤答の整理】B：伊藤博文は明治期の政治家。C：福沢諭吉は教育者・思想家(慶應義塾創設者)。D：新島襄は同志社創設者。E：二宮尊徳は農政家。いずれも医師ではない。\n【補足】本居宣長は『古事記伝』の国学者として有名だが、日々の生計は医業で立てていた。近世の町医者が詳細な診療記録をつけていた証左として、医療記録史上重要な人物。","tags":["診療記録の歴史","近世","本居宣長"]},
      {"id":"ch08-009","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"本文で、世界で初めて全身麻酔を用いた手術で知られる人物として示されていたのはどれか。","choices":{"A":"本居宣長","B":"緒方洪庵","C":"華岡青洲","D":"杉田玄白","E":"小石元瑞"},"correctAnswer":"C","explanation":"【正答の根拠】華岡青洲(1760-1835)は、1804年(文化元年)10月13日、60歳女性『藍屋勘』に対し、自ら開発した全身麻酔薬『通仙散(別名：麻沸散、主成分は曼陀羅華＝チョウセンアサガオ)』を用いた全身麻酔下で、世界初の乳癌摘出手術に成功した。欧米初例(1846年W.T.G.モートンのエーテル麻酔)より約42年早い快挙。\n【誤答の整理】A：本居宣長は町医者だが全身麻酔とは無関係(Q8)。B：緒方洪庵は適塾創設者で蘭学者。D：杉田玄白は『解体新書』翻訳者(1774年)。E：小石元瑞は京都の蘭方医。いずれも全身麻酔の先駆者ではない。\n【補足】日本麻酔科学会は青洲の業績にちなみ、10月13日を『麻酔の日』と定め、ロゴマークに曼陀羅華をあしらっている。患者記録『乳巖姓名録』に152名の手術記録が残る点でも、『記録』史的に重要。","tags":["診療記録の歴史","華岡青洲","近世"]},
      {"id":"ch08-010","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"近代の医療制度の整備に関する記述として正しいのはどれか。","choices":{"A":"1874年に『医制』が公布された。","B":"1906年に初めて『医制』が公布された。","C":"1948年に初めて医療制度が法制化された。","D":"近代医療制度は戦後にのみ始まった。","E":"本文では近代の医療制度整備には触れていない。"},"correctAnswer":"A","explanation":"【正答の根拠】1874年(明治7年)、明治政府が『医制』を発布。これは日本最初の近代的な医療法規で、医学教育・医師免許・薬事・病院制度など医療全般を規定。西洋医学導入と医師制度の整備を一気に進めた。\n【誤答の整理】B：1906年は医師法制定年で、医制ではない(Q11)。C：1948年は戦後の現行医療法・医師法制定年で『初めて』ではない。D：近代医療制度は明治期から。E：本文で主要テーマ。\n【覚え方】『1874(医制)＝明治7年＝近代医療の夜明け』。富国強兵の一環として、軍事・教育と並んで医療制度が整備された。","tags":["診療記録の歴史","近代","医制"]},
      {"id":"ch08-011","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"本文で示された医療法規の流れとして最も適切なのはどれか。","choices":{"A":"医制 → 医師法 → 国民医療法 → 戦後の現行法整備","B":"国民医療法 → 医制 → 医師法 → 戦後の現行法整備","C":"医師法 → 医制 → 戦後の現行法整備 → 国民医療法","D":"戦後の現行法整備 → 医制 → 医師法 → 国民医療法","E":"本文では年次的な流れは示されていない。"},"correctAnswer":"A","explanation":"【正答の根拠】わが国の医療法規の歴史的流れ：(1)1874年『医制』(明治7、最初の近代医療法規)→(2)1906年『医師法』(明治39、医師資格の法制化)→(3)1942年『国民医療法』(昭和17、戦時下の医療統制法)→(4)1948年『現行医師法・医療法』(昭和23、戦後GHQ改革下の整備、国民医療法廃止)。\n【誤答の整理】B〜D：年次順が不正確。E：本文の中心テーマ。\n【覚え方】『医制(1874)→医師法(1906)→国民医療法(1942)→現行法(1948)』＝『明治7・明治39・昭和17・昭和23』。国民医療法は戦時の統制色が強く、戦後すぐ廃止された。","tags":["診療記録の歴史","法規","医師法","国民医療法"]},
      {"id":"ch08-012","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"日本病院会に関する記述として正しいのはどれか。","choices":{"A":"1951年に日本病院協会として設立され、1976年に日本病院会へ名称変更した。","B":"1948年に日本医師会として設立された。","C":"2005年に初めて設立された。","D":"国際組織には加盟していない。","E":"診療情報管理とは無関係である。"},"correctAnswer":"A","explanation":"【正答の根拠】日本病院会は1951年『日本病院協会』として設立、1976年に『日本病院会』へ名称変更。現在は日本の病院団体の中核の1つで、診療情報管理士の認定教育機関でもある(診療情報管理通信教育・認定試験の実施主体)。\n【誤答の整理】B：1948年日本医師会設立は別団体(医師個人の職能団体)。C：2005年ではない。D：ICD関連でWHOと協定を結ぶなど国際的にも活動(Q13・Q14)。E：診療情報管理士の認定・教育の中核機関。\n【補足】日本病院会・全日本病院協会・日本精神科病院協会・日本医療法人協会が『四病院団体協議会(四病協)』を構成し、医療政策への提言を行う。診療情報管理士の認定4団体の1つが日本病院会。","tags":["日本病院会","歴史","診療情報管理"]},
      {"id":"ch08-013","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"本文によれば、日本病院会が厚生労働大臣官房統計情報部企画課国際分類情報管理室の指導のもとで行ったものとして適切なのはどれか。","choices":{"A":"介護保険制度の創設","B":"ICDに関する技術・資金の支援についてWHOと調印したこと","C":"医師国家試験の実施","D":"薬価基準の改定","E":"病院建築基準の策定"},"correctAnswer":"B","explanation":"【正答の根拠】日本病院会は厚生労働省(当時・大臣官房統計情報部企画課国際分類情報管理室、現・政策統括官付国際分類情報管理室)の指導のもと、ICD(国際疾病分類)に関する技術・資金の支援についてWHOと調印。これがICDの日本における普及・運用の基盤となった。\n【誤答の整理】A：介護保険は厚労省老健局所管で制度創設。C：医師国家試験は厚労省医政局所管。D：薬価基準は中医協の答申に基づき厚労相告示。E：病院建築基準は医療法の範疇。いずれも日本病院会の主業務ではない。\n【補足】日本病院会のICD関連活動は、診療情報管理士制度の国際的整合性を支える基盤。診療情報管理士がICD-10、ICD-11等の翻訳・解説に関わる背景。","tags":["日本病院会","ICD","WHO"]},
      {"id":"ch08-014","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"本文で、日本病院会がWHO国際統計分類協力センターの指定を受けた年として示されていたのはどれか。","choices":{"A":"2005年","B":"2006年","C":"2007年","D":"2012年","E":"2018年"},"correctAnswer":"D","explanation":"【正答の根拠】2012年(平成24年)、日本病院会はWHO国際統計分類協力センター(WHO-FIC Collaborating Centre)の指定を受けた。国立保健医療科学院、日本診療情報管理学会等と共に、日本のWHO国際分類活動の中核を担う8機関の1つとして指定されている。\n【誤答の整理】A〜C・E：年次が異なる。他の国内機関(国立保健医療科学院等)との指定時期とも異なる。\n【補足】WHO-FIC(Family of International Classifications)は、ICD・ICF・ICHIなどWHOの国際分類ファミリーを指す。協力センター指定は、日本がWHO会議に専門家を派遣し、分類改定に関与する権限を持つことを意味する。","tags":["日本病院会","WHO","WHO-FIC"]},
      {"id":"ch08-015","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"医師法第24条の内容として正しいのはどれか。","choices":{"A":"医師は、診療をしたときは、遅滞なく診療に関する事項を診療録に記載しなければならない。","B":"医師は、診療後1年以内に記録すればよい。","C":"医師は、患者が希望した場合のみ診療録を記載する。","D":"診療録は看護師が記載することとされている。","E":"診療録の記載は自由記述で法的な定めはない。"},"correctAnswer":"A","explanation":"【正答の根拠】医師法第24条第1項：『医師は、診療をしたときは、遅滞なく診療に関する事項を診療録に記載しなければならない』。これは医師に課せられた絶対的義務で、違反時は第33条の3により50万円以下の罰金が科される。\n【誤答の整理】B：『遅滞なく』は厚労省見解で『概ね24時間以内』を意味し、1年以内では遅すぎる。C：患者の希望の有無と無関係に義務。D：医師自身が記載する義務(ただし医師事務作業補助者による代行入力は医師の確認・署名を条件に可)。E：医師法施行規則第23条で記載事項が具体的に規定されている(Q17)。\n【補足】『診療したときは、遅滞なく』は医師法24条の核心フレーズで頻出。『遅滞なく＝概ね24時間以内』という解釈は神戸大学診療録記載マニュアル等でも明記されている。","tags":["医師法","第24条","診療録記載義務"]},
      {"id":"ch08-016","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"医師法に基づく診療録の保存期間として正しいのはどれか。","choices":{"A":"1年","B":"3年","C":"5年","D":"10年","E":"20年"},"correctAnswer":"C","explanation":"【正答の根拠】医師法第24条第2項：『前項の診療録であつて、病院又は診療所に勤務する医師のした診療に関するものは、その病院又は診療所の管理者において、その他の診療に関するものは、その医師において、五年間これを保存しなければならない』。\n【誤答の整理】A・B：医師法の5年より短い。D・E：医師法は5年規定。ただし実務では訴訟対応等で20年保存が推奨される(Q18参照)。\n【保存期間の整理】(1)診療録(医師法24条)＝5年、(2)診療に関する諸記録(医療法施行規則21条の5)＝2年、(3)療担規則第9条：診療録以外の記録＝3年、(4)特定生物由来製品の記録＝20年。記録の種類により年限が違う。","tags":["医師法","保存期間","5年"]},
      {"id":"ch08-017","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"医師法施行規則第23条に定められている診療録の記載事項として含まれないものはどれか。","choices":{"A":"診療を受けた者の住所・氏名・性別及び年齢","B":"病名及び主要症状","C":"治療方法（処方及び処置）","D":"診療の年月日","E":"患者の職業歴のみ"},"correctAnswer":"E","explanation":"【正答の根拠】医師法施行規則第23条が定める診療録の必須記載事項は4項目：(1)診療を受けた者の住所、氏名、性別及び年齢、(2)病名及び主要症状、(3)治療方法(処方及び処置)、(4)診療の年月日。職業歴は法定必須項目ではない(参考情報として記載することは有用)。\n【誤答の整理】A〜D：すべて法定必須4項目。E：法定必須ではない。\n【覚え方】『住氏性年(しゅうしせいねん)／病名症状／治療方法／年月日』の4セット。これは医師事務作業補助者の研修でも重点項目。職業歴・家族歴・既往歴等は記載が推奨されるが法定必須ではない。","tags":["医師法施行規則","第23条","記載事項"]},
      {"id":"ch08-018","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"診療録の保存期間の起算日について正しいのはどれか。","choices":{"A":"記載した日","B":"患者が退院した日","C":"診療が完結した日","D":"保険請求した日","E":"病院が決めた任意の日"},"correctAnswer":"C","explanation":"【正答の根拠】保険医療機関及び保険医療養担当規則(療担規則)第9条：『保険医療機関は、療養の給付の担当に関する帳簿及び書類その他の記録をその完結の日から三年間保存しなければならない。ただし、患者の診療録にあつては、その完結の日から五年間とする』。『完結の日』とは当該患者に対する診療が完了した日を意味し、再診が続くうちは起算が始まらない。\n【誤答の整理】A：記載日ではなく診療完結日が起算点。B：退院後も外来通院が続けば起算は始まらない。D：保険請求日は無関係。E：法定基準に従うので任意設定不可。\n【実務ポイント】慢性疾患で通院が10年続けば、最終診療日から5年後まで保存義務が続く。実質的には『診療終了後5年』で、長期に及ぶことも多い。診療情報管理士の実務では、患者の最終来院日を起点に保存管理を行う。","tags":["保存期間","起算日","療担規則"]},
      {"id":"ch08-019","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"医師法第24条の診療録保存義務に違反した場合の罰則として、本文に示されていたのはどれか。","choices":{"A":"1年以下の懲役または100万円以下の罰金","B":"50万円以下の罰金","C":"罰則は一切ない","D":"無期懲役","E":"病院閉鎖のみ"},"correctAnswer":"B","explanation":"【正答の根拠】医師法第33条の3により、第24条(診療録の記載・保存義務)に違反した場合は『50万円以下の罰金』が科される。具体的には、(1)診療したのに診療録を作成しない、(2)必要な事項を記載していない、(3)5年間保存しない等の場合が該当する。\n【誤答の整理】A：医師法全般の他罰則(無免許医業等の第17条違反等は3年以下の懲役または100万円以下)と混同されやすいが、第24条違反は50万円以下の罰金のみ。C：罰則あり。D・E：該当しない。\n【補足】罰則は罰金のみで懲役はない点が特徴。軽微にみえるが医師免許への影響(行政処分)や民事損害賠償・保険医取消等の間接的影響は大きい。","tags":["医師法","罰則","診療録保存"]},
      {"id":"ch08-020","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"医師の守秘義務に関する罰則の根拠法として正しいのはどれか。","choices":{"A":"刑法第134条（秘密漏示罪）","B":"民法第709条","C":"医療法第7条","D":"労働基準法第1条","E":"健康保険法第1条"},"correctAnswer":"A","explanation":"【正答の根拠】医師の守秘義務違反は刑法第134条第1項(秘密漏示罪)により処罰される：『医師、薬剤師、医薬品販売業者、助産師、弁護士、弁護人、公証人又はこれらの職にあった者が、正当な理由がないのに、その業務上取り扱ったことについて知り得た人の秘密を漏らしたときは、六月以下の懲役又は十万円以下の罰金に処する』。\n【誤答の整理】B：民法709条は不法行為(民事責任)の一般規定で、守秘義務違反時の損害賠償根拠にはなるが刑事罰則ではない。C：医療法7条は病院・診療所の開設許可規定で守秘義務とは別。D：労基法1条は労働条件基本原則で無関係。E：健保法1条は目的規定で守秘と無関係。\n【補足】刑法134条は『医師』と明記され、判例上『歯科医師』も含むと解釈されている。看護師は保助看法第42条の2(罰則は第44条の4)で別途規定。","tags":["守秘義務","刑法","第134条","秘密漏示罪"]},
      {"id":"ch08-021","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"刑法第134条（秘密漏示罪）の訴追形式として正しいのはどれか。","choices":{"A":"親告罪である","B":"非親告罪であり検察が独自に起訴できる","C":"告発のみで成立する","D":"告訴も告発も不要で自動的に起訴される","E":"本文では言及されていない"},"correctAnswer":"A","explanation":"【正答の根拠】刑法第135条により、秘密漏示罪は『親告罪』。つまり被害者(秘密を漏らされた当事者)の告訴がなければ公訴提起できない。これは被害者のプライバシー保護の観点からで、『裁判によって秘密がさらに公になる二次被害』を避けるため被害者の意思を尊重する設計。\n【誤答の整理】B：非親告罪ではなく、被害者の告訴が起訴の要件。C：告発(第三者が申告)ではなく『告訴(被害者本人等)』が必要。D：告訴が必要。E：試験頻出事項として本文で扱われる。\n【補足】親告罪の他の例：名誉毀損罪、器物損壊罪など『個人のプライバシーや名誉の回復を被害者が自己決定すべき罪』が親告罪となる傾向。","tags":["守秘義務","親告罪","刑法"]},
      {"id":"ch08-022","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"医療法第86条に関する記述として本文に合致するのはどれか。","choices":{"A":"守秘義務違反に対する罰則が規定されている","B":"1年以下の懲役又は50万円以下の罰金が規定されている","C":"医師の資格を定める規定である","D":"介護保険の規定である","E":"救急医療のみに関する規定である"},"correctAnswer":"B","explanation":"【正答の根拠】医療法第86条は、病院・診療所の管理者が医療法上の義務(届出、記録保存、報告等)に違反した場合の罰則規定で、1年以下の懲役又は50万円以下の罰金が科される。医療法違反に対する最も重い刑事罰則の1つ。\n【誤答の整理】A：医療法86条は管理者の義務違反の罰則で、守秘義務違反は刑法134条。C：医師資格は医師法の範疇。D：介護保険は介護保険法。E：救急医療の独立規定ではない。\n【補足】医療法違反の罰則体系：管理者の義務違反(86条)、院内掲示義務違反等(87条)、など違反内容により罰則が異なる。診療情報管理部門の責任者は、医療法上の『記録保存管理責任』の一翼を担うため、86条の存在を理解しておくべき。","tags":["医療法","第86条","罰則"]},
      {"id":"ch08-023","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"個人情報保護法に関して病院に求められる体制として最も適切なのはどれか。","choices":{"A":"院内での個人情報保護に関する組織的な体制整備","B":"患者情報の自由な公開","C":"職員による情報の院外持ち出しの奨励","D":"個人情報の無制限な第三者提供","E":"個人情報の取扱いを院長1人のみで完結させること"},"correctAnswer":"A","explanation":"【正答の根拠】個人情報保護法は病院を『個人情報取扱事業者』と位置づけ、(1)取得時の利用目的通知、(2)第三者提供時の本人同意、(3)安全管理措置(組織的・人的・物理的・技術的)、(4)開示請求への対応、(5)苦情処理体制、(6)漏えい時の報告義務等を求める。2017年改正で小規模事業者(5,000人以下)の適用除外が撤廃され、全医療機関が対象に。\n【誤答の整理】B：自由な公開は違法。C：院外持ち出しは厳格管理対象。D：第三者提供は原則本人同意が必要。E：組織的対応が必要(院長1人では不可)。\n【補足】個人情報保護法の安全管理4側面：(1)組織的(責任者・規程)、(2)人的(教育・契約)、(3)物理的(入退室・施錠)、(4)技術的(アクセス制御・暗号化)。診療情報管理部門はこの中核を担う。","tags":["個人情報保護法","体制整備","安全管理"]},
      {"id":"ch08-024","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"医療機関における雇用契約上の守秘義務に関する説明として最も適切なのはどれか。","choices":{"A":"医師だけが守秘義務を負う","B":"医療職、事務職、委託業者を含む全ての職員が雇用契約や就業規則等で守秘義務を負うべきである","C":"雇用契約には守秘義務を明記できない","D":"退職後は守秘義務がなくなる","E":"守秘義務は口頭でのみ交わす"},"correctAnswer":"B","explanation":"【正答の根拠】医療機関では医師・看護師・薬剤師等の法定資格者だけでなく、診療情報管理士・医事課職員・委託業者(清掃・警備・給食・廃棄物処理等)を含む全員が守秘義務を負う。これは雇用契約書・就業規則・業務委託契約書に明記するのが原則。法定資格者は職種法で、それ以外は契約上の義務として規定する。\n【誤答の整理】A：全職員が対象。C：明記すべき。D：退職後も継続する(刑法134条・保助看法42条の2も『○○でなくなった後においても、同様』と規定)。E：書面で明記するのが原則。\n【補足】医師事務作業補助者の研修でも『守秘義務』は必須項目(Q26の第10章関連)。診療情報管理士の業務も、医師同様に診療情報に触れるため、雇用契約での守秘義務規定は必須。","tags":["守秘義務","雇用契約","全職員"]},
      {"id":"ch08-025","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"職員への教育・研修の重要性について最も適切なのはどれか。","choices":{"A":"一度採用すれば教育は不要である","B":"個人情報保護・守秘義務・記載ルール等について定期的な教育を行うことが必要である","C":"教育は院長のみに必要である","D":"外部研修に参加させてはならない","E":"医師だけに教育すればよい"},"correctAnswer":"B","explanation":"【正答の根拠】医療機関では、個人情報保護法・医療法・医師法等の法令遵守、守秘義務、診療録記載ルール、医療安全、感染対策など、継続的な教育・研修が求められる。新規採用時のオリエンテーション、定期的な全職員研修、職種別の専門研修の3層構造が一般的。\n【誤答の整理】A：法改正や運用変化に対応した継続教育が必要。C：全職員対象。D：外部研修は知見の更新に有用。E：全職種対象。\n【補足】個人情報保護法の『人的安全管理措置』の中核が教育・研修。診療情報管理部門は研修企画の担当になることが多い。わたるさんの現場でも、整形外科クリニックのスタッフ向けに『記録・情報保護・ハラスメント』等の研修設計が実務テーマになり得る。","tags":["教育研修","個人情報保護","守秘義務"]},
      {"id":"ch08-026","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"指示せんに関する説明として最も適切なのはどれか。","choices":{"A":"医師が他職種に対して行う医療上の指示を記録化したもので、診療記録の一部である","B":"患者が医師に渡すメモである","C":"病院の広告用チラシである","D":"薬局への業務依頼書である","E":"退院時の挨拶文である"},"correctAnswer":"A","explanation":"【正答の根拠】指示せん(指示箋)は、医師が看護師・薬剤師・リハビリ職・放射線技師等に対して行う医療上の指示を文書化したもの。例：『輸液の種類・速度』『安静度』『検査オーダー』『リハビリ指示』など。電子カルテではオーダーエントリーシステムに統合されている。診療記録の一部として保存対象。\n【誤答の整理】B：患者のメモではない。C：広告チラシでもない。D：薬局への処方箋とは別(院内指示)。E：退院挨拶文ではない。\n【補足】指示せんは『医師の責任による医療指示の証拠』として重要。医療過誤時には『どんな指示が出されたか』を検証する原資料になる。わたるさんの現場でも、PTへのリハビリ指示せんや運動療法指示はこの範疇。","tags":["指示せん","診療記録","医師の指示"]},
      {"id":"ch08-027","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"診療記録上の禁止事項として最も適切なのはどれか。","choices":{"A":"誤記があった場合に元の記載を完全に消してしまうこと","B":"経過を時間順に正確に記載すること","C":"署名すること","D":"必要事項を遅滞なく書くこと","E":"正確な日付を書くこと"},"correctAnswer":"A","explanation":"【正答の根拠】診療記録は法的証拠としての性質を持つため、誤記を完全に消すこと(修正液・塗りつぶし・破棄・削除等)は禁止。これは記録の改ざん(真正性の喪失)にあたり、記録の証拠価値を根本から損なう。正しい訂正方法はQ31参照。\n【誤答の整理】B・C・D・E：いずれも診療記録の基本ルールで、禁止事項ではなく『すべきこと』。\n【補足】電子カルテでは監査ログ(誰がいつどこを変更したか)が残るため、物理的に『完全に消す』ことはできないが、意図的な訂正行為の記録も監査対象。紙カルテでの『塗りつぶし』は『何を隠したか』が不明になるため、特に医療訴訟で不利な証拠となる。","tags":["診療記録","禁止事項","真正性"]},
      {"id":"ch08-028","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"傷病名と保険適用に関する説明として最も適切なのはどれか。","choices":{"A":"診療録に記載される傷病名は、診療・統計・保険請求のすべてに関わる重要な情報である","B":"傷病名は保険請求だけに使われる","C":"傷病名は診療のみに関係し、統計には使われない","D":"傷病名は記載しなくてよい","E":"傷病名は電子カルテ以外には存在しない"},"correctAnswer":"A","explanation":"【正答の根拠】傷病名(病名)は医療の中核情報で、(1)診療(治療方針決定の根拠)、(2)統計(疾病統計・人口動態・がん登録)、(3)保険請求(レセプト請求の基礎)、(4)DPC分類(医療資源病名)、(5)疫学研究、(6)医療の質評価等、多面的に使われる。傷病名の正確性は全ての下流業務の前提。\n【誤答の整理】B：保険請求だけではなく統計・研究にも必須。C：統計でも中核情報。D：医師法施行規則23条で必須記載事項。E：紙カルテにも記載される。\n【補足】傷病名の質は医師の記載品質に依存する。曖昧な病名(『○○の疑い』の長期放置、『上気道炎』等の広すぎる病名)はDPCコーディング・がん登録ともに精度を落とす。これが10章で扱ったコーディング委員会の設置義務につながる。","tags":["傷病名","保険適用","記載"]},
      {"id":"ch08-029","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"診療録における「署名」と「記名」の違いとして最も適切なのはどれか。","choices":{"A":"署名は本人が自署すること、記名は氏名を記載しておくことである","B":"両者は完全に同一である","C":"記名は本人の自署を指し、署名は印字を指す","D":"署名は不要であり、記名だけでよい","E":"両者とも法的意味は全くない"},"correctAnswer":"A","explanation":"【正答の根拠】『署名』は本人が自筆でサインすること(筆跡による本人特定)。『記名』は氏名をあらかじめ印字・印鑑・スタンプで記載すること(本人特定の根拠は弱い)。法的効力は署名の方が強く、診断書・処方せん等は原則として署名が求められる。記名の場合は押印を併用することで署名と同等の効力とすることが多い(記名押印)。\n【誤答の整理】B：異なる概念。C：定義が逆。D：診断書等では署名(または記名押印)が必須。E：法的意味がある。\n【補足】電子カルテでは電子署名(PKI・タイムスタンプ等)が自筆署名の代わりになる。厚労省『医療情報システム安全管理ガイドライン』で要件が定められている。","tags":["署名","記名","診療録"]},
      {"id":"ch08-030","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"紙カルテの記載を訂正する正しい方法はどれか。","choices":{"A":"修正液で完全に消し、新しい内容を書き直す","B":"元の記載を横線2本（二重線）で消し、元の記載が見える状態のまま、新しい内容を隣や上に書き、訂正者の署名・日付を添える","C":"ページごと破棄して書き直す","D":"記載をすべて黒塗りにする","E":"そのまま上書きする"},"correctAnswer":"B","explanation":"【正答の根拠】紙カルテの訂正は、(1)元の記載を『二重線(横線2本)』で消す、(2)元の記載が読める状態を保つ、(3)訂正内容を空きスペースに書く、(4)訂正者の署名と訂正日時を記入、が原則。これにより『いつ・誰が・何を・どう訂正したか』の履歴が追跡可能になり、記録の真正性が保たれる。\n【誤答の整理】A：修正液は元の記載が読めなくなるため禁止。C：ページ破棄は改ざんにあたる。D：黒塗りも元記載が不明になるため不可。E：上書きは履歴が残らない。\n【補足】電子カルテでは自動的に訂正ログ(誰が・いつ・どこを・どう変更したか)が記録されるため、手動の二重線処理は不要。ただしシステム設計上、訂正前後の両方が参照できる機能が必要(監査証跡)。","tags":["診療録","訂正方法","二重線"]},
      {"id":"ch08-031","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"診療録への追記の方法として最も適切なのはどれか。","choices":{"A":"元の記載の途中に割り込んで書く","B":"診療録の末尾に日付を付けて「追記」と明記し、内容を記載する","C":"元の記載を書き換える","D":"追記は一切認められない","E":"元の日付で追記する"},"correctAnswer":"B","explanation":"【正答の根拠】診療録への追記は、(1)診療録の末尾または空きスペースに、(2)『追記』と明記し、(3)実際の追記日(追記した日)と署名を付けて、(4)内容を記載する、が正しい方法。これにより『いつ追記されたか』が明確になり、元記載との区別がつく。\n【誤答の整理】A：割り込み記載は履歴が不明確。C：書き換えは訂正の範疇で『二重線』処理が必要(Q30)。D：追記は必要な場合に認められる。E：元の日付で書くと『あたかも当時書かれたかのように偽装した』ことになり改ざんに該当する。\n【補足】追記と訂正は違う概念：(1)訂正＝元の記載を書き直す(二重線処理)、(2)追記＝元の記載はそのままに、後から情報を足す(末尾に日付付記)。どちらも『履歴を残す』のが絶対条件。","tags":["診療録","追記","日付"]},
      {"id":"ch08-032","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"保険医療機関及び保険医療養担当規則（療担規則）に関する説明として最も適切なのはどれか。","choices":{"A":"保険医療機関及び保険医が保険診療を行う際の基本ルールを定めたものである","B":"介護保険の基本規則である","C":"個人情報保護の基本規則である","D":"労働災害の規則である","E":"医師の資格取得要件である"},"correctAnswer":"A","explanation":"【正答の根拠】『保険医療機関及び保険医療養担当規則』(療担規則、昭和32年厚生省令第15号)は、保険医療機関(病院・診療所)と保険医(個々の医師)が保険診療を行う際に遵守すべき基本ルールを定めた厚生労働省令。療養の給付の担当方法、診療録の記載・保存、適正な保険請求等を規定する。\n【誤答の整理】B：介護保険法とは別制度。C：個人情報保護法とは別。D：労働災害は労災保険法。E：医師資格は医師法。\n【補足】療担規則違反は保険医療機関の指定取消等、行政処分の根拠になる重大事項。診療情報管理士は特に第9条(記録の保存：診療録5年、その他3年)と第22条(診療録記載)に習熟する必要がある。","tags":["療担規則","保険診療","基本ルール"]},
      {"id":"ch08-033","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"療担規則第9条で定められている「診療録以外の記録」の保存期間として正しいのはどれか。","choices":{"A":"1年","B":"3年","C":"5年","D":"10年","E":"20年"},"correctAnswer":"B","explanation":"【正答の根拠】療担規則第9条：『保険医療機関は、療養の給付の担当に関する帳簿及び書類その他の記録をその完結の日から三年間保存しなければならない。ただし、患者の診療録にあつては、その完結の日から五年間とする』。つまり診療録は5年、それ以外の記録(処方箋・手術記録・検査所見・会計記録等)は3年が原則。\n【誤答の整理】A：1年は短すぎる。C：5年は診療録の保存期間。D：10年は法定ではない。E：20年は特定生物由来製品の記録の保存期間、または民事訴訟の消滅時効対応としての推奨期間。\n【保存期間一覧】(1)診療録(医師法24条)＝5年、(2)診療以外の記録(療担規則9条)＝3年、(3)診療に関する諸記録(医療法施行規則21条の5)＝2年、(4)特定生物由来製品の使用記録＝20年。数字の使い分けが頻出。","tags":["療担規則","第9条","保存期間"]},
      {"id":"ch08-034","chapterId":8,"chapterName":"第8章 診療情報管理I（法令・諸規則）","questionText":"診療情報管理士が法令・諸規則を理解すべき理由として最も適切なのはどれか。","choices":{"A":"診療記録の収集・管理・活用・開示の全工程で法令順守が前提となるため","B":"医師の業務を代行するため","C":"法律の専門家として法廷で弁護するため","D":"患者に法律相談するため","E":"法令と診療情報管理は無関係であるため"},"correctAnswer":"A","explanation":"【正答の根拠】診療情報管理士の業務全般(記録管理、コーディング、統計作成、情報開示対応、がん登録、DPC業務等)は、医師法・医療法・療担規則・個人情報保護法・がん登録推進法等、複数法令の枠組みの中で行われる。法令理解がなければ『なぜその業務ルールなのか』を根拠づけられず、現場判断で適切な対応ができない。\n【誤答の整理】B：医師業務の代行ではない(医師事務作業補助者の役割)。C：弁護士業務ではない。D：患者への法律相談は弁護士の範疇。E：むしろ密接に関連。\n【補足】診療情報管理士は『法令の直接的執行者ではないが、法令を現場実務に落とし込む橋渡し役』。わたるさんの立場なら、整形外科クリニックの運営設計で法令順守(記録・請求・個人情報)を設計に組み込む役割に通じる。\n\n★第8章完了。法令・保存期間・守秘義務・記載ルールは、診療情報管理士のすべての実務の基盤。","tags":["診療情報管理士","法令理解","実務の前提"]}
    ]
  },

    questions: [
      {"id":"ch09-001","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報管理士の役割の説明として最も適切なのはどれか。","choices":{"A":"病棟で直接看護ケアを行う","B":"診療記録の管理、点検、コーディング、データ活用など、診療情報全般を専門的に扱う","C":"医師国家試験の監督を行う","D":"病院の会計業務のみを担う","E":"患者の手術執刀を行う"},"correctAnswer":"B","explanation":"【正答の根拠】診療情報管理士の業務は多面的：(1)診療記録の管理(収集・保管・検索)、(2)記録の質の点検(記載不備・不整合の確認)、(3)ICDコーディング・DPCコーディング、(4)がん登録・統計作成、(5)データ活用支援(臨床研究・経営分析)、(6)情報開示請求対応、(7)医療安全・医療の質評価への貢献。いわば『診療情報の司令塔』。\n【誤答の整理】A：看護ケアは看護師の業務。C：医師国家試験は厚労省の所管。D：会計は医事課・経理の業務。E：医療行為は医師の業務。\n【補足】診療情報管理士の認定は日本病院会・全日本病院協会・日本医療法人協会・日本精神科病院協会の4団体が共同で行う民間資格。法定資格ではないが、診療録管理体制加算の要件として位置づけられる等、診療報酬上も重要視される。","tags":["診療情報管理士","役割","業務全般"]},
      {"id":"ch09-002","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報管理士の位置づけとして本文に合致するものはどれか。","choices":{"A":"医師の補助のみに限定された職種である","B":"多職種連携の中で、診療情報の専門家としての役割を担う","C":"医療の質評価とは無関係である","D":"研究活動には関与しない","E":"病院経営と無関係である"},"correctAnswer":"B","explanation":"【正答の根拠】診療情報管理士はチーム医療(医師・看護師・薬剤師・リハビリ職・栄養士・医療ソーシャルワーカー等)の一員として、『診療情報の専門家』の立場から情報基盤を支える。医師事務作業補助者との連携(10章Q28)、コーディング委員会(10章Q14)、がん登録実務者(10章Q47)等、多方面で多職種と関わる。\n【誤答の整理】A：医師補助に限定されない(医師事務作業補助者とは別)。C：医療の質評価の中核データを提供。D：臨床研究・疫学研究・DPC研究の基盤データを提供。E：病院経営の意思決定資料(病床稼働、診療単価、在院日数)を作成。\n【補足】診療情報管理士のキャリアは『情報の正確性を支える裏方』から『データ分析・経営参画者』へ拡大しつつある。医療DX時代の鍵職種。","tags":["診療情報管理士","多職種連携","専門家"]},
      {"id":"ch09-003","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"EMR（Electronic Medical Record）の説明として最も適切なのはどれか。","choices":{"A":"個人が自分の健康情報を管理するシステム","B":"医療機関内で運用される電子カルテ","C":"地域の医療機関で情報を共有するシステム","D":"レセプト請求専用ソフト","E":"介護施設専用の記録"},"correctAnswer":"B","explanation":"【正答の根拠】EMR(Electronic Medical Record：電子医療記録)は、『医療機関内で運用される電子カルテ』。個々の施設で診療記録を電子化し、院内業務の効率化を目的とする。他施設との連携は基本的に想定していない『院内完結型』のシステム。\n【誤答の整理】A：PHR(個人が主体)の説明。C：EHR(地域医療連携)の説明。D：レセコン(医事会計システム)の話で電子カルテとは別。E：介護記録は別システム(ケアプラン等)。\n【3用語整理】(1)EMR＝院内(Medical)、(2)EHR＝地域連携(Health)、(3)PHR＝本人主体(Personal)。『M→H→P』で範囲が広がっていくと覚える。","tags":["EMR","電子カルテ","院内運用"]},
      {"id":"ch09-004","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"EHR（Electronic Health Record）の説明として最も適切なのはどれか。","choices":{"A":"個人が日記を書くアプリ","B":"医療機関や地域をまたいだ情報共有を目的とした電子健康記録","C":"会計システム","D":"薬局のみが使用するシステム","E":"患者家族の連絡網"},"correctAnswer":"B","explanation":"【正答の根拠】EHR(Electronic Health Record：電子健康記録、生涯医療記録)は、医療機関や地域をまたいで診療情報を共有する仕組み。患者中心に情報を統合することで、(1)重複検査の抑制、(2)転院時の情報継続、(3)地域医療連携の推進を実現する。日本では全国約80〜218のプロジェクトが稼働しているが、標準化の遅れで普及は道半ば。\n【誤答の整理】A：PHRに近いが正確ではない。C：医事会計は別。D：薬局単独ではなく、医療機関全体の連携。E：連絡網ではない。\n【補足】EHRは『診療情報の持ち運び』を可能にする仕組み。日本ではマイナンバーカードの健康保険証機能化(2021年〜)、電子処方箋(2023年〜)、診療情報共有基盤の整備等、医療DXの中核テーマ。","tags":["EHR","電子健康記録","地域連携"]},
      {"id":"ch09-005","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"PHR（Personal Health Record）の説明として最も適切なのはどれか。","choices":{"A":"個人が自らの健康・医療情報を一元的に管理・活用する仕組み","B":"病院の電子カルテ","C":"国のレセプト審査システム","D":"医師の研究ノート","E":"保険会社の契約書"},"correctAnswer":"A","explanation":"【正答の根拠】PHR(Personal Health Record：個人健康記録)は、本人が主体となって、医療機関の受診記録・健康診断結果・服薬情報・日々のバイタル(血圧・体重・歩数・睡眠)等を一元管理するシステム。スマホアプリやマイナポータル(公的PHR)が代表例。\n【誤答の整理】B：EMRの説明。C：オンライン請求システム。D：個人の研究ノートではない。E：保険契約書ではない。\n【3つの主体比較】EMR＝医療機関が管理、EHR＝医療機関ネットワークが管理、PHR＝本人が管理。データの『所有者・管理主体』の違いを押さえる。PHRは医療DX推進と並んで厚労省が重点政策。","tags":["PHR","個人健康記録","本人管理"]},
      {"id":"ch09-006","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療録ファイリングの一方式「連続番号法」の説明として最も適切なのはどれか。","choices":{"A":"患者ID番号の末尾2桁で並べる方法","B":"患者ID番号の中央2桁で並べる方法","C":"患者ID番号を若い順（連続した順）に並べて保管する方法","D":"アルファベット順に並べる方法","E":"病名ごとに並べる方法"},"correctAnswer":"C","explanation":"【正答の根拠】連続番号法(Straight Numeric Filing)は、患者ID番号を若い順(1, 2, 3...)に並べて保管する最もシンプルなファイリング法。ID発行順＝保管順になるため、新規患者のカルテは常に棚の最後に追加される。\n【誤答の整理】A：末尾2桁法(Terminal Digit Filing、Q7)の説明。B：中2桁法(Middle Digit Filing)の説明。D：アルファベット順は姓名ファイリング(Alphabetical)で別法。E：病名ファイリングは統計用で主記録のファイリングには不向き。\n【メリット・デメリット】メリット：ルールがシンプル、探しやすい。デメリット：新規カルテが常に同じ場所(末尾)に集中するため作業負荷が偏る。中小病院向き。","tags":["ファイリング法","連続番号法"]},
      {"id":"ch09-007","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"「末尾2桁法（ターミナル・デジット・ファイリング）」の説明として最も適切なのはどれか。","choices":{"A":"患者ID番号の末尾2桁で第1区分を決め、その次の2桁で第2区分、残りを第3区分としてファイリングする方法","B":"患者の入院日で並べる方法","C":"病名ごとに並べる方法","D":"医師ごとに並べる方法","E":"住所ごとに並べる方法"},"correctAnswer":"A","explanation":"【正答の根拠】末尾2桁法(Terminal Digit Filing)は、6桁の患者IDを『XX-XX-XX』に分け、最後の2桁を第1区分(100区画)、中2桁を第2区分(100区画)、最初の2桁を第3区分として並べる方式。例：ID 123456の場合、末尾『56』→中『34』→頭『12』の順で格納場所が決まる。\n【誤答の整理】B〜E：いずれも通常のファイリング法としては使わない。\n【メリット・デメリット】メリット：(1)新規IDが発行されても100の末尾区分に均等に分散する(作業負荷が平準化)、(2)大規模病院で有効、(3)ID誤認も分散される。デメリット：(1)仕組みが複雑で職員教育が必要、(2)誤配置時の発見が遅れやすい。大病院向きの方式。","tags":["ファイリング法","末尾2桁法","ターミナルデジット"]},
      {"id":"ch09-008","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"末尾2桁法が大規模病院で好まれる理由として最も適切なのはどれか。","choices":{"A":"作業負荷が一箇所に集中しないから","B":"ID番号を使わなくてよいから","C":"患者の名前を省略できるから","D":"医師の負担を減らすためだけに使うから","E":"病名管理が不要になるから"},"correctAnswer":"A","explanation":"【正答の根拠】連続番号法だと新規カルテが常に棚の末尾(最新ID側)に集中するため、作業者が特定の棚に集中し、探しに行くのも同じ場所になる。末尾2桁法では、新規IDが発行されても末尾2桁の100区画に分散して保管されるため、(1)格納作業、(2)取り出し作業、(3)棚の密度、すべてが100の区画に均等に分散し、作業負荷のピークが平準化する。大規模病院(患者数数万〜十万超)ほど効果が大きい。\n【誤答の整理】B〜E：末尾2桁法の導入目的と無関係。\n【補足】電子カルテ時代には物理的ファイリングの重要性は低下したが、紙カルテとスキャンデータの併存施設や、医療文書の保管(診断書控えなど)では今も実務に関わる。","tags":["末尾2桁法","作業負荷分散","大規模病院"]},
      {"id":"ch09-009","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"「中2桁法（ミドル・デジット・ファイリング）」の説明として最も適切なのはどれか。","choices":{"A":"患者ID番号の中央2桁を第1区分として並べる方法","B":"患者ID番号の末尾2桁を第1区分として並べる方法","C":"患者の生年月日で並べる方法","D":"診療科別に並べる方法","E":"性別で並べる方法"},"correctAnswer":"A","explanation":"【正答の根拠】中2桁法(Middle Digit Filing)は、患者ID『XX-XX-XX』のうち中央2桁を第1区分として並べる方法。末尾2桁法と連続番号法の中間的な特性を持つ。\n【誤答の整理】B：末尾2桁法の説明。C〜E：ID番号ベースではない。\n【3つのファイリング法比較】(1)連続番号法＝若番から順(シンプル・中小向き)、(2)末尾2桁法＝末尾2桁が第1キー(分散・大規模向き)、(3)中2桁法＝中2桁が第1キー(両者の中間)。電子カルテ時代は物理配置より論理配置の話題が中心だが、試験ではこの3方式の比較が頻出。","tags":["ファイリング法","中2桁法","ミドルデジット"]},
      {"id":"ch09-010","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"パージング（purging）の説明として最も適切なのはどれか。","choices":{"A":"使用頻度の低い記録を保管庫から別の場所（書庫・倉庫等）に移す作業","B":"記録をすべて廃棄すること","C":"記録を検索して患者に開示すること","D":"新しいカルテを作成する作業","E":"医師の署名を確認する作業"},"correctAnswer":"A","explanation":"【正答の根拠】パージング(purging、カルテパージ)は、一定期間使用されていないカルテ(インアクティブファイル)を、日常的に使う保管棚から、比較的アクセス頻度の低い書庫・倉庫・外部倉庫等に移す作業。限られた棚スペースを効率的に使うための運用。\n【誤答の整理】B：廃棄ではなく『移動』。法定保存期間中の廃棄は違法。C：開示請求対応とは別作業。D：新規作成はパージングではない。E：署名確認はファイリングと別の業務。\n【補足】『パージ基準』は施設ごとに設定(例：最終受診から2年経過、5年経過等)。電子カルテ時代もアーカイブサーバへの移行という形でパージは続く。診療情報管理士の日常業務の1つ。","tags":["パージング","ファイリング管理","インアクティブ"]},
      {"id":"ch09-011","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"インアクティブファイルの説明として最も適切なのはどれか。","choices":{"A":"しばらく使用されていないため、日常運用から外されたカルテ","B":"電子化が不可能なカルテ","C":"破棄されたカルテ","D":"開示請求中のカルテ","E":"作成中のカルテ"},"correctAnswer":"A","explanation":"【正答の根拠】インアクティブファイル(inactive file)は、一定期間(施設により2年・5年等)来院がなく、日常運用のアクティブファイル群から外された非活性状態のカルテ。パージングの対象となり、書庫等へ移動される。ただし、再来院があれば再びアクティブファイルに戻される。\n【誤答の整理】B：電子化の可否とは別概念。C：破棄はされていない(法定保存期間中)。D：開示請求中のカルテはアクティブに使われている。E：作成中は『アクティブ』。\n【補足】『アクティブ／インアクティブ』の区分は、(1)検索効率、(2)棚スペース管理、(3)保存期間管理(5年経過判定)の3目的で重要。診療情報管理部門の運用設計の中核。","tags":["インアクティブファイル","アクティブファイル","運用"]},
      {"id":"ch09-012","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"電子保存の三原則として正しいのはどれか。","choices":{"A":"公開性・迅速性・簡潔性","B":"真正性・見読性・保存性","C":"匿名性・網羅性・迅速性","D":"秘匿性・完全性・拡張性","E":"自動性・連続性・可逆性"},"correctAnswer":"B","explanation":"【正答の根拠】厚労省『医療情報システムの安全管理に関するガイドライン』で定められる電子保存の三原則は『(1)真正性、(2)見読性、(3)保存性』。1999年の『法令に保存義務が規定されている診療記録及び診療諸記録の電子媒体による保存に関するガイドライン』以来、電子カルテ・電子化診療記録の必須要件として一貫している。\n【誤答の整理】他の選択肢は三原則ではない。\n【覚え方】『真・見・保(しん・けん・ほ)』の3点セット。Q13〜Q15で個別に扱う。この3原則を満たさない電子保存は、医師法24条の『診療録』として認められない(つまり紙運用を続けるか、紙出力保存が必要になる)。","tags":["電子保存","三原則","真正性","見読性","保存性"]},
      {"id":"ch09-013","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"電子保存の三原則のうち「真正性」の意味として最も適切なのはどれか。","choices":{"A":"記録が虚偽・改ざんされておらず、作成責任者が明確であること","B":"記録が必要なときに読めること","C":"記録が長期間残ること","D":"記録が暗号化されていること","E":"記録が縮小表示できること"},"correctAnswer":"A","explanation":"【正答の根拠】真正性とは『正当な権限において作成された記録に対し、虚偽入力、書換え、消去及び混同が防止されており、かつ、第三者から見て作成の責任の所在が明確であること』(厚労省ガイドライン)。具体要件：(1)ユーザー識別・認証(ID・パスワード等)、(2)操作ログ(誰がいつ何をしたか)、(3)改ざん防止(監査証跡)、(4)作成責任者の明示(電子署名等)。\n【誤答の整理】B：見読性(Q14)の説明。C：保存性(Q15)の説明。D：暗号化は安全管理措置の一部だが真正性の本質ではない。E：縮小表示は無関係。\n【補足】真正性は『この記録は本物で、作ったのは○○である』と裁判所で示せる水準が求められる。医療訴訟の証拠能力に直結する。","tags":["真正性","電子保存","改ざん防止"]},
      {"id":"ch09-014","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"電子保存の三原則のうち「見読性」の意味として最も適切なのはどれか。","choices":{"A":"必要に応じて記録内容をただちに画面表示・紙出力でき、明瞭に読めること","B":"記録が改ざんされていないこと","C":"記録を長期保存できること","D":"記録が無制限に公開されること","E":"記録が暗号化されていること"},"correctAnswer":"A","explanation":"【正答の根拠】見読性とは『必要に応じ電磁的に記録された事項を出力することにより、ただちに明瞭かつ整然とした形式で使用に係る電子計算機その他の機器に表示し、及び書面を作成できるようにすること』(厚労省ガイドライン)。具体要件：(1)速やかな検索・表示、(2)停電・障害時の閲覧代替手段、(3)患者開示請求時の紙出力、(4)システム更新時の過去データ可読性維持。\n【誤答の整理】B：真正性。C：保存性。D：無制限公開は個人情報保護違反。E：暗号化は別の話。\n【補足】『必要に応じて』とは『診療・患者説明・監査・訴訟等の場面』を指す(厚労省読本)。電子カルテがシステム障害で見えない状態が長時間続くと、見読性違反になる可能性がある。","tags":["見読性","電子保存","表示・出力"]},
      {"id":"ch09-015","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"電子保存の三原則のうち「保存性」の意味として最も適切なのはどれか。","choices":{"A":"法令で定められた保存期間中、真正性と見読性が保たれた状態で復元可能に保存されること","B":"記録を瞬時に公開できること","C":"記録が改ざんされないこと","D":"記録が暗号化されていること","E":"記録が検索できること"},"correctAnswer":"A","explanation":"【正答の根拠】保存性とは『電磁的記録に記録された事項について、保存すべき期間中において復元可能な状態で保存することができる措置を講じていること』(厚労省ガイドライン)。要件：(1)バックアップ体制、(2)ウイルス対策、(3)記録媒体・装置の劣化対応、(4)システム移行時のデータ継続性、(5)BCP(事業継続計画)対応。\n【誤答の整理】B：公開は見読性の一側面。C：真正性。D：暗号化は技術的安全管理。E：検索性は見読性の一部。\n【補足】『保存期間中』＝診療録なら医師法24条の5年、療担規則なら診療録5年・他記録3年(Q33第8章)。その間ずっと『真正性＋見読性＋復元可能性』を維持するのが保存性の要件。2011年東日本大震災以降、BCPとしての外部保存・クラウド化が推進されている。","tags":["保存性","電子保存","バックアップ","BCP"]},
      {"id":"ch09-016","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"スキャン文書（紙原本を電子化した文書）の取扱いとして最も適切なのはどれか。","choices":{"A":"スキャン後の原本は必ずすべて破棄する","B":"スキャンした電子データが真正性・見読性・保存性を満たしていれば、原本の扱いは定められたルールに従い判断する","C":"スキャンは禁止されている","D":"スキャン後は電子データを破棄する","E":"スキャンは患者本人のみが行うべきである"},"correctAnswer":"B","explanation":"【正答の根拠】紙原本をスキャン電子化する場合、e-文書法(2005年施行)および厚労省ガイドラインに基づき、(1)電子保存3基準(真正性・見読性・保存性)を満たすこと、(2)スキャン時の画質・解像度基準、(3)運用規程の整備、(4)責任者の明示、が要件。これらを満たせば紙原本の廃棄が可能となるが、満たさない場合は原本保管が必要。\n【誤答の整理】A：必ず破棄ではなく、要件を満たした場合のみ。C：法令に従えば可能。D：電子データは保存対象。E：医療機関の責任で行う。\n【補足】スキャン運用は『電子保存の延長線上』で、安易に紙を捨てると3原則違反になる。専任の責任者(診療情報管理士等)を置き、定期的な監査が必要。わたるさんの現場でも、古いカルテの電子化プロジェクトでは『要件確認→責任者設置→運用規程整備→監査』の順で設計する。","tags":["スキャン文書","e-文書法","原本管理"]},
      {"id":"ch09-017","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療録の共通番号（患者ID）の重要性として最も適切なのはどれか。","choices":{"A":"同一患者の記録を一元的に追跡できる","B":"ID番号は使わなくてもよい","C":"患者ごとに毎回異なるIDを発行する","D":"ID番号は病院の秘密にすべきである","E":"ID番号と病名は必ず一致させる"},"correctAnswer":"A","explanation":"【正答の根拠】患者ID(診療録番号)は、1人の患者に1つ(唯一性・一貫性)発行し、生涯通じて使う。これにより、(1)同一患者の記録を散逸させない、(2)複数診療科・複数入院の情報を統合できる、(3)複数医療機関連携(EHR)時の突合キーになる、(4)がん登録・DPC等の統計での名寄せが可能になる。\n【誤答の整理】B：ID運用はファイリングの必須基盤。C：毎回違うIDでは同一患者識別不可。D：ID自体は管理情報で、内容(診療情報)こそ秘密。E：病名は患者ごとに異なるので一致させる必要はなく、不可能。\n【補足】『1患者＝1ID＝1記録体系』の原則。重複IDの発生(初診時受付ミス)は医療安全上も重大で、診療情報管理部門が定期的にチェック・統合する業務を担う。","tags":["患者ID","共通番号","記録一元化"]},
      {"id":"ch09-018","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報の開示について最も適切なのはどれか。","choices":{"A":"患者本人からの開示請求には原則として応じる必要がある","B":"開示請求には絶対に応じてはならない","C":"開示は医師の気分で決めてよい","D":"開示を求められても無視してよい","E":"開示請求は有料にすれば応じなくてよい"},"correctAnswer":"A","explanation":"【正答の根拠】個人情報保護法および厚労省『診療情報の提供等に関する指針』により、患者本人からの診療情報開示請求には原則として応じる義務がある。医療機関は『個人情報取扱事業者』として、本人からの開示請求を受けた場合、遅滞なく応じる必要がある。ただし、(1)第三者の生命・身体・財産に重大な損害を与える恐れ、(2)医療機関の業務の適正な実施に著しい支障をきたす恐れ、(3)法令違反となる場合、等の例外がある。\n【誤答の整理】B：拒否は原則違法。C：医師の恣意的判断は認められない(院内委員会等の合議で判断)。D：無視は違法。E：実費相当の手数料は認められるが、手数料があるから応じなくてよいとはならない。\n【補足】開示請求対応は診療情報管理部門の重要業務。開示の可否、開示範囲、開示方法、手数料の設定までを院内規程として整備するのが実務。","tags":["診療情報開示","患者の権利","個人情報保護法"]},
      {"id":"ch09-019","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報の開示請求対応として最も適切なのはどれか。","choices":{"A":"すべての開示を即日対応する","B":"院内で開示の可否・範囲を検討し、適切な手続きで応じる体制を整える","C":"すべての開示を拒否する","D":"医師が不在なら対応しない","E":"本人確認は不要である"},"correctAnswer":"B","explanation":"【正答の根拠】開示請求対応の標準プロセス：(1)請求受付(本人確認、請求書受理)、(2)院内での検討(主治医確認、開示範囲決定、例外事由確認)、(3)必要に応じて院内委員会(開示審査委員会等)で合議、(4)手数料・方法(紙・電子・閲覧)の決定、(5)実施と記録。合理的な期間内に対応することが法的要件。\n【誤答の整理】A：即日は現実的でなく、適切な検討が必要。C：原則拒否は違法。D：診療情報管理部門が対応窓口となる(医師不在でも機能する体制が必要)。E：本人確認は必須(なりすまし防止)。\n【補足】請求者の本人確認は極めて重要。運転免許証等の身分証で確認し、代理人の場合は委任状・戸籍謄本等で関係を確認する。個人情報漏えいの最大リスクは『誤送付・誤交付』である。","tags":["診療情報開示","対応プロセス","本人確認"]},
      {"id":"ch09-020","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"第三者（患者本人以外）への情報提供として最も適切なのはどれか。","choices":{"A":"本人の同意なく第三者に自由に提供してよい","B":"原則として本人の同意が必要であり、法定の例外事由がある場合のみ同意なく提供できる","C":"家族なら無条件で提供してよい","D":"警察からの問い合わせには何でも応じる","E":"保険会社の依頼には本人の同意は不要である"},"correctAnswer":"B","explanation":"【正答の根拠】個人情報保護法第27条により、第三者提供は原則として本人の同意が必要。法定の例外：(1)法令に基づく場合(感染症法の届出・児童虐待通告・DV通報等)、(2)生命・身体・財産保護のため必要で本人同意を得るのが困難な場合、(3)公衆衛生向上・児童健全育成に特に必要で本人同意が困難な場合、(4)国・地方公共団体の法令事務協力、等。\n【誤答の整理】A：自由提供は違法。C：家族でも本人同意が原則必要(成人の場合)。D：警察は正式な令状(捜査関係事項照会書など)があっても慎重な検討が必要(弁護士相談推奨)。E：保険会社は本人の書面同意が必要。\n【補足】医療現場では『家族なら問題ないだろう』という判断が最も危険。特に夫婦間・親子間の秘匿希望(DV被害・精神疾患告知等)があるケースで家族に情報を出すと重大な問題になる。","tags":["第三者提供","本人同意","個人情報保護"]},
      {"id":"ch09-021","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"チーム医療における診療情報の位置づけとして最も適切なのはどれか。","choices":{"A":"医師個人の所有物として他職種には見せない","B":"多職種が共有・参照する情報基盤であり、チーム医療の成立に不可欠","C":"患者に見せてはいけない","D":"看護師のみが参照するものである","E":"紙カルテでしか共有できない"},"correctAnswer":"B","explanation":"【正答の根拠】現代医療は医師・看護師・薬剤師・リハビリ職・栄養士・検査技師・MSW(医療ソーシャルワーカー)・診療情報管理士など多職種のチームで行う。それぞれの職種が異なる視点で患者情報を記録・参照し、情報の統合によって質の高い医療が成立する。診療情報は『チーム共有の情報基盤』。\n【誤答の整理】A：医師個人の所有物ではない(病院の記録、患者の情報)。C：本人開示請求は原則応じる義務(Q18)。D：多職種参照が原則。E：電子カルテで共有可能、むしろ電子化の方が共有効率が高い。\n【補足】わたるさんのリハ部門では、PT・OT・ST各職種の記録が診療情報の一部として統合されるべき。リハ記録が医師・看護師に参照されない運用は、チーム医療の機能不全を招く。","tags":["チーム医療","情報共有","多職種連携"]},
      {"id":"ch09-022","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"退院時要約（退院サマリ）の重要性として最も適切なのはどれか。","choices":{"A":"入院経過の要点をまとめ、他院連携や次回診療の基盤になる重要文書である","B":"病院の宣伝用に作られる文書である","C":"作成は任意で法的意味はない","D":"患者にだけ渡せばよい","E":"研究にしか使われない"},"correctAnswer":"A","explanation":"【正答の根拠】退院時要約は入院期間中の(1)主病名・副病名、(2)入院経過、(3)実施した検査・治療、(4)退院時の状態、(5)退院後の指示・処方、(6)次回受診予定等を簡潔にまとめた文書。(1)継続医療の基盤(他院への紹介、外来主治医への情報継承)、(2)DPCコーディングの根拠、(3)病院機能評価・診療録管理体制加算の要件、(4)医療の質評価・研究のデータ源、など多面的に重要。\n【誤答の整理】B：宣伝ではない。C：医療法施行規則第21条の5で『診療に関する諸記録』として位置づけられ、法的文書。D：他医療機関・次回診療用の文書。E：研究用途は副次的。\n【補足】診療録管理体制加算1の要件には『退院後14日以内に退院時要約を作成する割合が全退院患者の90%以上』がある。つまり作成遅延は加算喪失につながる。診療情報管理部門が医師に作成を促すワークフロー構築が実務テーマ。","tags":["退院時要約","サマリ","継続医療"]},
      {"id":"ch09-023","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"退院時要約の記載基準として最も適切なのはどれか。","choices":{"A":"遅滞なく作成し、必要な項目を網羅することが求められる","B":"退院後1年以内に作成すればよい","C":"医師以外が単独で作成してよい","D":"作成は任意で省略できる","E":"患者本人が作成する"},"correctAnswer":"A","explanation":"【正答の根拠】退院時要約は『遅滞なく』作成し、(1)病名・副病名、(2)入院目的・経過、(3)診断・治療内容、(4)退院時状態、(5)退院後方針を網羅することが必要。診療録管理体制加算1では『退院後14日以内』、同加算2では『退院後30日以内』が作成期限の目安。\n【誤答の整理】B：1年以内は遅すぎる。C：医師が最終責任を持って作成(医師事務作業補助者の代行入力は医師の確認・署名を条件に可)。D：省略はDPC・加算要件上も許されない。E：患者作成ではない。\n【補足】退院時要約の作成遅延は全国的な課題で、診療情報管理部門は(1)未作成リストの医師への提示、(2)期限アラート、(3)作成支援(コーディング情報提供)でサポートする。わたるさんの現場でも、退院サマリの運用効率化は整形外科クリニック・病院運営の定番テーマ。","tags":["退院時要約","作成期限","記載基準"]},
      {"id":"ch09-024","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"医療の質評価に関する説明として最も適切なのはどれか。","choices":{"A":"診療録やDPCデータ等から算出した指標を用いて、医療の質を客観的に評価する取り組みである","B":"患者アンケートのみで評価する","C":"医師の感覚で評価する","D":"評価は病院に不要である","E":"経営数値のみで評価する"},"correctAnswer":"A","explanation":"【正答の根拠】医療の質評価は『構造(Structure)・過程(Process)・結果(Outcome)』の3側面(ドナベディアンモデル)で行うのが標準。(1)構造＝施設・人員・体制、(2)過程＝診療プロセス(予防的抗菌薬投与率、血液培養2セット実施率等)、(3)結果＝患者アウトカム(死亡率、在院日数、再入院率、褥瘡発生率等)。データ源は診療録・DPCデータ・がん登録・レセプト等。\n【誤答の整理】B：患者アンケートは主観評価の一部にすぎない。C：感覚評価は客観性に欠ける。D：質評価は病院機能評価・DPC係数・診療報酬加算等で必須。E：経営数値だけでは医療の質は測れない。\n【補足】2024年度診療報酬改定で『医療の質指標』の公表が評価対象になった(10章Q11)。診療情報管理士は質指標計測の中核人材。","tags":["医療の質評価","質指標","ドナベディアンモデル"]},
      {"id":"ch09-025","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"クリニカルインディケーターの説明として最も適切なのはどれか。","choices":{"A":"医療の質を測定するための客観的指標","B":"患者の満足度のみを測る指標","C":"病院建築費用の指標","D":"医師の給与水準を表す指標","E":"病院の株価指標"},"correctAnswer":"A","explanation":"【正答の根拠】クリニカルインディケーター(Clinical Indicator、臨床指標)は、医療の質を定量的に評価する客観的指標。例：(1)手術後30日死亡率、(2)平均在院日数、(3)再入院率(30日以内)、(4)術後合併症発生率、(5)予防的抗菌薬投与率、(6)転倒・転落発生率、(7)褥瘡発生率、(8)DVT予防実施率、等。病院間比較・経時変化の測定に使う。\n【誤答の整理】B：満足度は質の一側面にすぎない。C・D・E：医療の質ではなく経営・人事の指標。\n【補足】日本では日本病院会『QIプロジェクト』、国立病院機構『臨床評価指標』等で標準指標セットが開発されている。診療情報管理士は指標の定義に沿ったデータ抽出・算出を担う。わたるさんが整形外科領域で質指標を設計するなら、手術後の転倒・褥瘡・再手術率・リハ介入開始時間等が候補。","tags":["クリニカルインディケーター","臨床指標","質評価"]},
      {"id":"ch09-026","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"医療安全と診療記録の関係として最も適切なのはどれか。","choices":{"A":"診療記録は医療安全と無関係である","B":"正確な診療記録は、インシデント検証・再発防止・医療安全の基盤となる","C":"医療安全は記録とは別領域である","D":"医療安全は医師のみが担うべきである","E":"記録は安全より効率を優先する"},"correctAnswer":"B","explanation":"【正答の根拠】正確な診療記録は医療安全の基盤：(1)アレルギー歴・禁忌情報の共有で有害事象を予防、(2)インシデント・アクシデント発生時の原因究明と再発防止、(3)医療事故調査制度(2015年施行)での事実確認、(4)医療訴訟時の証拠として医療者を守る。逆に記録の不備は『やっていなかった』と解釈され、医療者側が不利になる。\n【誤答の整理】A・C：密接に関連。D：多職種全員の責任。E：安全を優先する。\n【補足】医療事故調査制度では、予期しない死亡事例について医療機関が院内調査を行い、医療事故調査・支援センター(日本医療安全調査機構)に報告する。この過程で診療記録は最重要資料となる。診療情報管理士は記録の完全性を担保する役割を担う。","tags":["医療安全","インシデント","記録の重要性"]},
      {"id":"ch09-027","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"病院機能評価における診療情報管理の位置づけとして最も適切なのはどれか。","choices":{"A":"評価対象外である","B":"診療記録の整備・管理状況が評価項目に含まれる重要領域である","C":"医師の人数のみで評価される","D":"建物の新しさで評価される","E":"患者数のみで評価される"},"correctAnswer":"B","explanation":"【正答の根拠】病院機能評価(公益財団法人日本医療機能評価機構が実施)は、病院の医療の質を多面的に評価する第三者認証制度。評価領域には『診療記録管理機能』があり、(1)診療記録の整備・管理体制、(2)診療情報管理士等の配置、(3)記録の質監査、(4)退院時要約作成状況、(5)情報開示対応体制等が評価対象となる。\n【誤答の整理】A：重要な評価領域。C〜E：単一指標では評価されない。\n【補足】病院機能評価の認定は病院の『格』を示す指標の1つで、診療報酬の一部加算要件にもなる。診療情報管理士の配置・活動の質が評価に直結するため、記録管理部門の実力が病院評価そのものを左右する。","tags":["病院機能評価","診療記録管理","第三者認証"]},
      {"id":"ch09-028","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療録管理体制加算について最も適切なのはどれか。","choices":{"A":"診療録管理体制の整備を診療報酬上で評価する加算","B":"医師数を評価する加算","C":"病床数のみで決まる加算","D":"建物の築年数による加算","E":"救急車受入台数に対する加算"},"correctAnswer":"A","explanation":"【正答の根拠】診療録管理体制加算(A207)は診療報酬上の加算で、診療録管理体制の整備を評価する。加算1(100点)の主な要件：(1)専任の診療記録管理者(診療情報管理士等)を複数名配置、(2)退院後14日以内の退院時要約作成率90%以上、(3)中央病歴管理、(4)ICDコーディングによる疾病統計作成、等。加算2(30点)は要件が緩和される。\n【誤答の整理】B〜E：診療録管理体制加算の本質的要件ではない。\n【補足】DPC対象病院の要件にも診療録管理体制加算の届出が含まれる(加算1推奨、10章Q2)。つまり『診療情報管理士の配置＝診療報酬に直結する』構造。病院経営上も診療情報管理部門の整備は重要投資。","tags":["診療録管理体制加算","診療報酬","A207"]},
      {"id":"ch09-029","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報管理士が担う統計作成業務として最も適切なのはどれか。","choices":{"A":"患者の家計簿作成","B":"疾病分類統計、手術統計、退院患者統計、在院日数統計等の院内統計作成","C":"株式売買の記録作成","D":"職員の給与明細作成","E":"建築図面の作成"},"correctAnswer":"B","explanation":"【正答の根拠】診療情報管理士の統計作成業務：(1)疾病分類統計(ICD別集計)、(2)手術統計(術式別件数)、(3)退院患者統計(年齢・性別・疾患別)、(4)在院日数統計(診断群分類別、診療科別)、(5)死亡統計、(6)がん登録統計、(7)DPCデータ集計、(8)病院情報公表用集計(10章Q8〜10)、等。これらは病院運営・政策立案・研究の基礎データ。\n【誤答の整理】A・C・D・E：診療情報管理士の業務範囲外。\n【補足】統計作成は単なる数値集計ではなく、『定義の一貫性』『欠損データの扱い』『分母・分子の正確性』が質の鍵。診療情報管理士の統計リテラシーが院内データの信頼性を決める。","tags":["統計作成","院内統計","データ活用"]},
      {"id":"ch09-030","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報管理士のデータ活用業務として最も適切なのはどれか。","choices":{"A":"臨床研究・経営分析・医療の質改善等、多面的なデータ活用を支援する","B":"データは請求後すぐ廃棄する","C":"データ分析は外部委託のみで行う","D":"診療情報管理士はデータ活用に関与しない","E":"データは医師のみが使う"},"correctAnswer":"A","explanation":"【正答の根拠】データ活用の場面：(1)臨床研究(症例抽出、後方視的研究、疫学研究)、(2)経営分析(診療単価、科別採算、紹介率・逆紹介率)、(3)質改善(クリニカルインディケーター、クリニカルパス遵守率)、(4)人員配置計画(病床稼働、救急件数)、(5)地域医療連携(他院紹介状況)。診療情報管理士は『データの抽出・整形・解釈』の中核を担う。\n【誤答の整理】B：廃棄ではなく活用対象。C：院内主体で行い、必要に応じて外部連携。D：中核人材。E：多職種で使う。\n【補足】医療DXの時代、診療情報管理士は『記録管理者』から『データサイエンティスト』への役割拡大が求められる。わたるさんが整形外科領域のデータ活用を設計するなら、(1)患者背景別の手術成績、(2)リハビリ介入強度別の機能回復、(3)術後再手術率などが応用例。","tags":["データ活用","臨床研究","経営分析"]},
      {"id":"ch09-031","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報管理士の倫理として最も適切なのはどれか。","choices":{"A":"守秘義務・個人情報保護・データの誠実な扱いが基本倫理である","B":"倫理は不要である","C":"記録は自由に外部に持ち出してよい","D":"患者情報は友人と共有してよい","E":"倫理よりも業務効率が常に優先される"},"correctAnswer":"A","explanation":"【正答の根拠】診療情報管理士の職業倫理：(1)守秘義務(雇用契約・就業規則・個人情報保護法、第8章Q24参照)、(2)個人情報保護の徹底、(3)データの誠実な扱い(改ざん・アップコーディングの拒否)、(4)利害相反の回避、(5)継続学習、(6)患者の人権尊重。医師・看護師と同じレベルの職業倫理が求められる。\n【誤答の整理】B：倫理は職業の基盤。C：持ち出しは厳格制限対象。D：友人共有は秘密漏示罪(刑法134条準用、または個人情報保護法違反)。E：倫理と効率は両立させるべきだが、倫理が優先。\n【補足】日本診療情報管理士会は倫理綱領を定めており、認定時に遵守を宣誓する。診療情報管理士の信頼性は職業倫理の徹底によって保たれる。","tags":["職業倫理","守秘義務","誠実性"]},
      {"id":"ch09-032","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報管理士の継続教育の重要性として最も適切なのはどれか。","choices":{"A":"一度資格取得すれば学習は不要","B":"ICDの改訂・法令改正・IT進化等に対応するため、継続的な学習が不可欠である","C":"継続教育は義務ではないので不要","D":"医師にだけ継続教育が必要","E":"資格の更新制度は一切ない"},"correctAnswer":"B","explanation":"【正答の根拠】診療情報管理士が対応すべき変化：(1)ICDの改訂(ICD-10→ICD-11への移行)、(2)DPCの改定(2年ごと)、(3)法令改正(個人情報保護法・医療法等)、(4)診療報酬改定(2年ごと)、(5)IT進化(電子カルテ更新、クラウド化、AI活用)、(6)医療DX推進(電子処方箋・マイナ保険証連携)。これらに対応するため継続教育が必須。\n【誤答の整理】A：学習継続が職業の前提。C：日本病院会等による生涯教育研修が用意されている。D：診療情報管理士にも必要。E：認定証には更新の仕組みがある(生涯教育点数等)。\n【補足】日本病院会では生涯教育研修・症例検討会・ICD講習会等を継続的に実施。日本診療情報管理学会での発表・参加も知見更新の場。わたるさんの学習姿勢(『時間かけてゆっくり』『Web検索で補完』)はこの分野に合う。","tags":["継続教育","生涯学習","法令改正"]},
      {"id":"ch09-033","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報管理士の将来展望として最も適切なのはどれか。","choices":{"A":"電子化・AI化で役割は縮小する一方である","B":"医療DX・データ活用・質評価の進展で専門性の重要性はむしろ高まっている","C":"資格は不要になる","D":"医師に吸収される","E":"診療情報管理の仕事はなくなる"},"correctAnswer":"B","explanation":"【正答の根拠】医療DXの進展(電子カルテ普及、マイナ保険証、電子処方箋、診療情報共有基盤、PHR、AI診断支援等)により、診療情報管理士の役割は拡大している：(1)データ標準化の推進役、(2)AI活用時のデータ品質保証、(3)質指標計測の中核、(4)がん登録実務者、(5)DPCコーディング専門家、(6)医療情報のガバナンス担当者。単純な記録整理は自動化される一方、『データの意味を理解し活用する専門性』の需要はむしろ増す。\n【誤答の整理】A：拡大している。C：むしろ高度化。D：別職種の専門性。E：なくならない。\n【補足】AI時代に残る仕事は『文脈理解』『判断』『倫理判断』が必要な領域。診療情報管理士のコーディング・データ監査・開示判断はいずれもこれに該当する。","tags":["将来展望","医療DX","専門性"]},
      {"id":"ch09-034","chapterId":9,"chapterName":"第9章 診療情報管理II 診療情報管理士の実務","questionText":"診療情報管理部門の役割として最も適切なのはどれか。","choices":{"A":"単なる倉庫機能だけを担う","B":"診療情報の収集・管理・点検・提供・活用を支える中核部門となる","C":"診療録の法的保存義務とは無関係である","D":"紙カルテ運用時にのみ必要である","E":"病院の改善活動には関与しない"},"correctAnswer":"B","explanation":"【正答の根拠】診療情報管理部門の機能は『5つの柱』：(1)収集(診療録・諸記録の受入・整備)、(2)管理(保存・ファイリング・電子化)、(3)点検(質監査・コーディング精度管理)、(4)提供(開示請求対応、院内検索支援)、(5)活用(統計・研究支援、質改善、経営分析)。これらは独立した業務ではなく、連携して機能することで病院全体の情報基盤を支える中核となる。\n【誤答の整理】A：倉庫機能だけでは管理士の価値を発揮できない。C：医師法24条・療担規則9条の保存義務の実務執行者。D：電子カルテ運用でも同じ機能が必要。E：クリニカルパス・医療安全・質改善活動の中核。\n【補足】本章で扱った実務(EMR/EHR/PHR、ファイリング、電子保存3原則、開示請求、退院時要約、質評価)のすべてが、診療情報管理部門の『5本柱』のどこかに位置づけられる。この総括視点で章を整理すると定着しやすい。\n\n★第9章完了。これで第8・9・10・11章の全解説拡充が完成。","tags":["診療情報管理部門","組織","中核部門"]}
    ]
