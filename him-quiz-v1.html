<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診療情報管理士 模擬問題集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper: #f5f2ed;
  --ink: #111;
  --red: #c23a22;
  --faint: #d5d0c8;
  --mid: #8a8477;
  --green: #2e7d4f;
  --green-light: #e8f5e9;
  --red-light: #fbe9e7;
  --card: #fffefa;
  --explain-bg: #f0ece5;
}

html { font-size: 16px; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.75;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

/* ── Top bar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--paper);
  border-bottom: 1px solid var(--faint);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
}
.topbar-back {
  background: none; border: none; font-size: 1.2rem; cursor: pointer;
  color: var(--mid); padding: 4px 8px; border-radius: 4px;
}
.topbar-back:hover { color: var(--ink); }
.topbar-title {
  font-size: 0.85rem; font-weight: 500; color: var(--mid);
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar-progress-text {
  font-size: 0.75rem; color: var(--mid); white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

/* ── Progress bar ── */
.progress-track {
  height: 3px; background: var(--faint); width: 100%;
}
.progress-fill {
  height: 100%; background: var(--red); transition: width 0.3s ease;
}

/* ── Home screen ── */
.home { max-width: 560px; margin: 0 auto; padding: 40px 20px 60px; }
.home-header { margin-bottom: 36px; }
.home-header h1 {
  font-size: 1.4rem; font-weight: 700; letter-spacing: 0.02em;
  margin-bottom: 4px;
}
.home-header p { font-size: 0.82rem; color: var(--mid); }

.chapter-card {
  background: var(--card);
  border: 1px solid var(--faint);
  border-left: 4px solid var(--red);
  border-radius: 6px;
  padding: 20px;
  margin-bottom: 16px;
  cursor: pointer;
  transition: box-shadow 0.15s ease, border-color 0.15s ease;
}
.chapter-card:hover {
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.chapter-badge {
  display: inline-block;
  font-size: 0.7rem; font-weight: 500;
  color: var(--red); background: var(--red-light);
  padding: 2px 10px; border-radius: 3px;
  margin-bottom: 8px; letter-spacing: 0.04em;
}
.chapter-card h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; }
.chapter-meta { display: flex; gap: 16px; font-size: 0.78rem; color: var(--mid); }
.chapter-bar-track {
  margin-top: 12px; height: 4px; background: var(--faint); border-radius: 2px; overflow: hidden;
}
.chapter-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

.home-actions { margin-top: 28px; display: flex; gap: 10px; flex-wrap: wrap; }
.home-btn {
  background: var(--card); border: 1px solid var(--faint);
  border-radius: 6px; padding: 10px 18px;
  font-size: 0.82rem; font-family: inherit; cursor: pointer;
  color: var(--ink); transition: border-color 0.15s;
}
.home-btn:hover { border-color: var(--mid); }
.home-btn:disabled { opacity: 0.4; cursor: default; }

/* ── Quiz screen ── */
.quiz { max-width: 600px; margin: 0 auto; padding: 16px 16px 100px; }

.q-card {
  background: var(--card);
  border: 1px solid var(--faint);
  border-left: 4px solid var(--red);
  border-radius: 6px;
  padding: 22px 20px;
  margin-bottom: 16px;
}
.q-number {
  font-size: 0.72rem; font-weight: 500; color: var(--mid);
  margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.q-bookmark {
  background: none; border: none; cursor: pointer;
  font-size: 1rem; color: var(--faint); padding: 0;
  transition: color 0.15s;
}
.q-bookmark.active { color: #d4a017; }
.q-text { font-size: 0.95rem; font-weight: 500; line-height: 1.8; }

/* ── Choices ── */
.choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.choice-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--card);
  border: 1px solid var(--faint);
  border-left: 4px solid transparent;
  border-radius: 6px;
  padding: 14px 16px;
  font-family: inherit; font-size: 0.88rem;
  text-align: left; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  line-height: 1.7;
}
.choice-btn:hover:not(.answered) {
  border-color: var(--mid);
  background: #f9f7f3;
}
.choice-label {
  flex-shrink: 0;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--faint);
  border-radius: 50%;
  font-size: 0.78rem; font-weight: 500; color: var(--mid);
  margin-top: 1px;
}
.choice-text { flex: 1; }

.choice-btn.correct {
  border-left-color: var(--green);
  background: var(--green-light);
  cursor: default;
}
.choice-btn.correct .choice-label {
  background: var(--green); color: #fff; border-color: var(--green);
}
.choice-btn.wrong {
  border-left-color: var(--red);
  background: var(--red-light);
  cursor: default;
}
.choice-btn.wrong .choice-label {
  background: var(--red); color: #fff; border-color: var(--red);
}
.choice-btn.answered { cursor: default; }
.choice-btn.answered:hover { background: inherit; border-color: inherit; }
.choice-btn.dimmed { opacity: 0.55; cursor: default; }

.choice-icon { margin-left: auto; font-size: 1rem; flex-shrink: 0; }

/* ── Explanation ── */
.explanation {
  background: var(--explain-bg);
  border-radius: 6px;
  padding: 20px;
  font-size: 0.84rem;
  line-height: 1.85;
  display: none;
}
.explanation.show { display: block; }
.explain-section { margin-bottom: 14px; }
.explain-section:last-child { margin-bottom: 0; }
.explain-heading {
  font-weight: 700; font-size: 0.8rem;
  color: var(--red); margin-bottom: 4px;
  letter-spacing: 0.03em;
}
.explain-heading.green { color: var(--green); }
.explain-heading.point { color: #7b6c2a; }
.explain-wrong-item { margin-bottom: 2px; }
.explain-wrong-label { font-weight: 500; }

/* ── Navigation ── */
.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--paper);
  border-top: 1px solid var(--faint);
  padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 100;
}
.nav-btn {
  background: none; border: 1px solid var(--faint);
  border-radius: 6px; padding: 8px 20px;
  font-family: inherit; font-size: 0.82rem;
  cursor: pointer; color: var(--ink);
  transition: border-color 0.15s;
}
.nav-btn:hover { border-color: var(--mid); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.primary {
  background: var(--ink); color: #fff; border-color: var(--ink);
}
.nav-btn.primary:hover { background: #333; }
.nav-counter { font-size: 0.75rem; color: var(--mid); font-variant-numeric: tabular-nums; }

/* ── Results screen ── */
.results { max-width: 560px; margin: 0 auto; padding: 40px 20px 60px; }
.results-header { text-align: center; margin-bottom: 32px; }
.results-header h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
.results-score {
  font-size: 2.8rem; font-weight: 700; color: var(--ink);
  margin: 16px 0 4px;
}
.results-score span { font-size: 1rem; font-weight: 400; color: var(--mid); }
.results-sub { font-size: 0.85rem; color: var(--mid); }
.results-actions { display: flex; gap: 10px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }

.wrong-list { margin-top: 24px; }
.wrong-list h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: var(--red); }
.wrong-item {
  background: var(--card); border: 1px solid var(--faint);
  border-left: 4px solid var(--red); border-radius: 6px;
  padding: 14px 16px; margin-bottom: 10px;
  cursor: pointer; transition: box-shadow 0.15s;
}
.wrong-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.wrong-item-q { font-size: 0.84rem; font-weight: 500; margin-bottom: 4px; }
.wrong-item-a { font-size: 0.78rem; color: var(--mid); }

/* ── Utilities ── */
.screen { display: none; }
.screen.active { display: block; }
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 480px) {
  .home-header h1 { font-size: 1.2rem; }
  .q-card { padding: 18px 16px; }
  .choice-btn { padding: 12px 14px; }
}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="screen-home" class="screen active">
  <div class="home">
    <div class="home-header">
      <h1>診療情報管理士 模擬問題集</h1>
      <p>基礎課程 第1章・第2章（各15問）</p>
    </div>
    <div id="chapter-list"></div>
    <div class="home-actions">
      <button class="home-btn" id="btn-bookmarks" disabled>★ ブックマーク一覧</button>
      <button class="home-btn" id="btn-reset">進捗をリセット</button>
    </div>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div id="screen-quiz" class="screen">
  <div class="topbar">
    <button class="topbar-back" id="quiz-back">←</button>
    <div class="topbar-title" id="quiz-topbar-title"></div>
    <div class="topbar-progress-text" id="quiz-progress-text"></div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="quiz-progress-bar"></div></div>
  <div class="quiz" id="quiz-body"></div>
  <div class="nav-bar">
    <button class="nav-btn" id="nav-prev">← 前へ</button>
    <div class="nav-counter" id="nav-counter"></div>
    <button class="nav-btn primary" id="nav-next">次へ →</button>
  </div>
</div>

<!-- ===== RESULTS ===== -->
<div id="screen-results" class="screen">
  <div class="results" id="results-body"></div>
</div>

<script>
// ──────────────────────────────────────────
// QUESTION DATA
// ──────────────────────────────────────────
const CHAPTERS = [
  {
    id: 1,
    title: "医療管理総論",
    questions: [
      {
        id: "1-1",
        text: "医療資源は一般に4つに区分される。次のうち、医療資源の区分として正しい組み合わせはどれか。",
        choices: [
          "物的資源・人的資源・財的資源・情報資源",
          "物的資源・人的資源・財的資源・時間資源",
          "物的資源・技術資源・財的資源・情報資源",
          "施設資源・人的資源・財的資源・情報資源",
          "物的資源・人的資源・知的資源・情報資源"
        ],
        answer: 0,
        explanation: {
          correct: "医療資源は「物的資源（施設・医療機器等）」「人的資源（医師・看護師等の医療従事者）」「財的資源（医療費・経営資金等）」「情報資源（診療情報・医学知識等）」の4つに区分される。この分類は医療経営学における基本的枠組みであり、診療情報管理士は特に「情報資源」の管理を担う専門職として位置づけられる。",
          wrong: {
            "B": "「時間資源」は医療資源の基本4区分には含まれない。時間は経営管理上重要だが、独立した医療資源区分としては扱われない。",
            "C": "「技術資源」は独立した区分ではなく、人的資源に付随する要素として捉えられる。",
            "D": "「施設資源」は物的資源の一部であり、より広い概念である物的資源が正しい区分名である。",
            "E": "「知的資源」という区分は存在せず、知識・情報は「情報資源」として分類される。"
          },
          point: "医療資源＝「物・人・金・情報」と覚える。一般経営学の経営資源（ヒト・モノ・カネ・情報）と対応させると記憶しやすい。"
        }
      },
      {
        id: "1-2",
        text: "EBM（Evidence-Based Medicine）を実践する際に統合すべき3つの要素として正しいものはどれか。",
        choices: [
          "最善の研究エビデンス・臨床的専門技能・患者の価値観と状況",
          "最善の研究エビデンス・ガイドライン・医療経済学的評価",
          "臨床的専門技能・患者の希望・保険制度の制約",
          "最善の研究エビデンス・臨床的専門技能・医療チームの合意"
        ],
        answer: 0,
        explanation: {
          correct: "EBMの3要素は、Sackettらにより「①最善の研究エビデンス（best research evidence）」「②臨床的専門技能（clinical expertise）」「③患者の価値観と状況（patient values and circumstances）」と定義された。EBMはエビデンスだけに頼るのではなく、臨床家の経験と患者個人の希望・状況を統合して意思決定を行うアプローチである。",
          wrong: {
            "B": "ガイドラインはエビデンスを集約したものだが、EBMの3要素そのものではない。医療経済学的評価も3要素に含まれない。",
            "C": "保険制度の制約は実臨床上の考慮事項ではあるが、EBMの理論的枠組みの3要素には含まれない。",
            "D": "医療チームの合意は重要だが、EBMの3要素として定義されているのは「患者の価値観と状況」である。"
          },
          point: "EBM＝「エビデンス＋臨床技能＋患者の価値観」の3本柱。「エビデンスだけがEBMではない」という点が頻出。"
        }
      },
      {
        id: "1-3",
        text: "ドナベディアン（Donabedian）が提唱した医療の質評価の3つのアプローチとして正しいものはどれか。",
        choices: [
          "安全性・有効性・効率性",
          "構造・過程・結果",
          "投入・活動・成果",
          "計画・実行・評価",
          "予防・治療・回復"
        ],
        answer: 1,
        explanation: {
          correct: "Donabedianモデルでは、医療の質を「構造（Structure）」「過程（Process）」「結果（Outcome）」の3側面から評価する。構造は医療提供体制（人員配置・設備等）、過程は実際の診療行為、結果は患者の健康状態の変化を指す。1966年に発表されたこの枠組みは、現在も医療の質評価の基本モデルとして世界的に使用されている。",
          wrong: {
            "A": "安全性・有効性・効率性はIOM（米国医学研究所）が掲げた医療の質の6つの目標の一部であり、Donabedianの枠組みとは異なる。",
            "C": "投入・活動・成果はプログラム評価等で使用されるロジックモデルの用語であり、Donabedianモデルではない。",
            "D": "計画・実行・評価はPDCAサイクルに近い概念であり、Donabedianの質評価モデルとは異なる。",
            "E": "予防・治療・回復は医療の段階的区分であり、質評価の枠組みではない。"
          },
          point: "Donabedian＝「Structure（構造）・Process（過程）・Outcome（結果）」のSPO。病院機能評価にもこの考え方が反映されている。"
        }
      },
      {
        id: "1-4",
        text: "医療安全におけるインシデントとアクシデントの違いについて、正しい記述はどれか。",
        choices: [
          "インシデントとは患者に傷害が生じた事象を指し、アクシデントとは傷害に至らなかった事象を指す。",
          "インシデントとは患者に傷害が生じなかったが、日常診療の現場で「ヒヤリ」としたり「ハッ」としたりした事象を指す。",
          "インシデントとアクシデントは同義であり、いずれも医療事故を意味する。",
          "インシデントは医療従事者のみに影響する事象であり、患者には関係しない。"
        ],
        answer: 1,
        explanation: {
          correct: "インシデント（ヒヤリ・ハット事象）とは、実際には患者に傷害は生じなかったが、危険な状況が発生した事象を指す。一方、アクシデントは患者に実際に傷害が生じた事象である。ハインリッヒの法則によれば、1件の重大事故の背後には29件の軽微な事故と300件のインシデントがあるとされ、インシデント報告の収集・分析が事故予防の鍵となる。",
          wrong: {
            "A": "インシデントとアクシデントの定義が逆になっている。傷害が生じたものがアクシデント、生じなかったものがインシデントである。",
            "C": "インシデントとアクシデントは明確に区別される概念であり、同義ではない。",
            "D": "インシデントは患者に関係する事象である。投薬ミスの未遂など、患者に影響し得た事象をいう。"
          },
          point: "インシデント＝ヒヤリ・ハット（傷害なし）、アクシデント＝実際の傷害あり。ハインリッヒの法則「1:29:300」もセットで覚える。"
        }
      },
      {
        id: "1-5",
        text: "インフォームド・コンセントに関する記述として、最も適切なものはどれか。",
        choices: [
          "医師が最善と判断した治療法を患者に説明し、同意を得ればよい。",
          "患者が治療を拒否する権利は含まれない。",
          "医師は病状・治療法・代替手段・リスク等を十分に説明し、患者の自由な意思に基づく同意を得なければならない。",
          "文書による同意が得られれば、口頭での説明は省略できる。",
          "意識のない緊急患者であっても、必ず患者本人の同意が必要である。"
        ],
        answer: 2,
        explanation: {
          correct: "インフォームド・コンセントとは、医師が①病状の診断内容、②提案する治療法の内容・目的、③代替可能な治療法、④各治療法のリスク・副作用、⑤予後等を十分に説明し、患者がその内容を理解した上で、自由な意思に基づいて同意（または拒否）することを指す。医療法第1条の4第2項にも「適切な説明を行い、医療を受ける者の理解を得るよう努めなければならない」と規定されている。",
          wrong: {
            "A": "医師が最善と判断した治療法のみを説明するのでは不十分である。代替手段やリスクも含めた包括的な説明が必要である。",
            "B": "患者には治療を拒否する権利が含まれる。インフォームド・コンセントは患者の自己決定権に基づく概念である。",
            "D": "文書があっても口頭での説明は不可欠である。形式的な同意書の取得だけではインフォームド・コンセントとはいえない。",

          },
          point: "インフォームド・コンセント＝「説明と同意」。患者の自己決定権が根底にあり、治療拒否の権利も含むことを押さえる。"
        }
      },
      {
        id: "1-6",
        text: "チーム医療について、正しい記述はどれか。",
        choices: [
          "チーム医療では医師がすべての指示を出し、他の職種はそれに従えばよい。",
          "チーム医療とは、各専門職が専門性を発揮しつつ、対等な立場で連携・協働して患者中心の医療を提供することである。",
          "チーム医療は急性期病院のみで実践される概念であり、在宅医療には適用されない。",
          "チーム医療の推進により、各職種の業務範囲が縮小される。"
        ],

// ──────────────────────────────────────────
// APP STATE
// ──────────────────────────────────────────
const STORAGE_KEY = "him-quiz-v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { answers: {}, bookmarks: {} };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let currentChapter = null;
let currentIndex = 0;
let quizQuestions = []; // current set of questions
let quizMode = "normal"; // "normal" | "review" | "bookmarks"

// ──────────────────────────────────────────
// SCREENS
// ──────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ──────────────────────────────────────────
// HOME
// ──────────────────────────────────────────
function renderHome() {
  const list = document.getElementById('chapter-list');
  list.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const total = ch.questions.length;
    const correct = ch.questions.filter(q => state.answers[q.id] === true).length;
    const answered = ch.questions.filter(q => state.answers[q.id] !== undefined).length;
    const wrong = ch.questions.filter(q => state.answers[q.id] === false).length;
    const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.innerHTML = `
      <div class="chapter-badge">第${ch.id}章</div>
      <h2>${ch.title}</h2>
      <div class="chapter-meta">
        <span>全${total}問</span>
        <span>正解 ${correct}/${answered}問</span>
        <span>${pct}%</span>
      </div>
      <div class="chapter-bar-track"><div class="chapter-bar-fill" style="width:${pct}%"></div></div>
    `;
    card.addEventListener('click', () => startChapter(ch.id, "normal"));
    list.appendChild(card);
  });

  // Review wrong answers
  const wrongCount = Object.values(state.answers).filter(v => v === false).length;
  const bmCount = Object.keys(state.bookmarks).filter(k => state.bookmarks[k]).length;

  const btnBookmarks = document.getElementById('btn-bookmarks');
  btnBookmarks.textContent = `★ ブックマーク一覧（${bmCount}）`;
  btnBookmarks.disabled = bmCount === 0;
  btnBookmarks.onclick = () => startBookmarks();

  document.getElementById('btn-reset').onclick = () => {
    if (confirm('すべての進捗をリセットしますか？')) {
      state = { answers: {}, bookmarks: {} };
      saveState();
      renderHome();
    }
  };

  showScreen('home');
}

// ──────────────────────────────────────────
// START QUIZ
// ──────────────────────────────────────────
function startChapter(chapterId, mode) {
  currentChapter = CHAPTERS.find(c => c.id === chapterId);
  quizMode = mode;
  if (mode === "review") {
    quizQuestions = currentChapter.questions.filter(q => state.answers[q.id] === false);
  } else {
    quizQuestions = [...currentChapter.questions];
  }
  if (quizQuestions.length === 0) {
    alert("該当する問題がありません。");
    return;
  }
  currentIndex = 0;
  renderQuiz();
  showScreen('quiz');
}

function startBookmarks() {
  const bmIds = Object.keys(state.bookmarks).filter(k => state.bookmarks[k]);
  quizQuestions = [];
  CHAPTERS.forEach(ch => {
    ch.questions.forEach(q => {
      if (bmIds.includes(q.id)) quizQuestions.push(q);
    });
  });
  if (quizQuestions.length === 0) { alert("ブックマークがありません。"); return; }
  currentChapter = null;
  quizMode = "bookmarks";
  currentIndex = 0;
  renderQuiz();
  showScreen('quiz');
}

// ──────────────────────────────────────────
// RENDER QUIZ
// ──────────────────────────────────────────
function renderQuiz() {
  const q = quizQuestions[currentIndex];
  const isAnswered = state.answers[q.id] !== undefined;
  const isBookmarked = !!state.bookmarks[q.id];

  // Topbar
  const titleEl = document.getElementById('quiz-topbar-title');
  if (quizMode === "bookmarks") {
    titleEl.textContent = "ブックマーク一覧";
  } else if (currentChapter) {
    titleEl.textContent = `第${currentChapter.id}章　${currentChapter.title}` + (quizMode === "review" ? "（復習）" : "");
  }
  document.getElementById('quiz-progress-text').textContent = `${currentIndex + 1} / ${quizQuestions.length}`;
  document.getElementById('quiz-progress-bar').style.width = `${((currentIndex + 1) / quizQuestions.length) * 100}%`;

  // Question body
  const body = document.getElementById('quiz-body');
  const labels = "ABCDE";

  let choicesHtml = q.choices.map((c, i) => {
    let cls = "choice-btn";
    let icon = "";
    if (isAnswered) {
      cls += " answered";
      if (i === q.answer) {
        cls += " correct";
        icon = '<span class="choice-icon">✓</span>';
      } else if (state.answers[q.id] === false && i === state.answers[q.id + "_selected"]) {
        cls += " wrong";
        icon = '<span class="choice-icon">✗</span>';
      } else {
        cls += " dimmed";
      }
    }
    return `<button class="${cls}" data-idx="${i}">
      <span class="choice-label">${labels[i]}</span>
      <span class="choice-text">${c}</span>
      ${icon}
    </button>`;
  }).join('');

  // Explanation
  let explainHtml = '';
  if (isAnswered) {
    const exp = q.explanation;
    let wrongItems = '';
    for (const [label, text] of Object.entries(exp.wrong)) {
      wrongItems += `<div class="explain-wrong-item"><span class="explain-wrong-label">${label}.</span> ${text}</div>`;
    }
    explainHtml = `
      <div class="explanation show fade-in">
        <div class="explain-section">
          <div class="explain-heading green">【正答の根拠】</div>
          <div>${exp.correct}</div>
        </div>
        <div class="explain-section">
          <div class="explain-heading">【誤答の整理】</div>
          ${wrongItems}
        </div>
        <div class="explain-section">
          <div class="explain-heading point">【試験のポイント】</div>
          <div>${exp.point}</div>
        </div>
      </div>
    `;
  }

  // Find original question number
  let qNumDisplay = "";
  const chForQ = CHAPTERS.find(ch => ch.questions.some(qq => qq.id === q.id));
  if (chForQ) {
    const idx = chForQ.questions.indexOf(q);
    qNumDisplay = `第${chForQ.id}章 問${idx + 1}`;
  }

  body.innerHTML = `
    <div class="q-card fade-in">
      <div class="q-number">
        <span>${qNumDisplay}</span>
        <button class="q-bookmark ${isBookmarked ? 'active' : ''}" id="btn-bookmark">★</button>
      </div>
      <div class="q-text">${q.text}</div>
    </div>
    <div class="choices">${choicesHtml}</div>
    ${explainHtml}
  `;

  // Bookmark
  document.getElementById('btn-bookmark').addEventListener('click', function() {
    state.bookmarks[q.id] = !state.bookmarks[q.id];
    saveState();
    this.classList.toggle('active');
  });

  // Choice click
  if (!isAnswered) {
    body.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const idx = parseInt(this.dataset.idx);
        handleAnswer(q, idx);
      });
    });
  }

  // Nav
  document.getElementById('nav-prev').disabled = currentIndex === 0;
  const isLast = currentIndex === quizQuestions.length - 1;
  const nextBtn = document.getElementById('nav-next');
  nextBtn.textContent = isLast ? "結果を見る →" : "次へ →";
  nextBtn.disabled = false;
  document.getElementById('nav-counter').textContent = `${currentIndex + 1} / ${quizQuestions.length}`;
}

function handleAnswer(q, selectedIdx) {
  const isCorrect = selectedIdx === q.answer;
  state.answers[q.id] = isCorrect;
  state.answers[q.id + "_selected"] = selectedIdx;
  saveState();
  renderQuiz();
}

// Nav events
document.getElementById('nav-prev').addEventListener('click', () => {
  if (currentIndex > 0) { currentIndex--; renderQuiz(); window.scrollTo(0, 0); }
});
document.getElementById('nav-next').addEventListener('click', () => {
  if (currentIndex < quizQuestions.length - 1) {
    currentIndex++;
    renderQuiz();
    window.scrollTo(0, 0);
  } else {
    showResults();
  }
});
document.getElementById('quiz-back').addEventListener('click', () => {
  renderHome();
});

// ──────────────────────────────────────────
// RESULTS
// ──────────────────────────────────────────
function showResults() {
  const correctCount = quizQuestions.filter(q => state.answers[q.id] === true).length;
  const total = quizQuestions.length;
  const pct = Math.round((correctCount / total) * 100);
  const wrongQs = quizQuestions.filter(q => state.answers[q.id] === false);

  let titleText = "結果";
  if (quizMode === "bookmarks") {
    titleText = "ブックマーク　結果";
  } else if (currentChapter) {
    titleText = `第${currentChapter.id}章　${currentChapter.title}` + (quizMode === "review" ? "（復習）" : "") + "　結果";
  }

  let wrongListHtml = '';
  if (wrongQs.length > 0) {
    const items = wrongQs.map(q => {
      const labels = "ABCDE";
      const selIdx = state.answers[q.id + "_selected"];
      return `<div class="wrong-item" data-qid="${q.id}">
        <div class="wrong-item-q">${q.text.substring(0, 60)}…</div>
        <div class="wrong-item-a">あなたの回答: ${labels[selIdx]} → 正答: ${labels[q.answer]}</div>
      </div>`;
    }).join('');
    wrongListHtml = `<div class="wrong-list"><h3>間違えた問題（${wrongQs.length}問）</h3>${items}</div>`;
  }

  const resultsBody = document.getElementById('results-body');
  resultsBody.innerHTML = `
    <div class="results-header fade-in">
      <h2>${titleText}</h2>
      <div class="results-score">${pct}<span>%</span></div>
      <div class="results-sub">${total}問中 ${correctCount}問正解</div>
      <div class="results-actions">
        <button class="home-btn" id="res-home">ホームに戻る</button>
        ${wrongQs.length > 0 && currentChapter ? `<button class="home-btn" id="res-review">間違えた問題を復習</button>` : ''}
      </div>
    </div>
    ${wrongListHtml}
  `;

  document.getElementById('res-home').addEventListener('click', () => renderHome());
  const revBtn = document.getElementById('res-review');
  if (revBtn && currentChapter) {
    revBtn.addEventListener('click', () => {
      // Reset wrong answers so they can be re-attempted
      wrongQs.forEach(q => {
        delete state.answers[q.id];
        delete state.answers[q.id + "_selected"];
      });
      saveState();
      startChapter(currentChapter.id, "review");
    });
  }

  // Click wrong items to jump
  resultsBody.querySelectorAll('.wrong-item').forEach(el => {
    el.addEventListener('click', () => {
      const qid = el.dataset.qid;
      const idx = quizQuestions.findIndex(q => q.id === qid);
      if (idx >= 0) {
        currentIndex = idx;
        renderQuiz();
        showScreen('quiz');
      }
    });
  });

  showScreen('results');
}

// ──────────────────────────────────────────
// INIT
// ──────────────────────────────────────────
renderHome();
</script>
</body>
</html>
