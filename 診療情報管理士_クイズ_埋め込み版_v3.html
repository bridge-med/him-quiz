<script>
(function(){
  var DB = [];
  try { DB = JSON.parse(document.getElementById('data').textContent); } catch(e) { console.error(e); }
  var info = document.getElementById('info');
  function updateInfo(){
    var total=0; for(var i=0;i<DB.length;i++) total += (DB[i].questions||[]).length;
    info.textContent = DB.length + "章 / " + total + "問";
    var sel = document.getElementById('chapter');
    sel.innerHTML = '<option value="all">全章ミックス</option>';
    for(var i=0;i<DB.length;i++){ var o=document.createElement('option'); o.value=DB[i].name; o.textContent=DB[i].name; sel.appendChild(o); }
  }
  function poolFromSelection(){
    var chap = document.getElementById('chapter').value;
    var pool = [];
    if(chap==='all'){
      for(var i=0;i<DB.length;i++){ var qs = DB[i].questions||[]; for(var j=0;j<qs.length;j++) pool.push(qs[j]); }
    }else{
      for(var i=0;i<DB.length;i++){ if(DB[i].name===chap){ pool = (DB[i].questions||[]).slice(); break; } }
    }
    return pool;
  }
  function shuffle(arr){ for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i]; arr[i]=arr[j]; arr[j]=t; } return arr; }
  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function startQuiz(){
    var pool = poolFromSelection();
    if(!pool.length){ alert('データがありません'); return; }
    if(document.getElementById('shuffle').checked) shuffle(pool);
    var count = parseInt(document.getElementById('count').value,10);
    var items = pool.slice(0, Math.min(count, pool.length));
    render(items, document.getElementById('mode').value, document.getElementById('hideAnswer').checked);
  }
  function render(items, mode, hide){
    var root = document.getElementById('quiz'); root.innerHTML='';
    for(var idx=0; idx<items.length; idx++){
      var q = items[idx];
      var card = document.createElement('div'); card.className='card';
      var head = document.createElement('div'); head.innerHTML = '<b>Q'+(idx+1)+'</b>　'+esc(q.stem||'（設問なし）'); card.appendChild(head);
      var opts = document.createElement('div'); opts.className='options';
      var labs = ['A','B','C','D'];
      for(var i=0;i<4;i++){
        var o = document.createElement('button'); o.className='opt'; o.innerHTML = '<b>'+labs[i]+'.</b> '+esc(q.options[i]||'');
        (function(o,lab){
          o.addEventListener('click', function(){
            if(mode==='learn'){
              if(lab===(q.answer||'')) o.classList.add('correct'); else o.classList.add('wrong');
              ans.style.display='block';
            }else{
              var bs = opts.querySelectorAll('.opt');
              for(var k=0;k<bs.length;k++){ bs[k].dataset.selected='0'; bs[k].classList.remove('correct'); }
              o.dataset.selected='1'; o.classList.add('correct');
            }
          }, false);
        })(o,labs[i]);
        opts.appendChild(o);
      }
      card.appendChild(opts);
      var ans = document.createElement('div'); ans.className='answer'; ans.innerHTML = '<b>✅ 正答：</b>'+(q.answer||'?')+'<br><b>💡 解説：</b>'+esc(q.explain||'—');
      if(!document.getElementById('hideAnswer').checked && mode==='learn'){ ans.style.display='block'; }
      card.appendChild(ans);
      var eye = document.createElement('button'); eye.textContent='👁 解答'; eye.addEventListener('click', function(){ ans.style.display = (ans.style.display==='block')?'none':'block'; }, false);
      card.appendChild(eye);
      root.appendChild(card);
    }
    var footer = document.createElement('div'); footer.className='footer';
    var btn = document.createElement('button'); btn.className='primary'; btn.textContent = (mode==='learn'?'次のセット':'採点する');
    btn.addEventListener('click', function(){
      if(mode==='learn'){ startQuiz(); return; }
      var cards = document.querySelectorAll('.card'); var correct=0, total=items.length;
      for(var i=0;i<cards.length;i++){ var map={{'A':0,'B':1,'C':2,'D':3}}; var idx=map[items[i].answer]; var bs = cards[i].querySelectorAll('.opt'); if(idx!=null && bs[idx] && bs[idx].dataset.selected==='1') correct++; cards[i].querySelector('.answer').style.display='block'; }
      alert('スコア：'+correct+' / '+total);
    }, false);
    footer.appendChild(btn); document.getElementById('main').appendChild(footer);
  }
  document.getElementById('start').addEventListener('click', startQuiz, false);
  updateInfo();
})();
</script>
