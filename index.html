","C":"全患者への開示は要件ではない。","D":"病床数の制限はない。"},"point":"診療録管理体制加算＝専任管理者＋退院サマリー作成体制。"}},{"q":"がん登録推進法に基づく全国がん登録の説明として正しいのはどれか。","c":["すべての病院に届出が義務付けられている","200床以上の病院のみが対象","届出は任意である","都道府県単位でのみ集計"],"a":0,"e":{"correct":"全国がん登録（2016年開始）はすべての病院にがんの届出を義務付けている。国が一元管理。","wrong":{"B":"病床数に関わらず全病院が対象。","C":"届出は義務であり任意ではない。","D":"国が一元的に管理し全国集計を行う。"},"point":"全国がん登録＝全病院に届出義務。2016年開始。国が一元管理。"}},{"q":"クリニカルパスのバリアンスの説明として正しいのはどれか。","c":["パスで予定された経過から逸脱すること","パスの作成費用","パスの印刷版と電子版の違い","パスの著作権"],"a":0,"e":{"correct":"バリアンスはクリニカルパスで予定された標準的な経過から逸脱した事象。分析により質改善につながる。","wrong":{"B":"作成費用はバリアンスではない。","C":"印刷版と電子版の違いではない。","D":"著作権とは無関係。"},"point":"バリアンス＝パスからの逸脱。正のバリアンス（予定より早い回復）と負のバリアンスがある。"}},{"q":"医療情報システムの安全管理GLで求められる3つの安全対策はどれか。","c":["組織的・物理的・技術的安全対策","法的・倫理的・経済的対策","医学的・看護的・薬学的対策","建築的・設備的・人員的対策"],"a":0,"e":{"correct":"安全管理GLでは組織的安全対策、物理的安全対策、技術的安全対策（＋人的安全対策）が求められる。","wrong":{"B":"法的・倫理的・経済的は安全管理GLの主要分類ではない。","C":"診療科別の分類ではない。","D":"ハード面だけでなく組織的・技術的対策も含む。"},"point":"安全管理GL＝組織的＋物理的＋技術的（＋人的）安全対策。"}},{"q":"DPC調査で提出する様式1に含まれる情報はどれか。","c":["患者の診断名・手術名・入退院情報等の臨床情報","医療機関の財務情報","患者の年収情報","医師の勤務時間情報"],"a":0,"e":{"correct":"様式1はDPC対象患者の臨床情報（傷病名、手術、入退院日等）を報告するもの。診療情報管理士が作成に関与。","wrong":{"B":"財務情報は様式1の内容ではない。","C":"年収情報は含まれない。","D":"勤務時間は別の報告。"},"point":"様式1＝臨床情報（傷病名・手術・入退院等）。診療情報管理士の重要業務。"}},{"q":"SS-MIX2の説明として正しいのはどれか。","c":["厚労省が推進する医療情報の標準化ストレージ規格","手術手技の標準化マニュアル","薬剤の混合規格","保険請求の電子フォーマット"],"a":0,"e":{"correct":"SS-MIX2（Standardized Structured Medical Information eXchange）は医療情報を標準的な形式で蓄積・交換するための規格。","wrong":{"B":"手術手技のマニュアルではない。","C":"薬剤の混合規格ではない。","D":"保険請求フォーマットではない。"},"point":"SS-MIX2＝医療情報の標準化ストレージ。地域医療連携にも活用。"}},{"q":"HL7の説明として正しいのはどれか。","c":["医療情報システム間のデータ交換規格","病院の階層構造を示す規格","患者の重症度を7段階で分類する基準","医療安全の7原則"],"a":0,"e":{"correct":"HL7（Health Level 7）は医療情報システム間でデータを交換するための国際標準規格。","wrong":{"B":"病院の階層構造ではない。","C":"重症度分類ではない。","D":"医療安全の原則ではない。"},"point":"HL7＝医療情報交換の国際標準規格。「7」はOSI参照モデルの第7層（アプリケーション層）に由来。"}},{"q":"カルテ開示請求への対応として正しいのはどれか。","c":["患者本人からの請求には原則として応じなければならない","すべての開示請求を拒否してよい","医師の判断のみで開示範囲を決定してよい","弁護士からの請求は常に拒否してよい"],"a":0,"e":{"correct":"患者本人からの開示請求には原則として応じる義務がある。拒否には正当な理由が必要。","wrong":{"B":"正当な理由なく拒否することはできない。","C":"組織的な判断体制が必要。医師個人の判断のみではない。","D":"弁護士からの請求も患者本人の委任があれば応じる必要がある。"},"point":"カルテ開示＝患者本人の請求には原則応じる。拒否には正当理由が必要。"}},{"q":"診療情報の3階層構造として正しいのはどれか。","c":["診療録・診療諸記録・診療情報","一次情報・二次情報・三次情報","医師記録・看護記録・検査記録","入院記録・外来記録・救急記録"],"a":0,"e":{"correct":"診療情報は①診療録（カルテ）、②診療に関する諸記録（看護記録等）、③その他の診療情報の3階層で構成。","wrong":{"B":"情報の次数ではなく種類による階層分類。","C":"職種別ではなく制度上の3階層。","D":"場所別ではない。"},"point":"3階層＝診療録（5年）・諸記録（2年）・その他情報。保存期間も異なる。"}},{"q":"NCD（National Clinical Database）の説明として正しいのはどれか。","c":["外科手術症例のデータベースで医療の質向上を目的とする","国民の食事データベース","看護師の教育データベース","薬価収載データベース"],"a":0,"e":{"correct":"NCDは日本の外科手術症例を登録するデータベースで、手術成績の評価と質向上を目的とする。専門医制度とも連動。","wrong":{"B":"食事データベースではない。","C":"看護教育のデータベースではない。","D":"薬価のデータベースではない。"},"point":"NCD＝外科手術症例DB。専門医制度と連動。医療の質指標として活用。"}},{"q":"医療の質指標（QI）として適切でないのはどれか。","c":["手術死亡率","再入院率","褥瘡発生率","病院の立地条件"],"a":3,"e":{"correct":"QIは手術死亡率、再入院率、褥瘡発生率等の測定可能な指標。立地条件は質指標ではない。","wrong":{"A":"手術死亡率はアウトカム指標の代表。","B":"再入院率は質を反映する指標。","C":"褥瘡発生率はプロセス/アウトカム指標。"},"point":"QI＝測定可能な質の指標。立地条件のような環境要因は含まない。"}},{"q":"e-文書法で電子保存が認められた文書はどれか。","c":["診療録や看護記録等の法定保存文書","個人の日記","新聞記事","市販の書籍"],"a":0,"e":{"correct":"e-文書法は法令により紙での保存が義務付けられた文書（診療録・看護記録等）の電子保存を可能にした。","wrong":{"B":"個人の日記はe-文書法の対象ではない。","C":"新聞記事は法定保存文書ではない。","D":"市販書籍は対象ではない。"},"point":"e-文書法＝法定保存文書の電子保存を許可。"}},{"q":"入院診療計画書について正しいのはどれか。","c":["入院後7日以内に患者に交付する義務がある","退院時に交付すればよい","作成は任意である","医師のみが作成する"],"a":0,"e":{"correct":"医療法施行規則により入院後7日以内に病名・治療計画等を記載した入院診療計画書を患者に交付することが義務。","wrong":{"B":"退院時ではなく入院後7日以内。","C":"義務であり任意ではない。","D":"多職種が協力して作成。"},"point":"入院診療計画書＝入院後7日以内に交付義務。"}},{"q":"診療情報管理士の主な業務に含まれないのはどれか。","c":["診療録の管理・点検","コーディング（ICD等）","がん登録","処方箋の調剤"],"a":3,"e":{"correct":"診療情報管理士は診療録管理、コーディング、がん登録、DPCデータ管理等が主業務。調剤は薬剤師の業務。","wrong":{"A":"診療録の管理・点検は中核業務。","B":"ICDコーディングは重要業務。","C":"がん登録は診療情報管理士の業務範囲。"},"point":"診療情報管理士＝診療録管理・コーディング・がん登録・DPC。調剤は薬剤師。"}},{"q":"診療録の法定記載事項に含まれないものはどれか。","c":["診療を受けた者の住所・氏名・性別・年齢","病名及び主要症状","治療方法（処方及び処置）","患者の家族構成図"],"a":3,"e":{"correct":"医師法第24条に基づく診療録の記載事項は①患者の住所・氏名・性別・年齢、②病名・主要症状、③治療方法、④診療年月日。家族構成図は法定記載事項ではない。","wrong":{"A":"患者の基本情報は医師法で定められた法定記載事項。","B":"病名・主要症状は法定記載事項。","C":"処方・処置は治療方法として法定記載事項。"},"point":"診療録の法定記載事項＝患者情報＋病名・症状＋治療法＋診療日。保存期間は5年。"}},{"q":"POMRの4つの構成要素に含まれないものはどれか。","c":["基礎データ","問題リスト","初期計画","患者満足度調査"],"a":3,"e":{"correct":"POMR（問題志向型医療記録）は①基礎データ、②問題リスト、③初期計画、④経過記録の4要素で構成。患者満足度調査は含まれない。","wrong":{"A":"基礎データは主訴・現病歴・既往歴等を含むPOMRの構成要素。","B":"問題リストはPOMRの中核。アクティブ・インアクティブに分類。","C":"初期計画は診断計画・治療計画・教育計画を含む。"},"point":"POMR＝基礎データ＋問題リスト＋初期計画＋経過記録（SOAP）。Weed博士が提唱。"}},{"q":"クリティカルインディケーターに該当するものはどれか。","c":["患者の身長","術後48時間以内の再手術","定期健康診断の結果","外来の待ち時間"],"a":1,"e":{"correct":"クリティカルインディケーターは診療の質に問題がある可能性を示す重要指標。術後の予期せぬ再手術・院内感染・転倒事故等が該当。","wrong":{"A":"身長はバイタルデータであり質の指標ではない。","C":"定期健診の結果はクリティカルインディケーターに該当しない。","D":"待ち時間はサービス指標であり臨床的なクリティカルインディケーターではない。"},"point":"クリティカルインディケーター＝質の問題を示す指標。スクリーニング機能を持つ。"}},{"q":"退院時要約（サマリー）の必須記載項目に含まれるのはどれか。","c":["入院時診断名と退院時診断名","患者の趣味","家族の年収","主治医の休暇予定"],"a":0,"e":{"correct":"退院時要約には入院時・退院時の診断名、入院経過、検査結果、治療内容、退院時の状態、退院後の方針等を記載する。","wrong":{"B":"患者の趣味は医療上必要な情報ではなく必須記載項目ではない。","C":"家族の年収は退院時要約の記載項目ではない。","D":"主治医の休暇は退院時要約と無関係。"},"point":"退院時要約＝入退院診断名＋経過＋検査＋治療＋退院時状態＋退院後方針。14日以内に作成。"}},{"q":"同意書の管理について正しいのはどれか。","c":["同意書は診療録とは別に保管し破棄してよい","同意書は診療録の一部として保管する","同意書は患者のみが保管する","同意書は保険者に提出する"],"a":1,"e":{"correct":"手術同意書・検査同意書等は診療録の一部として保管する。診療録と同じ5年間の保存義務がある。","wrong":{"A":"同意書は破棄せず診療録と一体的に保管する。","C":"同意書は医療機関が保管する。患者には写しを渡す。","D":"同意書は保険者への提出書類ではない。"},"point":"同意書＝診療録の一部。手術・検査・輸血等の同意書は記録として重要。"}},{"q":"がん登録等の推進に関する法律（がん登録推進法）に基づく全国がん登録の届出項目に含まれるのはどれか。","c":["患者の学歴","がんの進展度（ステージ）","患者の宗教","患者のSNSアカウント"],"a":1,"e":{"correct":"全国がん登録の届出項目にはがんの種類・進展度（ステージ）・治療内容・診断日等が含まれる。","wrong":{"A":"学歴は全国がん登録の届出項目ではない。","C":"宗教は届出項目ではない。","D":"SNSアカウントは医療情報ではなく届出不要。"},"point":"全国がん登録＝2016年開始。届出項目＝がん種・進展度・治療・診断日・届出日等。"}},{"q":"QI（Quality Indicator）の具体例として適切なのはどれか。","c":["病院の建築年数","院内感染発生率","病院の所在地","職員の平均年齢"],"a":1,"e":{"correct":"QIは医療の質を定量的に評価する指標。院内感染発生率・術後死亡率・再入院率・患者満足度等が代表的。","wrong":{"A":"建築年数は施設のハード面であり医療の質指標ではない。","C":"所在地は質の指標ではない。","D":"職員の平均年齢は質の直接的指標ではない。"},"point":"QI＝医療の質指標。構造・過程・結果のドナベディアンモデルに沿って設定。"}},{"q":"診療録の記録の修正方法として正しいのはどれか。","c":["修正液で消して書き直す","二重線で消し修正日・修正者名を記入する","修正箇所を切り取って貼り直す","元の記録を完全に削除して新たに記載する"],"a":1,"e":{"correct":"診療録の修正は元の記載が判読できるよう二重線で消し、修正日時と修正者を明記する。改ざん防止のため。","wrong":{"A":"修正液は原記載を判読不能にするため不可。","C":"切り取りは改ざんとみなされる。","D":"完全削除は記録の連続性を損ない不適切。"},"point":"記録修正＝二重線＋修正日＋修正者名。電子カルテでは修正履歴を自動保存。"}},{"q":"電子署名の法的要件として正しいのはどれか。","c":["メールアドレスの記載で代替できる","本人性の確認と非改ざん性の確保が必要","手書き署名より法的効力が弱い","国内では法的に認められていない"],"a":1,"e":{"correct":"電子署名及び認証業務に関する法律により、電子署名は本人性の確認（本人が作成）と非改ざん性（改変されていないこと）の確保が要件。","wrong":{"A":"メールアドレスの記載だけでは電子署名の要件を満たさない。","C":"電子署名法により手書き署名と同等の法的効力が認められている。","D":"2001年の電子署名法により法的に認められている。"},"point":"電子署名＝本人性＋非改ざん性。電子署名法（2001年施行）。HPKI認証も重要。"}},{"q":"タイムスタンプの目的として正しいのはどれか。","c":["データのバックアップ","ある時刻にその電子データが存在し改ざんされていないことの証明","ファイルサイズの圧縮","通信速度の向上"],"a":1,"e":{"correct":"タイムスタンプはある時刻にデータが存在し、その後改ざんされていないことを第三者機関が証明する技術。","wrong":{"A":"バックアップはデータの複製であり、タイムスタンプの目的ではない。","C":"ファイル圧縮はタイムスタンプとは無関係。","D":"通信速度はタイムスタンプとは無関係。"},"point":"タイムスタンプ＝存在証明＋非改ざん証明。TSA（時刻認証局）が発行。"}},{"q":"診療情報の外部監査の目的として最も適切なのはどれか。","c":["医療費の削減","診療録の記載内容と管理体制の質の評価・改善","患者数の増加","新しい治療法の開発"],"a":1,"e":{"correct":"外部監査は第三者が診療録の記載内容・管理体制・コーディング精度等を客観的に評価し、改善点を指摘するもの。","wrong":{"A":"医療費削減は外部監査の直接的な目的ではない。","C":"患者数増加は外部監査の目的ではない。","D":"治療法開発は研究活動であり外部監査の目的ではない。"},"point":"外部監査＝客観的評価＋改善提案。診療録の質保証に重要。内部監査と組み合わせる。"}},{"q":"アクセスログ管理の目的として正しいのはどれか。","c":["診療録の印刷枚数を減らすこと","誰がいつどの情報にアクセスしたかを記録し不正アクセスを検知すること","患者の来院回数を把握すること","医師の勤務時間を計算すること"],"a":1,"e":{"correct":"アクセスログは電子カルテ等への誰が・いつ・どの情報にアクセスしたかを記録し、不正アクセスの検知や個人情報保護に活用する。","wrong":{"A":"印刷枚数の管理はアクセスログの主目的ではない。","C":"来院回数は予約・会計システムで把握する。","D":"勤務時間は勤怠管理システムで把握する。"},"point":"アクセスログ＝5W1H記録。個人情報保護＋監査証跡（audit trail）。"}},{"q":"診療情報の開示請求権について正しいのはどれか。","c":["医師のみが開示請求できる","患者本人は診療情報の開示を請求する権利がある","開示は医療機関の任意である","死亡した患者の遺族には開示請求権がない"],"a":1,"e":{"correct":"個人情報保護法に基づき患者本人は自己の診療情報の開示を請求する権利を有する。医療機関は原則として応じる義務がある。","wrong":{"A":"患者本人が開示請求の権利者である。","C":"法律に基づく義務であり医療機関の任意ではない。","D":"遺族にも一定の条件下で開示請求権が認められている。"},"point":"診療情報開示＝患者本人の権利。遺族も請求可能。正当な理由なく拒否不可。"}},{"q":"POS（問題志向型システム）の経過記録で用いるSOAPのAが意味するのはどれか。","c":["主観的データ","客観的データ","評価","計画"],"a":2,"e":{"correct":"SOAPのAはAssessment（評価）。S（主観的データ）とO（客観的データ）に基づき病態を評価・判断する部分。","wrong":{"A":"主観的データはS（Subjective）。","B":"客観的データはO（Objective）。","D":"計画はP（Plan）。"},"point":"SOAP＝S（主観）＋O（客観）＋A（評価）＋P（計画）。経過記録の基本フォーマット。"}}]},{"id":9,"name":"診療情報管理II（コーディング）","questions":[{"q":"ICD-10の基本構造として正しいのはどれか。","c":["アルファベット1文字＋数字2桁を基本とする英数字コード","数字のみの5桁コード","アルファベット3文字のコード","漢字コード"],"a":0,"e":{"correct":"ICD-10は第1桁がアルファベット（A〜Z、Uを除く）、第2〜3桁が数字の英数字コード。小数点以下で詳細分類。","wrong":{"B":"数字のみではなくアルファベットと数字の組み合わせ。","C":"アルファベット3文字ではない。","D":"漢字コードではない。"},"point":"ICD-10＝A00.0形式。アルファベット1文字＋数字2桁＋小数点以下。"}},{"q":"ICD-10の章数はどれか。","c":["21章","10章","26章","30章"],"a":0,"e":{"correct":"ICD-10は全21章で構成。第I章（感染症）〜第XXI章（健康状態に影響を及ぼす要因）。","wrong":{"B":"10章ではなく21章。","C":"26章ではない。","D":"30章ではない。"},"point":"ICD-10＝21章構成。ICD-11は26章。"}},{"q":"悪性新生物のICD-10コードの範囲はどれか。","c":["C00-C97","A00-A99","E00-E90","S00-S99"],"a":0,"e":{"correct":"ICD-10で悪性新生物はC00-C97に分類される。第II章「新生物」に含まれる。","wrong":{"B":"A00-A99は感染症（第I章）。","C":"E00-E90は内分泌・代謝疾患（第IV章）。","D":"S00-S99は損傷（第XIX章）。"},"point":"C＝悪性新生物。D＝良性新生物等。A-B＝感染症。覚えやすいアルファベット対応。"}},{"q":"糖尿病のICD-10コードはどれか。","c":["E10-E14","C34","J18","I21"],"a":0,"e":{"correct":"糖尿病はE10（1型）、E11（2型）、E12（栄養障害関連）、E13（その他）、E14（詳細不明）に分類。","wrong":{"B":"C34は肺の悪性新生物。","C":"J18は肺炎。","D":"I21は急性心筋梗塞。"},"point":"E10＝1型DM、E11＝2型DM。Eは内分泌・代謝疾患。"}},{"q":"ダガー（†）とアスタリスク（*）のコーディングルールで正しいのはどれか。","c":["ダガーは原因疾患、アスタリスクは臓器別症状のコード","ダガーは症状、アスタリスクは原因","ダガーとアスタリスクは同義","どちらか一方のみ使用する"],"a":0,"e":{"correct":"ダガー（†）は病因コード（原因疾患）、アスタリスク（*）は発現部位コード（臓器別症状）を示す。","wrong":{"B":"逆である。ダガーが原因、アスタリスクが症状。","C":"同義ではなく異なる意味を持つ。","D":"両方を記録することが推奨される。"},"point":"†＝原因（etiology）、*＝症状部位（manifestation）。セットで使用。"}},{"q":"外因コードの範囲はどれか。","c":["V01-Y98","A00-B99","C00-D48","J00-J99"],"a":0,"e":{"correct":"ICD-10の第XX章「傷病及び死亡の外因」はV01-Y98。交通事故、転倒、中毒等の外的原因を分類。","wrong":{"B":"A00-B99は感染症。","C":"C00-D48は新生物。","D":"J00-J99は呼吸器系疾患。"},"point":"V-Y＝外因コード。V＝交通事故、W＝転倒等、X＝中毒等、Y＝その他。"}},{"q":"「医療資源を最も投入した傷病名」の選択で正しいのはどれか。","c":["入院全体を通じて最も資源を投入した傷病名を選択","入院時の最初の診断名を選択","最も長く治療した傷病名を選択","退院時に残存している傷病名を選択"],"a":0,"e":{"correct":"DPCでは入院期間全体を通じて人的・物的資源を最も投入した傷病名を主傷病名として選択。","wrong":{"B":"入院時の最初の診断名とは限らない。","C":"治療期間の長さではなく資源投入量で判断。","D":"退院時の残存傷病名とは限らない。"},"point":"DPC＝資源投入量で判断。期間の長さや入退院時点ではない。"}},{"q":"DPCコードの桁数はどれか。","c":["14桁","6桁","10桁","20桁"],"a":0,"e":{"correct":"DPCコードは14桁で構成。MDC（2桁）＋傷病名（4桁）＋手術等（6桁）＋その他（2桁）。","wrong":{"B":"6桁ではなく14桁。","C":"10桁ではない。","D":"20桁ではない。"},"point":"DPCコード＝14桁。MDC＋傷病名＋手術分岐＋その他で構成。"}},{"q":"入院期間区分I・II・IIIの説明として正しいのはどれか。","c":["期間Iが最も1日当たり点数が高く期間IIIが最も低い","期間IIIが最も高い","すべての期間で同一点数","期間の区分はない"],"a":0,"e":{"correct":"DPC/PDPSでは入院期間I（短期）が最も高い1日当たり点数、期間IIで中程度、期間IIIで低い点数となる。早期退院のインセンティブ。","wrong":{"B":"期間IIIは最も低い。","C":"期間により点数は異なる。","D":"I・II・IIIの3区分がある。"},"point":"DPC入院期間＝Iが最高→IIで低下→IIIで最低。早期退院を促す仕組み。"}},{"q":"ICD-Oの説明として正しいのはどれか。","c":["腫瘍学のための国際分類で部位コードと形態コードで構成","眼科疾患の分類","整形外科疾患の分類","産科疾患の分類"],"a":0,"e":{"correct":"ICD-O（International Classification of Diseases for Oncology）は腫瘍学のための分類で、部位（Topography）と形態（Morphology）の2軸で腫瘍を分類。がん登録で使用。","wrong":{"B":"Oは眼科ではなくOncology（腫瘍学）。","C":"整形外科の分類ではない。","D":"産科の分類ではない。"},"point":"ICD-O＝腫瘍学分類。部位コード＋形態コードの2軸。がん登録で使用。"}},{"q":"肺炎のICD-10コードとして正しいのはどれか。","c":["J18","C34","I21","K70"],"a":0,"e":{"correct":"J18は肺炎（起因菌不詳）のコード。J章は呼吸器系の疾患。","wrong":{"B":"C34は肺の悪性新生物。","C":"I21は急性心筋梗塞。","D":"K70はアルコール性肝疾患。"},"point":"J＝呼吸器系。J18＝肺炎。Jはlung/pulmonaryと連想。"}},{"q":"骨折のICD-10コードの章はどれか。","c":["第XIX章（S00-T98：損傷、中毒）","第XIII章（M00-M99：筋骨格系）","第IX章（I00-I99：循環器系）","第X章（J00-J99：呼吸器系）"],"a":0,"e":{"correct":"骨折はS章（損傷）に分類。例：大腿骨頸部骨折＝S72.0。第XIX章。","wrong":{"B":"M章は筋骨格系疾患（骨粗鬆症等）だが骨折はS章。","C":"I章は循環器系。","D":"J章は呼吸器系。"},"point":"骨折＝S章（損傷）。S72＝大腿骨骨折。M章ではないことに注意。"}},{"q":"死因コーディングで「原死因」の定義はどれか。","c":["直接に死亡を引き起こした一連の事象の起因となった疾病または損傷","死亡の直前に存在した疾病","最も長く罹患していた疾病","最後に診断された疾病"],"a":0,"e":{"correct":"原死因（underlying cause of death）は死亡に至る一連の事象を開始させた疾病または損傷。WHOが定義。死因統計の基本。","wrong":{"B":"直前の疾病ではなく一連の起因。","C":"罹病期間の長さではない。","D":"最後の診断ではない。"},"point":"原死因＝一連の事象の起点。直接死因→中間原因→原死因の連鎖。"}},{"q":"DPC/PDPSの包括評価に含まれないのはどれか。","c":["入院基本料","投薬","注射","手術料"],"a":3,"e":{"correct":"DPC包括には入院基本料、投薬、注射、検査、画像診断、処置（一部）が含まれる。手術料は出来高で別途算定。","wrong":{"A":"入院基本料は包括に含まれる。","B":"投薬は包括に含まれる。","C":"注射は包括に含まれる。"},"point":"DPC包括＝入院基本料・投薬・注射・検査・画像。出来高＝手術・麻酔・リハビリ。"}},{"q":"コーディングの精度管理で重要なのはどれか。","c":["主傷病名と術式の正確な対応確認","コード番号の順番","用紙の色分け","入力スピードのみ"],"a":0,"e":{"correct":"コーディング精度管理では主傷病名の選択、コードの正確性、術式との対応等を確認・監査する。","wrong":{"B":"番号の順番は精度管理の主要ポイントではない。","C":"用紙の色分けは精度管理ではない。","D":"スピードだけでなく正確性が最も重要。"},"point":"コーディング精度＝正確な傷病名選択＋正確なコード付与。定期的な監査が重要。"}},{"q":"ICD-10の索引表と内容例示表の関係として正しいのはどれか。","c":["索引表で疾患名からコードを検索し内容例示表で確認する","内容例示表で検索し索引表で確認する","どちらか一方のみ使用する","両者は同一の表である"],"a":0,"e":{"correct":"コーディングの手順は①索引表（第3巻）で疾患名からコード候補を検索→②内容例示表（第1巻）でコードの正確性を確認。","wrong":{"B":"索引表→内容例示表の順が正しい手順。","C":"両方を使用して正確なコーディングを行う。","D":"索引表と内容例示表は異なる構成の表。"},"point":"コーディング手順＝索引表で検索→内容例示表で確認。必ず両方を使う。"}},{"q":"MDC（主要診断群分類）のカテゴリ数はどれか。","c":["18カテゴリ","10カテゴリ","21カテゴリ","30カテゴリ"],"a":0,"e":{"correct":"MDC（Major Diagnostic Category）は18のカテゴリで構成。臓器系統別に分類されている。","wrong":{"B":"10ではなく18カテゴリ。","C":"21はICD-10の章数。","D":"30ではない。"},"point":"MDC＝18カテゴリ。ICD-10の章（21章）とは異なるので注意。"}},{"q":"合併症と続発症のコーディングルールとして正しいのはどれか。","c":["主傷病名の他に合併症・続発症も追加コーディングする","主傷病名のみコーディングすればよい","合併症は常に無視する","続発症のみコーディングする"],"a":0,"e":{"correct":"正確なコーディングのため主傷病名に加えて入院中に治療対象となった合併症・続発症も追加コーディングする。","wrong":{"B":"主傷病名のみでは不十分。","C":"合併症も医療資源投入があれば記録。","D":"主傷病名＋合併症＋続発症すべてが対象。"},"point":"コーディング＝主傷病名＋合併症＋続発症。すべて記録して正確な情報管理を行う。"}},{"q":"ICD-11について正しいのはどれか。","c":["2019年にWHOで承認されデジタル対応が強化された最新版","1990年に作成された旧版","日本でのみ使用される分類","5章構成の簡易版"],"a":0,"e":{"correct":"ICD-11は2019年のWHO総会で承認。デジタル環境での利用を前提に設計され、コーディングツールも提供。26章構成。","wrong":{"B":"2019年承認の最新版。1990年はICD-10の採択年。","C":"WHOの国際分類であり日本のみではない。","D":"26章構成であり5章ではない。"},"point":"ICD-11＝2019年WHO承認。26章構成。デジタル対応が特徴。"}},{"q":"急性心筋梗塞のICD-10コードはどれか。","c":["I21","C34","J18","E11"],"a":0,"e":{"correct":"I21＝急性心筋梗塞。I章は循環器系の疾患（第IX章）。","wrong":{"B":"C34は肺がん。","C":"J18は肺炎。","D":"E11は2型糖尿病。"},"point":"I21＝急性心筋梗塞。I章＝循環器系。I＝Heart/Circulatoryと連想。"}},{"q":"ICD-10で糖尿病のコードE11に該当するのはどれか。","c":["1型糖尿病","2型糖尿病","妊娠糖尿病","薬物性糖尿病"],"a":1,"e":{"correct":"E11は2型糖尿病（インスリン非依存型）のコード。E10は1型糖尿病、O24は妊娠糖尿病。","wrong":{"A":"1型糖尿病はE10。","C":"妊娠糖尿病はO24（産科の章）。","D":"薬物性糖尿病はE13（その他の明示された糖尿病）に分類。"},"point":"E10＝1型、E11＝2型、E13＝その他、E14＝詳細不明。4桁目で合併症を分類。"}},{"q":"糖尿病性腎症のICD-10コーディングで4桁目の分類として正しいのはどれか。","c":["E11.0","E11.2","E11.5","E11.9"],"a":1,"e":{"correct":"E11.2は2型糖尿病の腎合併症（糖尿病性腎症）。4桁目で合併症の種類を特定する。","wrong":{"A":"E11.0は2型糖尿病の昏睡。","C":"E11.5は2型糖尿病の末梢循環合併症。","D":"E11.9は2型糖尿病の合併症を伴わないもの。"},"point":"4桁目：.0昏睡 .2腎 .3眼 .4神経 .5末梢循環 .6その他 .9合併症なし。"}},{"q":"悪性新生物で「胃体部」の癌のICD-10コードはどれか。","c":["C16.0","C16.2","C16.8","C16.9"],"a":1,"e":{"correct":"C16.2は胃体部の悪性新生物。C16は胃の悪性新生物で4桁目で部位を特定する。","wrong":{"A":"C16.0は噴門部。","C":"C16.8は胃の境界部病巣。","D":"C16.9は胃の悪性新生物、部位不明。"},"point":"C16.0噴門 .1胃底部 .2胃体部 .3幽門前庭部 .4幽門 .9部位不明。"}},{"q":"大腿骨頸部骨折のICD-10コードはどれか。","c":["S72.0","S82.0","S42.0","S52.0"],"a":0,"e":{"correct":"S72.0は大腿骨頸部骨折。S72は大腿骨骨折で4桁目で部位を特定。高齢者の転倒で頻出。","wrong":{"B":"S82は下腿骨折（脛骨・腓骨）。","C":"S42は肩・上腕骨骨折。","D":"S52は前腕骨折。"},"point":"S72.0＝大腿骨頸部、S72.1＝転子部。高齢者骨折のコーディング頻出。"}},{"q":"交通事故による歩行者の損傷で使用する外因コードの章はどれか。","c":["第XIX章（損傷・中毒）","第XX章（傷病及び死亡の外因）","第XVIII章（症状・徴候）","第XXI章（健康状態に影響を及ぼす要因）"],"a":1,"e":{"correct":"外因コード（V01-Y98）は第XX章「傷病及び死亡の外因」に分類。損傷の原因・状況をコーディングする。","wrong":{"A":"第XIX章は損傷の部位・種類（S・Tコード）。外因ではなく損傷そのもの。","C":"第XVIII章は症状・徴候・異常所見。","D":"第XXI章は保健サービスの利用等。"},"point":"損傷（S/T）＝XIX章＋外因（V-Y）＝XX章。両方コーディングが原則。"}},{"q":"薬物の有害反応（副作用）のコーディングで正しいのはどれか。","c":["外因コードのみをコーディングする","症状のコードと薬物の外因コードの両方をコーディングする","薬物名のみを記録する","コーディング不要"],"a":1,"e":{"correct":"薬物有害反応は症状・病態のコード（S/T章等）と薬物を特定する外因コード（Y40-Y59）の両方をコーディングする。","wrong":{"A":"外因コードのみでは症状・病態が特定できない。","C":"薬物名の記録だけではコーディングにならない。","D":"薬物有害反応もICD-10でコーディングが必要。"},"point":"薬物有害反応＝症状コード＋外因コード（Y40-Y59）。ダブルコーディング。"}},{"q":"複数の病態がある場合の主傷病の選択原則として正しいのはどれか。","c":["最も軽い病態を選択する","入院の主たる理由となった病態を選択する","最も先に診断された病態を選択する","最もコードが若い番号の病態を選択する"],"a":1,"e":{"correct":"主傷病（主要病態）は入院期間を通じて治療の主たる対象となった病態を選択する。WHOの選択ルールに準拠。","wrong":{"A":"最も軽い病態ではなく最も医療資源を投入した病態。","C":"診断順ではなく治療の主対象で判断。","D":"コード番号の大小は選択基準にならない。"},"point":"主傷病＝入院治療の主たる理由。副傷病＝合併症・併存症。"}},{"q":"後遺症（続発症）のコーディングで使用する主なカテゴリはどれか。","c":["Sカテゴリ","Tカテゴリの.9","B90-B94、E64、G09等の後遺症コード","Zカテゴリのみ"],"a":2,"e":{"correct":"後遺症は各疾患に対応する後遺症コードを使用。例：結核の後遺症＝B90、脳血管疾患の後遺症＝I69、損傷の後遺症＝T90-T98。","wrong":{"A":"Sコードは急性期の損傷部位コード。","B":"T.9は詳細不明であり後遺症コードではない。","D":"Zコードは健康状態に影響する因子で後遺症専用ではない。"},"point":"後遺症コード＝B90-B94（感染症）、I69（脳血管）、T90-T98（損傷）等。"}},{"q":"DPCにおける分岐条件に含まれるのはどれか。","c":["患者の職業","手術・処置の有無","患者の血液型","入院時の天候"],"a":1,"e":{"correct":"DPCの分岐条件は手術・処置の有無、副傷病名の有無、年齢、意識障害の有無等。診断群分類を決定する。","wrong":{"A":"患者の職業はDPCの分岐条件ではない。","C":"血液型はDPCの分岐条件に含まれない。","D":"天候は医療とは無関係。"},"point":"DPC分岐＝手術＋処置＋副傷病＋年齢＋意識障害等。14桁の診断群分類番号。"}},{"q":"手術コードの選択において、同一手術野で2以上の手術を行った場合の原則はどれか。","c":["すべての手術の点数を合算する","主たる手術の所定点数のみ算定する","最も低い点数の手術を算定する","手術を行わなかったものとして算定する"],"a":1,"e":{"correct":"同一手術野の2以上の手術は原則として主たる手術（高い方）の所定点数のみ算定。例外として従たる手術の50%加算あり。","wrong":{"A":"原則として合算はしない（一部例外あり）。","C":"低い方ではなく高い方（主たる手術）を算定。","D":"手術自体は実施されているため算定する。"},"point":"同一手術野＝主たる手術のみ。別の手術野＝併施可。例外規定も確認。"}},{"q":"コーディング精度の評価指標として用いられるものはどれか。","c":["患者満足度","コーディング一致率（Coding Accuracy Rate）","在院日数","食事の提供回数"],"a":1,"e":{"correct":"コーディング精度はコーディング一致率で評価する。外部監査等で専門家のコーディングと比較し一致率を算出。","wrong":{"A":"患者満足度はサービスの質指標でありコーディング精度とは異なる。","C":"在院日数は診療効率の指標。","D":"食事の提供回数はコーディングとは無関係。"},"point":"コーディング精度＝一致率で評価。内部・外部監査で定期的に検証。"}},{"q":"連鎖コーディング（ダガー・アスタリスク分類）について正しいのはどれか。","c":["一つの疾患に一つのコードのみ付与する","基礎疾患にダガー（†）コード、臓器障害にアスタリスク（*）コードを付与する","アスタリスクコードは死因統計に使用される","ダガーコードは補助的コードである"],"a":1,"e":{"correct":"連鎖コーディングではダガー（†）が基礎疾患（原因）、アスタリスク（*）が臓器障害（症状発現部位）を示す。","wrong":{"A":"連鎖コーディングは2つのコードを付与する二重分類。","C":"死因統計にはダガーコード（基礎疾患）を使用。アスタリスクは使用しない。","D":"ダガーコードが主分類であり補助的ではない。"},"point":"†＝基礎疾患（主）、*＝臓器障害（副）。例：糖尿病性腎症＝E11.2†＋N08.3*。"}}]},{"id":10,"name":"国際統計分類I（ICD総論・コーディング実践）","questions":[{"q":"ICDの正式名称はどれか。","c":["International Statistical Classification of Diseases and Related Health Problems","International Code of Diseases","International Classification of Diagnosis","International Category of Disease"],"a":0,"e":{"correct":"ICD＝疾病及び関連保健問題の国際統計分類。WHOが作成・管理する国際分類。","wrong":{"B":"Codeではなく正式にはClassification。","C":"DiagnosisではなくDiseases。","D":"CategoryではなくClassification。"},"point":"ICD＝疾病及び関連保健問題の国際統計分類。WHO管理。"}},{"q":"WHO-FIC（国際分類ファミリー）に含まれないのはどれか。","c":["ICD","ICF","ICHI","DPC"],"a":3,"e":{"correct":"WHO-FICにはICD（疾病分類）、ICF（機能分類）、ICHI（介入分類）等が含まれる。DPCは日本独自の制度。","wrong":{"A":"ICDはWHO-FICの中核分類。","B":"ICFは国際生活機能分類で含まれる。","C":"ICHIは国際保健介入分類で含まれる。"},"point":"WHO-FIC＝ICD＋ICF＋ICHI等。DPCは日本独自。"}},{"q":"ICD-10の索引表で使用される「主導語」の説明はどれか。","c":["索引の見出しとなる疾患名や状態を示す語","コード番号そのもの","患者の氏名","医師の署名"],"a":0,"e":{"correct":"主導語（lead term）は索引表で疾患を検索する際の見出し語。主導語の下に修飾語が並ぶ構造。","wrong":{"B":"主導語はコード番号ではなく疾患名。","C":"患者名ではない。","D":"医師の署名ではない。"},"point":"索引表＝主導語→修飾語→コード。主導語から検索を開始する。"}},{"q":"内容例示表の「包含（includes）」の意味はどれか。","c":["そのコードに含まれる用語の例示","そのコードに含まれない用語","コードの略称","医学的に否定された用語"],"a":0,"e":{"correct":"包含（includes）はそのコードに分類される用語・状態の例を示す。除外（excludes）はそのコードに含まれず別のコードに分類される用語。","wrong":{"B":"含まれない用語は「除外（excludes）」。","C":"コードの略称ではない。","D":"否定された用語ではない。"},"point":"包含＝そのコードに含む。除外＝別コードに分類。コーディングの重要ルール。"}},{"q":"主たる病態の選定ルールとして正しいのはどれか。","c":["入院中に最も医療資源を投入した病態を選択する","入院時に最初に疑われた病態を選択する","アルファベット順で最初のコードを選択する","最も軽症の病態を選択する"],"a":0,"e":{"correct":"主たる病態は入院期間を通じて検査・治療に最も医療資源を投入した病態を選択する。入院後の経過で変わることもある。","wrong":{"B":"入院時の疑い病名が最終的な主たる病態とは限らない。","C":"アルファベット順は選択基準ではない。","D":"軽症ではなく最も資源を投入した病態。"},"point":"主たる病態＝最も資源を投入した病態。入院時の診断名と異なる場合もある。"}},{"q":"悪性新生物のコーディングで「原発不明」の場合のコードはどれか。","c":["C80（部位の明示されない悪性新生物）","C34（肺の悪性新生物）","D48（性状不詳の新生物）","Z03（医学的観察）"],"a":0,"e":{"correct":"原発不明の悪性新生物はC80にコーディングする。","wrong":{"B":"C34は原発が肺と判明している場合。","C":"D48は良性・悪性が不明な場合。","D":"Z03は悪性新生物の疑いで経過観察。"},"point":"原発不明＝C80。性状不詳＝D48。疑い＝Z03。区別が重要。"}},{"q":"損傷・中毒のコーディングで必要な追加コードはどれか。","c":["外因コード（V-Y）","感染症コード（A-B）","内分泌コード（E）","精神疾患コード（F）"],"a":0,"e":{"correct":"損傷・中毒（S-T章）をコーディングする際は外因コード（V-Y）を追加して原因を示す。","wrong":{"B":"感染症コードは損傷の追加コードではない。","C":"内分泌コードは損傷とは無関係。","D":"精神疾患コードは損傷の追加コードではない。"},"point":"損傷（S-T）＋外因（V-Y）のセットコーディング。原因と結果の両方を記録。"}},{"q":"産科コーディングで使用されるICD-10の章はどれか。","c":["第XV章（O00-O99）","第I章（A00-B99）","第IX章（I00-I99）","第XIX章（S00-T98）"],"a":0,"e":{"correct":"産科コーディングは第XV章「妊娠、分娩及び産じょく」（O00-O99）を使用。","wrong":{"B":"第I章は感染症。","C":"第IX章は循環器系。","D":"第XIX章は損傷。"},"point":"O章＝産科。O00-O99。Obstetrics（産科）のOと対応。"}},{"q":"死因統計における原死因選択ルールの「一般原則」はどれか。","c":["死亡診断書の最下欄に記載された病態が原死因","最上欄に記載された病態が原死因","最も多く記載された病態が原死因","医師が指定した病態が原死因"],"a":0,"e":{"correct":"一般原則では、死亡診断書のI欄の最下欄に単独で記載された病態が他のすべての病態を引き起こしたと解釈できる場合にそれを原死因とする。","wrong":{"B":"最上欄は直接死因であり原死因ではない。","C":"記載頻度は選択基準ではない。","D":"原死因はルールに基づき選択する。"},"point":"一般原則＝最下欄の病態が原死因。I欄の記載順序が重要。"}},{"q":"ICD-10で「Z」コードが分類するのはどれか。","c":["健康状態に影響を及ぼす要因（健診・予防接種等）","悪性新生物","感染症","循環器系疾患"],"a":0,"e":{"correct":"Zコード（Z00-Z99）は疾病ではないが医療サービスの利用理由となる要因（健診、予防接種、がん既往歴等）を分類。","wrong":{"B":"悪性新生物はC章。","C":"感染症はA-B章。","D":"循環器系はI章。"},"point":"Zコード＝疾病以外の受診理由。健診・予防・既往歴等。第XXI章。"}},{"q":"コーディングの質管理で定期的に行うべきことはどれか。","c":["コーディング監査とフィードバック","コードの暗記テスト","索引表の暗唱","患者への報告"],"a":0,"e":{"correct":"コーディングの質管理では定期的な監査（audit）を行い、エラーパターンの分析と改善のフィードバックを行う。","wrong":{"B":"暗記テストは質管理ではない。","C":"暗唱は質管理の方法ではない。","D":"コーディング結果を患者に報告する制度はない。"},"point":"コーディング質管理＝定期監査＋フィードバック＋改善。PDCAサイクルで実施。"}},{"q":"新生物のコーディングで「良性新生物」のコード範囲はどれか。","c":["D10-D36","C00-C97","D37-D48","Z85"],"a":0,"e":{"correct":"良性新生物はD10-D36に分類。悪性はC00-C97、性状不詳はD37-D48。","wrong":{"B":"C00-C97は悪性新生物。","C":"D37-D48は性状不詳の新生物。","D":"Z85はがんの既往歴。"},"point":"悪性＝C、良性＝D10-D36、性状不詳＝D37-D48。"}},{"q":"コーディングで「NOS（Not Otherwise Specified）」の意味はどれか。","c":["特に明示されないもの（詳細不明）","全く新しい疾患","手術が必要な状態","緊急を要する状態"],"a":0,"e":{"correct":"NOS＝Not Otherwise Specified（特に明示されないもの）。診療録に詳細情報がない場合に使用される修飾語。","wrong":{"B":"新しい疾患の意味ではない。","C":"手術の必要性とは無関係。","D":"緊急性とは無関係。"},"point":"NOS＝詳細不明。NEC＝他に分類されないもの。両者の違いを覚える。"}},{"q":"ICD-10で精神疾患が分類される章はどれか。","c":["第V章（F00-F99）","第I章（A00-B99）","第X章（J00-J99）","第XV章（O00-O99）"],"a":0,"e":{"correct":"精神及び行動の障害は第V章（F00-F99）に分類。F00＝アルツハイマー型認知症、F20＝統合失調症等。","wrong":{"B":"第I章は感染症。","C":"第X章は呼吸器系。","D":"第XV章は産科。"},"point":"F章＝精神疾患。F00-F09＝器質性、F10-F19＝物質使用、F20-F29＝統合失調症等。"}},{"q":"多数回コーディングが必要な場面はどれか。","c":["入院中に複数の傷病について治療を行った場合","1つの傷病のみで入院した場合","外来受診の場合","退院後のフォローアップの場合"],"a":0,"e":{"correct":"入院中に複数の傷病（主傷病＋合併症・併存症）について検査・治療を行った場合は多数回コーディングが必要。","wrong":{"B":"1つの傷病のみなら多数回は不要。","C":"外来でも必要な場合はあるが、入院で特に重要。","D":"退院後フォローアップは入院コーディングとは別。"},"point":"多数回コーディング＝主傷病＋合併症＋併存症。すべて記録して正確な情報を残す。"}},{"q":"ICD-10の索引表（第3巻）で「see also」の意味はどれか。","c":["そのコードを使用せよ","参照先も確認せよ","コーディング不要","索引に記載なし"],"a":1,"e":{"correct":"see also（参照）は索引表で目的のコードが見つからない場合に別の用語も参照するよう指示するもの。","wrong":{"A":"see（見よ）は別の用語を参照する指示。see alsoは追加参照。","C":"コーディングは必要。適切なコードを探すための相互参照。","D":"索引に記載がある場合に使用される表記。"},"point":"索引表の相互参照：see＝別の用語を見よ。see also＝こちらも確認。"}},{"q":"ICD-10でNOS（Not Otherwise Specified）が意味するのはどれか。","c":["他に分類されないもの","特定されないもの（特定不能）","合併症を伴うもの","急性のもの"],"a":1,"e":{"correct":"NOSは「特定されないもの」を意味し、臨床情報が不足して特定の下位分類に分けられない場合に使用する。","wrong":{"A":"他に分類されないものはNEC（Not Elsewhere Classified）。","C":"合併症の有無はNOSとは無関係。","D":"急性・慢性の区別はNOSの意味ではない。"},"point":"NOS＝特定不能（情報不足）。NEC＝他に分類されない（分類上該当なし）。区別が重要。"}},{"q":"ICD-10の内容例示表における「除外」（Excludes）の意味はどれか。","c":["そのカテゴリに含まれることを示す","そのカテゴリには分類されず別の箇所に分類されることを示す","コーディングが不要であることを示す","治療が不要であることを示す"],"a":1,"e":{"correct":"除外（Excludes）はその病態がそのカテゴリではなく別のカテゴリに分類されることを示す。正しい分類先への誘導。","wrong":{"A":"含まれることを示すのは「包含」（Includes）。","C":"コーディング自体は必要で、別の箇所でコーディングする。","D":"治療の必要性とは無関係のコーディング上の概念。"},"point":"包含＝含まれる。除外＝別の箇所に分類。索引表と内容例示表の確認が必要。"}},{"q":"ICD-10の二重分類（ダガー・アスタリスク）の例として正しいのはどれか。","c":["高血圧と頭痛","結核性髄膜炎（A17.0†・G01*）","骨折と打撲","糖尿病の1型と2型"],"a":1,"e":{"correct":"結核性髄膜炎はダガー（A17.0†：結核が原因）とアスタリスク（G01*：髄膜炎が臓器障害）の二重分類の典型例。","wrong":{"A":"高血圧と頭痛は二重分類の関係ではない。","C":"骨折と打撲は別々の損傷であり二重分類の対象ではない。","D":"1型と2型は糖尿病の病型分類であり二重分類ではない。"},"point":"二重分類の例：結核性髄膜炎（A17.0†＋G01*）、糖尿病性腎症（E11.2†＋N08.3*）。"}},{"q":"ICD-10の形態コード（Morphology code）の構成として正しいのはどれか。","c":["M＋4桁の数字","M＋4桁の数字＋/＋1桁の性状コード","C＋3桁の数字","D＋4桁の数字"],"a":1,"e":{"correct":"形態コードはM＋4桁の組織型コード＋/＋1桁の性状コード（/0良性、/1不明、/2上皮内、/3悪性原発、/6悪性転移）で構成。","wrong":{"A":"4桁だけでなく/と性状コード1桁が必要。","C":"Cコードは悪性新生物の部位コード（ICD-10本体）。","D":"Dコードは良性腫瘍等の部位コード。"},"point":"形態コード＝M0000/0。/3＝悪性原発、/6＝悪性転移、/0＝良性。"}},{"q":"産科コーディングで正常単胎分娩のICD-10コードはどれか。","c":["O80","O82","Z37","Z38"],"a":0,"e":{"correct":"O80は正常単胎分娩（自然経膣分娩）。産科の合併症がない正常分娩に使用する。","wrong":{"B":"O82は帝王切開による単胎分娩。","C":"Z37は出産の結果を示すコード（単胎出生等）。","D":"Z38は出生時の場所による新生児の分類。"},"point":"O80＝正常分娩、O82＝帝王切開。産科コードはO00-O99（第XV章）。"}},{"q":"ICD-10の外因分類でY40-Y59に該当するのはどれか。","c":["交通事故","転倒・転落","治療上の使用における薬物の有害作用","自傷行為"],"a":2,"e":{"correct":"Y40-Y59は治療上の使用における薬物・薬剤・生物学的製剤の有害作用のコード。正しい用量での副作用を分類。","wrong":{"A":"交通事故はV01-V99。","B":"転倒・転落はW00-W19。","D":"自傷行為はX71-X83。"},"point":"V＝交通事故、W＝転倒等、X＝自傷・暴行等、Y40-59＝薬物有害作用。"}},{"q":"死因統計における原死因の選択で「一般原則」とは何か。","c":["死亡診断書の最下欄に記載された病態を原死因とする","死亡診断書のI欄最下行の病態が最上行の原因となっている場合にそれを原死因とする","最も重い病態を原死因とする","最後に発症した病態を原死因とする"],"a":1,"e":{"correct":"一般原則はI欄最下行に記載された病態が、その上に記載された病態の原因として因果関係が成立する場合に最下行を原死因とする。","wrong":{"A":"最下欄ではなく、因果関係が成立するI欄最下行。","C":"重症度ではなく因果関係に基づいて選択。","D":"発症時期ではなく因果の連鎖の起点を選択。"},"point":"一般原則＝I欄最下行の因果関係成立→原死因。不成立なら選択ルール1・2を適用。"}},{"q":"死因統計の修正ルールの目的として正しいのはどれか。","c":["死因の分類をより詳細にすること","原死因として不適切な病態を修正しより有用な統計を得ること","死亡数を減少させること","死亡診断書の記載を医師に修正させること"],"a":1,"e":{"correct":"修正ルール（ルールA〜F）は原死因として選択された病態が統計的に不適切な場合に、より情報量の多い病態に修正する。","wrong":{"A":"詳細化だけでなく、統計的に有用な原死因を選択するための修正。","C":"死亡数自体は変わらない。分類される死因が変わる。","D":"死亡診断書の記載修正ではなく統計処理上の修正。"},"point":"修正ルール＝原死因の統計的有用性を高める。ルールA-Fで段階的に適用。"}},{"q":"ICD-10で複数原因統計の目的として正しいのはどれか。","c":["コーディングの手間を省くこと","死亡に関与したすべての病態を分析すること","原死因のみを集計すること","人口統計を作成すること"],"a":1,"e":{"correct":"複数原因統計は死亡診断書に記載されたすべての病態を分析対象とし、原死因統計では見えない疾病間の関連を明らかにする。","wrong":{"A":"むしろコーディング量は増える。","C":"原死因のみの集計は従来の単一原因統計。","D":"人口統計は国勢調査等による。"},"point":"複数原因統計＝死亡診断書の全病態を分析。原死因統計の補完的役割。"}},{"q":"ICD-10の索引表で「−」（ダッシュ）が4桁目に付いている場合の意味はどれか。","c":["コーディング不要","4桁目の細分類が存在するため内容例示表で確認する必要がある","そのカテゴリは廃止された","3桁コードで十分である"],"a":1,"e":{"correct":"索引表の4桁目のダッシュ（−）は4桁の細分類が存在することを示し、内容例示表で適切な4桁目を確認する必要がある。","wrong":{"A":"コーディングは必要。4桁目を確認して付与する。","C":"廃止を意味するものではない。","D":"4桁目が必要なことを示しており3桁では不十分。"},"point":"ダッシュ＝4桁目あり。必ず内容例示表で確認。索引表だけでコーディング完了しない。"}},{"q":"ICD-10の包含注記（Includes note）の機能として正しいのはどれか。","c":["そのカテゴリに分類される具体例を示す","そのカテゴリから除外される病態を示す","4桁目の分類を示す","治療法を示す"],"a":0,"e":{"correct":"包含注記はそのカテゴリに含まれる病態の具体例・類義語を示し、正しいコーディングの判断を助ける。","wrong":{"B":"除外される病態を示すのはExcludes（除外注記）。","C":"4桁目の分類は内容例示表の細分類で示される。","D":"ICD-10は分類であり治療法の記載はない。"},"point":"Includes＝含まれる例示。Excludes＝除外。両方確認してコーディング。"}}]},{"id":11,"name":"国際統計分類II（DPC・がん登録）","questions":[{"q":"DPC制度の目的として正しいのはどれか。","c":["急性期入院医療の適正化と透明性の向上","外来診療の効率化","予防医療の推進","在宅医療の拡充"],"a":0,"e":{"correct":"DPC制度は急性期入院医療の包括的評価を通じて、医療の透明性向上と効率化を目的とする。","wrong":{"B":"外来診療は出来高払いでありDPCの対象外。","C":"予防医療はDPCの直接的な目的ではない。","D":"在宅医療はDPCの対象外。"},"point":"DPC＝急性期入院医療の包括評価。透明性と効率化が目的。"}},{"q":"MDCの構成について正しいのはどれか。","c":["臓器系統別に18カテゴリで構成","疾患の重症度別に5段階で構成","年齢別に10区分で構成","治療法別に20区分で構成"],"a":0,"e":{"correct":"MDC（Major Diagnostic Category）は臓器系統別に18カテゴリで構成。神経系、眼科系、耳鼻科系、呼吸器系等。","wrong":{"B":"重症度別ではなく臓器系統別。","C":"年齢別ではない。","D":"治療法別ではない。"},"point":"MDC＝18カテゴリ。臓器系統別分類。"}},{"q":"DPCコード14桁の構成要素に含まれないのはどれか。","c":["MDC（主要診断群）","傷病名コード","手術・処置分岐","患者の年収"],"a":3,"e":{"correct":"DPCコード14桁＝MDC（2桁）＋傷病名（4桁）＋手術等（6桁）＋副傷病等（2桁）。年収は含まれない。","wrong":{"A":"MDCは14桁の最初の2桁。","B":"傷病名コードは含まれる。","C":"手術・処置による分岐は含まれる。"},"point":"DPC14桁＝MDC＋傷病名＋手術分岐＋副傷病等。患者属性（年収等）は含まない。"}},{"q":"機能評価係数IIに含まれる係数はどれか。","c":["効率性係数","基礎係数","暫定調整係数","入院基本料係数"],"a":0,"e":{"correct":"機能評価係数IIには効率性係数、複雑性係数、カバー率係数、救急医療係数、地域医療係数、保険診療係数が含まれる。","wrong":{"B":"基礎係数は機能評価係数IIではなく別の係数。","C":"暫定調整係数は廃止された。","D":"入院基本料係数は機能評価係数IIではない。"},"point":"機能評価係数II＝効率性・複雑性・カバー率・救急・地域・保険診療の6項目。"}},{"q":"DPC調査で提出するファイルに含まれるのはどれか。","c":["様式1・EFファイル・Dファイル","確定申告書","人事評価書","建築図面"],"a":0,"e":{"correct":"DPC調査では様式1（臨床情報）、EFファイル（出来高情報）、Dファイル（包括情報）等を提出。","wrong":{"B":"確定申告書はDPC調査と無関係。","C":"人事評価書は無関係。","D":"建築図面は無関係。"},"point":"DPC調査＝様式1＋EFファイル＋Dファイル。診療情報管理士が作成に関与。"}},{"q":"院内がん登録の目的として正しいのはどれか。","c":["自施設のがん診療の実態把握と質の向上","がん患者の個人情報を公開すること","がんの発生を防止すること","がん治療費を無料にすること"],"a":0,"e":{"correct":"院内がん登録は自施設で診断・治療されたがんの情報を登録し、がん診療の実態把握、質の評価・向上に活用する。","wrong":{"B":"個人情報の公開は目的ではない。","C":"発生防止は一次予防であり登録の直接目的ではない。","D":"治療費無料化は目的ではない。"},"point":"院内がん登録＝自施設のがん診療の実態把握＋質向上。全国がん登録とは異なる。"}},{"q":"全国がん登録の開始年はどれか。","c":["2016年","2000年","2010年","2020年"],"a":0,"e":{"correct":"全国がん登録はがん登録推進法に基づき2016年1月から開始。すべての病院に届出義務。","wrong":{"B":"2000年は介護保険開始年。","C":"2010年ではない。","D":"2020年ではない。"},"point":"全国がん登録＝2016年開始。全病院に届出義務。"}},{"q":"TNM分類でT3N1M0のステージとして最も考えられるのはどれか。","c":["Stage III","Stage I","Stage IV","Stage 0"],"a":0,"e":{"correct":"T3（原発腫瘍がある程度の大きさ）N1（所属リンパ節転移あり）M0（遠隔転移なし）はStage IIIに分類されることが多い。","wrong":{"B":"Stage Iは早期でリンパ節転移なしが典型。","C":"Stage IVは遠隔転移（M1）がある場合。","D":"Stage 0は上皮内癌（Tis）。"},"point":"M1＝Stage IV。N+M0＝通常Stage II〜III。臓器により異なるが大まかな目安。"}},{"q":"5年生存率の算出に用いられる統計手法はどれか。","c":["Kaplan-Meier法","カイ二乗検定","t検定","回帰分析"],"a":0,"e":{"correct":"がんの5年生存率はKaplan-Meier法（打ち切りデータを含む生存分析）で算出される。","wrong":{"B":"カイ二乗検定はカテゴリデータの検定。","C":"t検定は平均値の比較。","D":"回帰分析は予測モデル。"},"point":"5年生存率＝Kaplan-Meier法で算出。打ち切りデータへの対応が重要。"}},{"q":"がん登録の精度指標であるDCO率の説明はどれか。","c":["死亡票のみで把握されたがん症例の割合","がんの治癒率","手術の成功率","5年生存率"],"a":0,"e":{"correct":"DCO率（Death Certificate Only）は死亡票のみで把握され生前の届出がなかったがん症例の割合。低いほど登録精度が高い。","wrong":{"B":"治癒率ではない。","C":"手術成功率ではない。","D":"5年生存率ではない。"},"point":"DCO率＝死亡票のみの症例割合。低いほど精度良好。がん登録の質指標。"}},{"q":"DPC対象病院の要件として正しいのはどれか。","c":["急性期一般入院基本料を算定し一定のデータ提出要件を満たす病院","すべての病院が対象","200床以上のみが対象","特定機能病院のみが対象"],"a":0,"e":{"correct":"DPC対象病院は急性期一般入院基本料を算定し、データ提出要件（適切なコーディング体制等）を満たす病院。","wrong":{"B":"すべての病院ではなく要件を満たした病院。","C":"200床以上に限定されない。","D":"特定機能病院以外もDPC対象。"},"point":"DPC対象病院＝急性期入院料算定＋データ提出要件。規模は問わない。"}},{"q":"がんの臨床病期分類で最も進行した段階はどれか。","c":["Stage IV","Stage I","Stage II","Stage 0"],"a":0,"e":{"correct":"Stage IVは遠隔転移がある最も進行した病期。Stage 0は上皮内癌で最も早期。","wrong":{"B":"Stage Iは早期段階。","C":"Stage IIは中程度の進行。","D":"Stage 0は上皮内で最も早期。"},"point":"Stage 0（上皮内）→I→II→III→IV（遠隔転移）。数字が大きいほど進行。"}},{"q":"標準登録様式の届出項目に含まれるのはどれか。","c":["がんの部位・組織型・進行度・治療内容","患者の年収","患者の学歴","保険の種類のみ"],"a":0,"e":{"correct":"標準登録様式にはがんの部位、組織型（病理診断）、進行度（TNM/Stage）、治療内容等が含まれる。","wrong":{"B":"年収は登録項目ではない。","C":"学歴は登録項目ではない。","D":"保険種類のみでは不十分。"},"point":"がん登録届出＝部位＋組織型＋進行度＋治療。臨床情報が中心。"}},{"q":"MI比（Mortality/Incidence比）の説明として正しいのはどれか。","c":["がん死亡数÷がん罹患数で登録の精度や予後を反映する指標","入院死亡率","手術死亡率","在院日数の比"],"a":0,"e":{"correct":"MI比＝がん死亡数÷がん罹患数。がん登録の精度指標の一つであり、予後不良ながんや登録精度の問題を反映する。","wrong":{"B":"入院死亡率とは異なる。","C":"手術死亡率ではない。","D":"在院日数の比ではない。"},"point":"MI比＝死亡÷罹患。1に近いほど予後不良。登録精度指標としても使用。"}},{"q":"がん登録実務者の役割として正しいのはどれか。","c":["がん症例の情報収集・登録・精度管理を行う","がんの治療を直接行う","がん患者のカウンセリングのみを行う","がんの画像診断を読影する"],"a":0,"e":{"correct":"がん登録実務者は診療録等からがん症例の情報を収集し、正確に登録・コーディングし、精度管理を行う専門職。","wrong":{"B":"治療は医師の業務。","C":"カウンセリングのみではない。","D":"読影は放射線科医の業務。"},"point":"がん登録実務者＝情報収集＋登録＋コーディング＋精度管理。診療情報管理士が担うことも多い。"}},{"q":"DPCにおける包括評価と出来高評価の併用について正しいのはどれか。","c":["入院基本料等は包括、手術料等は出来高で算定","すべて包括で算定","すべて出来高で算定","包括と出来高の選択は患者が行う"],"a":0,"e":{"correct":"DPCでは入院基本料・検査・投薬等は包括評価、手術・麻酔・リハビリ等は出来高評価の併用方式。","wrong":{"B":"すべて包括ではなく出来高部分がある。","C":"すべて出来高ではなく包括部分がある。","D":"患者の選択ではなく制度として決まっている。"},"point":"DPC＝包括（入院料・検査・投薬）＋出来高（手術・麻酔・リハビリ）。"}},{"q":"地域がん登録の説明として正しいのはどれか。","c":["都道府県単位でがんの罹患・死亡を把握する登録制度","市区町村単位の登録","病院単位の登録","国レベルのみの登録"],"a":0,"e":{"correct":"地域がん登録は都道府県単位でがんの罹患・死亡データを収集する制度。2016年の全国がん登録開始後も一部運用。","wrong":{"B":"市区町村単位ではなく都道府県単位。","C":"病院単位は院内がん登録。","D":"国レベルは全国がん登録。"},"point":"院内がん登録＝病院単位。地域がん登録＝都道府県単位。全国がん登録＝国単位。"}},{"q":"がんの治療分類に含まれないのはどれか。","c":["手術","化学療法","放射線療法","交通事故防止"],"a":3,"e":{"correct":"がんの3大治療＝手術・化学療法（薬物療法）・放射線療法。交通事故防止はがん治療ではない。","wrong":{"A":"手術はがん治療の主要方法。","B":"化学療法は薬物でがんを治療。","C":"放射線療法はがん治療の一つ。"},"point":"がん3大治療＝手術・化学療法・放射線療法。免疫療法が第4の治療として注目。"}},{"q":"DPC/PDPSの包括評価における1日当たりの点数の特徴はどれか。","c":["入院期間を通じて一定である","入院期間が長くなるほど1日当たり点数が段階的に逓減する","入院期間が長くなるほど1日当たり点数が増加する","退院日にのみ点数が発生する"],"a":1,"e":{"correct":"DPC/PDPSでは入院期間I・II・IIIの3段階で1日当たり点数が逓減する設計。早期退院にインセンティブを与える。","wrong":{"A":"一定ではなく3段階で逓減する。","C":"増加ではなく逓減。長期入院にはディスインセンティブ。","D":"退院日のみではなく入院期間全体に点数が発生。"},"point":"DPC点数＝入院期間I（高い）→II（中間）→III（低い）。逓減制で在院日数短縮を促進。"}},{"q":"DPC/PDPSで出来高算定となる項目はどれか。","c":["入院基本料","投薬","注射","手術"],"a":3,"e":{"correct":"手術・麻酔・放射線治療・リハビリ等は包括範囲外であり出来高で算定する。","wrong":{"A":"入院基本料は包括範囲に含まれる。","B":"投薬は包括範囲に含まれる。","C":"注射は包括範囲に含まれる。"},"point":"包括＝入院料・検査・投薬・注射・画像。出来高＝手術・麻酔・放射線・リハビリ。"}},{"q":"DPC/PDPSの包括範囲に含まれる項目の組み合わせとして正しいのはどれか。","c":["入院基本料・検査・投薬・注射・画像診断","手術・麻酔・放射線治療","リハビリテーション・指導管理料","精神科専門療法・内視鏡手術"],"a":0,"e":{"correct":"DPCの包括範囲は入院基本料、検査、投薬、注射、1,000点未満の処置、画像診断が含まれる。","wrong":{"B":"手術・麻酔は出来高算定。","C":"リハビリは出来高算定。","D":"精神科専門療法・手術は出来高算定。"},"point":"包括5項目＝入院料＋検査＋投薬＋注射＋画像。処置は1,000点で包括/出来高が分かれる。"}},{"q":"DPCにおいて副傷病名の有無が影響するのはどれか。","c":["外来の医療費","診断群分類番号の決定","患者の自己負担割合","保険証の種類"],"a":1,"e":{"correct":"副傷病名（合併症・併存症）の有無はDPCの分岐条件の一つであり、診断群分類番号（14桁）の決定に影響する。","wrong":{"A":"DPCは入院の制度であり外来には適用されない。","C":"自己負担割合は保険制度により決定されDPCとは無関係。","D":"保険証の種類はDPC分岐に影響しない。"},"point":"副傷病名あり→高い点数の分岐に入る場合がある。コーディングの正確性が重要。"}},{"q":"DPCで同一疾患での再入院ルール（3日以内）について正しいのはどれか。","c":["3日以内の再入院は新規入院として扱う","3日以内の再入院は前回入院の継続として一連の入院とみなす","再入院のルールは存在しない","7日以内に統一されている"],"a":1,"e":{"correct":"DPCでは退院後3日以内に同一傷病で再入院した場合、一連の入院として前回入院の継続とみなす。","wrong":{"A":"3日以内は新規ではなく継続扱い。","C":"再入院ルールはDPCの重要ルール。","D":"3日と7日の2つのルールがある。7日は同一MDCでの再入院。"},"point":"DPC再入院：3日以内（同一傷病）→一連。7日以内（同一MDC）→再入院の検証対象。"}},{"q":"DPCの特定入院期間を超えた場合の算定方法はどれか。","c":["包括評価のまま点数が上がる","退院させなければならない","出来高算定に切り替わる","算定できない"],"a":2,"e":{"correct":"特定入院期間（入院期間III）を超えた場合は包括評価から出来高算定に切り替わる。","wrong":{"A":"特定入院期間超過後は包括評価ではなくなる。","B":"退院の義務はない。算定方法が変わるだけ。","D":"出来高で算定可能。"},"point":"入院期間III超過→出来高算定。DPCの包括期間には上限がある。"}},{"q":"がん登録において登録対象となるのはどれか。","c":["転移性腫瘍のみ","原発性悪性新生物","良性腫瘍のみ","すべての疾患"],"a":1,"e":{"correct":"全国がん登録の登録対象は原発性の悪性新生物（上皮内がんを含む）。転移性腫瘍は原発巣として登録。","wrong":{"A":"転移性のみではなく原発性が登録対象。転移は原発巣で登録。","C":"良性腫瘍は全国がん登録の対象外（院内がん登録では一部含む）。","D":"すべての疾患ではなく悪性新生物が対象。"},"point":"がん登録＝原発性悪性新生物が対象。転移先ではなく原発巣の情報で登録。"}},{"q":"UICC TNM分類のTが意味するのはどれか。","c":["腫瘍の大きさ・進展度","所属リンパ節転移の有無・程度","遠隔転移の有無","腫瘍の組織型"],"a":0,"e":{"correct":"T（Tumor）は原発腫瘍の大きさ・進展度を示す。T1-T4で段階的に評価。","wrong":{"B":"リンパ節転移はN（Node）で評価。","C":"遠隔転移はM（Metastasis）で評価。","D":"組織型は形態コードで分類。TNMには含まれない。"},"point":"T＝原発腫瘍、N＝リンパ節、M＝遠隔転移。TNMの組み合わせでステージ決定。"}},{"q":"臨床病期（cTNM）と病理病期（pTNM）の違いについて正しいのはどれか。","c":["cTNMは手術所見に基づく","pTNMは治療前の画像検査に基づく","cTNMは治療前の臨床所見、pTNMは手術標本の病理所見に基づく","両者に違いはない"],"a":2,"e":{"correct":"cTNM（臨床病期）は治療前の画像・身体所見等に基づく。pTNM（病理病期）は手術で摘出した標本の病理組織学的所見に基づく。","wrong":{"A":"手術所見に基づくのはpTNM。","B":"画像検査に基づくのはcTNM。","D":"臨床と病理で異なる評価法であり区別される。"},"point":"c＝clinical（臨床）、p＝pathological（病理）。病理病期のほうが正確。"}},{"q":"がん登録の精度指標であるDCO（Death Certificate Only）率とは何か。","c":["死亡診断書のみで登録された症例の割合","診断確定率","登録完全性の指標","手術実施率"],"a":0,"e":{"correct":"DCO率は死亡票のみの情報で登録され、医療機関からの届出がなかった症例の割合。低いほど登録精度が高い。","wrong":{"B":"診断確定率はMV（Morphological Verification）率。","C":"登録完全性はM/I比（罹患/死亡比）等で評価。","D":"手術実施率はがん登録の精度指標ではない。"},"point":"DCO率＝低いほど良い。DCN率＝死亡票からの追跡で情報が得られた割合。"}},{"q":"多重がんの判定基準として正しいのはどれか。","c":["同一臓器に発生した同じ組織型のがんは常に多重がんとする","異なる臓器に発生したがんは原則として多重がんとする","時期が異なれば同じ部位でも多重がんとする","多重がんの判定基準は存在しない"],"a":1,"e":{"correct":"多重がんは原則として異なる臓器に独立して発生した原発性がん。IARC/IACRの判定ルールに基づく。同一臓器は組織型で判断。","wrong":{"A":"同一臓器の同じ組織型は原則として1つのがんとして登録。","C":"時期だけでなく部位と組織型の組み合わせで判定。","D":"IARC/IACRの国際的な判定ルールが存在する。"},"point":"多重がん判定＝IARC/IACRルール。部位×組織型で独立性を判断。"}},{"q":"がんの治療効果判定基準（RECIST）で「PR（部分奏効）」の定義はどれか。","c":["腫瘍が完全に消失","標的病変の最大径の和が30%以上縮小","標的病変の最大径の和が20%以上増大","腫瘍の大きさに変化なし"],"a":1,"e":{"correct":"RECISTでPR（Partial Response）は標的病変の径和がベースラインから30%以上縮小した場合。","wrong":{"A":"完全消失はCR（Complete Response）。","C":"20%以上増大はPD（Progressive Disease）。","D":"変化なしはSD（Stable Disease）。"},"point":"RECIST：CR＝完全消失、PR＝30%以上縮小、SD＝変化なし、PD＝20%以上増大。"}},{"q":"Kaplan-Meier法について正しいのはどれか。","c":["平均値を計算する方法","打ち切りデータを考慮して生存率を推定する方法","多変量解析の方法","正規分布を仮定する方法"],"a":1,"e":{"correct":"Kaplan-Meier法は生存分析の手法で、打ち切り（追跡不能・観察期間終了）データを含めて生存率を推定する。","wrong":{"A":"平均値計算ではなく生存率推定の方法。","C":"多変量解析はCox回帰等。KM法は単変量の記述的方法。","D":"正規分布の仮定は不要。ノンパラメトリック法。"},"point":"KM法＝生存曲線の推定。打ち切りを考慮。ログランク検定で群間比較。"}},{"q":"日本の5大がん（がん検診対象）に含まれないのはどれか。","c":["胃がん","肺がん","膵がん","大腸がん"],"a":2,"e":{"correct":"5大がん（がん検診対象）は胃がん・肺がん・大腸がん・乳がん・子宮頸がん。膵がんは含まれない。","wrong":{"A":"胃がんは5大がんの一つ。バリウム検査・胃内視鏡で検診。","B":"肺がんは5大がんの一つ。胸部X線・喀痰細胞診で検診。","D":"大腸がんは5大がんの一つ。便潜血検査で検診。"},"point":"5大がん検診＝胃・肺・大腸・乳・子宮頸。対策型検診として市区町村が実施。"}}]},{"id":12,"name":"医療情報学（医療情報システム）","questions":[{"q":"電子カルテシステムの略称として正しいのはどれか。","c":["EMR（Electronic Medical Record）","EBM（Evidence-Based Medicine）","DPC（Diagnosis Procedure Combination）","ICD（International Classification of Diseases）"],"a":0,"e":{"correct":"EMR＝Electronic Medical Record（電子カルテ）。施設内の診療録を電子化。EHRは施設間で共有可能な電子健康記録。","wrong":{"B":"EBMは根拠に基づく医療。","C":"DPCは診断群分類。","D":"ICDは国際疾病分類。"},"point":"EMR＝施設内電子カルテ。EHR＝施設間で共有できる電子健康記録。"}},{"q":"PACSの説明として正しいのはどれか。","c":["医用画像管理システム","患者アクセス管理システム","薬剤処方管理システム","人事管理システム"],"a":0,"e":{"correct":"PACS（Picture Archiving and Communication System）は医用画像（CT・MRI等）のデジタル保存・表示・通信を行うシステム。","wrong":{"B":"患者アクセス管理ではない。","C":"処方管理はオーダリングシステム。","D":"人事管理は医療情報システムではない。"},"point":"PACS＝医用画像管理。フィルムレス化を実現。DICOMが通信規格。"}},{"q":"DICOMの説明として正しいのはどれか。","c":["医用画像の通信規格","診療報酬の計算規格","電子カルテの入力規格","薬剤の分類規格"],"a":0,"e":{"correct":"DICOM（Digital Imaging and Communications in Medicine）は医用画像の保存・通信に関する国際標準規格。PACSの基盤技術。","wrong":{"B":"診療報酬の計算規格ではない。","C":"電子カルテの入力規格ではない。","D":"薬剤分類ではない。"},"point":"DICOM＝医用画像通信規格。PACSとセットで覚える。"}},{"q":"情報セキュリティの3要素はどれか。","c":["機密性・完全性・可用性","真正性・見読性・保存性","安全性・効率性・正確性","速度・容量・信頼性"],"a":0,"e":{"correct":"情報セキュリティの3要素（CIA）＝機密性（Confidentiality）、完全性（Integrity）、可用性（Availability）。","wrong":{"B":"真正性・見読性・保存性は電子保存の3基準。","C":"安全性等はCIAではない。","D":"速度等はシステム性能指標。"},"point":"CIA＝機密性・完全性・可用性。電子保存3基準（真正性・見読性・保存性）との混同に注意。"}},{"q":"オーダリングシステムの説明として正しいのはどれか。","c":["医師が検査・処方等の指示をコンピュータで行うシステム","患者が自分で検査を予約するシステム","会計処理のみを行うシステム","医師の勤務管理を行うシステム"],"a":0,"e":{"correct":"オーダリングシステムは医師がコンピュータ上で検査・処方・注射等のオーダー（指示）を入力し、各部門に伝達するシステム。","wrong":{"B":"患者の自己予約ではない。","C":"会計は医事会計システム。","D":"勤務管理は人事システム。"},"point":"オーダリングシステム＝医師の指示入力→各部門への伝達。電子カルテの前段階。"}},{"q":"BCP（事業継続計画）の医療機関における意義はどれか。","c":["災害時でも医療サービスを継続するための計画","新規事業を開始する計画","病院を建て替える計画","保険料を値上げする計画"],"a":0,"e":{"correct":"BCP（Business Continuity Plan）は災害・システム障害等の緊急事態発生時にも重要な医療サービスを継続するための計画。","wrong":{"B":"新規事業計画ではない。","C":"建替計画ではない。","D":"保険料とは無関係。"},"point":"BCP＝災害時の業務継続計画。医療情報システムのバックアップも含む。"}},{"q":"VPNの説明として正しいのはどれか。","c":["インターネット上に仮想的な専用回線を構築する技術","病院内の院内LANのこと","患者情報をインターネットに公開する技術","医療画像を圧縮する技術"],"a":0,"e":{"correct":"VPN（Virtual Private Network）はインターネット上に暗号化された仮想的な専用回線を構築し、安全な通信を実現する技術。地域医療連携等に活用。","wrong":{"B":"院内LANとVPNは異なる。","C":"患者情報の公開技術ではない。","D":"画像圧縮とは異なる。"},"point":"VPN＝仮想専用回線。暗号化通信で安全にデータ交換。"}},{"q":"PHR（Personal Health Record）の説明として正しいのはどれか。","c":["個人が自身の健康情報を管理・活用する仕組み","病院が管理する診療録のこと","保険者が管理する医療費記録","製薬会社の臨床試験データ"],"a":0,"e":{"correct":"PHRは個人が自分の健康・医療情報（検診結果、服薬情報等）を自ら管理し活用する仕組み。マイナポータル等で推進。","wrong":{"B":"病院の診療録はEMR/EHR。","C":"保険者の記録はレセプトデータ。","D":"臨床試験データとは異なる。"},"point":"PHR＝個人が自ら管理する健康記録。EMR（施設管理）と対比。"}},{"q":"アクセス制御の方式で「ロールベースアクセス制御」の説明はどれか。","c":["職務上の役割に基づいてアクセス権限を設定する方式","患者の希望に基づくアクセス制御","時間帯によるアクセス制御のみ","パスワードなしでアクセスする方式"],"a":0,"e":{"correct":"RBAC（Role-Based Access Control）は医師・看護師・事務等の職務上の役割に応じてシステムへのアクセス権限を設定する方式。","wrong":{"B":"患者の希望ではなく職務上の役割に基づく。","C":"時間帯制御はRBACの主要概念ではない。","D":"パスワードなしではなく認証は必要。"},"point":"RBAC＝役割ベースのアクセス制御。職種ごとに閲覧・編集権限を設定。"}},{"q":"遠隔医療（オンライン診療）について正しいのはどれか。","c":["情報通信技術を用いて離れた場所から診療を行うこと","対面診療の完全な代替として常に利用可能","すべての疾患で初診からオンラインが可能","保険適用の対象外である"],"a":0,"e":{"correct":"遠隔医療はICTを用いて医師と患者が離れた場所で診療を行う方法。オンライン診療として保険適用あり。","wrong":{"B":"対面診療の完全代替ではなく、適切な場合に利用。","C":"初診は原則対面だが2020年以降一部緩和。","D":"2018年の診療報酬改定でオンライン診療料が新設され保険適用。"},"point":"オンライン診療＝2018年から保険適用。COVID-19で初診からの利用も一時的に緩和。"}},{"q":"IoTの医療応用として正しいのはどれか。","c":["ウェアラブルデバイスで患者のバイタルサインを常時モニタリング","紙のカルテを保管すること","院内の掃除を自動化すること","手書きの処方箋を作成すること"],"a":0,"e":{"correct":"IoT（Internet of Things）の医療応用では、ウェアラブルデバイスでバイタルサインを常時モニタリングし遠隔でデータを収集・分析する。","wrong":{"B":"紙カルテの保管はIoTではない。","C":"掃除の自動化はロボティクスでありIoTの主要応用ではない。","D":"手書き処方箋はデジタル化以前の方法。"},"point":"IoT医療＝ウェアラブルデバイス、遠隔モニタリング、スマートベッド等。"}},{"q":"次世代医療基盤法の目的として正しいのはどれか。","c":["医療ビッグデータを匿名加工して研究・産業に活用","患者情報を無制限に公開","医療機関の統廃合を推進","医師の給与を規定"],"a":0,"e":{"correct":"次世代医療基盤法（2018年施行）は医療情報を匿名加工して、研究開発や産業利用に活用することを目的とする。認定匿名加工医療情報作成事業者が処理。","wrong":{"B":"無制限公開ではなく匿名加工して活用。","C":"統廃合の推進法ではない。","D":"給与規定ではない。"},"point":"次世代医療基盤法＝医療ビッグデータの匿名加工＋研究活用。2018年施行。"}},{"q":"マイナンバーカードの健康保険証利用について正しいのはどれか。","c":["マイナンバーカードを健康保険証として利用できるオンライン資格確認制度","マイナンバーカードで治療内容を自分で入力する制度","マイナンバーカードが処方箋の代わりになる制度","マイナンバーカードで手術を予約する制度"],"a":0,"e":{"correct":"2021年からマイナンバーカードの健康保険証利用が開始。オンライン資格確認システムで保険資格をリアルタイムに確認。","wrong":{"B":"治療内容を自分で入力する制度ではない。","C":"処方箋の代わりにはならない。","D":"手術予約とは無関係。"},"point":"マイナ保険証＝オンライン資格確認。2021年開始。2024年12月から原則義務化。"}},{"q":"クラウドコンピューティングの医療分野での利点はどれか。","c":["初期投資の軽減とスケーラビリティの向上","通信速度の低下","データの安全性の低下","利用コストの永久無料化"],"a":0,"e":{"correct":"クラウドは初期投資の軽減、柔軟なスケーラビリティ、災害時のデータ保全等の利点がある。3省2ガイドラインに基づくセキュリティ確保が必要。","wrong":{"B":"通信速度は低下しない。","C":"適切な対策で安全性は確保可能。","D":"永久無料ではなく従量課金等。"},"point":"医療クラウド＝初期投資軽減＋スケーラビリティ。セキュリティガイドライン遵守が必須。"}},{"q":"SS-MIX2の目的として正しいのはどれか。","c":["異なるベンダーのシステム間で医療情報を標準的に交換すること","特定のベンダーのみで利用するシステム","患者の自己管理ツール","保険請求の自動化ツール"],"a":0,"e":{"correct":"SS-MIX2は異なるベンダーの医療情報システム間でデータを標準的な形式で蓄積・交換するための仕組み。地域医療連携を促進。","wrong":{"B":"特定ベンダーに限定せず標準化が目的。","C":"患者の自己管理ツールではない。","D":"保険請求の自動化ではない。"},"point":"SS-MIX2＝ベンダー非依存の標準化ストレージ。地域医療連携の基盤技術。"}},{"q":"AIの医療応用として正しいのはどれか。","c":["画像診断支援（内視鏡・CT等の読影補助）","すべての診療をAIが代替すること","患者の同意なくAIが治療方針を決定すること","AIの判断は常に医師より正確であること"],"a":0,"e":{"correct":"AIの医療応用は画像診断支援（内視鏡画像の病変検出、CT/MRIの読影補助）等で実用化が進んでいる。","wrong":{"B":"AIはすべての診療を代替するものではなく支援ツール。","C":"最終判断は医師が行い患者の同意も必要。","D":"AIの判断が常に正確とは限らない。"},"point":"AI医療＝画像診断支援が先行。最終判断は医師。支援ツールとしての位置づけ。"}},{"q":"地域医療連携システムの基盤技術はどれか。","c":["EHRとSS-MIX2","紙の紹介状のみ","FAXでの情報伝達のみ","院内PHSシステム"],"a":0,"e":{"correct":"地域医療連携システムはEHR（Electronic Health Record）とSS-MIX2を基盤技術として、施設間で患者情報を安全に共有する。","wrong":{"B":"紙の紹介状のみでは電子的連携ではない。","C":"FAXのみでは標準化されていない。","D":"院内PHSは施設内通信。"},"point":"地域医療連携＝EHR＋SS-MIX2。施設間の安全な情報共有を実現。"}},{"q":"電子カルテの導入効果として最も適切なのはどれか。","c":["紙の使用量が増加する","診療情報の共有・検索が迅速になる","医療費が必ず削減される","すべての医療ミスがなくなる"],"a":1,"e":{"correct":"電子カルテの主な導入効果は診療情報の即時共有・迅速な検索・診療支援機能・データの二次利用等。","wrong":{"A":"電子カルテ導入により紙の使用量は減少する。","C":"導入コストがかかり必ず削減されるとは限らない。","D":"電子カルテはツールであり、すべてのミスを防ぐことは不可能。"},"point":"電子カルテの効果＝情報共有＋検索性＋データ活用＋安全支援。課題＝導入コスト・操作教育。"}},{"q":"病院情報システムの部門システムのうち、検査部門システムの略称はどれか。","c":["RIS","LIS","NIS","PIS"],"a":1,"e":{"correct":"LIS（Laboratory Information System）は検査部門システム。検体検査のオーダ受付・結果報告を管理する。","wrong":{"A":"RIS（Radiology Information System）は放射線部門システム。","C":"NIS（Nursing Information System）は看護情報システム。","D":"PIS（Pharmacy Information System）は薬剤部門システム。"},"point":"LIS＝検査、RIS＝放射線、PIS＝薬剤、NIS＝看護。部門システムの略称は頻出。"}},{"q":"HPKI（保健医療福祉分野の公開鍵基盤）の主な用途はどれか。","c":["患者の体温測定","医療従事者の電子署名・認証","病院の建築設計","医薬品の製造管理"],"a":1,"e":{"correct":"HPKIは医師・薬剤師等の資格を電子的に確認し、電子署名・認証を行うための公開鍵基盤。処方箋の電子化等に活用。","wrong":{"A":"体温測定は医療機器の機能でありHPKIとは無関係。","C":"建築設計はHPKIの対象外。","D":"医薬品の製造管理はGMP等の規制による。"},"point":"HPKI＝医療資格の電子認証基盤。電子処方箋・電子紹介状の署名に使用。"}},{"q":"クリティカルパス（クリニカルパス）の電子化の利点はどれか。","c":["パスの作成が不要になる","バリアンス分析の自動化・パスの標準化が容易になる","すべての患者に同一の治療を強制できる","医師の判断が不要になる"],"a":1,"e":{"correct":"電子化によりバリアンス（逸脱）の自動記録・集計・分析が容易になり、パスの改訂・標準化が促進される。","wrong":{"A":"電子化してもパスの作成は必要。","C":"患者の個別性は尊重され、強制ではない。バリアンスとして記録。","D":"医師の臨床判断は常に必要。パスはあくまでガイドライン。"},"point":"電子パスの利点＝バリアンス自動収集＋分析＋標準化＋改訂の効率化。"}},{"q":"BI（ビジネスインテリジェンス）ツールの医療分野での活用例はどれか。","c":["手術の実施","経営データの可視化・分析によるダッシュボード作成","患者の搬送","医薬品の調剤"],"a":1,"e":{"correct":"BIツールは経営データ・診療データを可視化し、ダッシュボードやレポートを自動生成。意思決定を支援する。","wrong":{"A":"手術の実施はBIツールの機能ではない。","C":"患者搬送はBIツールとは無関係。","D":"調剤は薬剤部門の業務。"},"point":"BI＝データの可視化・分析ツール。DWH（データウェアハウス）と連携して活用。"}},{"q":"データウェアハウス（DWH）の特徴として正しいのはどれか。","c":["日常業務の処理を目的とする","複数の情報源からデータを統合し分析用に蓄積する","リアルタイムでデータを更新する","個々のトランザクション処理に特化している"],"a":1,"e":{"correct":"DWHは複数のシステムからデータを抽出・統合・蓄積し、分析・意思決定に活用するためのデータベース。","wrong":{"A":"日常業務処理はOLTP（オンライントランザクション処理）。","C":"DWHは定期的なバッチ処理でデータを更新。リアルタイムではない。","D":"トランザクション処理はOLTPの特徴。"},"point":"DWH＝分析用データ統合基盤。ETL（抽出・変換・格納）でデータを投入。"}},{"q":"匿名加工情報について正しいのはどれか。","c":["個人を特定できる状態の情報","特定の個人を識別できないように加工された情報","暗号化されただけの情報","医療機関名を削除しただけの情報"],"a":1,"e":{"correct":"匿名加工情報は個人情報保護法に定められ、特定の個人を識別できないよう加工し、復元できないようにした情報。一定条件で第三者提供可。","wrong":{"A":"個人特定可能な状態は個人情報であり匿名加工情報ではない。","C":"暗号化は復号可能なため匿名加工とは異なる。","D":"医療機関名だけでなく個人識別情報全体の加工が必要。"},"point":"匿名加工情報＝個人特定不可＋復元不可。本人同意なしで第三者提供可能。"}},{"q":"次世代医療基盤法の目的として正しいのはどれか。","c":["医療費の削減のみ","医療情報を匿名加工して研究・分析に活用すること","医療機関の統廃合","医師の増員"],"a":1,"e":{"correct":"次世代医療基盤法（2018年施行）は医療情報を認定匿名加工医療情報作成事業者が匿名加工し、研究・開発に活用する仕組みを定めた法律。","wrong":{"A":"医療費削減のみが目的ではなく、医療分野の研究開発促進が主目的。","C":"医療機関の統廃合は医療法の領域。","D":"医師の増員は医療基盤法の目的ではない。"},"point":"次世代医療基盤法＝医療ビッグデータの安全な利活用。認定事業者が匿名加工。"}},{"q":"標準マスターのうち、病名の標準マスターはどれか。","c":["HOTコード","ICD大分類コード","標準病名マスター（MEDIS）","JLACコード"],"a":2,"e":{"correct":"標準病名マスターはMEDIS-DC（医療情報システム開発センター）が管理。ICD-10コードとの対応付けも含む。","wrong":{"A":"HOTコードは医薬品の標準コード。","B":"ICD大分類は国際統計分類であり標準マスターそのものではない。","D":"JLACコードは臨床検査の標準コード。"},"point":"標準マスター：病名＝MEDIS、薬剤＝HOT、検査＝JLAC10、手術＝Kコード。"}},{"q":"医療情報技師の主な役割として正しいのはどれか。","c":["診療行為を直接実施すること","医療情報システムの企画・開発・運用を担うこと","医療保険の審査を行うこと","薬剤の調合を行うこと"],"a":1,"e":{"correct":"医療情報技師は医療情報システムの企画・導入・運用・保守を担う専門職。日本医療情報学会が認定。","wrong":{"A":"診療行為は医師・看護師等の医療職の役割。","C":"医療保険の審査は審査支払機関の業務。","D":"薬剤の調合は薬剤師の業務。"},"point":"医療情報技師＝医療IT専門職。医学・情報技術・医療情報システムの3分野の知識が必要。"}}]}];</script>
<script>
"use strict";
var CH=defined_chapters;
var LS=localStorage;
var app=document.getElementById("app");
var bnav=document.getElementById("bottomNav");
var prevBtn=document.getElementById("prevBtn");
var nextBtn=document.getElementById("nextBtn");
var navCenter=document.getElementById("navCenter");
var state={screen:"home",chId:null,qIdx:0,questions:[],answers:{},mode:""};

function key(k){return "himq_"+k;}
function load(k,d){try{var v=LS.getItem(key(k));return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){LS.setItem(key(k),JSON.stringify(v));}
function getScore(chId){return load("score_"+chId,{correct:0,total:0});}
function setScore(chId,s){save("score_"+chId,s);}
function getWrong(){return load("wrong",[]);}
function setWrong(w){save("wrong",w);}
function getBookmarks(){return load("bookmarks",[]);}
function setBookmarks(b){save("bookmarks",b);}

function totalQ(){var n=0;CH.forEach(function(c){n+=c.questions.length;});return n;}
function totalCorrect(){var n=0;CH.forEach(function(c){var s=getScore(c.id);n+=s.correct;});return n;}
function totalAttempted(){var n=0;CH.forEach(function(c){var s=getScore(c.id);n+=s.total;});return n;}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function getTitle(){
  if(state.mode==="chapter"){var ch=CH.find(function(c){return c.id===state.chId;});return ch?ch.name:"";}
  if(state.mode==="random") return "\u5168\u7ae0\u30e9\u30f3\u30c0\u30e0";
  if(state.mode==="exam") return "\u6a21\u64ec\u8a66\u9a13\uff08"+state.questions.length+"\u554f / "+state.examTime+"\u5206\uff09";
  if(state.mode==="wrong") return "\u9593\u9055\u3048\u305f\u554f\u984c\u306e\u5fa9\u7fd2";
  if(state.mode==="bookmark") return "\u30d6\u30c3\u30af\u30de\u30fc\u30af";
  return "";
}

function renderHome(){
  state.screen="home";bnav.classList.add("hidden");
  var tq=totalQ(),tc=totalCorrect(),ta=totalAttempted();
  var acc=ta>0?Math.round(tc/ta*100):0;
  var wrongCount=getWrong().length;
  var bmCount=getBookmarks().length;
  var h='<h1>\u8a3a\u7642\u60c5\u5831\u7ba1\u7406\u58eb \u6a21\u64ec\u554f\u984c\u96c6</h1>';
  h+='<div class="subtitle">\u516812\u7ae0 \u5b8c\u5168\u5bfe\u5fdc\u7248\u30fb\u5168'+tq+'\u554f</div>';
  h+='<div class="stats-bar"><span>\u7dcf\u554f\u984c\u6570: '+tq+'</span><span>\u6b63\u89e3: '+tc+'</span><span>\u6b63\u7b54\u7387: '+acc+'%</span></div>';
  h+='<div class="top-actions">';
  h+='<button class="btn btn-primary" onclick="startRandom()">\u5168\u7ae0\u30e9\u30f3\u30c0\u30e0</button>';
  h+='<button class="btn btn-accent" onclick="startExam()">\u6a21\u64ec\u8a66\u9a13\uff0850\u554f / 60\u5206\uff09</button>';
  h+='<button class="btn btn-secondary" onclick="startWrongReview()">\u9593\u9055\u3048\u305f\u554f\u984c\u3092\u5fa9\u7fd2';
  if(wrongCount>0) h+='<span class="badge">'+wrongCount+'</span>';
  h+='</button>';
  h+='<button class="btn btn-secondary" onclick="startBookmarkReview()">\u30d6\u30c3\u30af\u30de\u30fc\u30af';
  if(bmCount>0) h+='<span class="badge">'+bmCount+'</span>';
  h+='</button></div>';
  h+='<div class="chapter-grid">';
  CH.forEach(function(ch){
    var s=getScore(ch.id);var pct=ch.questions.length>0?Math.round(s.correct/ch.questions.length*100):0;
    h+='<div class="ch-card" onclick="startChapter('+ch.id+')">';
    h+='<div class="ch-num">\u7b2c'+ch.id+'\u7ae0</div>';
    h+='<div class="ch-name">'+ch.name+'</div>';
    h+='<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
    h+='<div class="ch-score">'+s.correct+'/'+ch.questions.length+'\u554f \u6b63\u89e3</div></div>';
  });
  h+='</div>';
  h+='<div class="data-area"><h4>\u5b66\u7fd2\u30c7\u30fc\u30bf\u306e\u7ba1\u7406</h4><div class="data-btns">';
  h+='<button class="data-btn" onclick="exportData()">\u30c7\u30fc\u30bf\u3092\u30a8\u30af\u30b9\u30dd\u30fc\u30c8</button>';
  h+='<button class="data-btn" onclick="document.getElementById(\'import-file\').click()">\u30c7\u30fc\u30bf\u3092\u30a4\u30f3\u30dd\u30fc\u30c8</button>';
  h+='<input type="file" id="import-file" class="import-input" accept=".json" onchange="importData(event)">';
  h+='<button class="data-btn" onclick="resetAll()" style="color:var(--red);border-color:var(--red)">\u5168\u30ea\u30bb\u30c3\u30c8</button>';
  h+='</div></div>';
  h+='<footer>\u8a3a\u7642\u60c5\u5831\u7ba1\u7406\u58eb\u8a66\u9a13\u5bfe\u7b56 \u2014 \u5b66\u7fd2\u7528\u6a21\u64ec\u554f\u984c\u96c6</footer>';
  app.innerHTML=h;
}

// --- 問題数選択モーダル ---
var pendingAction=null;
function showCountModal(title,maxQ,callback){
  pendingAction=callback;
  var opts=[10,20,30];
  var h='<div class="modal-overlay" onclick="closeModal(event)"><div class="modal">';
  h+='<h3>'+title+'</h3>';
  h+='<div class="modal-sub">出題数を選んでください（全'+maxQ+'問）</div>';
  h+='<div class="modal-options">';
  opts.forEach(function(n){
    if(n<=maxQ){
      h+='<button class="modal-opt" onclick="confirmCount('+n+')"><span class="opt-num">'+n+'問</span> <span class="opt-desc">サクッと学習</span></button>';
    }
  });
  h+='<button class="modal-opt" onclick="confirmCount('+maxQ+')"><span class="opt-num">全'+maxQ+'問</span> <span class="opt-desc">全問チャレンジ</span></button>';
  h+='</div><button class="modal-cancel" onclick="closeModal()">キャンセル</button></div></div>';
  var div=document.createElement("div");div.id="modal-root";div.innerHTML=h;document.body.appendChild(div);
}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;var m=document.getElementById("modal-root");if(m)m.remove();pendingAction=null;}
function confirmCount(n){var m=document.getElementById("modal-root");if(m)m.remove();if(pendingAction)pendingAction(n);pendingAction=null;}

function startChapter(id){
  var ch=CH.find(function(c){return c.id===id;});if(!ch)return;
  showCountModal("第"+id+"章 "+ch.name,ch.questions.length,function(count){
    state.chId=id;state.qIdx=0;state.mode="chapter";
    var all=ch.questions.map(function(q,i){return{chId:id,qIdx:i,data:q};});
    state.questions=count<all.length?shuffle(all).slice(0,count):shuffle(all);
    state.answers={};renderQuiz();
  });
}
function startRandom(){
  var pool=[];CH.forEach(function(ch){ch.questions.forEach(function(q,i){pool.push({chId:ch.id,qIdx:i,data:q});});});
  showCountModal("全章ランダム",pool.length,function(count){
    state.questions=shuffle(pool).slice(0,count);state.qIdx=0;state.mode="random";state.answers={};state.chId=null;renderQuiz();
  });
}
// --- 模擬試験モード ---
var examTimer=null;
var examStartTime=null;
var examTimeLimit=60; // 分

function startExam(){
  var pool=[];CH.forEach(function(ch){ch.questions.forEach(function(q,i){pool.push({chId:ch.id,qIdx:i,data:q});});});
  state.questions=shuffle(pool).slice(0,50);state.qIdx=0;state.mode="exam";state.answers={};state.chId=null;
  state.examTime=examTimeLimit;
  examStartTime=Date.now();
  if(examTimer)clearInterval(examTimer);
  examTimer=setInterval(updateExamTimer,1000);
  renderQuiz();
}

function updateExamTimer(){
  if(state.mode!=="exam"){clearInterval(examTimer);return;}
  var elapsed=Math.floor((Date.now()-examStartTime)/1000);
  var remaining=examTimeLimit*60-elapsed;
  if(remaining<=0){
    clearInterval(examTimer);
    alert("時間切れです。結果を表示します。");
    renderResults();
    return;
  }
  var min=Math.floor(remaining/60);var sec=remaining%60;
  var timerEl=document.getElementById("exam-timer");
  if(timerEl){
    timerEl.textContent=min+"分"+("0"+sec).slice(-2)+"秒";
    if(remaining<300)timerEl.style.color="var(--red)";
  }
}

function stopExamTimer(){if(examTimer){clearInterval(examTimer);examTimer=null;}}

function startWrongReview(){
  var wrong=getWrong();if(!wrong.length){alert("\u9593\u9055\u3048\u305f\u554f\u984c\u306f\u3042\u308a\u307e\u305b\u3093\u3002");return;}
  var qs=[];wrong.forEach(function(w){var ch=CH.find(function(c){return c.id===w.chId;});if(ch&&ch.questions[w.qIdx])qs.push({chId:w.chId,qIdx:w.qIdx,data:ch.questions[w.qIdx]});});
  state.questions=shuffle(qs);state.qIdx=0;state.mode="wrong";state.answers={};state.chId=null;renderQuiz();
}
function startBookmarkReview(){
  var bm=getBookmarks();if(!bm.length){alert("\u30d6\u30c3\u30af\u30de\u30fc\u30af\u306f\u3042\u308a\u307e\u305b\u3093\u3002");return;}
  var qs=[];bm.forEach(function(b){var ch=CH.find(function(c){return c.id===b.chId;});if(ch&&ch.questions[b.qIdx])qs.push({chId:b.chId,qIdx:b.qIdx,data:ch.questions[b.qIdx]});});
  state.questions=qs;state.qIdx=0;state.mode="bookmark";state.answers={};state.chId=null;renderQuiz();
}

function renderQuiz(){
  state.screen="quiz";bnav.classList.remove("hidden");
  var title=getTitle();var total=state.questions.length;
  var qObj=state.questions[state.qIdx];var qData=qObj.data;
  var qKey=qObj.chId+"_"+qObj.qIdx;var ans=state.answers[qKey];
  var answered=ans!==undefined;var isCorrect=answered&&ans===qData.a;
  var bm=getBookmarks();var isBookmarked=bm.some(function(b){return b.chId===qObj.chId&&b.qIdx===qObj.qIdx;});
  var pct=Math.round((state.qIdx+1)/total*100);
  var h='<div class="quiz-header"><button class="back-btn" onclick="goHome()">\u2190</button>';
  h+='<span class="quiz-title">'+title+'</span>';
  if(state.mode==="exam")h+='<span id="exam-timer" style="font-size:.8rem;font-weight:700;color:var(--red);margin-right:8px">'+state.examTime+':00</span>';
  h+='<span class="q-counter">'+(state.qIdx+1)+' / '+total+'</span></div>';
  h+='<div class="progress-bar-wrap"><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
  h+='<div class="q-card fade-in'+(answered?(isCorrect?' correct':' wrong'):'')+'">';
  h+='<button class="bookmark-btn'+(isBookmarked?' active':'')+'" onclick="toggleBookmark('+qObj.chId+','+qObj.qIdx+')">'+(isBookmarked?'\u2605':'\u2606')+'</button>';
  h+='<div class="q-text">Q'+(state.qIdx+1)+'. '+qData.q+'</div><div class="choices">';
  var labels=["A","B","C","D"];
  for(var i=0;i<qData.c.length;i++){
    var cls="choice-btn";
    if(answered){if(i===qData.a)cls+=" correct-choice";else if(i===ans)cls+=" wrong-choice";}
    h+='<button class="'+cls+'"'+(answered?' disabled':'')+' onclick="selectAnswer('+i+')"><span class="result-icon">';
    if(answered&&i===qData.a)h+='\u2713';else if(answered&&i===ans)h+='\u2717';else h+=labels[i]+'.';
    h+='</span> '+qData.c[i]+'</button>';
  }
  h+='</div>';
  if(answered&&qData.e){
    var e=qData.e;
    h+='<div class="explanation show"><div class="expl-section"><div class="expl-label green">\u25cb \u6b63\u89e3\u306e\u89e3\u8aac</div>'+e.correct+'</div>';
    if(e.wrong){h+='<div class="expl-section"><div class="expl-label red">\u2717 \u8aa4\u7b54\u80a2\u306e\u89e3\u8aac</div>';for(var wk in e.wrong){if(e.wrong.hasOwnProperty(wk))h+='<div class="expl-wrong-item"><strong>'+wk+'.</strong> '+e.wrong[wk]+'</div>';}h+='</div>';}
    if(e.point)h+='<div class="expl-section"><div class="expl-label blue">\u2606 \u8a66\u9a13\u306e\u30dd\u30a4\u30f3\u30c8</div>'+e.point+'</div>';
    h+='</div>';
  }
  h+='</div>';app.innerHTML=h;
  prevBtn.disabled=state.qIdx===0;
  nextBtn.textContent=(state.qIdx===total-1&&answered)?"\u7d50\u679c\u3092\u898b\u308b":"\u6b21\u3078 \u2192";
  nextBtn.disabled=!answered;navCenter.textContent=(state.qIdx+1)+' / '+total;
}

function selectAnswer(idx){
  var qObj=state.questions[state.qIdx];var qKey=qObj.chId+"_"+qObj.qIdx;
  if(state.answers[qKey]!==undefined)return;state.answers[qKey]=idx;
  var isCorrect=idx===qObj.data.a;
  if(state.mode==="chapter"){var s=getScore(qObj.chId);s.total++;if(isCorrect)s.correct++;setScore(qObj.chId,s);}
  if(!isCorrect){var w=getWrong();if(!w.some(function(x){return x.chId===qObj.chId&&x.qIdx===qObj.qIdx;})){w.push({chId:qObj.chId,qIdx:qObj.qIdx});setWrong(w);}}
  else{var w=getWrong();w=w.filter(function(x){return!(x.chId===qObj.chId&&x.qIdx===qObj.qIdx);});setWrong(w);}
  renderQuiz();
}

function toggleBookmark(chId,qIdx){
  var bm=getBookmarks();var idx=bm.findIndex(function(b){return b.chId===chId&&b.qIdx===qIdx;});
  if(idx>=0)bm.splice(idx,1);else bm.push({chId:chId,qIdx:qIdx});setBookmarks(bm);renderQuiz();
}

function goPrev(){if(state.qIdx>0){state.qIdx--;renderQuiz();}}
function goNext(){
  if(state.qIdx<state.questions.length-1){state.qIdx++;renderQuiz();}
  else renderResults();
}

function renderResults(){
  state.screen="results";bnav.classList.add("hidden");
  stopExamTimer();
  var correct=0,total=state.questions.length,wrongList=[],unanswered=0;
  state.questions.forEach(function(qObj,i){
    var qKey=qObj.chId+"_"+qObj.qIdx;var ans=state.answers[qKey];
    if(ans===undefined){unanswered++;wrongList.push({idx:i,q:qObj.data.q,yourAns:"未解答",correctAns:qObj.data.c[qObj.data.a]});}
    else if(ans===qObj.data.a)correct++;
    else wrongList.push({idx:i,q:qObj.data.q,yourAns:qObj.data.c[ans]||"",correctAns:qObj.data.c[qObj.data.a]});
  });
  var pct=Math.round(correct/total*100);
  var isExam=state.mode==="exam";
  var h='<div class="quiz-header"><button class="back-btn" onclick="goHome()">\u2190</button><span class="quiz-title">'+(isExam?'\u6a21\u64ec\u8a66\u9a13 \u7d50\u679c':'\u7d50\u679c')+'</span></div>';
  h+='<div class="result-card"><div class="result-score">'+correct+' / '+total+'</div><div class="result-label">\u6b63\u7b54\u7387 '+pct+'%</div>';
  if(isExam){
    var elapsed=examStartTime?Math.floor((Date.now()-examStartTime)/1000):0;
    var eMin=Math.floor(elapsed/60);var eSec=elapsed%60;
    h+='<div style="margin-top:8px;font-size:.85rem;color:var(--mid)">\u6240\u8981\u6642\u9593: '+eMin+'\u5206'+("0"+eSec).slice(-2)+'\u79d2</div>';
    if(pct>=60)h+='<div style="margin-top:12px;padding:10px;background:var(--green);color:#fff;border-radius:var(--radius);font-weight:700;font-size:1.1rem">\u2713 \u5408\u683c\u30e9\u30a4\u30f3\u7a81\u7834\uff01\uff0860%\u4ee5\u4e0a\uff09</div>';
    else h+='<div style="margin-top:12px;padding:10px;background:var(--red);color:#fff;border-radius:var(--radius);font-weight:700;font-size:1.1rem">\u25b2 \u5408\u683c\u30e9\u30a4\u30f3\u672a\u5230\u9054\uff0860%\u672a\u6e80\uff09</div>';
    if(unanswered>0)h+='<div style="margin-top:8px;font-size:.82rem;color:var(--mid)">\u203b \u672a\u89e3\u7b54: '+unanswered+'\u554f</div>';
    // 章別正答率
    h+='<div style="margin-top:16px;text-align:left"><div style="font-weight:700;margin-bottom:8px;font-size:.85rem">\u7ae0\u5225\u6b63\u7b54\u7387</div>';
    var chStats={};
    state.questions.forEach(function(qObj){
      if(!chStats[qObj.chId])chStats[qObj.chId]={correct:0,total:0,name:""};
      chStats[qObj.chId].total++;
      var ch=CH.find(function(c){return c.id===qObj.chId;});
      if(ch)chStats[qObj.chId].name=ch.name;
      var qKey=qObj.chId+"_"+qObj.qIdx;var ans=state.answers[qKey];
      if(ans===qObj.data.a)chStats[qObj.chId].correct++;
    });
    for(var cid in chStats){
      if(!chStats.hasOwnProperty(cid))continue;
      var cs=chStats[cid];var cp=cs.total>0?Math.round(cs.correct/cs.total*100):0;
      var cColor=cp>=60?"var(--green)":"var(--red)";
      h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.82rem;border-bottom:1px solid var(--faint)">';
      h+='<span>\u7b2c'+cid+'\u7ae0 '+cs.name+'</span>';
      h+='<span style="font-weight:700;color:'+cColor+'">'+cs.correct+'/'+cs.total+' ('+cp+'%)</span></div>';
    }
    h+='</div>';
  }
  h+='</div>';
  if(wrongList.length>0){
    h+='<div class="result-card" style="text-align:left"><div style="font-weight:700;margin-bottom:12px">\u9593\u9055\u3048\u305f\u554f\u984c ('+wrongList.length+'\u554f)</div>';
    wrongList.forEach(function(w){
      h+='<div class="result-list-item"><div style="font-weight:500;margin-bottom:4px">Q'+(w.idx+1)+'. '+w.q+'</div>';
      h+='<div style="color:var(--red);font-size:.8rem">\u2717 '+w.yourAns+'</div>';
      h+='<div style="color:var(--green);font-size:.8rem">\u25cb '+w.correctAns+'</div></div>';
    });h+='</div>';
  }
  h+='<button class="btn btn-primary" onclick="goHome()" style="margin-top:16px">\u30db\u30fc\u30e0\u306b\u623b\u308b</button>';
  app.innerHTML=h;
}

function goHome(){stopExamTimer();renderHome();}
function resetAll(){
  if(!confirm("\u3059\u3079\u3066\u306e\u5b66\u7fd2\u30c7\u30fc\u30bf\u3092\u30ea\u30bb\u30c3\u30c8\u3057\u307e\u3059\u304b\uff1f"))return;
  var keys=[];for(var i=0;i<LS.length;i++){var k=LS.key(i);if(k&&k.indexOf("himq_")===0)keys.push(k);}
  keys.forEach(function(k){LS.removeItem(k);});renderHome();
}

// --- エクスポート: 学習データをJSONファイルとしてダウンロード ---
function exportData(){
  var data={};
  for(var i=0;i<LS.length;i++){var k=LS.key(i);if(k&&k.indexOf("himq_")===0)data[k]=LS.getItem(k);}
  data._exportDate=new Date().toISOString();
  data._version="him-quiz-v2";
  data._totalQuestions=totalQ();
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="him-quiz-progress-"+new Date().toISOString().slice(0,10)+".json";
  a.click();URL.revokeObjectURL(url);
}

// --- インポート: JSONファイルから学習データを復元 ---
function importData(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      var count=0;
      for(var k in data){
        if(data.hasOwnProperty(k)&&k.indexOf("himq_")===0){LS.setItem(k,data[k]);count++;}
      }
      alert("インポート完了（"+count+"件のデータを復元しました）");
      renderHome();
    }catch(err){alert("ファイルの読み込みに失敗しました。");}
  };
  reader.readAsText(file);
  event.target.value="";
}

renderHome();
</script>
