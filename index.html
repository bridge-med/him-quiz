<style>
/* ===== BRIDGE Design System v1.0 — Quiet Atelier / 職人の手記 ===== */
*{margin:0;padding:0;box-sizing:border-box}

.result-card{background:var(--card);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px}

<script>var defined_chapters=[{"id":1,"name":"医療管理総論","questions":[{"q":"医療資源の4区分として正しい組み合わせはどれか。","c":["物的資源・人的資源・財的資源・情報資源","物的資源・自然資源・財的資源・情報資源","人的資源・観光資源・財的資源・情報資源","物的資源・人的資源・文化資源・情報資源"],"a":0,"e":{"correct":"医療資源は物的資源（施設・設備）、人的資源（医師・看護師等）、財的資源（資金・予算）、情報資源（診療情報・データ）の4つに分類される。","wrong":{"B":"自然資源は医療資源の分類に含まれない。","C":"観光資源は医療資源とは無関係である。","D":"文化資源は医療資源の4区分に該当しない。"},"point":"「ヒト・モノ・カネ・情報」と覚える。一般的な経営資源と同じ4分類。"}},{"q":"EBMの3要素として正しいものはどれか。","c":["最善の研究エビデンス・臨床的専門技能・患者の価値観","最善の研究エビデンス・医療費の効率性・患者の価値観","臨床ガイドライン・臨床的専門技能・病院の方針","最善の研究エビデンス・臨床的専門技能・保険者の意向"],"a":0,"e":{"correct":"EBMは①最善の研究エビデンス、②臨床家の専門的技能・経験、③患者の価値観・好みの3要素を統合して臨床判断を行う方法論である。","wrong":{"B":"医療費の効率性はEBMの3要素に含まれない。","C":"臨床ガイドラインはEBMの成果物であって3要素ではない。","D":"保険者の意向はEBMの要素ではない。"},"point":"EBM＝エビデンス＋臨床経験＋患者の希望。"}},{"q":"ドナベディアンモデルの3要素はどれか。","c":["構造・過程・結果","費用・満足度・安全性","構造・効率・公平性","投入・活動・影響"],"a":0,"e":{"correct":"ドナベディアンは医療の質を構造（Structure）、過程（Process）、結果（Outcome）の3側面から評価する枠組みを提唱した。","wrong":{"B":"費用・満足度・安全性はドナベディアンの3要素ではない。","C":"効率や公平性はWHOの保健システム評価の指標。","D":"投入・活動・影響はプログラム評価の用語。"},"point":"ドナベディアン＝S・P・O（Structure-Process-Outcome）。"}},{"q":"インシデントとアクシデントの違いとして正しいのはどれか。","c":["インシデントは患者に傷害が及ばなかった事象、アクシデントは傷害が及んだ事象","インシデントは医師の過失、アクシデントは看護師の過失","インシデントは入院患者、アクシデントは外来患者の事象","両者に明確な区別はない"],"a":0,"e":{"correct":"インシデント（ヒヤリ・ハット）は実害なし、アクシデントは実際に傷害が発生した事象である。","wrong":{"B":"職種ではなく患者への傷害の有無で分類。","C":"入院・外来の区別ではなく実害の有無。","D":"医療安全では明確に区別されている。"},"point":"インシデント＝ヒヤリ・ハット（実害なし）、アクシデント＝有害事象（実害あり）。"}},{"q":"インフォームドコンセントについて正しいのはどれか。","c":["患者が十分な説明を受けた上で自発的に同意すること","医師が治療方針を一方的に決定すること","患者の家族だけに説明すれば足りること","緊急時を含めいかなる場合も省略できないこと"],"a":0,"e":{"correct":"ICは医療者が十分に説明し患者が理解・納得した上で自発的に同意すること。医療法にも説明義務が規定されている。","wrong":{"B":"一方的な決定はパターナリズムでありICに反する。","C":"原則として患者本人への説明と同意が必要。","D":"緊急時には例外的にICの省略が認められる場合がある。"},"point":"IC＝説明と同意。「患者本人」「十分な説明」「自発的同意」の3要素。"}},{"q":"チーム医療の説明として最も適切なのはどれか。","c":["多職種が専門性を発揮し連携して患者ケアに当たること","医師の指示に他職種が従うこと","各職種が独立して業務を行うこと","看護師が中心となり医師を補佐すること"],"a":0,"e":{"correct":"チーム医療は多職種が対等な立場で連携・協力して患者中心の医療を提供する形態。","wrong":{"B":"上下関係ではなく対等な立場で専門性を発揮する。","C":"独立・孤立は従来の縦割り型医療。","D":"特定の中心職種はなく全職種が対等に参画。"},"point":"チーム医療＝多職種・連携・専門性・患者中心。"}},{"q":"リスボン宣言に含まれないのはどれか。","c":["良質の医療を受ける権利","情報を得る権利","自己決定の権利","無償で医療を受ける権利"],"a":3,"e":{"correct":"WMAリスボン宣言は良質の医療、選択の自由、自己決定、情報、秘密保持等の権利を規定。無償医療は含まれない。","wrong":{"A":"良質の医療を受ける権利は第1原則に明記。","B":"情報を得る権利はリスボン宣言に含まれる。","C":"自己決定の権利は重要な柱の一つ。"},"point":"リスボン宣言に「無償」はない。医療費は各国制度に委ねられている。"}},{"q":"病院の定義における病床数基準はどれか。","c":["20床以上","10床以上","50床以上","100床以上"],"a":0,"e":{"correct":"医療法により病院は20人以上の患者を入院させる施設。19床以下は診療所。","wrong":{"B":"10床以上の基準は存在しない。","C":"50床以上は病院の定義ではない。","D":"100床以上は病院の定義ではない。"},"point":"病院＝20床以上。診療所＝0〜19床。"}},{"q":"クリニカルパスについて正しいのはどれか。","c":["標準的な診療計画をスケジュール化したもの","医師の裁量を制限する規則","保険請求のための書類","患者に見せてはいけない内部文書"],"a":0,"e":{"correct":"クリニカルパスは特定の疾患について入院から退院までの標準的診療計画を一覧表にしたもの。","wrong":{"B":"裁量を制限するものではなく標準的な目安。","C":"保険請求書類ではなく診療計画ツール。","D":"患者用パスも作成され情報共有に活用。"},"point":"パス＝診療スケジュール表。バリアンス分析が質改善につながる。"}},{"q":"PDCAサイクルの正しい順序はどれか。","c":["Plan→Do→Check→Act","Plan→Do→Act→Check","Do→Plan→Check→Act","Check→Plan→Do→Act"],"a":0,"e":{"correct":"PDCA＝Plan（計画）→Do（実行）→Check（評価）→Act（改善）の4段階を繰り返す。","wrong":{"B":"ActとCheckの順序が逆。","C":"Planが最初に来る。","D":"Checkから始まるのではなくPlanが起点。"},"point":"P→D→C→A。計画→実行→評価→改善。"}},{"q":"DPC/PDPSの「医療資源を最も投入した傷病名」について正しいのはどれか。","c":["入院中に最も人的・物的医療資源を投入した傷病名","入院時の主訴に該当する傷病名","最も医療費が高い傷病名","退院時に治癒していない傷病名"],"a":0,"e":{"correct":"入院期間全体を通じて診療行為に最も資源を投入した傷病名を選択する。DPCコード決定の基礎。","wrong":{"B":"主訴と医療資源病名は必ずしも一致しない。","C":"医療費の高さではなく資源投入量で判断。","D":"治癒の有無は選択基準ではない。"},"point":"DPCの要＝医療資源を最も投入した傷病名。"}},{"q":"地域医療構想の4つの病床機能区分に含まれないのはどれか。","c":["高度急性期","急性期","慢性期","予防期"],"a":3,"e":{"correct":"4区分は高度急性期・急性期・回復期・慢性期。「予防期」は存在しない。","wrong":{"A":"高度急性期は4区分の一つ。","B":"急性期は4区分の一つ。","C":"慢性期は4区分の一つ。"},"point":"4区分＝高度急性期・急性期・回復期・慢性期。回復期を忘れやすい。"}},{"q":"5疾病に含まれないのはどれか。","c":["がん","脳卒中","精神疾患","アレルギー疾患"],"a":3,"e":{"correct":"5疾病＝がん・脳卒中・心血管疾患・糖尿病・精神疾患。アレルギー疾患は含まれない。","wrong":{"A":"がんは5疾病の筆頭。","B":"脳卒中は5疾病の一つ。","C":"精神疾患は2013年から追加。"},"point":"5疾病＝がん・脳卒中・心血管・糖尿病・精神。精神疾患の追加も頻出。"}},{"q":"QIの説明として正しいのはどれか。","c":["医療の質を定量的に評価するための指標","医療事故の件数のみを測る指標","患者満足度アンケートのこと","医療費の削減率を示す指標"],"a":0,"e":{"correct":"QIは医療の質を定量的・客観的に評価するための指標。構造・過程・結果の各側面について設定される。","wrong":{"B":"事故件数だけでなく多角的な指標を含む。","C":"患者満足度はQIの一要素にはなるがQIそのものではない。","D":"医療費削減率は経営指標でありQIとは異なる。"},"point":"QI＝医療の質を数値で測る仕組み。"}},{"q":"特定機能病院の要件として正しいのはどれか。","c":["高度の医療を提供し400床以上","救急医療を提供し200床以上","地域住民に一次医療を提供","在宅医療を専門に行う"],"a":0,"e":{"correct":"特定機能病院は高度医療の提供・開発・評価・研修能力を有し400床以上。厚生労働大臣が承認。","wrong":{"B":"200床以上は地域医療支援病院の要件。","C":"一次医療は特定機能病院の役割ではない。","D":"在宅医療専門は要件に含まれない。"},"point":"特定機能病院＝400床以上。地域医療支援病院＝200床以上。"}},{"q":"地域医療支援病院の説明として正しいのはどれか。","c":["かかりつけ医を支援し紹介患者中心の医療を提供","すべての診療科を備えた総合病院","高度先進医療を専門に行う病院","救急患者のみを受け入れる病院"],"a":0,"e":{"correct":"紹介患者中心の医療、救急医療、研修、医療機器共同利用を行う。200床以上で都道府県知事が承認。","wrong":{"B":"すべての診療科は不要。","C":"高度先進医療は特定機能病院。","D":"紹介患者を中心に幅広い医療を提供。"},"point":"地域医療支援病院＝都道府県知事承認。特定機能病院＝厚生労働大臣承認。"}},{"q":"NSTの説明として正しいのはどれか。","c":["多職種で構成され入院患者の栄養管理を行うチーム","看護師のみで構成される栄養管理チーム","栄養士が単独で行う食事指導","外来患者のみを対象とした栄養相談"],"a":0,"e":{"correct":"NST（Nutrition Support Team）は医師・看護師・管理栄養士・薬剤師等の多職種で入院患者の栄養療法を提供。","wrong":{"B":"多職種で構成される。","C":"チームアプローチであり単独ではない。","D":"主に入院患者が対象。"},"point":"NST＝多職種チーム。栄養サポートチーム加算の要件にも。"}},{"q":"医療メディエーションとして最も適切なのはどれか。","c":["医療紛争で中立的な第三者が対話を促進すること","裁判所が医療過誤を裁定すること","患者が直接医師を告訴すること","保険会社が示談交渉を行うこと"],"a":0,"e":{"correct":"中立的なメディエーターが患者と医療者の対話を促進し相互理解による解決を目指す手法。","wrong":{"B":"裁判はメディエーションとは異なる。","C":"告訴は刑事手続。","D":"保険会社の示談交渉ではない。"},"point":"メディエーション＝対話促進。「中立」「対話」がキーワード。"}},{"q":"セカンドオピニオンについて正しいのはどれか。","c":["主治医以外の医師に意見を求めること","主治医を変更すること","複数の病院で同時に治療を受けること","苦情申立のこと"],"a":0,"e":{"correct":"主治医の診断・治療方針について別の医師に意見を求めること。転医とは異なる。","wrong":{"B":"転医ではなく第二の意見を聞くこと。","C":"同時治療ではない。","D":"苦情申立は患者相談窓口の役割。"},"point":"セカンドオピニオン≠転医。主治医はそのまま。"}},{"q":"ハインリッヒの法則の説明として正しいのはどれか。","c":["1件の重大事故の背景に29件の軽微な事故と300件のヒヤリ・ハットがある","1件の報告に29件の改善と300件の研修が必要","事故原因は1つの重大要因と29の中間要因からなる","年間の許容事故件数は300件以内とする法則"],"a":0,"e":{"correct":"1:29:300の比率で重大事故・軽微な事故・ヒヤリハットが存在するという経験則。","wrong":{"B":"改善件数の比率ではない。","C":"原因数の法則ではない。","D":"許容件数を定める法則ではない。"},"point":"1:29:300＝重大:軽微:ヒヤリ・ハット。インシデント報告の重要性の根拠。"}},{"q":"倫理委員会（IRB）の主な役割はどれか。","c":["臨床研究の倫理的妥当性を審査すること","医療事故の責任者を処分すること","診療報酬の査定を行うこと","医師の国家試験を実施すること"],"a":0,"e":{"correct":"IRBは人を対象とする研究の倫理的・科学的妥当性を審査。被験者の人権保護が目的。","wrong":{"B":"事故の責任追及は医療安全管理部門の役割。","C":"査定は審査支払機関の業務。","D":"国家試験は厚生労働省の所管。"},"point":"IRB＝研究の倫理審査。被験者保護が最大の目的。"}},{"q":"病院機能評価について正しいのはどれか。","c":["日本医療機能評価機構が第三者として評価する","厚生労働省が直接全病院を毎年評価する","自己申告のみで認定される","病床数のみで判断される"],"a":0,"e":{"correct":"日本医療機能評価機構が実施する第三者評価制度。自主的に申請し訪問審査を経て認定。","wrong":{"B":"厚労省ではなく日本医療機能評価機構が実施。任意。","C":"サーベイヤーによる訪問審査がある。","D":"多角的な評価項目がある。"},"point":"病院機能評価＝第三者評価。任意参加。"}},{"q":"医療法の制定年はどれか。","c":["1948年","2000年","1961年","1985年"],"a":0,"e":{"correct":"医療法は1948年（昭和23年）制定。第1次〜第8次の大改正あり。","wrong":{"B":"2000年は第4次改正の時期。","C":"1961年は国民皆保険達成の年。","D":"1985年は第1次改正の年。"},"point":"医療法制定＝1948年。"}},{"q":"医療ADRについて正しいのはどれか。","c":["裁判によらず第三者が関与して医療紛争の解決を図る手続","裁判所が強制的に行う紛争処理","医師のみが利用できる制度","結果には常に法的拘束力がある"],"a":0,"e":{"correct":"ADRは裁判によらず中立的な第三者の関与で医療紛争の解決を図る手続。","wrong":{"B":"裁判外の手続であり強制ではない。","C":"患者側も利用可能。","D":"拘束力の有無は手続の種類による。"},"point":"ADR＝裁判外紛争解決。"}},{"q":"医療提供体制における「かかりつけ医」の機能として最も適切なのはどれか。","c":["専門的な三次救急医療の提供","日常的な診療と健康管理の実施","高度先進医療の研究開発","介護施設の直接運営"],"a":1,"e":{"correct":"かかりつけ医は日常的な診療を行い、必要に応じて専門医への紹介や健康管理を担う。地域の身近な医師として重要な役割を果たす。","wrong":{"A":"三次救急は救命救急センターなど高度医療機関の機能。","C":"高度先進医療の研究開発は主に特定機能病院や大学病院の役割。","D":"介護施設の運営は医療提供体制の直接的な機能には含まれない。"},"point":"かかりつけ医＝日常診療＋健康管理＋専門医紹介。地域医療の中心的存在。"}},{"q":"地域包括ケアシステムの4つの「助」に含まれないものはどれか。","c":["自助","互助","扶助","公助"],"a":2,"e":{"correct":"地域包括ケアシステムは「自助・互助・共助・公助」の4つの助で構成される。「扶助」は生活保護法の用語。","wrong":{"A":"自助は自ら健康管理を行うことであり4つの助に含まれる。","B":"互助はボランティアや地域活動など住民同士の支え合い。","D":"公助は生活保護や社会福祉など行政による支援。"},"point":"4つの助＝自助・互助・共助・公助。「共助」（社会保険）と「扶助」を混同しないこと。"}},{"q":"医療事故調査制度において、医療事故が発生した場合に届出を行う先はどこか。","c":["厚生労働大臣","都道府県知事","医療事故調査・支援センター","日本医師会"],"a":2,"e":{"correct":"2015年に施行された医療事故調査制度では、予期しない死亡・死産が発生した場合、医療機関は医療事故調査・支援センターに届け出る。","wrong":{"A":"厚生労働大臣への届出ではなく、医療事故調査・支援センターが窓口。","B":"都道府県知事への届出は医療法の別の規定によるもの。","D":"日本医師会は職能団体であり、届出先ではない。"},"point":"医療事故調査制度＝医療事故調査・支援センターへの届出。対象は予期しない死亡・死産。"}},{"q":"患者安全文化の醸成に最も重要な要素はどれか。","c":["個人の責任追及を徹底すること","エラーを報告しやすい非懲罰的な環境","医療事故を完全にゼロにすること","事故発生時の法的対応の迅速化"],"a":1,"e":{"correct":"患者安全文化では、エラーを隠さず報告できる非懲罰的な環境（Just Culture）が最も重要とされる。個人を罰するのではなくシステムの改善を目指す。","wrong":{"A":"個人の責任追及はエラー報告を抑制し、安全文化の醸成を阻害する。","C":"ヒューマンエラーをゼロにすることは不可能であり現実的でない。","D":"法的対応の迅速化は安全文化の本質ではない。"},"point":"患者安全文化＝非懲罰的環境＋報告文化＋学習する組織。Just Cultureが鍵。"}},{"q":"一般病床の平均在院日数の算定式として正しいのはどれか。","c":["在院患者延数÷退院患者数","在院患者延数÷（新入院患者数＋退院患者数）×2","退院患者数÷在院患者延数","新入院患者数÷病床数×100"],"a":1,"e":{"correct":"平均在院日数＝在院患者延数÷（1/2）×（新入院患者数＋退院患者数）。分母は新入院と退院の平均を用いる。","wrong":{"A":"分母が退院患者数のみでは正確な算定にならない。","C":"分子と分母が逆で、これは回転率に近い指標。","D":"これは入院率に近い計算式であり、平均在院日数ではない。"},"point":"平均在院日数＝在院患者延数÷{（新入院＋退院）÷2}。病院報告の重要指標。"}},{"q":"病床区分のうち、精神病床の対象となる疾患はどれか。","c":["結核","感染症法の一類感染症","精神疾患","悪性新生物"],"a":2,"e":{"correct":"精神病床は精神疾患を有する者を入院させるための病床で、医療法に基づき区分される。","wrong":{"A":"結核は結核病床に入院させる。","B":"一類感染症は感染症病床の対象。","D":"悪性新生物は一般病床で対応する。"},"point":"病床5区分＝一般・療養・精神・感染症・結核。それぞれ対象疾患が異なる。"}},{"q":"医療経営における損益分岐点について正しいのはどれか。","c":["売上高が固定費と変動費の合計を上回る点","売上高が固定費のみと等しくなる点","変動費がゼロとなる点","売上高が最大となる点"],"a":0,"e":{"correct":"損益分岐点とは、売上高が総費用（固定費＋変動費）と等しくなる点であり、これを超えると利益が発生する。","wrong":{"B":"固定費のみでなく、変動費も含めた総費用と比較する。","C":"変動費は売上に比例して発生するためゼロにはならない。","D":"売上高が最大となる点は損益分岐点とは無関係。"},"point":"損益分岐点＝売上高＝固定費＋変動費。医療経営の基本概念。"}},{"q":"療養病床の人員配置基準において、看護職員の配置は患者何人に対して1人か。","c":["3人に1人","4人に1人","7人に1人","10人に1人"],"a":1,"e":{"correct":"療養病床の看護職員配置基準は患者4人に対して1人（4:1）である。一般病床は3:1。","wrong":{"A":"3:1は一般病床の看護職員配置基準。","C":"7:1は看護配置加算に関する基準であり、療養病床の基準ではない。","D":"10:1は介護施設等の基準であり療養病床とは異なる。"},"point":"一般病床＝3:1、療養病床＝4:1。看護配置基準は頻出。"}}]},{"id":2,"name":"医療保険制度","questions":[{"q":"国民皆保険制度が達成された年はどれか。","c":["1961年","1945年","1975年","2000年"],"a":0,"e":{"correct":"1961年（昭和36年）に国民健康保険法の改正により全国民がいずれかの公的医療保険に加入することが義務付けられた。","wrong":{"B":"1945年は終戦の年。","C":"1975年は皆保険達成とは異なる。","D":"2000年は介護保険制度の開始年。"},"point":"国民皆保険＝1961年。介護保険＝2000年。"}},{"q":"診療報酬の1点の単価と改定頻度について正しいのはどれか。","c":["1点＝10円で原則2年に1回改定","1点＝1円で毎年改定","1点＝10円で5年に1回改定","1点＝100円で2年に1回改定"],"a":0,"e":{"correct":"診療報酬は1点＝10円で原則2年に1回改定。中医協での議論を経て厚労大臣が告示。","wrong":{"B":"1点＝10円であり改定は2年に1回。","C":"改定は5年ではなく2年に1回。","D":"1点＝10円であり100円ではない。"},"point":"診療報酬＝1点10円・2年改定。介護報酬＝3年改定。"}},{"q":"高額療養費制度の説明として正しいのはどれか。","c":["月間の自己負担が上限額を超えた場合に超過分が払い戻される制度","年間100万円超で全額免除される制度","入院費用のみが対象の制度","70歳以上のみが対象の制度"],"a":0,"e":{"correct":"同一月の自己負担額が上限（所得に応じて設定）を超えた場合に超過分が保険者から払い戻される。","wrong":{"B":"月単位で上限を超えた分が払い戻される仕組み。","C":"入院・外来ともに対象。","D":"全年齢が対象。"},"point":"高額療養費＝月単位・所得に応じた上限。限度額適用認定証で窓口軽減可能。"}},{"q":"後期高齢者医療制度の対象年齢はどれか。","c":["75歳以上","65歳以上","70歳以上","80歳以上"],"a":0,"e":{"correct":"後期高齢者医療制度は75歳以上（および65〜74歳で一定障害あり）を対象とする独立した医療保険制度。2008年創設。","wrong":{"B":"65歳以上は前期高齢者に該当。","C":"70歳以上は高齢受給者証の対象年齢。","D":"80歳以上の区分は存在しない。"},"point":"後期高齢者＝75歳以上。前期高齢者＝65〜74歳。"}},{"q":"介護保険の被保険者について正しいのはどれか。","c":["第1号は65歳以上、第2号は40〜64歳","第1号は75歳以上、第2号は65〜74歳","すべての国民が被保険者","20歳以上が被保険者"],"a":0,"e":{"correct":"第1号被保険者＝65歳以上（原因不問）、第2号被保険者＝40〜64歳の医療保険加入者（特定疾病のみ）。","wrong":{"B":"75歳は後期高齢者の区分。介護保険の第1号は65歳以上。","C":"40歳以上であり全国民ではない。","D":"40歳以上が被保険者。"},"point":"介護保険＝40歳から。第1号＝65歳以上、第2号＝40〜64歳。"}},{"q":"混合診療の禁止について正しいのはどれか。","c":["保険診療と自由診療を同時に行うことが原則禁止","公立と私立の混合利用が禁止","内科と外科の混合受診が禁止","入院と外来の同日利用が禁止"],"a":0,"e":{"correct":"保険診療と自由診療を同一疾病について同時に行う混合診療は原則禁止。保険外併用療養費制度が例外。","wrong":{"B":"病院設置主体の混合ではない。","C":"診療科の混合とは無関係。","D":"入院・外来の同日利用は混合診療ではない。"},"point":"混合診療禁止の例外＝保険外併用療養費（評価療養・選定療養・患者申出療養）。"}},{"q":"保険外併用療養費の区分として正しいのはどれか。","c":["評価療養・選定療養・患者申出療養","応急療養・計画療養・予防療養","基本療養・特別療養・先進療養","入院療養・外来療養・在宅療養"],"a":0,"e":{"correct":"評価療養（先進医療・治験等）、選定療養（差額ベッド等）、患者申出療養（2016年創設）の3区分。","wrong":{"B":"そのような法的区分は存在しない。","C":"正式な分類ではない。","D":"療養の場の区分であり保険外併用療養費の区分ではない。"},"point":"患者申出療養は2016年から追加された新しい類型。"}},{"q":"審査支払機関として正しい組み合わせはどれか。","c":["社会保険診療報酬支払基金と国民健康保険団体連合会","厚生労働省と財務省","日本医師会と日本看護協会","都道府県と市区町村"],"a":0,"e":{"correct":"支払基金（社保）と国保連（国保）がレセプト審査と支払いを行う。","wrong":{"B":"行政機関であり審査支払機関ではない。","C":"職能団体であり審査支払業務は行わない。","D":"保険者であって審査支払機関ではない。"},"point":"支払基金＝社保。国保連＝国保。2つをセットで。"}},{"q":"DPC/PDPSの包括払いについて正しいのはどれか。","c":["入院1日当たりの定額を診断群分類に基づき算定","すべての医療費を1回の入院で定額とする方式","外来診療にも適用される","医療機関の規模に関わらず同一点数"],"a":0,"e":{"correct":"DPC/PDPSは入院1日当たりの包括点数を診断群分類に基づき算定。手術等は出来高。","wrong":{"B":"手術料等は出来高で別途算定。","C":"入院のみが対象。","D":"医療機関別係数があり病院ごとに異なる。"},"point":"DPC＝入院1日定額。手術・麻酔は出来高。医療機関別係数あり。"}},{"q":"出来高払い方式の説明として正しいのはどれか。","c":["実施した診療行為ごとに点数を積み上げて算定","1日あたりの定額で算定","月額の定額で算定","年間総額を事前に決定"],"a":0,"e":{"correct":"出来高払い（Fee-for-Service）は個々の診療行為に対して点数を積み上げて算定する方式。","wrong":{"B":"1日定額はDPCの包括払い。","C":"月額定額は人頭払いに近い概念。","D":"年間総額決定は総額予算制。"},"point":"出来高＝やった分だけ。包括＝1日定額。外来＝出来高、入院＝DPCが主流。"}},{"q":"レセプトの説明として正しいのはどれか。","c":["医療機関が保険者に診療報酬を請求するための明細書","患者が保険料を支払うための請求書","審査支払機関が医療機関を評価する報告書","厚労省が医療費を集計する統計表"],"a":0,"e":{"correct":"レセプトは医療機関が審査支払機関を通じて保険者に診療報酬を請求する明細書。患者ごと月ごとに作成。","wrong":{"B":"患者の保険料支払い書類ではない。","C":"請求書であり評価報告書ではない。","D":"本来の目的は請求。二次的に統計利用される。"},"point":"レセプト＝医療機関→審査支払機関→保険者。月単位作成。"}},{"q":"公費負担医療に該当しないのはどれか。","c":["生活保護法の医療扶助","自立支援医療","感染症法の入院医療","民間の医療保険による給付"],"a":3,"e":{"correct":"公費負担医療は国・地方公共団体が公費で負担する制度。民間医療保険は公費ではない。","wrong":{"A":"医療扶助は代表的な公費負担医療。","B":"自立支援医療は公費負担医療に含まれる。","C":"感染症法の入院医療費は公費負担対象。"},"point":"公費負担医療＝法律に基づき国・自治体が負担。民間保険は公費ではない。"}},{"q":"労災保険の説明として正しいのはどれか。","c":["業務上の事由または通勤による傷病に対して給付","すべての傷病に適用","被保険者が保険料を全額負担","65歳以上のみが対象"],"a":0,"e":{"correct":"労災保険は業務災害・通勤災害が対象。保険料は全額事業主負担。","wrong":{"B":"業務災害・通勤災害のみが対象。","C":"保険料は全額事業主負担。","D":"年齢制限はない。"},"point":"労災＝業務上・通勤途上。保険料は全額事業主負担。"}},{"q":"療養担当規則について正しいのはどれか。","c":["保険医療機関及び保険医が保険診療で遵守すべき規則","患者が療養中に守るべき規則","保険者が保険料を徴収する規則","製薬会社が薬価を決定する規則"],"a":0,"e":{"correct":"療養担当規則は保険医療機関と保険医が保険診療で遵守すべき事項を定めた厚労省令。","wrong":{"B":"医療提供側の規則であり患者のルールではない。","C":"保険料徴収の規則ではない。","D":"薬価決定とは異なる。"},"point":"療担規則＝保険医療機関・保険医の義務。保険診療のルールブック。"}},{"q":"特定健診の対象年齢として正しいのはどれか。","c":["40〜74歳","20歳以上すべて","65〜74歳","75歳以上"],"a":0,"e":{"correct":"特定健診は40〜74歳の医療保険加入者が対象。メタボリックシンドロームに着目。2008年開始。","wrong":{"B":"40〜74歳が対象。","C":"65歳からではなく40歳から。","D":"75歳以上は後期高齢者医療制度。"},"point":"特定健診＝40〜74歳。メタボ健診。2008年開始。"}},{"q":"国民医療費に含まれないのはどれか。","c":["正常分娩の費用","入院医療費","外来医療費","調剤医療費"],"a":0,"e":{"correct":"国民医療費は傷病治療に要する費用の推計。正常分娩・健診・予防接種・差額ベッド代は含まれない。","wrong":{"B":"入院医療費は含まれる。","C":"外来医療費は含まれる。","D":"調剤医療費は含まれる。"},"point":"国民医療費に含まれない＝正常分娩・健診・予防接種・差額ベッド。"}},{"q":"診療報酬請求の流れとして正しいのはどれか。","c":["医療機関→審査支払機関→保険者→審査支払機関→医療機関","医療機関→保険者→審査支払機関→医療機関","患者→保険者→医療機関→審査支払機関","保険者→医療機関→患者→審査支払機関"],"a":0,"e":{"correct":"①医療機関がレセプトを審査支払機関に提出→②審査し保険者に送付→③保険者が支払い→④医療機関に支払い。","wrong":{"B":"直接保険者に請求するのではなく審査支払機関を介する。","C":"患者が起点ではない。","D":"保険者から始まるのではない。"},"point":"審査支払機関が中間に入る。"}},{"q":"保険医と保険医療機関の登録・指定について正しいのはどれか。","c":["保険医は厚生労働大臣の登録、保険医療機関は地方厚生局長の指定","ともに都道府県知事が指定","保険医は日本医師会が認定","保険医療機関は市区町村長が指定"],"a":0,"e":{"correct":"保険医は厚労大臣の登録、保険医療機関は地方厚生局長の指定を受ける。","wrong":{"B":"都道府県知事ではない。","C":"日本医師会は職能団体であり登録機関ではない。","D":"市区町村長に指定権限はない。"},"point":"保険医＝厚労大臣「登録」。保険医療機関＝地方厚生局長「指定」。"}},{"q":"70〜74歳の自己負担割合として原則正しいのはどれか。","c":["2割","1割","3割","5割"],"a":0,"e":{"correct":"70〜74歳の高齢受給者は原則2割。現役並み所得者は3割。","wrong":{"B":"1割は75歳以上の原則。","C":"3割は70歳未満または現役並み所得者。","D":"5割の自己負担は存在しない。"},"point":"〜6歳＝2割、〜69歳＝3割、70〜74歳＝2割、75歳〜＝1割。"}},{"q":"訪問看護療養費について正しいのはどれか。","c":["訪問看護ステーションからの訪問看護に対して支払われる療養費","病院内の看護に対する費用","通院付き添い看護の費用","看護師研修費の補助制度"],"a":0,"e":{"correct":"訪問看護ステーションの看護師が居宅訪問して行う療養上の世話に対する保険給付。医師の指示書が必要。","wrong":{"B":"病院内看護は入院基本料に含まれる。","C":"通院付き添いは対象外。","D":"研修費補助ではない。"},"point":"訪問看護療養費＝訪問看護ステーション。医師の指示書が必要。"}},{"q":"国保と社保の違いとして正しいのはどれか。","c":["国保は自営業者等で市区町村が保険者、社保は被用者で協会けんぽ等が保険者","国保は会社員、社保は自営業者が加入","国保と社保は同一の保険者が運営","国保は任意加入で社保は強制加入"],"a":0,"e":{"correct":"国保＝自営業者等・市区町村が保険者。社保＝会社員等・協会けんぽ等が保険者。","wrong":{"B":"加入者が逆。","C":"異なる保険者がそれぞれ運営。","D":"ともに強制加入。"},"point":"国保＝自営業・市区町村。社保＝被用者・協会けんぽ/健保組合。"}},{"q":"入院時食事療養費について正しいのはどれか。","c":["入院中の食事は保険給付対象で患者は標準負担額を自己負担","入院中の食事代は全額自己負担","入院中の食事代は全額保険給付","外来患者にも適用される"],"a":0,"e":{"correct":"入院時食事療養費は保険給付対象。患者は標準負担額（一般460円/食）を自己負担し残りが保険給付。","wrong":{"B":"全額自己負担ではなく標準負担額を超える分は保険給付。","C":"全額保険給付ではなく標準負担額は自己負担。","D":"入院患者のみが対象。"},"point":"入院食事＝標準負担額460円/食は自己負担、残りは保険給付。"}},{"q":"保険者の役割として正しいのはどれか。","c":["保険料の徴収と保険給付の実施","診療行為の直接的な提供","診療報酬点数表の作成","医師国家試験の実施"],"a":0,"e":{"correct":"保険者は保険料の徴収、被保険者証の交付、保険給付の実施が主な役割。","wrong":{"B":"診療行為の提供は医療機関の役割。","C":"点数表は中医協の議論を経て厚労大臣が告示。","D":"国家試験は厚労省の所管。"},"point":"保険者＝保険料徴収・被保険者証交付・保険給付。"}},{"q":"健康保険の保険料率の決定について正しいのはどれか。","c":["全国一律で厚生労働大臣が決定する","都道府県単位で協会けんぽが決定する","各医療機関が独自に設定する","被保険者の年齢のみで決定する"],"a":1,"e":{"correct":"協会けんぽの保険料率は都道府県単位で設定される。地域の医療費水準を反映するため都道府県ごとに異なる。","wrong":{"A":"全国一律ではなく都道府県単位。組合健保は組合ごとに設定。","C":"医療機関は保険料率の設定には関与しない。","D":"保険料率は年齢ではなく標準報酬月額に基づく。"},"point":"協会けんぽ＝都道府県単位の保険料率。組合健保＝組合ごとに設定。"}},{"q":"健康保険の被扶養者の認定要件として正しいのはどれか。","c":["年収200万円未満であること","年収130万円未満かつ被保険者の年収の2分の1未満","年齢が60歳未満であること","同一世帯に居住していること（例外なし）"],"a":1,"e":{"correct":"被扶養者は原則として年収130万円未満かつ被保険者の年収の1/2未満が認定要件。60歳以上・障害者は180万円未満。","wrong":{"A":"基準は200万円ではなく130万円（60歳以上は180万円）。","C":"年齢制限は75歳未満（後期高齢者医療制度移行）。60歳は収入基準の変更点。","D":"直系尊属・配偶者・子等は別居でも認定可能な場合がある。"},"point":"被扶養者認定＝年収130万円未満＋被保険者年収の1/2未満。60歳以上は180万円。"}},{"q":"療養の給付の範囲に含まれないものはどれか。","c":["診察","薬剤の支給","入院時の食事","正常分娩"],"a":3,"e":{"correct":"正常分娩は疾病ではないため療養の給付の対象外。出産育児一時金として別途支給される。","wrong":{"A":"診察は療養の給付の基本的な内容に含まれる。","B":"薬剤の支給は治療に必要な給付に含まれる。","C":"入院時の食事は入院時食事療養費として給付される。"},"point":"療養の給付＝診察・薬剤・処置・手術・入院等。正常分娩・美容整形は対象外。"}},{"q":"入院時生活療養費の対象となるのはどれか。","c":["一般病床に入院する65歳未満の者","療養病床に入院する65歳以上の者","すべての入院患者","外来通院中の患者"],"a":1,"e":{"correct":"入院時生活療養費は療養病床に入院する65歳以上の患者が対象。食費と居住費について生活療養標準負担額を自己負担する。","wrong":{"A":"一般病床の65歳未満は入院時食事療養費の対象。","C":"すべてではなく療養病床の65歳以上に限定。","D":"外来患者は入院時生活療養費の対象外。"},"point":"入院時生活療養費＝療養病床＋65歳以上。食費＋居住費の自己負担。"}},{"q":"傷病手当金の支給期間として正しいのはどれか。","c":["支給開始日から通算して1年","支給開始日から通算して1年6か月","支給開始日から連続して2年","支給開始日から連続して3年"],"a":1,"e":{"correct":"傷病手当金は2022年1月から支給開始日から通算して1年6か月に改正された（従来は連続1年6か月）。","wrong":{"A":"1年ではなく1年6か月。","C":"2年ではなく1年6か月。また2022年改正で「連続」から「通算」に変更。","D":"3年ではなく1年6か月。"},"point":"傷病手当金＝通算1年6か月（2022年改正）。支給額＝標準報酬日額の2/3。"}},{"q":"出産育児一時金の支給額として正しいのはどれか（2023年4月以降）。","c":["42万円","48.8万円","50万円","55万円"],"a":2,"e":{"correct":"出産育児一時金は2023年4月から50万円に引き上げられた（従来は42万円）。","wrong":{"A":"42万円は2023年3月までの金額。","B":"48.8万円は産科医療補償制度加算込みの旧金額に近いが正確ではない。","D":"55万円は現行の支給額ではない。"},"point":"出産育児一時金＝50万円（2023年4月〜）。旧額42万円からの増額。"}},{"q":"埋葬料（埋葬費）について正しいのはどれか。","c":["健康保険では一律10万円が支給される","健康保険では一律5万円が支給される","国民健康保険では全国一律の金額が定められている","労災保険から支給される"],"a":1,"e":{"correct":"健康保険の埋葬料は被保険者が死亡した場合に5万円が支給される。被扶養者死亡の場合は家族埋葬料として同額。","wrong":{"A":"10万円ではなく5万円。","C":"国民健康保険の葬祭費は市区町村により金額が異なる。","D":"業務上の死亡は労災だが、埋葬料は健康保険の給付。"},"point":"埋葬料＝5万円（健康保険）。国保の葬祭費は自治体により異なる。"}},{"q":"国民医療費の財源構成で最も大きい割合を占めるのはどれか。","c":["患者負担（自己負担）","公費（国庫＋地方）","事業主負担","保険料（被保険者負担）"],"a":1,"e":{"correct":"国民医療費の財源は公費（国庫負担＋地方負担）が約38%で最大。保険料が約49%（事業主＋被保険者）、患者負担が約12%。","wrong":{"A":"患者負担は約12%で最も小さい。","C":"事業主負担は保険料の一部で約21%程度。","D":"被保険者の保険料負担は約28%程度で公費より小さい。"},"point":"国民医療費の財源＝保険料約49%＞公費約38%＞患者負担約12%。"}},{"q":"社会保障制度の4つの柱に含まれないものはどれか。","c":["社会保険","公的扶助","社会福祉","医療提供"],"a":3,"e":{"correct":"社会保障制度の4つの柱は社会保険・公的扶助・社会福祉・公衆衛生。医療提供は社会保障の柱には含まれない。","wrong":{"A":"社会保険（医療・年金・介護・雇用・労災）は社会保障の中核。","B":"公的扶助は生活保護法に基づく制度。","C":"社会福祉は児童・障害者・高齢者等への福祉サービス。"},"point":"社会保障4本柱＝社会保険・公的扶助・社会福祉・公衆衛生。"}}]},{"id":3,"name":"医療関連法規","questions":[{"q":"医療法における病院と診療所の区分基準はどれか。","c":["病院は20床以上、診療所は19床以下または無床","病院は50床以上、診療所は49床以下","病院は入院施設あり、診療所は入院施設なし","法的な区分はない"],"a":0,"e":{"correct":"医療法により病院は20人以上、診療所は19人以下または無床と定義。","wrong":{"B":"50床以上の基準は存在しない。","C":"有床診療所（19床以下）もある。","D":"医療法で明確に区分されている。"},"point":"病院＝20床以上、診療所＝0〜19床。"}},{"q":"診療録の保存期間として正しいのはどれか。","c":["5年間","3年間","10年間","永久保存"],"a":0,"e":{"correct":"医師法第24条により診療録は5年間保存。診療に関する諸記録は医療法施行規則で2年間。","wrong":{"B":"3年間ではなく5年間。","C":"10年間は法定ではない。","D":"永久保存は法的義務ではない。"},"point":"診療録＝5年（医師法）。診療諸記録＝2年（医療法施行規則）。"}},{"q":"応召義務の内容として正しいのはどれか。","c":["正当な事由がなければ診療を拒んではならない","すべての患者を無条件に診療しなければならない","24時間365日診療する義務","往診を断ることはできない"],"a":0,"e":{"correct":"医師法第19条は正当な事由がなければ診療を拒否できないと規定。","wrong":{"B":"正当な事由があれば拒否可能。","C":"24時間365日の義務はない。","D":"正当事由があれば断れる。"},"point":"応召義務＝「正当な事由がなければ」拒否不可。"}},{"q":"要配慮個人情報に該当するのはどれか。","c":["病歴","氏名","住所","電話番号"],"a":0,"e":{"correct":"要配慮個人情報は病歴・障害・犯罪歴等。取得に原則本人同意が必要。オプトアウト不可。","wrong":{"B":"氏名は個人情報だが要配慮ではない。","C":"住所は要配慮ではない。","D":"電話番号は要配慮ではない。"},"point":"要配慮個人情報＝病歴・障害・犯罪歴等。オプトアウト不可。"}},{"q":"守秘義務を定めた刑法の条文はどれか。","c":["刑法第134条","刑法第1条","刑法第199条","刑法第235条"],"a":0,"e":{"correct":"刑法第134条は医師・薬剤師・助産師等の守秘義務違反を規定。","wrong":{"B":"第1条は総則。","C":"第199条は殺人罪。","D":"第235条は窃盗罪。"},"point":"守秘義務＝刑法134条。"}},{"q":"電子保存の3基準として正しいのはどれか。","c":["真正性・見読性・保存性","機密性・完全性・可用性","正確性・網羅性・適時性","安全性・信頼性・効率性"],"a":0,"e":{"correct":"電子保存の3基準は真正性、見読性、保存性。セキュリティの3要素（CIA）とは異なる。","wrong":{"B":"機密性・完全性・可用性は情報セキュリティの3要素（CIA）。","C":"データ品質の要素であり電子保存の基準ではない。","D":"システム評価の指標であり3基準ではない。"},"point":"電子保存3基準＝真正性・見読性・保存性。CIAとの混同に注意。"}},{"q":"感染症法の1類感染症に該当するのはどれか。","c":["エボラ出血熱","インフルエンザ","結核","梅毒"],"a":0,"e":{"correct":"1類感染症はエボラ、ペスト、痘そう等の7疾患。最も危険度が高い。","wrong":{"B":"インフルエンザは5類感染症。","C":"結核は2類感染症。","D":"梅毒は5類感染症。"},"point":"1類＝エボラ・ペスト等7疾患。2類＝結核・SARS等。"}},{"q":"異状死の届出先として正しいのはどれか。","c":["所轄警察署","保健所","厚生労働省","都道府県知事"],"a":0,"e":{"correct":"医師法第21条により24時間以内に所轄警察署に届け出る。","wrong":{"B":"保健所は感染症の届出先。","C":"厚労省は届出先ではない。","D":"都道府県知事は届出先ではない。"},"point":"異状死＝24時間以内に所轄警察署。感染症＝保健所。"}},{"q":"死亡診断書と死体検案書の違いとして正しいのはどれか。","c":["生前診療していた患者の死亡は死亡診断書、それ以外は死体検案書","すべての死亡に死亡診断書が交付される","死亡診断書は看護師も作成できる","死体検案書は警察官が作成する"],"a":0,"e":{"correct":"死亡診断書は生前診療していた傷病に関連した死亡。死体検案書はそれ以外。どちらも医師が作成。","wrong":{"B":"診療関係がない場合は死体検案書。","C":"看護師には作成権限がない。","D":"警察官には作成権限がない。"},"point":"死亡診断書＝自分の患者。死体検案書＝それ以外。どちらも医師が作成。"}},{"q":"処方箋の使用期間として原則正しいのはどれか。","c":["交付日含め4日以内","交付日含め7日以内","14日以内","30日以内"],"a":0,"e":{"correct":"処方箋の使用期間は交付の日を含めて4日以内（療養担当規則）。","wrong":{"B":"7日以内ではなく4日以内。","C":"14日以内ではない。","D":"30日以内ではない。"},"point":"処方箋有効期限＝交付日含め4日。"}},{"q":"診療に関する諸記録の保存期間はどれか。","c":["2年間","5年間","3年間","10年間"],"a":0,"e":{"correct":"医療法施行規則により看護記録・検査記録等の諸記録は2年間保存。診療録の5年とは異なる。","wrong":{"B":"5年は診療録の保存期間。","C":"3年の規定はない。","D":"10年は法定ではない。"},"point":"診療録＝5年、諸記録＝2年。この区別は頻出。"}},{"q":"特定機能病院の承認要件として正しいのはどれか。","c":["16以上の診療科と400床以上","10以上の診療科と200床以上","すべての診療科と500床以上","救急科と100床以上"],"a":0,"e":{"correct":"特定機能病院＝16以上の診療科＋400床以上＋高度医療能力等。","wrong":{"B":"10診療科・200床は地域医療支援病院に近い要件。","C":"すべての診療科ではなく16以上。500床ではなく400床。","D":"救急科と100床は要件ではない。"},"point":"特定機能病院＝16診療科以上＋400床以上。"}},{"q":"臨床研究法の対象として正しいのはどれか。","c":["特定臨床研究（未承認薬使用や企業資金提供のある研究）","すべての動物実験","基礎研究","疫学調査のみ"],"a":0,"e":{"correct":"臨床研究法（2018年施行）は特定臨床研究が対象。認定臨床研究審査委員会（CRB）審査が必要。","wrong":{"B":"動物実験は別の法令で規制。","C":"基礎研究は人を対象としないため対象外。","D":"疫学調査のみではない。"},"point":"臨床研究法＝特定臨床研究が対象。2018年施行。"}},{"q":"精神保健福祉法の措置入院の要件として正しいのはどれか。","c":["指定医2名以上の診察で自傷他害のおそれがある場合","本人同意で1名の医師の判断で可能","家族の申請のみで可能","市区町村長の判断のみで可能"],"a":0,"e":{"correct":"措置入院＝指定医2名＋自傷他害のおそれ＋都道府県知事の権限。","wrong":{"B":"本人同意不要の強制入院。1名では不可。","C":"家族同意は医療保護入院。","D":"都道府県知事であり市区町村長ではない。"},"point":"措置入院＝指定医2名＋自傷他害＋知事。医療保護入院＝指定医1名＋家族同意。"}},{"q":"児童虐待防止法の通告義務について正しいのはどれか。","c":["児童虐待を発見した者は速やかに通告しなければならない","医師のみに通告義務がある","書面でのみ通告可能","確証がなければ通告不可"],"a":0,"e":{"correct":"すべての国民に通告義務がある。「虐待を受けたと思われる」段階で通告。守秘義務に優先。","wrong":{"B":"医師に限らず全国民の義務。","C":"電話等でも可能。","D":"確証なくても「思われる」段階で通告義務。"},"point":"児童虐待通告＝全国民の義務。「思われる」段階で。守秘義務より優先。"}},{"q":"医療広告規制について正しいのはどれか。","c":["広告可能事項が限定列挙されている","医療機関は自由に広告できる","患者の体験談を使用できる","比較広告は許可されている"],"a":0,"e":{"correct":"医療法では広告可能事項がポジティブリスト方式で限定。Web広告も2018年から規制対象。","wrong":{"B":"広告は制限されている。","C":"患者体験談は2018年ガイドラインで禁止。","D":"比較広告は禁止。"},"point":"医療広告＝限定列挙。体験談・比較広告は禁止。"}},{"q":"e-文書法の医療分野における意義はどれか。","c":["法令で保存義務のある文書の電子保存を可能にした","電子メール送信を義務付けた","電子カルテ導入を義務付けた","紙の診療録の廃棄を命じた"],"a":0,"e":{"correct":"e-文書法（2005年施行）は紙保存義務の文書を電子でも保存可能にした法律。","wrong":{"B":"メール送信義務ではない。","C":"電子カルテ導入の義務ではなく「許可」。","D":"紙の廃棄命令ではない。"},"point":"e-文書法＝電子保存を「可能にした」法律。義務ではなく許可。"}},{"q":"助産所の入所施設の上限はどれか。","c":["9床以下","19床以下","20床以上","制限なし"],"a":0,"e":{"correct":"助産所は入所施設を設ける場合9人以下が要件。嘱託医師の指定が必要。","wrong":{"B":"19床以下は診療所の基準。","C":"20床以上は病院の定義。","D":"9床以下の制限がある。"},"point":"助産所＝9床以下。診療所＝19床以下。病院＝20床以上。"}},{"q":"薬機法の規制対象に含まれないのはどれか。","c":["医薬品","医療機器","再生医療等製品","食品"],"a":3,"e":{"correct":"薬機法は医薬品・医薬部外品・化粧品・医療機器・再生医療等製品の5分類を規制。食品は別法で規制。","wrong":{"A":"医薬品は薬機法の主要な規制対象。","B":"医療機器はクラス分類に基づく規制を受ける。","C":"再生医療等製品は2014年の法改正で追加。"},"point":"薬機法＝5分類。食品は食品衛生法等で規制。"}},{"q":"診療情報の開示を拒否できる正当な理由はどれか。","c":["開示により患者の心身を著しく損なうおそれ","患者が開示を希望している","診療録の量が多い","医師が多忙"],"a":0,"e":{"correct":"開示拒否の正当理由＝患者の心身を著しく損なうおそれ、第三者の利益侵害等。","wrong":{"B":"患者本人の希望には原則開示。","C":"記録量は拒否理由にならない。","D":"多忙は拒否理由にならない。"},"point":"開示拒否＝心身を著しく損なうおそれ。事務的理由は不可。"}},{"q":"看護師の業務として正しいのはどれか。","c":["療養上の世話又は診療の補助","医師の指示なく医行為を行うこと","処方箋の発行","死亡診断書の作成"],"a":0,"e":{"correct":"保健師助産師看護師法により看護師は療養上の世話・診療の補助を業とする。","wrong":{"B":"医師の指示なく医行為は不可。","C":"処方箋発行は医師の権限。","D":"死亡診断書は医師の権限。"},"point":"看護師＝療養上の世話＋診療の補助。補助は医師の指示が必要。"}},{"q":"高齢者虐待防止法で通報義務が課されるのはどれか。","c":["養介護施設従事者等","一般市民のみ","警察官のみ","介護保険の保険者のみ"],"a":0,"e":{"correct":"養介護施設従事者等は高齢者虐待を発見した場合に市町村への通報義務がある。","wrong":{"B":"一般市民のみではなく施設従事者に義務がある。","C":"警察官のみではない。","D":"保険者のみではない。"},"point":"高齢者虐待＝養介護施設従事者等に通報義務。市町村が窓口。"}},{"q":"再生医療安全性確保法の目的として正しいのはどれか。","c":["再生医療の安全性を確保しつつ迅速な提供を推進","再生医療を全面的に禁止","再生医療の費用を無料化","再生医療を保険診療のみに限定"],"a":0,"e":{"correct":"再生医療安全性確保法は再生医療の安全性を確保しつつ迅速な提供・普及を推進する法律。リスク分類に基づく規制。","wrong":{"B":"全面禁止ではなくリスクに応じた規制のもとで推進。","C":"費用の無料化を目的とする法律ではない。","D":"保険診療に限定するものではない。"},"point":"再生医療安全性確保法＝安全性確保＋迅速な提供推進。リスク分類（第1種〜第3種）。"}},{"q":"医療法の第一次改正（1985年）で導入された制度はどれか。","c":["特定機能病院制度","地域医療計画の策定","臨床研修の必修化","患者への説明義務"],"a":1,"e":{"correct":"1985年の第一次医療法改正で都道府県に地域医療計画の策定が義務付けられ、必要病床数（現：基準病床数）の概念が導入された。","wrong":{"A":"特定機能病院制度は1992年の第二次改正で創設。","C":"臨床研修の必修化は2004年から。","D":"患者への説明義務は1997年の第三次改正で規定。"},"point":"第一次改正（1985年）＝医療計画・必要病床数。第二次（1992年）＝特定機能病院・療養型病床群。"}},{"q":"地域医療支援病院の要件として正しいのはどれか。","c":["病床数が500床以上であること","紹介率が80%以上であること","救急医療を提供する能力を有すること","厚生労働大臣の承認を受けること"],"a":2,"e":{"correct":"地域医療支援病院は救急医療の提供、地域の医療従事者への研修、共同利用の実施等が要件。都道府県知事が承認する。","wrong":{"A":"病床数200床以上が要件であり500床以上ではない。","B":"紹介率80%以上は必須要件ではない。紹介率65%以上等の基準がある。","D":"承認は都道府県知事であり厚生労働大臣ではない。"},"point":"地域医療支援病院＝200床以上＋救急＋共同利用＋研修。都道府県知事が承認。"}},{"q":"特定機能病院の承認要件に該当するのはどれか。","c":["病床数200床以上","高度の医療を提供する能力","都道府県知事が承認する","すべての診療科を標榜すること"],"a":1,"e":{"correct":"特定機能病院は高度医療の提供・開発・研修を行う能力を有し、400床以上、16以上の診療科を有すること等が要件。厚生労働大臣が承認。","wrong":{"A":"200床以上ではなく400床以上が要件。","C":"都道府県知事ではなく厚生労働大臣が承認する。","D":"すべてではなく16以上の診療科の標榜が要件。"},"point":"特定機能病院＝400床以上＋16診療科以上＋高度医療。厚生労働大臣承認。"}},{"q":"医療計画に記載すべき5疾病に含まれないものはどれか。","c":["がん","脳卒中","肝疾患","精神疾患"],"a":2,"e":{"correct":"5疾病はがん・脳卒中・心筋梗塞等の心血管疾患・糖尿病・精神疾患。肝疾患は含まれない。","wrong":{"A":"がんは5疾病の一つ。","B":"脳卒中は5疾病の一つ。","D":"精神疾患は2013年の第6次医療計画から5疾病に追加。"},"point":"5疾病＝がん・脳卒中・心血管疾患・糖尿病・精神疾患。5事業＝救急・災害・へき地・周産期・小児。"}},{"q":"救急医療体制における二次救急医療の役割はどれか。","c":["軽症患者の外来診療","入院治療を必要とする重症患者への対応","生命危機の重篤患者への高度救命医療","すべての救急患者のトリアージ"],"a":1,"e":{"correct":"二次救急は入院治療を要する重症救急患者に対応する。病院群輪番制や共同利用型病院が該当する。","wrong":{"A":"軽症患者の外来診療は初期（一次）救急の役割。","C":"生命危機の重篤患者への対応は三次救急（救命救急センター）。","D":"トリアージは救急の一機能だが二次救急の主たる役割ではない。"},"point":"一次＝軽症外来、二次＝入院重症、三次＝重篤救命。段階的救急体制。"}},{"q":"医薬品医療機器等法（旧薬事法）の名称変更が行われた年はどれか。","c":["2006年","2009年","2013年","2014年"],"a":3,"e":{"correct":"2014年に薬事法が「医薬品、医療機器等の品質、有効性及び安全性の確保等に関する法律」（医薬品医療機器等法/薬機法）に改称された。","wrong":{"A":"2006年は薬事法の一部改正だが名称変更ではない。","B":"2009年は薬事法改正の年だが名称変更は行われていない。","C":"2013年は再生医療等安全性確保法の制定年。"},"point":"2014年＝薬事法→薬機法（医薬品医療機器等法）。再生医療等製品も規制対象に追加。"}},{"q":"個人情報保護法における個人情報の第三者提供の例外に該当しないのはどれか。","c":["本人の同意がある場合","法令に基づく場合","学術研究目的の場合","医療機関の経営改善目的の場合"],"a":3,"e":{"correct":"個人情報の第三者提供の例外は本人同意・法令基づき・人の生命等の保護・公衆衛生向上等。経営改善目的は例外に該当しない。","wrong":{"A":"本人の同意がある場合は第三者提供が認められる（原則）。","B":"法令に基づく場合（届出義務等）は例外として認められる。","C":"学術研究機関による学術研究目的は例外規定がある。"},"point":"第三者提供の例外＝本人同意・法令・生命保護・公衆衛生・学術研究等。経営目的は不可。"}},{"q":"診療情報提供書（紹介状）の記載事項として必須でないものはどれか。","c":["患者の氏名・生年月日","傷病名および既往歴","紹介目的","患者の年収情報"],"a":3,"e":{"correct":"診療情報提供書には患者情報・傷病名・紹介目的・診療経過等を記載する。年収情報は医療上不要であり記載事項ではない。","wrong":{"A":"患者の基本情報（氏名・生年月日）は必須記載事項。","B":"傷病名と既往歴は紹介先での診療に不可欠。","C":"紹介目的（精査依頼・転医等）は必須。"},"point":"診療情報提供書＝患者情報＋傷病名＋紹介目的＋診療経過＋検査結果。"}},{"q":"死亡届の届出義務者として最も優先順位が高いのはどれか。","c":["同居の親族","同居していない親族","家主","後見人"],"a":0,"e":{"correct":"戸籍法により死亡届の届出義務者の優先順位は①同居の親族②その他の同居者③家主・地主・家屋管理人の順。","wrong":{"B":"同居していない親族は同居の親族より優先順位が低い。","C":"家主は同居の親族・その他の同居者に次ぐ優先順位。","D":"後見人は届出できるが最優先ではない。"},"point":"死亡届＝7日以内。届出義務者の順位＝同居親族→同居者→家主。死亡診断書は医師が作成。"}}]},{"id":4,"name":"医学用語・医学略語","questions":[{"q":"MIの正式名称はどれか。","c":["Myocardial Infarction（心筋梗塞）","Mitral Insufficiency","Multiple Infection","Medical Indication"],"a":0,"e":{"correct":"MI＝Myocardial Infarction（心筋梗塞）。AMI＝急性心筋梗塞。","wrong":{"B":"僧帽弁閉鎖不全はMR。","C":"多発感染にMIは使わない。","D":"MIは心筋梗塞を指す。"},"point":"MI＝心筋梗塞。AMI＝急性心筋梗塞。"}},{"q":"COPDの正式名称はどれか。","c":["Chronic Obstructive Pulmonary Disease","Congenital Obstructive Pulmonary Disorder","Chronic Organic Peripheral Disease","Cardiac Output Pressure Deficiency"],"a":0,"e":{"correct":"COPD＝慢性閉塞性肺疾患。主に喫煙が原因で気流制限を来す。","wrong":{"B":"先天性ではなく後天性の疾患。","C":"末梢疾患ではなく肺の疾患。","D":"心臓ではなく肺の疾患。"},"point":"COPD＝慢性閉塞性肺疾患。喫煙が最大原因。"}},{"q":"SOAP形式の「S」の意味はどれか。","c":["Subjective（主観的情報）","Structure","Surgery","Symptom"],"a":0,"e":{"correct":"S＝Subjective data（主観的データ）。患者の訴え・自覚症状を記録。","wrong":{"B":"StructureはSOAPの要素ではない。","C":"SurgeryはSOAPのSではない。","D":"Symptomではない。SはSubjective。"},"point":"SOAP＝Subjective・Objective・Assessment・Plan。"}},{"q":"バイタルサインに含まれないのはどれか。","c":["体温","血圧","脈拍","血液型"],"a":3,"e":{"correct":"バイタルサインは体温・血圧・脈拍・呼吸数・SpO2。血液型は不変の属性。","wrong":{"A":"体温はバイタルサインの基本項目。","B":"血圧はバイタルサインの基本項目。","C":"脈拍はバイタルサインの基本項目。"},"point":"バイタルサイン＝体温・血圧・脈拍・呼吸数・SpO2。変動する生命兆候。"}},{"q":"「-ectomy」の意味はどれか。","c":["切除術","炎症","検査","形成術"],"a":0,"e":{"correct":"-ectomy＝切除術。例：gastrectomy＝胃切除術。","wrong":{"B":"炎症は-itis。","C":"検査は-scopy。","D":"形成術は-plasty。"},"point":"-ectomy＝切除、-itis＝炎症、-scopy＝鏡視、-plasty＝形成。"}},{"q":"CABGの意味はどれか。","c":["冠動脈バイパス術","心臓バイパスカテーテル","中心動脈血ガス","慢性腹部腸管ガス"],"a":0,"e":{"correct":"CABG＝Coronary Artery Bypass Grafting（冠動脈バイパス術）。読みは「キャベジ」。","wrong":{"B":"その略語は存在しない。","C":"CABGではない。","D":"存在しない用語。"},"point":"CABG＝冠動脈バイパス術。PCI＝経皮的冠動脈インターベンション。"}},{"q":"HbA1cが示す内容はどれか。","c":["過去1〜2ヶ月の平均血糖値の指標","即時の血糖値","肝機能の指標","腎機能の指標"],"a":0,"e":{"correct":"HbA1c＝過去1〜2ヶ月の平均血糖コントロール状態を反映。糖尿病管理の重要指標。","wrong":{"B":"即時の血糖値はFPG。","C":"肝機能はAST・ALT。","D":"腎機能はBUN・Cr・eGFR。"},"point":"HbA1c＝過去1〜2ヶ月の血糖平均値。正常4.6〜6.2%。"}},{"q":"CRPが示す内容はどれか。","c":["炎症の有無や程度を反映する急性期反応物質","血糖値の指標","血液凝固能の指標","肝臓の解毒機能の指標"],"a":0,"e":{"correct":"CRP＝C-Reactive Protein。炎症マーカーとして感染症・組織損傷等で上昇。","wrong":{"B":"血糖値はグルコース・HbA1c。","C":"凝固能はPT・APTT。","D":"解毒機能はICG試験等。"},"point":"CRP＝炎症マーカー。正常0.3mg/dL以下。"}},{"q":"「p.o.」の意味はどれか。","c":["経口投与","静脈注射","筋肉注射","皮下注射"],"a":0,"e":{"correct":"p.o.＝per os（経口投与）。ラテン語由来。","wrong":{"B":"静脈注射はi.v.。","C":"筋肉注射はi.m.。","D":"皮下注射はs.c.。"},"point":"p.o.＝経口、i.v.＝静注、i.m.＝筋注、s.c.＝皮下注。"}},{"q":"MRSAの正式名称はどれか。","c":["Methicillin-Resistant Staphylococcus Aureus","Multi-Resistant Streptococcus Aureus","Methicillin-Responsive Staphylococcus Aureus","Minimal Resistance Staphylococcus Aureus"],"a":0,"e":{"correct":"MRSA＝メチシリン耐性黄色ブドウ球菌。院内感染の代表的起因菌。","wrong":{"B":"Streptococcusはレンサ球菌で別物。","C":"Resistantが正しく、Responsiveは逆の意味。","D":"正式名称ではない。"},"point":"MRSA＝メチシリン耐性黄色ブドウ球菌。接触予防策が基本。"}},{"q":"ERCPの意味はどれか。","c":["内視鏡的逆行性胆管膵管造影","緊急蘇生心肺プロトコル","外部放射線化学療法","内視鏡的根治癌処置"],"a":0,"e":{"correct":"ERCP＝Endoscopic Retrograde Cholangiopancreatography。十二指腸から胆管・膵管を造影。","wrong":{"B":"救急のプロトコルではない。","C":"放射線治療ではない。","D":"癌処置ではない。"},"point":"ERCP＝内視鏡的逆行性胆管膵管造影。"}},{"q":"PETの正式名称はどれか。","c":["Positron Emission Tomography","Percutaneous Endoscopic Treatment","Pulmonary Embolism Test","Peripheral Extremity Thermography"],"a":0,"e":{"correct":"PET＝陽電子放射断層撮影。FDGの糖代謝を利用してがんを検出。","wrong":{"B":"PETは内視鏡治療ではない。","C":"肺塞栓検査ではない。","D":"温度記録ではない。"},"point":"PET＝陽電子放射断層撮影。がんの検出に使用。"}},{"q":"「s/o」の意味はどれか。","c":["〜の疑い（suspect of）","〜を除外（strike off）","〜の手術","〜を中止"],"a":0,"e":{"correct":"s/o＝suspect of（疑い）。確定診断前の疑い病名に使用。","wrong":{"B":"除外はr/o（rule out）。","C":"手術にs/oは使わない。","D":"中止にs/oは使わない。"},"point":"s/o＝疑い、r/o＝除外診断、c/c＝主訴。"}},{"q":"CPRの正式名称はどれか。","c":["Cardiopulmonary Resuscitation","Cardiac Pressure Recovery","Central Pulse Regulation","Chest Pain Relief"],"a":0,"e":{"correct":"CPR＝心肺蘇生法。胸骨圧迫と人工呼吸による救命処置。","wrong":{"B":"正式名称ではない。","C":"正式名称ではない。","D":"正式名称ではない。"},"point":"CPR＝心肺蘇生。BLS＝一次救命。ACLS＝二次救命。"}},{"q":"DMの日本語名はどれか。","c":["糖尿病","心筋梗塞","脳卒中","高血圧症"],"a":0,"e":{"correct":"DM＝Diabetes Mellitus（糖尿病）。1型と2型に大別。","wrong":{"B":"心筋梗塞はMI。","C":"脳卒中はCVA。","D":"高血圧はHT。"},"point":"DM＝糖尿病、HT＝高血圧、MI＝心筋梗塞、CVA＝脳卒中。"}},{"q":"「b.i.d.」の意味はどれか。","c":["1日2回","1日1回","1日3回","食前"],"a":0,"e":{"correct":"b.i.d.＝bis in die（1日2回）。処方の投薬回数指示。","wrong":{"B":"1日1回はq.d.。","C":"1日3回はt.i.d.。","D":"食前はa.c.。"},"point":"q.d.＝1回、b.i.d.＝2回、t.i.d.＝3回。"}},{"q":"BNPが指標となる疾患はどれか。","c":["心不全","腎不全","肝不全","呼吸不全"],"a":0,"e":{"correct":"BNP＝脳性ナトリウム利尿ペプチド。心不全の診断・重症度評価に使用。","wrong":{"B":"腎不全はBUN・Cr。","C":"肝不全はAST・ALT。","D":"呼吸不全は血液ガス。"},"point":"BNP＝心不全マーカー。「Brain」だが主に心室で産生。"}},{"q":"CBCの正式名称はどれか。","c":["Complete Blood Count","Cardiac Bypass Catheter","Central Blood Culture","Cerebral Blood Circulation"],"a":0,"e":{"correct":"CBC＝全血球計算（血算）。WBC・RBC・Hb・Ht・PLTを測定する基本血液検査。","wrong":{"B":"CBCとは異なる。","C":"血液培養はBC。","D":"CBCではない。"},"point":"CBC＝血算。入院時ルーチン検査。"}},{"q":"SpO2の意味はどれか。","c":["経皮的動脈血酸素飽和度","収縮期血圧","血清蛋白量","脊椎の第2レベル"],"a":0,"e":{"correct":"SpO2＝経皮的動脈血酸素飽和度。パルスオキシメーターで非侵襲的に測定。正常96%以上。","wrong":{"B":"収縮期血圧はSBP。","C":"血清蛋白量はTP。","D":"脊椎レベルの略語ではない。"},"point":"SpO2＝酸素飽和度。パルスオキシメーターで測定。正常96%以上。"}},{"q":"PCIの正式名称はどれか。","c":["Percutaneous Coronary Intervention（経皮的冠動脈インターベンション）","Primary Care Institution","Peripheral Circulation Index","Pulmonary Capillary Insufficiency"],"a":0,"e":{"correct":"PCI＝経皮的冠動脈インターベンション。カテーテルを用いた冠動脈治療。ステント留置等。","wrong":{"B":"PCIは冠動脈治療の略語。","C":"末梢循環指数ではない。","D":"肺毛細血管不全ではない。"},"point":"PCI＝カテーテルによる冠動脈治療。CABG＝外科的バイパス術。対比で覚える。"}},{"q":"ICU（Intensive Care Unit）の日本語名称として正しいのはどれか。","c":["冠疾患集中治療室","集中治療室","新生児集中治療室","高度治療室"],"a":1,"e":{"correct":"ICUはIntensive Care Unitの略で集中治療室を意味する。重症患者の集中的な治療・看護を行う。","wrong":{"A":"冠疾患集中治療室はCCU（Coronary Care Unit）。","C":"新生児集中治療室はNICU（Neonatal ICU）。","D":"高度治療室はHCU（High Care Unit）。"},"point":"ICU＝集中治療室、CCU＝冠疾患、NICU＝新生児、HCU＝高度治療室。"}},{"q":"NSAIDsの正式名称はどれか。","c":["Non-Steroidal Anti-Inflammatory Drugs","Non-Specific Anti-Infective Drugs","Neuro-Stimulating Anti-Inflammatory Drugs","Non-Steroidal Anti-Infective Drugs"],"a":0,"e":{"correct":"NSAIDsはNon-Steroidal Anti-Inflammatory Drugs（非ステロイド性抗炎症薬）の略。ロキソプロフェン、イブプロフェン等が該当。","wrong":{"B":"Anti-Infective（抗感染）ではなくAnti-Inflammatory（抗炎症）。","C":"Neuro-Stimulatingは神経刺激の意味で無関係。","D":"Anti-InfectiveではなくAnti-Inflammatoryが正しい。"},"point":"NSAIDs＝非ステロイド性抗炎症薬。PPI＝プロトンポンプ阻害薬。SSRI＝選択的セロトニン再取り込み阻害薬。"}},{"q":"PPIが意味する薬剤分類はどれか。","c":["プロテアーゼ阻害薬","プロトンポンプ阻害薬","血小板凝集阻害薬","ホスホジエステラーゼ阻害薬"],"a":1,"e":{"correct":"PPIはProton Pump Inhibitor（プロトンポンプ阻害薬）の略。胃酸分泌を抑制する薬剤で、オメプラゾール等が代表的。","wrong":{"A":"プロテアーゼ阻害薬はPI（Protease Inhibitor）。","C":"血小板凝集阻害薬は抗血小板薬に分類される。","D":"ホスホジエステラーゼ阻害薬はPDE阻害薬。"},"point":"PPI＝プロトンポンプ阻害薬（胃酸抑制）。H2ブロッカーとの違いも把握。"}},{"q":"血液検査でHbA1cが示す臨床的意義はどれか。","c":["過去1〜2か月の平均血糖値の指標","肝機能の指標","腎機能の指標","炎症反応の指標"],"a":0,"e":{"correct":"HbA1cはグリコヘモグロビンで、過去1〜2か月間の平均血糖コントロール状態を反映する。糖尿病の診断・管理に用いる。","wrong":{"B":"肝機能の指標はAST・ALT・γ-GTP等。","C":"腎機能の指標はBUN・クレアチニン・eGFR等。","D":"炎症反応の指標はCRP・赤沈等。"},"point":"HbA1c＝過去1-2か月の血糖。基準値6.5%未満。糖尿病診断の重要指標。"}},{"q":"ROMが意味するリハビリテーション用語はどれか。","c":["日常生活動作","機能的自立度評価","関節可動域","運動負荷試験"],"a":2,"e":{"correct":"ROMはRange of Motion（関節可動域）の略。リハビリテーションにおいて関節の動く範囲を評価する重要な指標。","wrong":{"A":"日常生活動作はADL（Activities of Daily Living）。","B":"機能的自立度評価はFIM（Functional Independence Measure）。","D":"運動負荷試験はExercise Stress Test。"},"point":"ROM＝関節可動域、ADL＝日常生活動作、FIM＝機能的自立度評価法。"}},{"q":"FIMの評価項目の総数はどれか。","c":["10項目","13項目","18項目","25項目"],"a":2,"e":{"correct":"FIM（機能的自立度評価法）は運動項目13項目と認知項目5項目の計18項目で構成される。各項目1〜7点で評価。","wrong":{"A":"10項目はBarthel Indexの評価項目数。","B":"13項目は運動項目のみの数。","D":"25項目はFIMの項目数ではない。"},"point":"FIM＝18項目（運動13＋認知5）。1〜7点×18＝最高126点、最低18点。"}},{"q":"SSRIが適応となる主な疾患はどれか。","c":["高血圧症","うつ病","糖尿病","骨粗鬆症"],"a":1,"e":{"correct":"SSRIはSelective Serotonin Reuptake Inhibitor（選択的セロトニン再取り込み阻害薬）で、うつ病・パニック障害等の治療に用いる。","wrong":{"A":"高血圧にはCa拮抗薬・ARB・ACE阻害薬等を使用。","C":"糖尿病にはインスリン・経口血糖降下薬等を使用。","D":"骨粗鬆症にはビスホスホネート等を使用。"},"point":"SSRI＝うつ病の第一選択薬。SNRI・NaSSA等の抗うつ薬との違いも重要。"}},{"q":"TPN（Total Parenteral Nutrition）の日本語訳はどれか。","c":["経腸栄養","完全静脈栄養","経口栄養","半消化態栄養"],"a":1,"e":{"correct":"TPNはTotal Parenteral Nutrition（完全静脈栄養/中心静脈栄養）の略。経口摂取や経腸栄養が不可能な患者に対して中心静脈から栄養を投与する方法。","wrong":{"A":"経腸栄養はEN（Enteral Nutrition）。経管栄養とも呼ばれる。","C":"経口栄養は通常の食事摂取のこと。","D":"半消化態栄養は経腸栄養剤の一種で、TPNとは異なる。"},"point":"TPN＝完全静脈栄養（中心静脈栄養）。PPN＝末梢静脈栄養。EN＝経腸栄養。"}}]},{"id":5,"name":"臨床医学","questions":[{"q":"急性心筋梗塞の典型的症状はどれか。","c":["激しい胸痛が30分以上持続しニトロで改善しない","数秒間の胸痛が繰り返される","運動時のみの息切れ","食後に悪化する上腹部痛"],"a":0,"e":{"correct":"AMIは前胸部の激しい圧迫感が30分以上持続しニトログリセリンでは改善しない。","wrong":{"B":"数秒の胸痛は不整脈を示唆。","C":"運動時の息切れは心不全や狭心症。","D":"食後の上腹部痛は胃腸疾患。"},"point":"AMI＝30分以上の胸痛＋ニトロ無効。狭心症＝数分＋ニトロ有効。"}},{"q":"COPDの最大のリスク因子はどれか。","c":["喫煙","飲酒","高血圧","肥満"],"a":0,"e":{"correct":"COPD患者の約90%に喫煙歴がある。長期喫煙で不可逆的な気流制限。","wrong":{"B":"飲酒は肝疾患のリスク因子。","C":"高血圧は循環器疾患のリスク因子。","D":"COPDでは体重減少がむしろ多い。"},"point":"COPD＝喫煙が最大原因（90%）。「タバコ病」。"}},{"q":"糖尿病の分類について正しいのはどれか。","c":["1型は自己免疫によるインスリン分泌不全、2型はインスリン抵抗性が主体","1型は生活習慣が原因、2型は自己免疫が原因","1型は高齢者に多く2型は小児に多い","1型と2型の治療法は同一"],"a":0,"e":{"correct":"1型＝自己免疫で膵β細胞破壊→インスリン絶対不足。2型＝インスリン抵抗性＋分泌低下。日本は2型が90%。","wrong":{"B":"1型と2型の原因が逆。","C":"1型は若年、2型は中高年に多い。","D":"1型はインスリン必須、2型は段階的治療。"},"point":"1型＝自己免疫・インスリン依存。2型＝生活習慣・抵抗性。"}},{"q":"TNM分類の「T」の意味はどれか。","c":["原発腫瘍の大きさ・進展度","転移の有無","リンパ節転移の程度","腫瘍の悪性度"],"a":0,"e":{"correct":"T＝Tumor（原発腫瘍）、N＝Node（リンパ節転移）、M＝Metastasis（遠隔転移）。","wrong":{"B":"転移はM。","C":"リンパ節はN。","D":"悪性度はGradeで別途分類。"},"point":"T＝腫瘍、N＝リンパ節、M＝遠隔転移。TNMでStageが決まる。"}},{"q":"脳梗塞の3病型に含まれないのはどれか。","c":["ラクナ梗塞","アテローム血栓性脳梗塞","心原性脳塞栓症","出血性脳梗塞"],"a":3,"e":{"correct":"3病型＝ラクナ梗塞・アテローム血栓性・心原性塞栓症。「出血性脳梗塞」は独立した病型ではない。","wrong":{"A":"ラクナ梗塞は3病型の一つ。","B":"アテローム血栓性は3病型の一つ。","C":"心原性塞栓症は3病型の一つ。"},"point":"脳梗塞3病型＝ラクナ・アテローム血栓性・心原性塞栓。"}},{"q":"CKDのステージ分類に用いる指標はどれか。","c":["GFR","血糖値","血圧値","BMI"],"a":0,"e":{"correct":"CKDステージはGFR（糸球体濾過量）に基づく。G5（GFR<15）が末期腎不全。","wrong":{"B":"血糖値は糖尿病の管理指標。","C":"血圧は管理に重要だがステージ分類はGFR。","D":"BMIは肥満の指標。"},"point":"CKDステージ＝GFRで分類。G5＝GFR<15→透析導入。"}},{"q":"大腿骨近位部骨折について正しいのはどれか。","c":["高齢者の転倒で多発し寝たきりの原因となる","小児に最も多い骨折","保存療法が第一選択","骨粗鬆症と関連しない"],"a":0,"e":{"correct":"高齢者の転倒＋骨粗鬆症で多発。寝たきり予防のため手術＋早期リハビリが基本。","wrong":{"B":"高齢者に圧倒的に多い。","C":"手術療法が第一選択。","D":"骨粗鬆症が最大のリスク因子。"},"point":"大腿骨近位部骨折＝高齢者＋骨粗鬆症。手術が基本。"}},{"q":"市中肺炎で最も多い起因菌はどれか。","c":["肺炎球菌","緑膿菌","MRSA","結核菌"],"a":0,"e":{"correct":"市中肺炎（CAP）の最多起因菌は肺炎球菌。ワクチン接種が推奨。","wrong":{"B":"緑膿菌は院内肺炎に多い。","C":"MRSAは院内感染の起因菌。","D":"結核菌は肺結核の原因だが市中肺炎の最多ではない。"},"point":"市中肺炎＝肺炎球菌。院内肺炎＝MRSA・緑膿菌。"}},{"q":"心房細動の最も重要な合併症はどれか。","c":["脳塞栓症","心筋梗塞","肺気腫","腎不全"],"a":0,"e":{"correct":"心房細動→心房内血栓→脳塞栓症。抗凝固療法で予防。","wrong":{"B":"心筋梗塞は冠動脈閉塞が原因。","C":"肺気腫は喫煙が主因。","D":"腎不全は直接的合併症ではない。"},"point":"心房細動→血栓→脳塞栓。抗凝固療法が重要。"}},{"q":"くも膜下出血の最も多い原因はどれか。","c":["脳動脈瘤の破裂","高血圧性脳出血","脳腫瘍","外傷"],"a":0,"e":{"correct":"SAHの約80%は脳動脈瘤破裂。突然の激しい頭痛が特徴。","wrong":{"B":"高血圧性は脳内出血の主因。","C":"脳腫瘍は主因ではない。","D":"外傷性もあるが自発性SAHは動脈瘤が最多。"},"point":"SAH＝脳動脈瘤破裂が80%。突然の激しい頭痛。"}},{"q":"認知症で最も多い原因疾患はどれか。","c":["アルツハイマー型","血管性","レビー小体型","前頭側頭型"],"a":0,"e":{"correct":"アルツハイマー型が約60-70%で最多。次いで血管性、レビー小体型。","wrong":{"B":"血管性は2番目（約20%）。","C":"レビー小体型は3番目。","D":"前頭側頭型は比較的稀。"},"point":"認知症：アルツハイマー（60-70%）>血管性（約20%）>レビー小体型。"}},{"q":"胃がんの最大リスク因子はどれか。","c":["ヘリコバクター・ピロリ菌感染","喫煙","飲酒","肥満"],"a":0,"e":{"correct":"ピロリ菌が胃がんの最大リスク因子。除菌でリスク低減。","wrong":{"B":"喫煙はリスク因子だがピロリ菌ほどではない。","C":"飲酒は食道がんのリスク因子としてより重要。","D":"肥満は大腸がん・乳がんのリスク因子。"},"point":"胃がん＝ピロリ菌が最大リスク。除菌→リスク低下。"}},{"q":"ショックの分類に含まれないのはどれか。","c":["循環血液量減少性ショック","心原性ショック","敗血症性ショック","代謝性ショック"],"a":3,"e":{"correct":"ショック分類＝循環血液量減少性・心原性・心外閉塞性・血液分布異常性。代謝性は存在しない。","wrong":{"A":"出血等で生じるショックの基本型。","B":"心筋梗塞等でポンプ機能破綻。","C":"感染症による分布異常性ショック。"},"point":"ショック分類＝循環血液量減少性・心原性・心外閉塞性・血液分布異常性。"}},{"q":"2型糖尿病の初期治療はどれか。","c":["食事療法と運動療法","インスリン注射","透析療法","手術療法"],"a":0,"e":{"correct":"2型DMの治療は食事・運動療法が基本で最初に行うべき治療。段階的にステップアップ。","wrong":{"B":"インスリンは効果不十分時に使用。","C":"透析は糖尿病性腎症進行時。","D":"手術は重度肥満の場合のみ。"},"point":"2型DM＝①食事・運動→②経口薬→③インスリン。"}},{"q":"関節リウマチの特徴として正しいのはどれか。","c":["朝のこわばりと対称性多関節炎","高齢男性に多い","血液検査に異常なし","片側の大関節のみ"],"a":0,"e":{"correct":"RA＝朝のこわばり（30分以上）＋対称性多関節炎。30〜50歳代女性に好発。","wrong":{"B":"30〜50歳代女性に多い。","C":"RF・抗CCP抗体・CRP等が異常。","D":"対称性の多関節炎が特徴。"},"point":"RA＝朝のこわばり＋対称性＋女性に多い。RF・抗CCP抗体。"}},{"q":"肝硬変の三大合併症に含まれないのはどれか。","c":["食道静脈瘤","腹水","肝性脳症","胆石症"],"a":3,"e":{"correct":"三大合併症＝食道静脈瘤・腹水・肝性脳症。すべて門脈圧亢進が関連。","wrong":{"A":"食道静脈瘤は門脈圧亢進による。","B":"腹水は門脈圧亢進＋低アルブミン。","C":"肝性脳症はアンモニア蓄積。"},"point":"肝硬変三大合併症＝食道静脈瘤・腹水・肝性脳症。"}},{"q":"気管支喘息の病態として正しいのはどれか。","c":["気道の慢性炎症と可逆性の気道狭窄","不可逆性の気道狭窄","肺胞の破壊","胸膜の炎症"],"a":0,"e":{"correct":"気管支喘息は気道の慢性炎症に基づく可逆性の気道狭窄（気流制限）を特徴とする。","wrong":{"B":"不可逆性の気道狭窄はCOPDの特徴。","C":"肺胞破壊は肺気腫の特徴。","D":"胸膜炎は別の疾患。"},"point":"喘息＝可逆性（治療で改善）。COPD＝不可逆性。重要な違い。"}},{"q":"甲状腺機能亢進症（バセドウ病）の症状として正しいのはどれか。","c":["頻脈・体重減少・発汗過多","徐脈・体重増加・寒がり","高血糖・多飲多尿","関節痛・朝のこわばり"],"a":0,"e":{"correct":"バセドウ病は甲状腺ホルモン過剰により頻脈・体重減少・発汗過多・手指振戦・眼球突出等を呈する。","wrong":{"B":"徐脈・体重増加は甲状腺機能低下症の症状。","C":"高血糖・多飲多尿は糖尿病の症状。","D":"関節痛は関節リウマチの症状。"},"point":"亢進症＝頻脈・体重減少・発汗。低下症＝徐脈・体重増加・寒がり。対比で覚える。"}},{"q":"大腸がんの好発部位として最も多いのはどれか。","c":["S状結腸・直腸","盲腸","横行結腸","上行結腸"],"a":0,"e":{"correct":"大腸がんはS状結腸と直腸に好発し、全体の約70%を占める。","wrong":{"B":"盲腸は大腸がんの好発部位ではない。","C":"横行結腸の頻度は低い。","D":"上行結腸の頻度も低い。"},"point":"大腸がん＝S状結腸・直腸が約70%。便潜血検査でスクリーニング。"}},{"q":"心房細動の最も重大な合併症はどれか。","c":["心室中隔欠損","脳塞栓症","肺気腫","腎結石"],"a":1,"e":{"correct":"心房細動では心房内に血栓が形成されやすく、それが脳に飛んで脳塞栓症（心原性脳塞栓症）を引き起こすリスクが高い。","wrong":{"A":"心室中隔欠損は先天性心疾患であり心房細動の合併症ではない。","C":"肺気腫はCOPDの一型であり心房細動とは直接関係しない。","D":"腎結石は泌尿器系疾患で心房細動の合併症ではない。"},"point":"心房細動→心房内血栓→脳塞栓症。抗凝固療法（ワルファリン・DOAC）が重要。"}},{"q":"深部静脈血栓症（DVT）の最も危険な合併症はどれか。","c":["蜂窩織炎","肺塞栓症","脳出血","心筋梗塞"],"a":1,"e":{"correct":"DVTで形成された血栓が遊離して肺動脈に詰まると肺塞栓症（PE）を引き起こす。エコノミークラス症候群とも呼ばれる。","wrong":{"A":"蜂窩織炎は皮膚軟部組織の感染症。","C":"脳出血は動脈病変が原因であり静脈血栓とは機序が異なる。","D":"心筋梗塞は冠動脈の閉塞であり静脈血栓が直接の原因とはならない。"},"point":"DVT→PE（肺塞栓症）。長期臥床・術後・長時間座位がリスク。"}},{"q":"膵臓がんの腫瘍マーカーとして最も有用なのはどれか。","c":["AFP","CEA","CA19-9","PSA"],"a":2,"e":{"correct":"CA19-9は膵臓がんの腫瘍マーカーとして最も広く使用される。膵がんの診断・経過観察に有用。","wrong":{"A":"AFPは肝細胞がんの腫瘍マーカー。","B":"CEAは大腸がんなど消化器がん全般のマーカーだが膵臓がんの特異性は低い。","D":"PSAは前立腺がんの腫瘍マーカー。"},"point":"膵がん＝CA19-9、肝がん＝AFP、大腸がん＝CEA、前立腺がん＝PSA。"}},{"q":"前立腺肥大症の主な症状はどれか。","c":["血尿のみ","排尿困難・頻尿・残尿感","腰痛","下痢"],"a":1,"e":{"correct":"前立腺肥大症は尿道を圧迫し、排尿困難・頻尿（特に夜間）・残尿感・尿線細小などの下部尿路症状を呈する。","wrong":{"A":"血尿は出ることもあるが主症状ではない。","C":"腰痛は前立腺肥大症の典型的症状ではない。","D":"下痢は消化器症状であり前立腺とは無関係。"},"point":"前立腺肥大症＝下部尿路症状（LUTS）。排尿困難・頻尿・残尿感が三大症状。"}},{"q":"急性白血病の診断に最も重要な検査はどれか。","c":["胸部X線検査","骨髄穿刺（骨髄生検）","腹部CT","心電図"],"a":1,"e":{"correct":"急性白血病の確定診断には骨髄穿刺を行い、芽球（未熟な血液細胞）の割合を確認する。骨髄中の芽球が20%以上で診断。","wrong":{"A":"胸部X線は縦隔腫瘤の評価に用いるが確定診断にはならない。","C":"腹部CTは臓器浸潤の評価に有用だが確定診断ではない。","D":"心電図は白血病の診断には使用しない。"},"point":"白血病の確定診断＝骨髄穿刺。芽球20%以上＝急性白血病（WHO分類）。"}},{"q":"悪性リンパ腫の分類として正しいのはどれか。","c":["小細胞がんと大細胞がん","ホジキンリンパ腫と非ホジキンリンパ腫","T細胞性のみ","急性型と慢性型"],"a":1,"e":{"correct":"悪性リンパ腫はホジキンリンパ腫と非ホジキンリンパ腫に大別される。日本では非ホジキンリンパ腫が約90%を占める。","wrong":{"A":"小細胞・大細胞は肺がんの分類。","C":"B細胞性・T細胞性・NK細胞性があり、T細胞性のみではない。","D":"急性型・慢性型は白血病の分類。"},"point":"悪性リンパ腫＝ホジキン＋非ホジキン。日本は非ホジキンが9割。Ann Arbor分類でI〜IV期。"}},{"q":"骨粗鬆症の診断基準で用いられる指標はどれか。","c":["BMI","骨密度（YAM値）","血糖値","CRP"],"a":1,"e":{"correct":"骨粗鬆症はYAM（Young Adult Mean：若年成人平均値）の70%以下で診断。DXA法による骨密度測定が標準。","wrong":{"A":"BMIは肥満度の指標であり骨粗鬆症の診断基準ではない。","C":"血糖値は糖尿病の指標。","D":"CRPは炎症の指標。"},"point":"骨粗鬆症＝YAM70%以下。80%未満は骨量減少。DXA法が標準的測定法。"}},{"q":"関節リウマチの特徴的な症状として正しいのはどれか。","c":["大関節の非対称性腫脹","朝のこわばりと手指小関節の対称性腫脹","発熱のみ","片側の膝関節痛のみ"],"a":1,"e":{"correct":"関節リウマチは朝のこわばり（30分以上）と手指などの小関節の対称性多関節炎が特徴。自己免疫疾患である。","wrong":{"A":"大関節の非対称性はむしろ変形性関節症や痛風の特徴。","C":"発熱は随伴症状であり特徴的症状は関節症状。","D":"片側のみではなく対称性（左右同時）が特徴。"},"point":"関節リウマチ＝朝のこわばり＋小関節対称性腫脹。RF・抗CCP抗体が重要。"}},{"q":"てんかんの診断に最も有用な検査はどれか。","c":["脳波検査（EEG）","頭部MRI","腰椎穿刺","血液検査"],"a":0,"e":{"correct":"てんかんの診断には脳波検査（EEG）が最も有用。棘波・鋭波などのてんかん性異常波を検出する。","wrong":{"B":"頭部MRIは器質的病変の検索に有用だがてんかんの機能的診断はEEG。","C":"腰椎穿刺は髄膜炎等の診断に用いる。","D":"血液検査は鑑別診断に用いるがてんかんの直接的診断にはならない。"},"point":"てんかん診断＝EEG（脳波）。発作型分類に基づき薬物選択を行う。"}},{"q":"パーキンソン病の4大症状に含まれないものはどれか。","c":["安静時振戦","筋強剛（固縮）","認知症","無動・寡動"],"a":2,"e":{"correct":"パーキンソン病の4大症状は安静時振戦・筋強剛・無動/寡動・姿勢反射障害。認知症は合併することがあるが4大症状には含まれない。","wrong":{"A":"安静時振戦は4大症状の一つで初発症状として多い。","B":"筋強剛（固縮）は4大症状の一つ。","D":"無動・寡動は動作緩慢として4大症状の一つ。"},"point":"パーキンソン4大症状＝振戦・固縮・無動・姿勢反射障害。ドパミン神経の変性が原因。"}},{"q":"褥瘡の好発部位として最も多いのはどれか。","c":["前腕","仙骨部","腹部","前胸部"],"a":1,"e":{"correct":"褥瘡は仙骨部が最も好発する。体圧が集中し骨が突出している部位に発生しやすい。","wrong":{"A":"前腕は褥瘡の好発部位ではない。","C":"腹部は褥瘡の好発部位として頻度が低い。","D":"前胸部は体圧がかかりにくく褥瘡の好発部位ではない。"},"point":"褥瘡好発部位＝仙骨部＞踵部＞大転子部。DESIGN-R分類で重症度評価。"}},{"q":"敗血症の定義として現在（Sepsis-3）正しいのはどれか。","c":["細菌が血液中に存在すること","感染症に対する制御不能な宿主反応による臓器障害","38℃以上の発熱があること","白血球数が増加していること"],"a":1,"e":{"correct":"Sepsis-3（2016年）では敗血症を「感染症に対する制御不能な宿主反応に起因する生命を脅かす臓器障害」と定義。SOFAスコアで評価。","wrong":{"A":"菌血症（bacteremia）の定義であり敗血症とは異なる。","C":"発熱は敗血症の一症状だが定義そのものではない。","D":"白血球増加は感染の指標だが敗血症の定義ではない。"},"point":"Sepsis-3＝感染症＋臓器障害。qSOFA（呼吸数・意識・血圧）でスクリーニング。"}},{"q":"肺塞栓症の確定診断に最も有用な画像検査はどれか。","c":["胸部X線","造影CT（CTPA）","心エコー","腹部超音波"],"a":1,"e":{"correct":"造影CT肺動脈造影（CTPA）は肺塞栓症の確定診断に最も有用。肺動脈内の血栓を直接描出できる。","wrong":{"A":"胸部X線は非特異的所見が多く確定診断には不十分。","C":"心エコーは右心負荷の評価に有用だが血栓の直接描出は困難。","D":"腹部超音波は肺塞栓の診断には使用しない。"},"point":"肺塞栓の確定診断＝CTPA。D-dimerは除外診断に有用。"}}]},{"id":6,"name":"医療統計I（基礎統計学）","questions":[{"q":"外れ値の影響を最も受けにくい代表値はどれか。","c":["中央値","平均値","合計値","範囲"],"a":0,"e":{"correct":"中央値はデータを順に並べた中央の値で、外れ値の影響を受けにくい。在院日数の分析に適切。","wrong":{"B":"平均値は外れ値に大きく影響される。","C":"合計値は代表値ではない。","D":"範囲は外れ値に最も影響される。"},"point":"外れ値に強い＝中央値。在院日数には中央値を使用。"}},{"q":"正規分布で平均±1SDに含まれるデータは約何%か。","c":["約68%","約95%","約99.7%","約50%"],"a":0,"e":{"correct":"±1SD＝約68%、±2SD＝約95%、±3SD＝約99.7%。","wrong":{"B":"約95%は±2SD。","C":"約99.7%は±3SD。","D":"50%は中央値の上下。"},"point":"68-95-99.7ルール。±1SD＝68%、±2SD＝95%、±3SD＝99.7%。"}},{"q":"p値が0.05未満の場合の解釈はどれか。","c":["帰無仮説を棄却し統計学的に有意差あり","帰無仮説を採択し差なし","臨床的に必ず意味ある差","100%の証明"],"a":0,"e":{"correct":"p<0.05は帰無仮説を棄却して有意差ありと判断。ただし統計的有意≠臨床的有意性。","wrong":{"B":"p<0.05では帰無仮説を棄却する。","C":"統計的有意性と臨床的有意性は別概念。","D":"p値は確率であり100%ではない。"},"point":"p<0.05＝有意差あり。統計的有意≠臨床的に重要。"}},{"q":"感度の定義はどれか。","c":["疾患がある人で検査陽性の割合","疾患がない人で検査陰性の割合","検査陽性で実際に疾患ありの割合","検査陰性で実際に疾患なしの割合"],"a":0,"e":{"correct":"感度＝真陽性÷（真陽性＋偽陰性）。疾患者を正しく陽性と判定する割合。","wrong":{"B":"それは特異度。","C":"それは陽性的中率。","D":"それは陰性的中率。"},"point":"感度＝病気→陽性。特異度＝健康→陰性。セットで覚える。"}},{"q":"ROC曲線のAUCが1.0に近い場合の意味はどれか。","c":["診断精度が高い","診断精度が低い","費用が高い","実施時間が長い"],"a":0,"e":{"correct":"AUCは0.5〜1.0で、1.0に近いほど診断精度が高い。0.5は偶然と同等。","wrong":{"B":"1.0に近いほど精度は高い。","C":"費用とは無関係。","D":"時間とは無関係。"},"point":"AUC＝1.0は完璧、0.5は無意味。0.9以上で非常に良好。"}},{"q":"オッズ比の説明として正しいのはどれか。","c":["曝露群と非曝露群の疾患発生オッズの比","疾患の罹患率そのもの","治療効果の絶対的な大きさ","標本サイズの適切さ"],"a":0,"e":{"correct":"OR＝1は関連なし、OR>1は正の関連、OR<1は負の関連。主に症例対照研究で使用。","wrong":{"B":"罹患率はincidence rate。","C":"治療効果は効果量やNNT。","D":"標本サイズはパワー分析。"},"point":"OR＝1なら関連なし。症例対照研究で使用。"}},{"q":"エビデンスレベルが最も高い研究デザインはどれか。","c":["メタアナリシス","RCT","コホート研究","症例報告"],"a":0,"e":{"correct":"メタアナリシス/システマティックレビューが最上位。複数のRCTを統合分析。","wrong":{"B":"RCTは高いがメタアナリシスの下位。","C":"コホートは観察研究。","D":"症例報告は最下層。"},"point":"メタアナリシス>RCT>コホート>症例対照>症例報告。"}},{"q":"NNTの説明として正しいのはどれか。","c":["1人のイベントを防ぐために必要な治療患者数","臨床試験の最小サンプルサイズ","副作用発生確率","費用対効果の指標"],"a":0,"e":{"correct":"NNT＝1/ARR。小さいほど治療効果が大きい。","wrong":{"B":"サンプルサイズ計算はパワー分析。","C":"副作用はNNH。","D":"費用対効果は医療経済評価。"},"point":"NNT＝1人を救うのに必要な治療人数。小さいほど効果的。"}},{"q":"カイ二乗検定の適用場面はどれか。","c":["2つのカテゴリ変数の独立性検定","2群の平均値の差の検定","3群以上の平均値比較","2変数間の相関検定"],"a":0,"e":{"correct":"カイ二乗検定はカテゴリデータ間の関連性・独立性を検定。クロス集計表を使用。","wrong":{"B":"平均値の差はt検定。","C":"3群以上はANOVA。","D":"相関はピアソンの相関係数検定。"},"point":"カイ二乗＝カテゴリ×カテゴリ。t検定＝平均比較。ANOVA＝3群以上。"}},{"q":"症例対照研究で特に問題となるバイアスはどれか。","c":["想起バイアス","計測バイアス","経時バイアス","出版バイアス"],"a":0,"e":{"correct":"想起バイアスは症例群が過去の曝露をより詳しく思い出しやすい偏り。関連が過大評価される。","wrong":{"B":"計測バイアスは症例対照研究に特有ではない。","C":"経時バイアスはコホート研究で問題。","D":"出版バイアスはメタアナリシスで問題。"},"point":"想起バイアス＝症例対照研究の弱点。"}},{"q":"Kaplan-Meier法の説明として正しいのはどれか。","c":["打ち切りデータを含む生存時間分析の方法","2群の平均値比較","回帰分析で将来予測","感度と特異度の算出"],"a":0,"e":{"correct":"Kaplan-Meier法は打ち切り（センサード）データを含む生存率の推定と生存曲線の描出に使用。","wrong":{"B":"平均値比較はt検定。","C":"生存時間の回帰はCox比例ハザードモデル。","D":"感度・特異度の算出には使わない。"},"point":"Kaplan-Meier＝生存曲線。打ち切りデータを扱えるのが特徴。"}},{"q":"相関係数r=-0.9の解釈はどれか。","c":["強い負の相関","相関なし","強い正の相関","弱い負の相関"],"a":0,"e":{"correct":"|r|=0.9は非常に強い相関。マイナスは負の相関（一方が増えると他方が減る）。","wrong":{"B":"r≒0が無相関。","C":"正の相関はr>0。","D":"|r|=0.9は弱くない。"},"point":"r＝±0.7以上で強い相関。符号が方向を示す。"}},{"q":"交絡因子の説明として正しいのはどれか。","c":["曝露と結果の両方に関連し関係を歪める第三の因子","研究の測定誤差","標本サイズの小ささによる偶然誤差","研究デザインの種類"],"a":0,"e":{"correct":"交絡因子は曝露と結果の両方に関連する第三の因子で、真の関連を歪める。","wrong":{"B":"測定誤差はバイアスの一種。","C":"偶然の誤差は標本変動。","D":"研究デザインではなく変数の問題。"},"point":"交絡＝第三の因子。層別化や多変量解析で制御。"}},{"q":"寄与リスクの説明として正しいのはどれか。","c":["曝露群の罹患率から非曝露群の罹患率を引いた差","曝露群と非曝露群の罹患率の比","治療費用","標本サイズ"],"a":0,"e":{"correct":"寄与リスク（AR）＝曝露群の罹患率−非曝露群の罹患率。曝露によるリスク増加の絶対量。","wrong":{"B":"罹患率の比は相対リスク（RR）。","C":"費用とは無関係。","D":"標本サイズとは異なる。"},"point":"寄与リスク＝差。相対リスク＝比。差と比の違い。"}},{"q":"2×2分割表（四分表）で、疾病あり・曝露ありのセルをaとした場合、オッズ比の計算式はどれか。","c":["a×d / b×c","a×c / b×d","(a+b) / (c+d)","a / (a+b)"],"a":0,"e":{"correct":"オッズ比（OR）＝ad/bc。2×2分割表でa＝曝露あり疾病あり、b＝曝露あり疾病なし、c＝曝露なし疾病あり、d＝曝露なし疾病なし。","wrong":{"B":"a×c/b×dは正しいオッズ比の計算式ではない。","C":"(a+b)/(c+d)は曝露群と非曝露群の人数比。","D":"a/(a+b)は曝露群の罹患率（リスク）。"},"point":"オッズ比＝ad/bc。症例対照研究の主要指標。分割表の対角の積の比。"}},{"q":"分散について正しい説明はどれか。","c":["データの中央値との差の合計","偏差の2乗の平均","データの最大値と最小値の差","データの平均値そのもの"],"a":1,"e":{"correct":"分散は各データの偏差（平均値との差）を2乗し、それを平均したもの。データの散らばりを表す指標。","wrong":{"A":"偏差の合計は常にゼロになるため指標にならない。","C":"最大値と最小値の差は「範囲（レンジ）」。","D":"平均値はデータの代表値であり散らばりの指標ではない。"},"point":"分散＝偏差の2乗の平均。標準偏差＝分散の平方根。散布度の代表的指標。"}},{"q":"母集団と標本の関係について正しいのはどれか。","c":["標本は母集団より常に大きい","標本から母集団の特性を推定することを統計的推測という","母集団は必ず有限である","標本サイズが大きいほど推定精度は低下する"],"a":1,"e":{"correct":"統計的推測とは標本のデータから母集団のパラメータ（母平均・母分散等）を推定すること。統計学の基本概念。","wrong":{"A":"標本は母集団の一部であり母集団より小さい。","C":"無限母集団（例：サイコロを無限に振る）も存在する。","D":"標本サイズが大きいほど推定精度は向上する。"},"point":"統計的推測＝標本→母集団の推定。標本サイズnが大きいほど精度向上。"}},{"q":"帰無仮説について正しい説明はどれか。","c":["研究者が証明したい仮説","差がない（効果がない）とする仮説","常に棄却される仮説","対立仮説と同じ意味"],"a":1,"e":{"correct":"帰無仮説（H₀）は「差がない」「効果がない」とする仮説。これを検定で棄却することにより対立仮説を採択する。","wrong":{"A":"研究者が証明したい仮説は対立仮説（H₁）。","C":"帰無仮説は棄却されることもあれば棄却されないこともある。","D":"帰無仮説と対立仮説は互いに排反する仮説。"},"point":"H₀＝帰無仮説（差なし）、H₁＝対立仮説（差あり）。P値で判定。"}},{"q":"第1種の過誤（αエラー）とは何か。","c":["帰無仮説が正しいのに棄却してしまう誤り","帰無仮説が誤りなのに棄却しない誤り","標本サイズの計算を誤ること","データ入力のミス"],"a":0,"e":{"correct":"第1種の過誤は帰無仮説が正しい（差がない）のにそれを棄却して「差がある」と判断してしまう誤り。有意水準αで制御。","wrong":{"B":"帰無仮説が誤りなのに棄却しないのは第2種の過誤（βエラー）。","C":"標本サイズの計算誤りは統計的過誤の分類には含まれない。","D":"データ入力ミスは統計的過誤ではなく人為的エラー。"},"point":"第1種＝偽陽性（αエラー）。第2種＝偽陰性（βエラー）。検出力＝1-β。"}},{"q":"多変量解析の手法のうち、複数の独立変数から1つの従属変数を予測するのはどれか。","c":["主成分分析","重回帰分析","クラスター分析","因子分析"],"a":1,"e":{"correct":"重回帰分析は複数の独立変数（説明変数）から1つの従属変数（目的変数）を予測する手法。","wrong":{"A":"主成分分析は多数の変数を少数の合成変数に縮約する手法。","C":"クラスター分析はデータを類似度に基づきグループ分けする手法。","D":"因子分析は観測変数の背後にある共通因子を探索する手法。"},"point":"重回帰分析＝複数独立変数→1つの従属変数。ロジスティック回帰は従属変数が2値。"}},{"q":"ハザード比について正しいのはどれか。","c":["ある時点での瞬間的なイベント発生率の比","累積発症率の比","有病率の比","死亡数の比"],"a":0,"e":{"correct":"ハザード比はある時点での瞬間的なイベント（死亡等）発生率の比。生存分析（Cox比例ハザードモデル）で用いる。","wrong":{"B":"累積発症率の比はリスク比（相対リスク）。","C":"有病率の比は有病率比（prevalence ratio）。","D":"死亡数の比は単純な比率であり、時間の概念を含まない。"},"point":"ハザード比＝瞬間的リスクの比。Cox回帰で算出。生存分析の重要指標。"}},{"q":"累積発症率の計算式として正しいのはどれか。","c":["期間中の新規発症者数÷観察開始時の観察対象者数","期間中の有病者数÷ある時点の全人口","期間中の死亡者数÷期間中の患者数","期間中の新規発症者数÷観察人年"],"a":0,"e":{"correct":"累積発症率（累積罹患率）＝期間中の新規発症者数÷観察開始時のリスク集団の人数。0〜1の値をとる。","wrong":{"B":"これは有病率（ポイント有病率）の計算式。","C":"これは致死率（致命率）の計算式。","D":"これは人年法による罹患率（発症密度）の計算式。"},"point":"累積発症率＝新規発症÷観察開始人数。罹患率＝新規発症÷観察人年。分母が異なる。"}},{"q":"罹患率と有病率の違いについて正しいのはどれか。","c":["罹患率は既存患者を含むが有病率は新規患者のみ","罹患率は新規発症のみ、有病率はある時点での全患者","罹患率と有病率は同じ指標である","有病率は時間の概念を含む"],"a":1,"e":{"correct":"罹患率は一定期間の新規発症を測定する指標。有病率はある一時点における全患者（新規＋既存）の割合。","wrong":{"A":"説明が逆。罹患率は新規のみ、有病率は既存患者も含む。","C":"罹患率と有病率は異なる疫学指標。","D":"有病率（点有病率）はある一時点の断面を見るもので、時間経過の概念は罹患率のほう。"},"point":"罹患率＝新規発症（フロー）。有病率＝全患者（ストック）。有病率≒罹患率×有病期間。"}},{"q":"リスク差（寄与リスク）の意味として正しいのはどれか。","c":["曝露群と非曝露群の罹患率の比","曝露群の罹患率から非曝露群の罹患率を引いた差","曝露群のオッズ比","曝露群の有病率"],"a":1,"e":{"correct":"リスク差（寄与リスク）＝曝露群の罹患率−非曝露群の罹患率。曝露によって増加した疾病リスクの絶対量を示す。","wrong":{"A":"罹患率の比は相対リスク（リスク比）。","C":"オッズ比は症例対照研究の指標で、リスク差ではない。","D":"有病率はリスク差の定義とは異なる。"},"point":"リスク差＝差（絶対指標）。リスク比＝比（相対指標）。両方の理解が重要。"}},{"q":"層別化の目的として正しいのはどれか。","c":["標本サイズを増やすこと","交絡因子の影響を制御すること","データの入力ミスを防ぐこと","検定の有意水準を変更すること"],"a":1,"e":{"correct":"層別化は交絡因子の影響を除去するため、交絡因子の各カテゴリ（層）ごとに解析を行う方法。","wrong":{"A":"層別化は標本サイズを増やす手法ではない。むしろ各層のサイズは小さくなる。","C":"データ入力ミスの防止は層別化の目的ではない。","D":"有意水準は研究者が事前に設定するもので層別化とは無関係。"},"point":"交絡の制御法＝層別化・マッチング・多変量解析・ランダム化。"}},{"q":"マッチングについて正しい説明はどれか。","c":["症例群と対照群で交絡因子の分布を揃える方法","無作為に症例群と対照群を割り付ける方法","すべての変数を一致させる方法","コホート研究でのみ使用される方法"],"a":0,"e":{"correct":"マッチングは症例対照研究等で、症例群と対照群の交絡因子（年齢・性別等）の分布を意図的に揃えることで交絡を制御する方法。","wrong":{"B":"無作為割り付けはランダム化であり、マッチングとは異なる。","C":"すべての変数を一致させることは現実的に不可能。主要な交絡因子について行う。","D":"症例対照研究でも使用される。コホート研究限定ではない。"},"point":"マッチング＝交絡因子を症例と対照で揃える。個別マッチングと頻度マッチングがある。"}},{"q":"交絡因子の条件として正しいものの組み合わせはどれか。","c":["曝露と関連があり、疾病の原因（リスク因子）であり、曝露と疾病の中間変数でない","曝露と関連があり、疾病と関連がなく、中間変数である","曝露と関連がなく、疾病の原因であること","曝露の結果として生じ、疾病のリスク因子であること"],"a":0,"e":{"correct":"交絡因子の3条件：①曝露因子と関連、②疾病の原因（独立したリスク因子）、③曝露と疾病の因果経路上の中間変数でない。","wrong":{"B":"疾病との関連がないものは交絡因子にならない。","C":"曝露との関連がないものは交絡因子にならない。","D":"曝露の結果として生じるのは中間変数であり交絡因子ではない。"},"point":"交絡因子の3条件を正確に覚える。中間変数との区別が重要。"}}]},{"id":7,"name":"医療統計II（保健統計・人口統計）","questions":[{"q":"人口静態統計の基盤となる調査はどれか。","c":["国勢調査","人口動態調査","患者調査","国民生活基礎調査"],"a":0,"e":{"correct":"人口静態統計はある一時点の人口状態を示す。5年ごとの国勢調査が基盤。","wrong":{"B":"人口動態調査は出生・死亡等の動態統計。","C":"患者調査は患者の傷病状況。","D":"国民生活基礎調査は世帯の健康等。"},"point":"静態＝国勢調査（5年ごと）。動態＝出生・死亡等の届出。"}},{"q":"人口動態統計の5事象はどれか。","c":["出生・死亡・婚姻・離婚・死産","出生・死亡・転入・転出・婚姻","出生・死亡・入院・退院・手術","出生・死亡・罹患・受診・治癒"],"a":0,"e":{"correct":"人口動態統計は出生・死亡・婚姻・離婚・死産の5事象。市区町村への届出に基づく。","wrong":{"B":"転入・転出は住民基本台帳の統計。","C":"入院・退院は医療統計。","D":"罹患・受診は疾病統計。"},"point":"5事象＝出生・死亡・婚姻・離婚・死産。"}},{"q":"年齢調整死亡率の目的はどれか。","c":["年齢構成の異なる集団間の死亡率を比較可能にする","すべての年齢の死亡率を合計する","特定年齢層のみの死亡率を算出","将来の死亡数を予測"],"a":0,"e":{"correct":"年齢構成が異なる集団間で公平に比較するため基準人口に合わせて調整。","wrong":{"B":"単純合計ではなく標準化して算出。","C":"それは年齢階級別死亡率。","D":"将来予測は人口推計。"},"point":"年齢調整死亡率＝年齢構成の違いを排除して比較可能にする。"}},{"q":"乳児死亡率の定義はどれか。","c":["年間の生後1年未満の死亡数÷出生数×1000","生後28日未満の死亡数÷出生数×1000","生後7日未満の死亡数÷出生数×1000","5歳未満の死亡数÷出生数×1000"],"a":0,"e":{"correct":"乳児死亡率＝生後1年未満の死亡。保健医療水準の指標。","wrong":{"B":"28日未満は新生児死亡率。","C":"7日未満は早期新生児死亡率。","D":"5歳未満はU5MR。"},"point":"乳児＝1年未満。新生児＝28日未満。早期新生児＝7日未満。"}},{"q":"合計特殊出生率の説明として正しいのはどれか。","c":["1人の女性が生涯に産む子どもの数の推計値","全女性の出産数の合計","男女合わせた出生数の合計","出生数÷人口"],"a":0,"e":{"correct":"TFR＝15〜49歳女性の年齢別出生率の合計。人口置換水準は約2.07。","wrong":{"B":"実際の合計ではなく年齢別出生率から推計した値。","C":"出生数の合計ではない。","D":"それは粗出生率。"},"point":"合計特殊出生率＝生涯出産数の推計。置換水準2.07。"}},{"q":"日本の死因第1位はどれか。","c":["悪性新生物","心疾患","老衰","脳血管疾患"],"a":0,"e":{"correct":"悪性新生物（がん）が1981年から死因第1位。2位心疾患、3位老衰、4位脳血管疾患。","wrong":{"B":"心疾患は第2位。","C":"老衰は近年上昇して第3位。","D":"脳血管疾患は第4位。"},"point":"1位がん、2位心疾患、3位老衰、4位脳血管疾患。1981年から。"}},{"q":"患者調査で把握できる指標はどれか。","c":["受療率と平均在院日数","出生率と死亡率","婚姻率と離婚率","国民所得と貯蓄率"],"a":0,"e":{"correct":"患者調査は3年ごと実施。受療率・平均在院日数が主な指標。","wrong":{"B":"出生率・死亡率は人口動態統計。","C":"婚姻率・離婚率は人口動態統計。","D":"経済統計で無関係。"},"point":"患者調査＝3年ごと・受療率・平均在院日数。"}},{"q":"国民生活基礎調査で把握される指標はどれか。","c":["有訴者率・通院者率","受療率・平均在院日数","出生率・死亡率","手術件数"],"a":0,"e":{"correct":"国民生活基礎調査は世帯調査で有訴者率（自覚症状あり）と通院者率が代表的指標。","wrong":{"B":"受療率は患者調査。","C":"出生率は人口動態統計。","D":"手術件数は病院報告等。"},"point":"国民生活基礎調査＝有訴者率・通院者率。"}},{"q":"SMR（標準化死亡比）の説明として正しいのはどれか。","c":["実際の死亡数を期待死亡数で割った比","2集団の粗死亡率の比","年齢調整死亡率そのもの","出生数と死亡数の比"],"a":0,"e":{"correct":"SMR＝実際の死亡数÷期待死亡数×100。100超は基準より死亡多い。間接法の指標。","wrong":{"B":"粗死亡率の単純比ではない。","C":"年齢調整死亡率は直接法。","D":"出生数と死亡数の比ではない。"},"point":"SMR＝実際÷期待×100。100超は死亡多い。"}},{"q":"平均寿命と健康寿命の違いとして正しいのはどれか。","c":["平均寿命は0歳の平均余命、健康寿命は日常生活制限なしの期間","両者は同じ意味","健康寿命の方が常に長い","平均寿命は男性のみの指標"],"a":0,"e":{"correct":"平均寿命＝0歳の平均余命。健康寿命＝日常生活に制限がない期間。差が不健康期間。","wrong":{"B":"異なる概念。","C":"健康寿命は必ず平均寿命より短い。","D":"どちらも男女別に算出。"},"point":"平均寿命−健康寿命＝不健康期間。この差の縮小が政策目標。"}},{"q":"罹患率と有病率の違いとして正しいのはどれか。","c":["罹患率は新規発生、有病率はある時点での患者の存在割合","両者は同じ意味","罹患率は慢性疾患のみ","罹患率の分母は患者数"],"a":0,"e":{"correct":"罹患率＝新規発生（フロー）。有病率＝既存患者の割合（ストック）。","wrong":{"B":"異なる概念。","C":"どちらも急性・慢性に使用。","D":"分母はリスク集団。"},"point":"罹患率＝新規、有病率＝既存。有病率≒罹患率×罹病期間。"}},{"q":"周産期死亡率の定義で正しいのはどれか。","c":["妊娠満22週以後の死産＋早期新生児死亡÷出産数×1000","妊娠全期間の死産÷出生数×1000","新生児死亡÷出生数×1000","1歳未満の死亡÷出生数×1000"],"a":0,"e":{"correct":"周産期死亡＝妊娠22週以後の死産＋生後7日未満の死亡。周産期医療水準の指標。","wrong":{"B":"妊娠全期間ではなく22週以後。","C":"それは新生児死亡率。","D":"それは乳児死亡率。"},"point":"周産期死亡＝22週以後の死産＋7日未満の死亡。"}},{"q":"感染症サーベイランスの目的はどれか。","c":["発生動向を継続監視し流行の早期探知と対策に活用","すべての患者を隔離","治療法の開発","個人情報の公開"],"a":0,"e":{"correct":"サーベイランスは感染症の発生状況を継続的に収集・分析し対策に活用する公衆衛生活動。","wrong":{"B":"隔離が目的ではなく監視が目的。","C":"治療法開発は臨床研究。","D":"個人情報保護に配慮。"},"point":"サーベイランス＝継続的監視→早期探知→対策立案。"}},{"q":"生命表から得られる情報はどれか。","c":["各年齢の生存率・死亡率・平均余命","年収と貯蓄額","就業率と失業率","受診率と処方率"],"a":0,"e":{"correct":"生命表は年齢別死亡率から生存率・平均余命等を算出。0歳の平均余命＝平均寿命。","wrong":{"B":"経済統計であり生命表ではない。","C":"労働統計であり生命表ではない。","D":"医療統計であり生命表ではない。"},"point":"生命表＝年齢別死亡率→生存率・平均余命。0歳の平均余命＝平均寿命。"}},{"q":"致死率の定義はどれか。","c":["ある疾患の患者のうちその疾患で死亡する割合","人口全体の死亡者割合","特定年齢層の死亡率","年間死亡者数"],"a":0,"e":{"correct":"致死率＝疾患による死亡数÷罹患者数。疾患の重篤度の指標。","wrong":{"B":"人口全体は粗死亡率。","C":"特定年齢は年齢階級別死亡率。","D":"死亡者数は率ではなく絶対数。"},"point":"致死率＝患者のうち死亡する割合。粗死亡率＝人口あたりの死亡。分母が違う。"}},{"q":"出生率の計算式として正しいのはどれか。","c":["年間出生数÷年央人口×1,000","年間出生数÷出産可能女性数×1,000","年間出生数÷年間婚姻数×1,000","年間出生数÷全世帯数×1,000"],"a":0,"e":{"correct":"（粗）出生率＝年間出生数÷年央（10月1日）人口×1,000（人口千対）。","wrong":{"B":"出産可能女性数を分母にするのは合計特殊出生率の考え方に近い。","C":"婚姻数を分母にしたものは出生率の定義ではない。","D":"世帯数は出生率の分母にならない。"},"point":"出生率＝出生数÷人口×1,000。死亡率も同様に人口千対。"}},{"q":"死産率の計算式として正しいのはどれか。","c":["年間死産数÷年間出生数×1,000","年間死産数÷（年間出生数＋年間死産数）×1,000","年間死産数÷年央人口×1,000","年間死産数÷年間妊娠数×1,000"],"a":1,"e":{"correct":"死産率＝年間死産数÷（年間出産数）×1,000。出産数＝出生数＋死産数。分母は出産数（出生数＋死産数）。","wrong":{"A":"分母が出生数のみでは死産を含まず不正確。","C":"人口を分母にするのは粗率の計算法で死産率には使わない。","D":"妊娠数は正確に把握困難であり分母にしない。"},"point":"死産率＝死産数÷（出生数＋死産数）×1,000。出産数が分母。"}},{"q":"死因別死亡率で日本の第1位はどれか（最新統計）。","c":["心疾患","脳血管疾患","悪性新生物（がん）","肺炎"],"a":2,"e":{"correct":"日本の死因第1位は悪性新生物（がん）で、1981年以降一貫して首位。全死亡の約27%を占める。","wrong":{"A":"心疾患は第2位。","B":"脳血管疾患は第4位（老衰に抜かれ第4位に後退）。","D":"肺炎は第5位。第3位は老衰。"},"point":"死因順位＝①がん②心疾患③老衰④脳血管疾患⑤肺炎。老衰の上昇が近年の特徴。"}},{"q":"人口ピラミッドの型で、日本の現在の形に最も近いのはどれか。","c":["富士山型（ピラミッド型）","つりがね型（釣鐘型）","つぼ型（壺型）","星型"],"a":2,"e":{"correct":"日本の人口ピラミッドは少子高齢化によりつぼ型（壺型）。底辺が狭く上部が広い形状。","wrong":{"A":"富士山型は多産多死の発展途上国に見られる。","B":"つりがね型は出生率・死亡率が安定した先進国の過渡期の形。","D":"星型という人口ピラミッドの分類はない。"},"point":"人口ピラミッド＝富士山型（多産多死）→つりがね型→つぼ型（少産少死）。日本はつぼ型。"}},{"q":"老年人口割合が21%を超えた社会を何というか。","c":["高齢化社会","高齢社会","超高齢社会","超超高齢社会"],"a":2,"e":{"correct":"超高齢社会は65歳以上人口が総人口の21%を超えた社会。日本は2007年に到達。","wrong":{"A":"高齢化社会は65歳以上が7%を超えた場合。","B":"高齢社会は65歳以上が14%を超えた場合。","D":"超超高齢社会は一般的な人口学用語ではない。"},"point":"7%＝高齢化社会、14%＝高齢社会、21%＝超高齢社会。日本は約29%。"}},{"q":"従属人口指数の計算式はどれか。","c":["（年少人口＋老年人口）÷生産年齢人口×100","老年人口÷生産年齢人口×100","年少人口÷総人口×100","生産年齢人口÷総人口×100"],"a":0,"e":{"correct":"従属人口指数＝（年少人口＋老年人口）÷生産年齢人口×100。生産年齢層が支える人口の割合を示す。","wrong":{"B":"これは老年人口指数（老年従属人口指数）。","C":"年少人口÷総人口は年少人口割合。","D":"生産年齢人口÷総人口は生産年齢人口割合。"},"point":"従属人口指数＝（0-14歳＋65歳以上）÷15-64歳×100。年少＋老年の合計。"}},{"q":"合計特殊出生率について正しいのはどれか。","c":["一人の女性が一生に産む子どもの実際の数","15歳から49歳までの女性の年齢別出生率の合計","出生数を全人口で割ったもの","既婚女性のみの出生率"],"a":1,"e":{"correct":"合計特殊出生率（TFR）は15〜49歳の女性の年齢別出生率を合計したもの。期間合計特殊出生率ともいう。","wrong":{"A":"実際の数ではなく、その年の年齢別出生率から仮想的に計算した値。","C":"出生数÷全人口は粗出生率。","D":"既婚・未婚を問わず全女性の出生率から計算する。"},"point":"TFR＝年齢別出生率の合計。人口置換水準は約2.07。日本は約1.2。"}},{"q":"0歳の平均余命と平均寿命の関係について正しいのはどれか。","c":["平均寿命は0歳の平均余命と同じ","平均寿命は65歳の平均余命と同じ","平均寿命は全年齢の平均余命の平均","平均寿命と平均余命は無関係"],"a":0,"e":{"correct":"平均寿命とは0歳の平均余命のこと。生命表から算出される。その年の死亡状況が続いた場合に0歳児が平均的に生きられる年数。","wrong":{"B":"65歳の平均余命は高齢者の余命指標だが平均寿命ではない。","C":"全年齢の平均余命の平均ではなく0歳の平均余命が平均寿命。","D":"平均寿命＝0歳の平均余命であり密接に関係。"},"point":"平均寿命＝0歳の平均余命。生命表から算出。健康寿命との差も重要指標。"}},{"q":"年齢3区分のうち生産年齢人口の範囲はどれか。","c":["0〜14歳","15〜64歳","15〜59歳","20〜64歳"],"a":1,"e":{"correct":"年齢3区分は年少人口（0〜14歳）、生産年齢人口（15〜64歳）、老年人口（65歳以上）。","wrong":{"A":"0〜14歳は年少人口。","C":"15〜59歳ではなく15〜64歳が国際的な生産年齢人口の定義。","D":"20歳からではなく15歳からが生産年齢人口。"},"point":"年齢3区分＝0-14歳（年少）＋15-64歳（生産年齢）＋65歳以上（老年）。"}},{"q":"医療施設静態調査について正しいのはどれか。","c":["毎月実施される","3年に1回実施される","病院のみが対象である","厚生労働省ではなく都道府県が実施する"],"a":1,"e":{"correct":"医療施設静態
